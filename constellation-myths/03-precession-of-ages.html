<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precession of the Ages - Constellation Myths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1c; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #timeline {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 700px; z-index: 100;
        }
        #timeline input[type="range"] {
            width: 100%; -webkit-appearance: none; background: rgba(138,154,91,0.2);
            height: 6px; border-radius: 3px; outline: none;
        }
        #timeline input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: #DDA15E; border-radius: 50%; cursor: pointer;
        }
        #year-display {
            text-align: center; color: #DDA15E; font-size: 1.4rem; font-weight: 700;
            margin-bottom: 8px; text-shadow: 0 0 20px rgba(221,161,94,0.5);
        }
        #year-markers {
            display: flex; justify-content: space-between; color: rgba(138,154,91,0.5);
            font-size: 0.65rem; margin-top: 4px;
        }
        #info-box {
            position: fixed; top: 60px; right: 20px; width: 260px;
            background: rgba(10,10,28,0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.25); border-radius: 12px;
            padding: 16px; color: #FEFAE0; z-index: 100;
        }
        #info-box h3 { color: #DDA15E; font-size: 1rem; margin-bottom: 8px; }
        #info-box .pole-star { font-size: 0.95rem; color: #FEFAE0; margin-bottom: 6px; }
        #info-box .detail { font-size: 0.8rem; color: #8A9A5B; line-height: 1.5; }
        #play-btn {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(138,154,91,0.2); border: 1px solid rgba(138,154,91,0.4);
            color: #8A9A5B; padding: 8px 24px; border-radius: 20px;
            cursor: pointer; font-size: 0.85rem; z-index: 100; transition: all 0.2s;
        }
        #play-btn:hover { background: rgba(138,154,91,0.35); color: #DDA15E; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info-box">
        <h3>North Celestial Pole</h3>
        <div class="pole-star" id="pole-star-name">Current: Polaris</div>
        <div class="detail" id="pole-detail">The Earth's axis wobbles like a gyroscope, tracing a circle among the stars over 25,772 years. Different stars take turns as the "North Star."</div>
    </div>
    <button id="play-btn">Animate 26,000 Years</button>
    <div id="timeline">
        <div id="year-display">2026 AD</div>
        <input type="range" id="year-slider" min="-13000" max="13000" value="2026" step="50">
        <div id="year-markers">
            <span>13000 BC</span><span>7000 BC</span><span>Now</span><span>7000 AD</span><span>13000 AD</span>
        </div>
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('year-slider');
    const yearDisplay = document.getElementById('year-display');
    const poleStarEl = document.getElementById('pole-star-name');
    const poleDetail = document.getElementById('pole-detail');
    const playBtn = document.getElementById('play-btn');

    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });

    // Precession parameters
    const PREC_PERIOD = 25772; // years
    const OBLIQUITY = 23.44; // degrees

    // Pole stars through history
    const poleStars = [
        { name: 'Vega', ra: 18.616, dec: 38.784, yearClosest: -12000, mag: 0.03, detail: 'Vega was the pole star around 12,000 BC and will be again around 13,700 AD. It is 25 times more luminous than the Sun.' },
        { name: 'Tau Herculis', ra: 16.328, dec: 46.313, yearClosest: -7400, mag: 3.89, detail: 'A faint pole star from around 7400 BC. Shows that the "north star" is not always bright.' },
        { name: 'Iota Draconis', ra: 15.415, dec: 58.966, yearClosest: -4800, mag: 3.29, detail: 'Pole star around 4800 BC, during the early Bronze Age.' },
        { name: 'Thuban', ra: 14.073, dec: 64.376, yearClosest: -2800, mag: 3.65, detail: 'North Star when the Great Pyramids were built (c. 2800 BC). The descending passage of the Great Pyramid was aligned to Thuban.' },
        { name: 'Kochab', ra: 14.845, dec: 74.155, yearClosest: -1000, mag: 2.08, detail: 'Pole star during the late Bronze Age and early Iron Age, from about 1500 BC to 300 AD.' },
        { name: 'Polaris', ra: 2.530, dec: 89.264, yearClosest: 2100, mag: 1.98, detail: 'Our current North Star. Closest approach to the pole around 2100 AD (0.45°). A Cepheid variable star 433 light-years away.' },
        { name: 'Gamma Cephei', ra: 23.656, dec: 77.632, yearClosest: 4000, mag: 3.22, detail: 'Will become the pole star around 3000-5200 AD as Polaris drifts away from the pole.' },
        { name: 'Iota Cephei', ra: 22.828, dec: 66.200, yearClosest: 5200, mag: 3.50, detail: 'Approximate pole star around 5200 AD.' },
        { name: 'Alpha Cephei', ra: 21.310, dec: 62.586, yearClosest: 7500, mag: 2.51, detail: 'Alderamin will serve as pole star around 7500 AD.' },
        { name: 'Deneb', ra: 20.691, dec: 45.280, yearClosest: 10000, mag: 1.25, detail: 'Around 10,000 AD, Deneb will be near the pole. One of the most luminous stars known.' },
    ];

    // Compute celestial pole position for a given year
    function getPolePosition(year) {
        const t = (year - 2000) / PREC_PERIOD;
        const angle = t * 2 * Math.PI;
        // The pole traces a circle of radius = obliquity around the ecliptic pole
        // Ecliptic pole is at RA ~18h, Dec ~66.56
        const ecRA = 18.0; // hours
        const ecDec = 66.56; // degrees
        const r = OBLIQUITY;
        const poleRA = ecRA + (r / 15) * Math.sin(angle) / Math.cos(ecDec * Math.PI / 180);
        const poleDec = ecDec + r * Math.cos(angle);
        return { ra: ((poleRA % 24) + 24) % 24, dec: poleDec };
    }

    // Project star onto circular view centered on ecliptic pole
    function projectCircular(ra, dec) {
        const cx = W * 0.38, cy = H * 0.45;
        const radius = Math.min(W * 0.32, H * 0.38);
        // Angular distance from ecliptic pole
        const ecRA = 18.0, ecDec = 66.56;
        const dRA = (ra - ecRA) * 15 * Math.PI / 180;
        const decR = dec * Math.PI / 180;
        const ecDecR = ecDec * Math.PI / 180;
        const angDist = Math.acos(Math.sin(decR) * Math.sin(ecDecR) + Math.cos(decR) * Math.cos(ecDecR) * Math.cos(dRA));
        const posAngle = Math.atan2(Math.cos(decR) * Math.sin(dRA), Math.sin(decR) * Math.cos(ecDecR) - Math.cos(decR) * Math.sin(ecDecR) * Math.cos(dRA));
        const r = (angDist / (Math.PI / 2)) * radius;
        return { x: cx + r * Math.sin(posAngle), y: cy - r * Math.cos(posAngle), visible: angDist < Math.PI / 2 };
    }

    // Background stars around the pole region
    const bgStars = [];
    for (let i = 0; i < 500; i++) {
        const ra = Math.random() * 24;
        const dec = 30 + Math.random() * 60;
        bgStars.push({ ra, dec, mag: 3 + Math.random() * 3, tw: Math.random() * Math.PI * 2 });
    }

    let year = 2026;
    let playing = false;
    let playSpeed = 50;
    let time = 0;

    slider.addEventListener('input', () => {
        year = parseInt(slider.value);
        playing = false;
        playBtn.textContent = 'Animate 26,000 Years';
    });

    playBtn.addEventListener('click', () => {
        playing = !playing;
        playBtn.textContent = playing ? 'Pause' : 'Animate 26,000 Years';
    });

    function findClosestPoleStar(year) {
        let closest = poleStars[0], minDist = Infinity;
        for (const ps of poleStars) {
            const d = Math.abs(year - ps.yearClosest);
            if (d < minDist) { minDist = d; closest = ps; }
        }
        return closest;
    }

    function draw() {
        time += 0.016;
        if (playing) {
            year += playSpeed;
            if (year > 13000) year = -13000;
            slider.value = year;
        }

        const yearStr = year < 0 ? `${Math.abs(year)} BC` : `${year} AD`;
        yearDisplay.textContent = yearStr;

        const pole = getPolePosition(year);
        const closestPS = findClosestPoleStar(year);
        poleStarEl.textContent = `Nearest Pole Star: ${closestPS.name}`;
        poleDetail.textContent = closestPS.detail;

        ctx.fillStyle = '#0a0a1c';
        ctx.fillRect(0, 0, W, H);

        const cx = W * 0.38, cy = H * 0.45;
        const radius = Math.min(W * 0.32, H * 0.38);

        // Precession circle
        ctx.strokeStyle = 'rgba(221,161,94,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        for (let t = 0; t <= 1; t += 0.005) {
            const pp = getPolePosition(-13000 + t * 26000);
            const p = projectCircular(pp.ra, pp.dec);
            if (t === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);

        // Background stars
        for (const s of bgStars) {
            const p = projectCircular(s.ra, s.dec);
            if (!p.visible) continue;
            const tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 2 + s.tw));
            ctx.globalAlpha = tw * 0.4;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, 3 - s.mag * 0.5), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Historical pole stars
        for (const ps of poleStars) {
            const p = projectCircular(ps.ra, ps.dec);
            if (!p.visible) continue;
            const isCurrent = ps === closestPS;
            const sz = isCurrent ? 4 : 2.5;

            // Glow for current
            if (isCurrent) {
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 25);
                grad.addColorStop(0, 'rgba(221,161,94,0.4)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = isCurrent ? '#DDA15E' : '#8A9A5B';
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
            ctx.fill();

            // Label
            ctx.fillStyle = isCurrent ? '#DDA15E' : 'rgba(138,154,91,0.6)';
            ctx.font = isCurrent ? 'bold 12px Segoe UI' : '10px Segoe UI';
            const labelText = ps.name + (isCurrent ? '' : ` (${ps.yearClosest < 0 ? Math.abs(ps.yearClosest) + ' BC' : ps.yearClosest + ' AD'})`);
            ctx.fillText(labelText, p.x + sz + 6, p.y + 4);
        }

        // Current pole position with crosshair
        const poleProj = projectCircular(pole.ra, pole.dec);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1;
        // Crosshair
        ctx.beginPath();
        ctx.moveTo(poleProj.x - 12, poleProj.y); ctx.lineTo(poleProj.x + 12, poleProj.y);
        ctx.moveTo(poleProj.x, poleProj.y - 12); ctx.lineTo(poleProj.x, poleProj.y + 12);
        ctx.stroke();
        // Circle
        ctx.beginPath();
        ctx.arc(poleProj.x, poleProj.y, 8, 0, Math.PI * 2);
        ctx.stroke();

        // Label the pole
        ctx.fillStyle = '#DDA15E';
        ctx.font = 'bold 11px Segoe UI';
        ctx.fillText('North Celestial Pole', poleProj.x + 14, poleProj.y - 8);
        ctx.font = '10px Segoe UI';
        ctx.fillStyle = 'rgba(221,161,94,0.7)';
        ctx.fillText(yearStr, poleProj.x + 14, poleProj.y + 6);

        // Trail of pole positions (recent history)
        ctx.strokeStyle = 'rgba(221,161,94,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const trailLen = 2000;
        for (let i = 0; i <= 40; i++) {
            const y = year - trailLen + (i / 40) * trailLen;
            const pp = getPolePosition(y);
            const p = projectCircular(pp.ra, pp.dec);
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();

        // Ecliptic pole marker
        const ecPole = projectCircular(18.0, 66.56);
        ctx.fillStyle = 'rgba(138,154,91,0.5)';
        ctx.beginPath();
        ctx.arc(ecPole.x, ecPole.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '9px Segoe UI';
        ctx.fillText('Ecliptic Pole', ecPole.x + 6, ecPole.y + 3);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        year = 2026;
        slider.value = 2026;
        playing = false;
        playBtn.textContent = 'Animate 26,000 Years';
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
