<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Magnitude Scale - Constellation Myths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #panel {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            background: rgba(10,10,26,0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.25); border-radius: 14px;
            padding: 16px; width: 260px; z-index: 100;
        }
        #panel h3 { color: #DDA15E; font-size: 1rem; margin-bottom: 10px; }
        .mag-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            padding: 6px 8px; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .mag-row:hover { background: rgba(138,154,91,0.1); }
        .mag-row.active { background: rgba(221,161,94,0.15); }
        .mag-dot { border-radius: 50%; flex-shrink: 0; }
        .mag-label { color: #FEFAE0; font-size: 0.85rem; }
        .mag-val { color: #8A9A5B; font-size: 0.75rem; }
        #star-info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,26,0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.25); border-radius: 12px;
            padding: 14px 24px; color: #FEFAE0; z-index: 100;
            opacity: 0; transition: opacity 0.3s; text-align: center;
        }
        #star-info.visible { opacity: 1; }
        #star-info .name { color: #DDA15E; font-weight: 700; font-size: 1.1rem; }
        #star-info .stats { color: #8A9A5B; font-size: 0.85rem; margin-top: 4px; }
        #mag-limit-ctrl {
            position: fixed; left: 20px; bottom: 20px; z-index: 100;
            background: rgba(10,10,26,0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.2); border-radius: 12px;
            padding: 12px 16px;
        }
        #mag-limit-ctrl label { color: #8A9A5B; font-size: 0.8rem; display: block; margin-bottom: 4px; }
        #mag-limit-ctrl input { width: 150px; }
        #mag-limit-val { color: #DDA15E; font-size: 0.9rem; font-weight: 700; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="panel">
        <h3>Apparent Magnitude</h3>
    </div>
    <div id="star-info">
        <div class="name" id="si-name"></div>
        <div class="stats" id="si-stats"></div>
    </div>
    <div id="mag-limit-ctrl">
        <label>Limiting Magnitude: <span id="mag-limit-val">6.0</span></label>
        <input type="range" id="mag-limit" min="0" max="8" step="0.1" value="6">
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('panel');
    const starInfo = document.getElementById('star-info');
    const magLimitSlider = document.getElementById('mag-limit');
    const magLimitVal = document.getElementById('mag-limit-val');

    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });

    // Representative stars at each magnitude
    const magExamples = [
        { mag: -1.46, name: 'Sirius', spec: 'A1', dist: '8.6 ly', desc: 'Brightest star in the night sky', color: '#cad7ff' },
        { mag: -0.05, name: 'Arcturus', spec: 'K1', dist: '37 ly', desc: '4th brightest star overall', color: '#ffd2a1' },
        { mag: 0.03, name: 'Vega', spec: 'A0', dist: '25 ly', desc: 'Defines magnitude 0 historically', color: '#cad7ff' },
        { mag: 0.77, name: 'Altair', spec: 'A7', dist: '17 ly', desc: 'One of the closest bright stars', color: '#f8f7ff' },
        { mag: 1.25, name: 'Deneb', spec: 'A2', dist: '2,600 ly', desc: 'Most distant 1st-mag star', color: '#cad7ff' },
        { mag: 1.98, name: 'Polaris', spec: 'F7', dist: '433 ly', desc: 'The North Star', color: '#f8f7ff' },
        { mag: 2.87, name: 'Algol', spec: 'B8', dist: '90 ly', desc: 'Famous eclipsing binary', color: '#aabfff' },
        { mag: 3.65, name: 'Thuban', spec: 'A0', dist: '303 ly', desc: 'Ancient pole star (3000 BC)', color: '#cad7ff' },
        { mag: 4.27, name: 'Mizar B', spec: 'A1', dist: '83 ly', desc: 'Companion to Mizar', color: '#cad7ff' },
        { mag: 5.0, name: 'Alcor', spec: 'A5', dist: '82 ly', desc: 'Ancient eye test star', color: '#cad7ff' },
        { mag: 6.0, name: 'HIP 12345', spec: 'G5', dist: '150 ly', desc: 'Naked-eye limit (dark sky)', color: '#fff4e8' },
    ];

    let magLimit = 6.0;
    let selectedMag = -1;
    let hoveredStar = null;
    let time = 0;

    // Generate field stars
    const fieldStars = [];
    for (let i = 0; i < 3000; i++) {
        // Exponentially more faint stars
        const mag = -1.5 + Math.pow(Math.random(), 0.6) * 9;
        const x = 0.05 + Math.random() * 0.55; // leave room for panel
        const y = 0.05 + Math.random() * 0.9;
        const spec = ['O','B','A','F','G','K','M'][Math.floor(Math.random() * 7)];
        const colors = { O: '#9bb0ff', B: '#aabfff', A: '#cad7ff', F: '#f8f7ff', G: '#fff4e8', K: '#ffd2a1', M: '#ffcc6f' };
        fieldStars.push({ x, y, mag, color: colors[spec], tw: Math.random() * Math.PI * 2 });
    }

    // Build magnitude panel
    for (let m = -1; m <= 6; m++) {
        const row = document.createElement('div');
        row.className = 'mag-row';
        const dotSize = Math.max(3, 14 - m * 2);
        const brightness = Math.max(0.2, 1 - m * 0.12);
        row.innerHTML = `<div class="mag-dot" style="width:${dotSize}px;height:${dotSize}px;background:rgba(254,250,224,${brightness})"></div>
            <div><div class="mag-label">Magnitude ${m}</div>
            <div class="mag-val">${m <= 0 ? 'Very bright' : m <= 2 ? 'Bright' : m <= 4 ? 'Moderate' : 'Faint'} (${Math.round(Math.pow(2.512, 6 - m))}x vs mag 6)</div></div>`;
        row.addEventListener('click', () => {
            selectedMag = selectedMag === m ? -99 : m;
            document.querySelectorAll('.mag-row').forEach(r => r.classList.remove('active'));
            if (selectedMag === m) row.classList.add('active');
        });
        panel.appendChild(row);
    }

    // Brightness formula explanation
    const note = document.createElement('div');
    note.style.cssText = 'margin-top:12px;padding-top:10px;border-top:1px solid rgba(138,154,91,0.2);color:#8A9A5B;font-size:0.75rem;line-height:1.5';
    note.textContent = 'Each magnitude step = 2.512x brightness. 5 magnitudes = exactly 100x. The scale is logarithmic and inverted: lower = brighter.';
    panel.appendChild(note);

    magLimitSlider.addEventListener('input', () => {
        magLimit = parseFloat(magLimitSlider.value);
        magLimitVal.textContent = magLimit.toFixed(1);
    });

    canvas.addEventListener('mousemove', (e) => {
        hoveredStar = null;
        for (const ex of magExamples) {
            if (ex._sx === undefined) continue;
            const d = Math.hypot(e.clientX - ex._sx, e.clientY - ex._sy);
            if (d < 20) { hoveredStar = ex; break; }
        }
        if (hoveredStar) {
            document.getElementById('si-name').textContent = hoveredStar.name;
            document.getElementById('si-stats').textContent = `Magnitude ${hoveredStar.mag.toFixed(2)} | ${hoveredStar.spec} | ${hoveredStar.dist} | ${hoveredStar.desc}`;
            starInfo.classList.add('visible');
        } else {
            starInfo.classList.remove('visible');
        }
    });

    function magToSize(mag) {
        return Math.max(0.3, 5 - mag * 0.7);
    }

    function magToAlpha(mag) {
        return Math.max(0.05, 1 - (mag + 1.5) / 9);
    }

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, W, H);

        // Field stars
        for (const s of fieldStars) {
            if (s.mag > magLimit) continue;
            const sx = s.x * W, sy = s.y * H;
            const highlight = selectedMag !== -99 && Math.abs(s.mag - selectedMag) < 0.5;
            const dim = selectedMag !== -99 && !highlight;
            const tw = 0.5 + 0.5 * (0.5 + 0.5 * Math.sin(time * 1.5 + s.tw));
            const alpha = magToAlpha(s.mag) * tw * (dim ? 0.1 : 1);
            const sz = magToSize(s.mag) * (highlight ? 1.3 : 1);

            ctx.globalAlpha = alpha;
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(sx, sy, sz, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Example stars (placed along a diagonal)
        const margin = 80;
        for (let i = 0; i < magExamples.length; i++) {
            const ex = magExamples[i];
            if (ex.mag > magLimit) { ex._sx = -100; ex._sy = -100; continue; }
            const t = i / (magExamples.length - 1);
            const sx = margin + t * (W * 0.55 - margin * 2);
            const sy = margin + t * (H - margin * 2);
            ex._sx = sx; ex._sy = sy;

            const sz = magToSize(ex.mag) * 1.5;
            const isHovered = ex === hoveredStar;

            // Glow
            const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sz * 6);
            grad.addColorStop(0, ex.color);
            grad.addColorStop(0.3, ex.color.slice(0,7) + '44');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(sx, sy, sz * (isHovered ? 8 : 6), 0, Math.PI * 2);
            ctx.fill();

            // Core
            ctx.fillStyle = ex.color;
            ctx.beginPath();
            ctx.arc(sx, sy, sz, 0, Math.PI * 2);
            ctx.fill();

            // Label
            ctx.fillStyle = isHovered ? '#DDA15E' : 'rgba(254,250,224,0.6)';
            ctx.font = isHovered ? 'bold 11px Segoe UI' : '10px Segoe UI';
            ctx.fillText(`${ex.name} (m=${ex.mag.toFixed(1)})`, sx + sz + 8, sy + 4);
        }

        // Brightness comparison bar
        const barX = 60, barY = 50, barW = W * 0.5 - 120;
        ctx.fillStyle = 'rgba(138,154,91,0.15)';
        ctx.fillRect(barX, barY, barW, 20);
        for (let m = -1; m <= 6; m++) {
            const x = barX + ((m + 1.5) / 7.5) * barW;
            const brightness = Math.pow(2.512, -m) / Math.pow(2.512, 1);
            const bw = Math.max(2, brightness * 5);
            ctx.fillStyle = `rgba(221,161,94,${Math.min(1, brightness * 0.5)})`;
            ctx.fillRect(x - 1, barY, 2, 20);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '9px monospace';
            ctx.fillText(`m=${m}`, x - 10, barY + 34);
        }
        ctx.fillStyle = 'rgba(138,154,91,0.5)';
        ctx.font = '10px Segoe UI';
        ctx.fillText('Brighter \u2190', barX, barY - 6);
        ctx.fillText('\u2192 Fainter', barX + barW - 50, barY - 6);

        // Count visible stars indicator
        const visCount = fieldStars.filter(s => s.mag <= magLimit).length;
        ctx.fillStyle = 'rgba(138,154,91,0.5)';
        ctx.font = '11px Segoe UI';
        ctx.fillText(`Stars visible: ~${visCount} (limit mag ${magLimit.toFixed(1)})`, 60, H - 30);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        magLimit = 6.0;
        magLimitSlider.value = 6.0;
        magLimitVal.textContent = '6.0';
        selectedMag = -99;
        document.querySelectorAll('.mag-row').forEach(r => r.classList.remove('active'));
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
