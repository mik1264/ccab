<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munsell Color System - Color Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #panel {
            position: fixed; top: 10px; right: 20px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1); max-width: 280px;
        }
        #panel h3 { margin-bottom: 6px; font-size: 15px; }
        #panel p { font-size: 12px; color: #aaa; line-height: 1.5; margin-bottom: 10px; }
        .slider-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .slider-row label { width: 60px; font-size: 13px; }
        .slider-row input { flex: 1; }
        .slider-row .val { width: 60px; text-align: right; font-size: 12px; color: #aaa; }
        #notation { font-size: 20px; font-weight: 700; margin: 10px 0; text-align: center; }
        .big-swatch {
            width: 100%; height: 60px; border-radius: 10px; margin-top: 8px;
            border: 2px solid rgba(255,255,255,0.15); transition: background 0.2s;
        }
        #rgbInfo { font-size: 11px; color: #888; text-align: center; margin-top: 6px; }
        .view-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
        .view-toggle button {
            flex: 1; padding: 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: #ddd; cursor: pointer; font-size: 12px;
        }
        .view-toggle button.active { background: rgba(255,255,255,0.15); border-color: #fff; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="panel">
        <h3>Munsell Color System</h3>
        <p>A perceptually uniform color system using Hue, Value (lightness), and Chroma (saturation).
        Unlike HSL, equal steps in Munsell look equally spaced to the human eye.</p>
        <div class="view-toggle">
            <button class="active" data-view="wheel">Hue Wheel</button>
            <button data-view="page">Hue Page</button>
            <button data-view="tree">Color Tree</button>
        </div>
        <div class="slider-row">
            <label>Hue</label>
            <input type="range" id="hueSlider" min="0" max="39" value="0" step="1">
            <span class="val" id="hueVal">5R</span>
        </div>
        <div class="slider-row">
            <label>Value</label>
            <input type="range" id="valSlider" min="1" max="9" value="5" step="1">
            <span class="val" id="valVal">5/</span>
        </div>
        <div class="slider-row">
            <label>Chroma</label>
            <input type="range" id="chrSlider" min="0" max="14" value="6" step="2">
            <span class="val" id="chrVal">/6</span>
        </div>
        <div id="notation">5R 5/6</div>
        <div class="big-swatch" id="swatch"></div>
        <div id="rgbInfo"></div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let view = 'wheel';

        // Munsell hue names (40 hues, 4 steps per family)
        const hueNames = [];
        const families = ['R','YR','Y','GY','G','BG','B','PB','P','RP'];
        const steps = ['2.5','5','7.5','10'];
        families.forEach(f => steps.forEach(s => hueNames.push(s + f)));

        // Approximate Munsell to sRGB conversion
        // Using a simplified HVC -> Lab -> XYZ -> sRGB pipeline
        function munsellToRGB(hueIdx, value, chroma) {
            // Munsell Value to CIE Y (lightness)
            const Y = value * value * 1.2219 / 100 + value * 0.23111 / 10;

            // Hue angle
            const hueAngle = (hueIdx / 40) * 360;
            const hRad = hueAngle * Math.PI / 180;

            // Chroma to approximate ab coordinates
            // The shape of Munsell chroma varies with hue - this is approximate
            const a = Math.cos(hRad) * chroma * 5;
            const b = Math.sin(hRad) * chroma * 5;

            // Lab to XYZ (D65 white point)
            const fy = (Y * 100 + 16) / 116;
            const fx = a / 500 + fy;
            const fz = fy - b / 200;

            const delta = 6/29;
            const Xn = 0.95047, Yn = 1.0, Zn = 1.08883;
            const X = Xn * (fx > delta ? fx*fx*fx : (fx - 16/116) * 3 * delta * delta);
            const Yc = Yn * (fy > delta ? fy*fy*fy : (fy - 16/116) * 3 * delta * delta);
            const Z = Zn * (fz > delta ? fz*fz*fz : (fz - 16/116) * 3 * delta * delta);

            // XYZ to sRGB
            let r = 3.2406*X - 1.5372*Yc - 0.4986*Z;
            let g = -0.9689*X + 1.8758*Yc + 0.0415*Z;
            let bl = 0.0557*X - 0.2040*Yc + 1.0570*Z;

            // Gamma
            r = r > 0.0031308 ? 1.055*Math.pow(Math.max(0,r),1/2.4)-0.055 : 12.92*r;
            g = g > 0.0031308 ? 1.055*Math.pow(Math.max(0,g),1/2.4)-0.055 : 12.92*g;
            bl = bl > 0.0031308 ? 1.055*Math.pow(Math.max(0,bl),1/2.4)-0.055 : 12.92*bl;

            const inGamut = r >= 0 && r <= 1 && g >= 0 && g <= 1 && bl >= 0 && bl <= 1;

            return {
                rgb: [Math.round(Math.max(0,Math.min(1,r))*255), Math.round(Math.max(0,Math.min(1,g))*255), Math.round(Math.max(0,Math.min(1,bl))*255)],
                inGamut
            };
        }

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const hueIdx = parseInt(document.getElementById('hueSlider').value);
            const value = parseInt(document.getElementById('valSlider').value);
            const chroma = parseInt(document.getElementById('chrSlider').value);

            document.getElementById('hueVal').textContent = hueNames[hueIdx];
            document.getElementById('valVal').textContent = value + '/';
            document.getElementById('chrVal').textContent = '/' + chroma;
            document.getElementById('notation').textContent = `${hueNames[hueIdx]} ${value}/${chroma}`;

            const { rgb, inGamut } = munsellToRGB(hueIdx, value, chroma);
            document.getElementById('swatch').style.background = `rgb(${rgb.join(',')})`;
            document.getElementById('rgbInfo').innerHTML = `RGB: ${rgb.join(', ')}${inGamut ? '' : ' <span style="color:#f66">(out of sRGB gamut)</span>'}`;

            const cx = W * 0.38, cy = H * 0.5;

            if (view === 'wheel') {
                // Draw hue wheel at current value
                const maxR = Math.min(W * 0.3, H * 0.4);

                // Title
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = 'bold 14px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(`Munsell Hue Wheel at Value ${value}`, cx, cy - maxR - 30);
                ctx.font = '12px system-ui';
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillText('Chroma increases outward', cx, cy - maxR - 12);

                // Draw concentric rings of chroma
                for (let c = 2; c <= 14; c += 2) {
                    const ringR = (c / 14) * maxR;
                    for (let h = 0; h < 40; h++) {
                        const a1 = (h / 40) * Math.PI * 2 - Math.PI / 2;
                        const a2 = ((h + 1) / 40) * Math.PI * 2 - Math.PI / 2;
                        const { rgb: clr, inGamut: ig } = munsellToRGB(h, value, c);

                        ctx.beginPath();
                        ctx.arc(cx, cy, ringR, a1, a2);
                        ctx.arc(cx, cy, ringR - (maxR / 7) + 2, a2, a1, true);
                        ctx.closePath();
                        ctx.fillStyle = ig ? `rgb(${clr.join(',')})` : `rgba(${clr.join(',')},0.3)`;
                        ctx.fill();

                        if (h === hueIdx && c === chroma) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 3;
                            ctx.stroke();
                        }
                    }

                    // Chroma label
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = '10px system-ui';
                    ctx.textAlign = 'center';
                    ctx.fillText('/' + c, cx + ringR - 5, cy - 3);
                }

                // Neutral center
                const gray = Math.round(value / 9 * 255);
                ctx.beginPath();
                ctx.arc(cx, cy, maxR / 7, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
                ctx.fill();
                ctx.fillStyle = gray > 128 ? '#333' : '#ccc';
                ctx.font = '11px system-ui';
                ctx.fillText('N' + value, cx, cy + 4);

                // Hue labels around
                for (let h = 0; h < 40; h += 4) {
                    const a = (h / 40) * Math.PI * 2 - Math.PI / 2;
                    const lx = cx + Math.cos(a) * (maxR + 20);
                    const ly = cy + Math.sin(a) * (maxR + 20);
                    ctx.fillStyle = h === hueIdx ? '#fff' : 'rgba(255,255,255,0.4)';
                    ctx.font = h === hueIdx ? 'bold 12px system-ui' : '10px system-ui';
                    ctx.fillText(hueNames[h], lx, ly + 4);
                }
                ctx.textAlign = 'left';

            } else if (view === 'page') {
                // Hue page: value vs chroma grid
                const gridW = Math.min(W * 0.5, 500);
                const gridH = Math.min(H * 0.7, 400);
                const gx = cx - gridW / 2;
                const gy = cy - gridH / 2;
                const cellW = gridW / 8; // chromas 0,2,4,6,8,10,12,14
                const cellH = gridH / 9; // values 1-9

                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = 'bold 14px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(`Hue Page: ${hueNames[hueIdx]}`, cx, gy - 20);
                ctx.textAlign = 'left';

                for (let v = 1; v <= 9; v++) {
                    for (let ci = 0; ci <= 7; ci++) {
                        const c = ci * 2;
                        const { rgb: clr, inGamut: ig } = munsellToRGB(hueIdx, v, c);
                        const x = gx + ci * cellW;
                        const y = gy + (9 - v) * cellH;

                        if (ig) {
                            ctx.fillStyle = `rgb(${clr.join(',')})`;
                        } else {
                            ctx.fillStyle = `rgba(${clr.join(',')},0.3)`;
                        }
                        ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);

                        if (v === value && c === chroma) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(x, y, cellW, cellH);
                        }
                    }
                }

                // Labels
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '11px system-ui';
                ctx.textAlign = 'center';
                for (let ci = 0; ci <= 7; ci++) {
                    ctx.fillText('/' + (ci * 2), gx + ci * cellW + cellW / 2, gy + gridH + 16);
                }
                ctx.fillText('Chroma \u2192', cx, gy + gridH + 32);
                ctx.textAlign = 'right';
                for (let v = 1; v <= 9; v++) {
                    ctx.fillText(v.toString(), gx - 8, gy + (9 - v) * cellH + cellH / 2 + 4);
                }
                ctx.save();
                ctx.translate(gx - 24, cy);
                ctx.rotate(-Math.PI / 2);
                ctx.textAlign = 'center';
                ctx.fillText('Value \u2192', 0, 0);
                ctx.restore();
                ctx.textAlign = 'left';

            } else if (view === 'tree') {
                // Color tree: all hue pages fanned out
                const treeH = Math.min(H * 0.7, 400);
                const treeW = Math.min(W * 0.6, 600);
                const tx = cx - treeW / 2;
                const ty = cy - treeH / 2;

                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = 'bold 14px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(`Munsell Color Tree (cross-section at Value ${value})`, cx, ty - 20);
                ctx.textAlign = 'left';

                // Draw a circular arrangement of chroma bars for each hue
                const outerR = Math.min(treeW, treeH) * 0.42;
                for (let h = 0; h < 40; h += 2) {
                    const angle = (h / 40) * Math.PI * 2 - Math.PI / 2;
                    for (let c = 2; c <= 14; c += 2) {
                        const r = (c / 14) * outerR;
                        const { rgb: clr, inGamut: ig } = munsellToRGB(h, value, c);
                        const px = cx + Math.cos(angle) * r;
                        const py = cy + Math.sin(angle) * r;
                        const dotR = 5;

                        ctx.beginPath();
                        ctx.arc(px, py, dotR, 0, Math.PI * 2);
                        ctx.fillStyle = ig ? `rgb(${clr.join(',')})` : `rgba(${clr.join(',')},0.3)`;
                        ctx.fill();

                        if (h === hueIdx && c === chroma) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    }
                }

                // Neutral center
                const gray = Math.round(value / 9 * 255);
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
                ctx.fill();

                // Hue labels
                ctx.textAlign = 'center';
                for (let h = 0; h < 40; h += 4) {
                    const angle = (h / 40) * Math.PI * 2 - Math.PI / 2;
                    const lx = cx + Math.cos(angle) * (outerR + 20);
                    const ly = cy + Math.sin(angle) * (outerR + 20);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '10px system-ui';
                    ctx.fillText(hueNames[h], lx, ly + 4);
                }
                ctx.textAlign = 'left';
            }
        }

        document.querySelectorAll('.view-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                view = btn.dataset.view;
                draw();
            });
        });

        ['hueSlider', 'valSlider', 'chrSlider'].forEach(id => {
            document.getElementById(id).addEventListener('input', draw);
        });

        canvas.addEventListener('click', e => {
            // Allow clicking on the wheel/page to select colors
            // Simple: update based on click position relative to center
            if (view === 'wheel') {
                const dx = e.clientX - W * 0.38;
                const dy = e.clientY - H * 0.5;
                let angle = Math.atan2(dy, dx) + Math.PI / 2;
                if (angle < 0) angle += Math.PI * 2;
                const hue = Math.round((angle / (Math.PI * 2)) * 40) % 40;
                document.getElementById('hueSlider').value = hue;

                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxR = Math.min(W * 0.3, H * 0.4);
                const chr = Math.round((dist / maxR) * 14 / 2) * 2;
                document.getElementById('chrSlider').value = Math.max(0, Math.min(14, chr));
                draw();
            }
        });

        window.addEventListener('resize', () => { resize(); draw(); });
        window.reset = function() {
            view = 'wheel';
            document.getElementById('hueSlider').value = 0;
            document.getElementById('valSlider').value = 5;
            document.getElementById('chrSlider').value = 6;
            draw();
        };

        resize();
        draw();
    })();
    </script>
</body>
</html>
