<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Gamut Comparison - Color Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 20px; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1); min-width: 200px;
        }
        #controls h3 { margin-bottom: 10px; font-size: 14px; }
        .toggle { display: flex; align-items: center; gap: 8px; margin: 6px 0; cursor: pointer; font-size: 13px; }
        .toggle input { accent-color: var(--c, #8A9A5B); }
        .legend-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; }
        #info {
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1); font-size: 13px; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Color Gamuts</h3>
        <label class="toggle"><input type="checkbox" id="srgb" checked style="--c:#4af"><span class="legend-swatch" style="background:#4af"></span> sRGB (Rec. 709)</label>
        <label class="toggle"><input type="checkbox" id="adobergb" checked style="--c:#f84"><span class="legend-swatch" style="background:#f84"></span> Adobe RGB</label>
        <label class="toggle"><input type="checkbox" id="p3" checked style="--c:#4f4"><span class="legend-swatch" style="background:#4f4"></span> Display P3</label>
        <label class="toggle"><input type="checkbox" id="rec2020" checked style="--c:#ff4"><span class="legend-swatch" style="background:#ff4"></span> Rec. 2020</label>
        <label class="toggle"><input type="checkbox" id="prophoto" style="--c:#f4f"><span class="legend-swatch" style="background:#f4f"></span> ProPhoto RGB</label>
        <label class="toggle"><input type="checkbox" id="ntsc" style="--c:#fa4"><span class="legend-swatch" style="background:#fa4"></span> NTSC (1953)</label>
        <label class="toggle"><input type="checkbox" id="cmyk" style="--c:#aaa"><span class="legend-swatch" style="background:#aaa"></span> Typical CMYK</label>
    </div>
    <div id="info">Hover to see coordinates. Toggle gamuts to compare coverage.</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, scale, ox, oy;

        // Gamut primaries as CIE xy coordinates [R, G, B]
        const gamuts = {
            srgb:     { name: 'sRGB',      color: '#4af',  primaries: [[0.64,0.33],[0.30,0.60],[0.15,0.06]], white: [0.3127,0.3290] },
            adobergb: { name: 'Adobe RGB',  color: '#f84',  primaries: [[0.64,0.33],[0.21,0.71],[0.15,0.06]], white: [0.3127,0.3290] },
            p3:       { name: 'Display P3', color: '#4f4',  primaries: [[0.68,0.32],[0.265,0.69],[0.15,0.06]], white: [0.3127,0.3290] },
            rec2020:  { name: 'Rec. 2020',  color: '#ff4',  primaries: [[0.708,0.292],[0.170,0.797],[0.131,0.046]], white: [0.3127,0.3290] },
            prophoto: { name: 'ProPhoto',   color: '#f4f',  primaries: [[0.7347,0.2653],[0.1596,0.8404],[0.0366,0.0001]], white: [0.3457,0.3585] },
            ntsc:     { name: 'NTSC 1953',  color: '#fa4',  primaries: [[0.67,0.33],[0.21,0.71],[0.14,0.08]], white: [0.3101,0.3162] },
            cmyk:     { name: 'CMYK',       color: '#aaa',  primaries: [[0.60,0.33],[0.28,0.59],[0.17,0.10]], white: [0.3127,0.3290] }
        };

        const spectralLocus = [
            [0.1741,0.0050],[0.1740,0.0050],[0.1738,0.0049],[0.1736,0.0049],[0.1733,0.0048],
            [0.1726,0.0048],[0.1714,0.0051],[0.1689,0.0069],[0.1644,0.0109],[0.1566,0.0177],
            [0.1440,0.0297],[0.1241,0.0578],[0.0913,0.1327],[0.0454,0.2950],[0.0082,0.5384],
            [0.0039,0.6548],[0.0139,0.7502],[0.0389,0.8120],[0.0743,0.8338],[0.1142,0.8262],
            [0.1547,0.8059],[0.1929,0.7816],[0.2296,0.7543],[0.2658,0.7243],[0.3016,0.6923],
            [0.3373,0.6589],[0.3731,0.6245],[0.4087,0.5896],[0.4441,0.5547],[0.4788,0.5202],
            [0.5125,0.4866],[0.5448,0.4544],[0.5752,0.4242],[0.6029,0.3965],[0.6270,0.3725],
            [0.6482,0.3514],[0.6658,0.3340],[0.6801,0.3197],[0.6915,0.3083],[0.7006,0.2993],
            [0.7079,0.2920],[0.7140,0.2859],[0.7190,0.2809],[0.7230,0.2770],[0.7260,0.2740],
            [0.7283,0.2717],[0.7300,0.2700],[0.7311,0.2689],[0.7320,0.2680],[0.7327,0.2673],
            [0.7334,0.2666],[0.7340,0.2660],[0.7344,0.2656],[0.7346,0.2654],[0.7347,0.2653]
        ];

        function xyToRGB(cx, cy) {
            if (cy === 0) return [0, 0, 0];
            const Y = 1.0, X = (Y / cy) * cx, Z = (Y / cy) * (1 - cx - cy);
            let r = 3.2406*X - 1.5372*Y - 0.4986*Z;
            let g = -0.9689*X + 1.8758*Y + 0.0415*Z;
            let b = 0.0557*X - 0.2040*Y + 1.0570*Z;
            const mx = Math.max(r, g, b, 1);
            r = Math.pow(Math.max(0, r/mx), 1/2.2);
            g = Math.pow(Math.max(0, g/mx), 1/2.2);
            b = Math.pow(Math.max(0, b/mx), 1/2.2);
            return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
        }

        function isInsideLocus(px, py) {
            let inside = false;
            for (let i = 0, j = spectralLocus.length - 1; i < spectralLocus.length; j = i++) {
                const xi = spectralLocus[i][0], yi = spectralLocus[i][1];
                const xj = spectralLocus[j][0], yj = spectralLocus[j][1];
                if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
            }
            return inside;
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            scale = Math.min(W, H) * 0.82;
            ox = (W - scale) / 2;
            oy = H - (H - scale) / 2;
        }

        function toScreen(x, y) { return [ox + x * scale, oy - y * scale]; }
        function fromScreen(sx, sy) { return [(sx - ox) / scale, (oy - sy) / scale]; }

        function triangleArea(p) {
            return 0.5 * Math.abs(
                (p[1][0]-p[0][0])*(p[2][1]-p[0][1]) - (p[2][0]-p[0][0])*(p[1][1]-p[0][1])
            );
        }

        // Approximate visible gamut area
        const locusArea = (function() {
            let a = 0;
            for (let i = 1; i < spectralLocus.length - 1; i++) {
                a += 0.5 * Math.abs(
                    (spectralLocus[i][0]-spectralLocus[0][0])*(spectralLocus[i+1][1]-spectralLocus[0][1]) -
                    (spectralLocus[i+1][0]-spectralLocus[0][0])*(spectralLocus[i][1]-spectralLocus[0][1])
                );
            }
            return a;
        })();

        let hoverXY = null;

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Fill gamut colors (low res)
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;
            for (let py = 0; py < H; py += 3) {
                for (let px = 0; px < W; px += 3) {
                    const [cx, cy] = fromScreen(px, py);
                    if (cx >= 0 && cx <= 0.8 && cy >= 0 && cy <= 0.9 && isInsideLocus(cx, cy)) {
                        const [r, g, b] = xyToRGB(cx, cy);
                        for (let dy = 0; dy < 3 && py+dy < H; dy++) {
                            for (let dx = 0; dx < 3 && px+dx < W; dx++) {
                                const idx = ((py+dy)*W+(px+dx))*4;
                                data[idx] = r * 0.35; data[idx+1] = g * 0.35; data[idx+2] = b * 0.35; data[idx+3] = 255;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Spectral locus
            ctx.beginPath();
            spectralLocus.forEach((p, i) => {
                const [sx, sy] = toScreen(p[0], p[1]);
                if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
            });
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw gamut triangles
            const active = Object.keys(gamuts).filter(k => document.getElementById(k).checked);
            active.forEach(key => {
                const g = gamuts[key];
                ctx.beginPath();
                g.primaries.forEach((p, i) => {
                    const [sx, sy] = toScreen(p[0], p[1]);
                    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
                });
                ctx.closePath();
                ctx.strokeStyle = g.color;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.fillStyle = g.color + '15';
                ctx.fill();

                // Primary labels
                const labels = ['R', 'G', 'B'];
                g.primaries.forEach((p, i) => {
                    const [sx, sy] = toScreen(p[0], p[1]);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                    ctx.fillStyle = g.color;
                    ctx.fill();
                });

                // White point
                const [wx, wy] = toScreen(g.white[0], g.white[1]);
                ctx.beginPath();
                ctx.arc(wx, wy, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                // Coverage percentage
                const area = triangleArea(g.primaries);
                const pct = ((area / locusArea) * 100).toFixed(1);
                const cx = (g.primaries[0][0] + g.primaries[1][0] + g.primaries[2][0]) / 3;
                const cy = (g.primaries[0][1] + g.primaries[1][1] + g.primaries[2][1]) / 3;
                const [lx, ly] = toScreen(cx, cy);
                ctx.fillStyle = g.color;
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(`${g.name}`, lx, ly - 6);
                ctx.font = '11px system-ui';
                ctx.fillText(`${pct}%`, lx, ly + 10);
                ctx.textAlign = 'left';
            });

            // Hover info
            if (hoverXY) {
                const [hsx, hsy] = toScreen(hoverXY[0], hoverXY[1]);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 0.5;
                ctx.setLineDash([3, 3]);
                ctx.beginPath(); ctx.moveTo(hsx, 0); ctx.lineTo(hsx, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, hsy); ctx.lineTo(W, hsy); ctx.stroke();
                ctx.setLineDash([]);

                let infoText = `x: ${hoverXY[0].toFixed(4)}, y: ${hoverXY[1].toFixed(4)}`;
                active.forEach(key => {
                    const g = gamuts[key];
                    // Check if point is inside this gamut triangle
                    const p = hoverXY;
                    const [A, B, C] = g.primaries;
                    const area0 = triangleArea([p, B, C]);
                    const area1 = triangleArea([A, p, C]);
                    const area2 = triangleArea([A, B, p]);
                    const total = triangleArea(g.primaries);
                    const inside = Math.abs(area0 + area1 + area2 - total) < 0.0001;
                    if (inside) infoText += ` | In ${g.name}`;
                });
                document.getElementById('info').textContent = infoText;
            }
        }

        canvas.addEventListener('mousemove', e => {
            hoverXY = fromScreen(e.clientX, e.clientY);
            draw();
        });

        document.querySelectorAll('#controls input').forEach(cb => cb.addEventListener('change', draw));
        window.addEventListener('resize', () => { resize(); draw(); });
        window.reset = function() { hoverXY = null; draw(); };

        resize();
        draw();
    })();
    </script>
</body>
</html>
