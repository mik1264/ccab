<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIE 1931 Chromaticity Diagram - Color Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px); color: #eee; padding: 16px 20px; border-radius: 12px;
            font-size: 14px; line-height: 1.6; min-width: 260px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #info .label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        #info .value { font-weight: 600; font-size: 16px; }
        #info .swatch {
            width: 40px; height: 40px; border-radius: 8px; display: inline-block;
            vertical-align: middle; margin-left: 10px; border: 2px solid rgba(255,255,255,0.2);
        }
        #title {
            position: fixed; top: 10px; right: 20px; color: #ccc; font-size: 13px;
            text-align: right; z-index: 100;
        }
        #title h2 { font-size: 18px; color: #fff; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <div class="label">Coordinates</div>
        <div class="value" id="coords">Hover over the diagram</div>
        <div style="margin-top:8px">
            <div class="label">Color at point</div>
            <div class="value" id="colorVal">---<span class="swatch" id="swatch"></span></div>
        </div>
        <div style="margin-top:8px">
            <div class="label">Wavelength</div>
            <div class="value" id="waveVal">---</div>
        </div>
    </div>
    <div id="title">
        <h2>CIE 1931 Chromaticity Diagram</h2>
        Click to place markers. Drag to explore.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, scale, ox, oy;
        const markers = [];
        let hoveredXY = null;

        // CIE 1931 2-degree observer spectral locus (x, y) at 5nm intervals 380-700nm
        const spectralLocus = [
            [0.1741,0.0050],[0.1740,0.0050],[0.1738,0.0049],[0.1736,0.0049],[0.1733,0.0048],
            [0.1726,0.0048],[0.1714,0.0051],[0.1689,0.0069],[0.1644,0.0109],[0.1566,0.0177],
            [0.1440,0.0297],[0.1241,0.0578],[0.0913,0.1327],[0.0454,0.2950],[0.0082,0.5384],
            [0.0039,0.6548],[0.0139,0.7502],[0.0389,0.8120],[0.0743,0.8338],[0.1142,0.8262],
            [0.1547,0.8059],[0.1929,0.7816],[0.2296,0.7543],[0.2658,0.7243],[0.3016,0.6923],
            [0.3373,0.6589],[0.3731,0.6245],[0.4087,0.5896],[0.4441,0.5547],[0.4788,0.5202],
            [0.5125,0.4866],[0.5448,0.4544],[0.5752,0.4242],[0.6029,0.3965],[0.6270,0.3725],
            [0.6482,0.3514],[0.6658,0.3340],[0.6801,0.3197],[0.6915,0.3083],[0.7006,0.2993],
            [0.7079,0.2920],[0.7140,0.2859],[0.7190,0.2809],[0.7230,0.2770],[0.7260,0.2740],
            [0.7283,0.2717],[0.7300,0.2700],[0.7311,0.2689],[0.7320,0.2680],[0.7327,0.2673],
            [0.7334,0.2666],[0.7340,0.2660],[0.7344,0.2656],[0.7346,0.2654],[0.7347,0.2653],
            [0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653],
            [0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653],[0.7347,0.2653]
        ];

        // CIE color matching functions (sampled at 5nm, 380-700nm) for color rendering
        const cmf_x = [0.0014,0.0022,0.0042,0.0076,0.0143,0.0232,0.0435,0.0776,0.1344,0.2148,0.2839,0.3285,0.3483,0.3481,0.3362,0.3187,0.2908,0.2511,0.1954,0.1421,0.0956,0.058,0.032,0.0147,0.0049,0.0024,0.0093,0.0291,0.0633,0.1096,0.1655,0.2257,0.2904,0.3597,0.4334,0.5121,0.5945,0.6784,0.7621,0.8425,0.9163,0.9786,1.0263,1.0567,1.0622,1.0456,1.0026,0.9384,0.8544,0.7514,0.6424,0.5419,0.4479,0.3608,0.2835,0.2187,0.1649,0.1212,0.0874,0.0636,0.0468,0.0329,0.0227,0.0158,0.0114];
        const cmf_y = [0.0000,0.0001,0.0001,0.0002,0.0004,0.0006,0.0012,0.0022,0.004,0.0073,0.0116,0.0168,0.023,0.0298,0.038,0.048,0.06,0.0739,0.091,0.1126,0.139,0.1693,0.208,0.2586,0.323,0.4073,0.503,0.6082,0.71,0.7932,0.862,0.9149,0.954,0.9803,0.995,1.0,0.995,0.9786,0.952,0.9154,0.87,0.8163,0.757,0.6949,0.631,0.5668,0.503,0.4412,0.381,0.321,0.265,0.217,0.175,0.1382,0.107,0.0816,0.061,0.0446,0.032,0.0232,0.017,0.0119,0.0082,0.0057,0.0041];
        const cmf_z = [0.0065,0.0105,0.0201,0.0362,0.0679,0.1102,0.2074,0.3713,0.6456,1.0391,1.3856,1.623,1.7471,1.7826,1.7721,1.7441,1.6692,1.5281,1.2876,1.0419,0.813,0.6162,0.4652,0.3533,0.272,0.2123,0.1582,0.1117,0.0782,0.0573,0.0422,0.0298,0.0203,0.0134,0.0087,0.0057,0.0039,0.0027,0.0021,0.0018,0.0017,0.0014,0.0011,0.0010,0.0008,0.0006,0.0003,0.0002,0.0002,0.0001,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            scale = Math.min(W, H) * 0.85;
            ox = (W - scale) / 2;
            oy = H - (H - scale) / 2;
        }

        function toScreen(x, y) {
            return [ox + x * scale, oy - y * scale];
        }

        function fromScreen(sx, sy) {
            return [(sx - ox) / scale, (oy - sy) / scale];
        }

        function wavelengthToXY(nm) {
            const idx = (nm - 380) / 5;
            if (idx < 0 || idx >= cmf_x.length) return null;
            const i = Math.floor(idx);
            const t = idx - i;
            const X = cmf_x[i] + (cmf_x[i+1] - cmf_x[i]) * t;
            const Y = cmf_y[i] + (cmf_y[i+1] - cmf_y[i]) * t;
            const Z = cmf_z[i] + (cmf_z[i+1] - cmf_z[i]) * t;
            const sum = X + Y + Z;
            if (sum === 0) return null;
            return [X / sum, Y / sum];
        }

        // Convert CIE xy to approximate sRGB
        function xyToRGB(cx, cy) {
            if (cy === 0) return [0, 0, 0];
            const Y = 1.0;
            const X = (Y / cy) * cx;
            const Z = (Y / cy) * (1 - cx - cy);
            // XYZ to linear sRGB
            let r =  3.2406 * X - 1.5372 * Y - 0.4986 * Z;
            let g = -0.9689 * X + 1.8758 * Y + 0.0415 * Z;
            let b =  0.0557 * X - 0.2040 * Y + 1.0570 * Z;
            // Clamp negatives, normalize
            const mx = Math.max(r, g, b, 1);
            r = Math.max(0, r / mx);
            g = Math.max(0, g / mx);
            b = Math.max(0, b / mx);
            // Gamma
            r = Math.pow(r, 1/2.2);
            g = Math.pow(g, 1/2.2);
            b = Math.pow(b, 1/2.2);
            return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
        }

        function isInsideLocus(px, py) {
            // Ray casting for spectral locus + purple line
            const pts = spectralLocus.filter((_, i) => i < 65);
            let inside = false;
            for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                const xi = pts[i][0], yi = pts[i][1];
                const xj = pts[j][0], yj = pts[j][1];
                if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function drawDiagram() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Fill the gamut with colors pixel by pixel using offscreen
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;
            for (let py = 0; py < H; py += 2) {
                for (let px = 0; px < W; px += 2) {
                    const [cx, cy] = fromScreen(px, py);
                    if (cx >= 0 && cx <= 0.8 && cy >= 0 && cy <= 0.9 && isInsideLocus(cx, cy)) {
                        const [r, g, b] = xyToRGB(cx, cy);
                        for (let dy = 0; dy < 2 && py + dy < H; dy++) {
                            for (let dx = 0; dx < 2 && px + dx < W; dx++) {
                                const idx = ((py + dy) * W + (px + dx)) * 4;
                                data[idx] = r;
                                data[idx + 1] = g;
                                data[idx + 2] = b;
                                data[idx + 3] = 255;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Spectral locus outline
            ctx.beginPath();
            for (let i = 0; i < spectralLocus.length; i++) {
                const [sx, sy] = toScreen(spectralLocus[i][0], spectralLocus[i][1]);
                if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Wavelength labels
            ctx.font = '11px system-ui';
            ctx.fillStyle = '#fff';
            const labelWavelengths = [380,420,460,480,500,520,540,560,580,600,620,700];
            labelWavelengths.forEach(nm => {
                const xy = wavelengthToXY(nm);
                if (!xy) return;
                const [sx, sy] = toScreen(xy[0], xy[1]);
                // offset outward from center
                const cx0 = 0.33, cy0 = 0.33;
                const dx = xy[0] - cx0, dy = xy[1] - cy0;
                const len = Math.sqrt(dx*dx + dy*dy);
                const offx = dx / len * 20, offy = dy / len * 20;
                ctx.fillText(nm + 'nm', sx + offx - 15, sy - offy);
                // dot
                ctx.beginPath();
                ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            });

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 0.5;
            for (let v = 0; v <= 0.8; v += 0.1) {
                const [x1, y1] = toScreen(v, 0);
                const [x2, y2] = toScreen(v, 0.9);
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                const [x3, y3] = toScreen(0, v);
                const [x4, y4] = toScreen(0.8, v);
                ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x4, y4); ctx.stroke();
            }

            // Axis labels
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '12px system-ui';
            for (let v = 0; v <= 0.8; v += 0.1) {
                const [sx, sy] = toScreen(v, 0);
                ctx.fillText(v.toFixed(1), sx - 8, sy + 16);
                const [sx2, sy2] = toScreen(0, v);
                ctx.fillText(v.toFixed(1), sx2 - 30, sy2 + 4);
            }
            ctx.font = '13px system-ui';
            const [axX, axY] = toScreen(0.4, -0.05);
            ctx.fillText('x', axX, axY);
            const [ayX, ayY] = toScreen(-0.05, 0.45);
            ctx.save();
            ctx.translate(ayX, ayY);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('y', 0, 0);
            ctx.restore();

            // sRGB triangle
            const srgb = [[0.64, 0.33], [0.30, 0.60], [0.15, 0.06]];
            ctx.beginPath();
            srgb.forEach((p, i) => {
                const [sx, sy] = toScreen(p[0], p[1]);
                if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
            });
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            // Labels
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px system-ui';
            const labels = ['R', 'G', 'B'];
            srgb.forEach((p, i) => {
                const [sx, sy] = toScreen(p[0], p[1]);
                ctx.fillText(labels[i], sx + 8, sy - 8);
            });
            ctx.font = '11px system-ui';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            const [tl1, tl2] = toScreen(0.38, 0.36);
            ctx.fillText('sRGB', tl1, tl2);

            // D65 white point
            const [wpx, wpy] = toScreen(0.3127, 0.3290);
            ctx.beginPath();
            ctx.arc(wpx, wpy, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '11px system-ui';
            ctx.fillText('D65', wpx + 8, wpy - 5);

            // Markers
            markers.forEach((m, i) => {
                const [sx, sy] = toScreen(m[0], m[1]);
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, Math.PI * 2);
                const [r, g, b] = xyToRGB(m[0], m[1]);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Hover crosshair
            if (hoveredXY) {
                const [hx, hy] = toScreen(hoveredXY[0], hoveredXY[1]);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(hx, 0); ctx.lineTo(hx, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, hy); ctx.lineTo(W, hy); ctx.stroke();
            }
        }

        function findNearestWavelength(cx, cy) {
            let best = null, bestDist = Infinity;
            for (let nm = 380; nm <= 700; nm += 1) {
                const xy = wavelengthToXY(nm);
                if (!xy) continue;
                const d = (xy[0] - cx) ** 2 + (xy[1] - cy) ** 2;
                if (d < bestDist) { bestDist = d; best = nm; }
            }
            return bestDist < 0.001 ? best : null;
        }

        canvas.addEventListener('mousemove', e => {
            const [cx, cy] = fromScreen(e.clientX, e.clientY);
            hoveredXY = [cx, cy];
            if (isInsideLocus(cx, cy)) {
                document.getElementById('coords').textContent = `x: ${cx.toFixed(4)}, y: ${cy.toFixed(4)}`;
                const [r, g, b] = xyToRGB(cx, cy);
                document.getElementById('colorVal').innerHTML = `RGB(${r}, ${g}, ${b}) <span class="swatch" style="background:rgb(${r},${g},${b})"></span>`;
                const nm = findNearestWavelength(cx, cy);
                document.getElementById('waveVal').textContent = nm ? `~${nm} nm` : 'Non-spectral';
            }
            drawDiagram();
        });

        canvas.addEventListener('click', e => {
            const [cx, cy] = fromScreen(e.clientX, e.clientY);
            if (isInsideLocus(cx, cy)) {
                markers.push([cx, cy]);
                if (markers.length > 10) markers.shift();
                drawDiagram();
            }
        });

        window.addEventListener('resize', () => { resize(); drawDiagram(); });

        window.reset = function() {
            markers.length = 0;
            hoveredXY = null;
            drawDiagram();
        };

        resize();
        drawDiagram();
    })();
    </script>
</body>
</html>
