<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opponent Process Color Vision - Color Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #panel {
            position: fixed; top: 10px; right: 20px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 18px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1); max-width: 340px;
        }
        #panel h3 { margin-bottom: 8px; font-size: 15px; }
        #panel p { font-size: 12px; color: #aaa; line-height: 1.5; margin-bottom: 10px; }
        .slider-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
        .slider-row label { width: 100px; font-size: 13px; }
        .slider-row input[type=range] { flex: 1; }
        .slider-row .val { width: 40px; text-align: right; font-size: 12px; color: #aaa; }
        #diagram {
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #diagram h4 { font-size: 13px; margin-bottom: 8px; color: #ccc; }
        .channel-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
        .bar-container { width: 200px; height: 16px; background: #222; border-radius: 8px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 8px; transition: width 0.1s; }
        .bar-center { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="panel">
        <h3>Opponent Process Color Vision</h3>
        <p>The brain encodes color in three opponent channels: Red-Green, Blue-Yellow, and Light-Dark.
        Adjust the wavelength or pick a color to see how cone responses become opponent signals.</p>
        <div class="slider-row">
            <label>Wavelength</label>
            <input type="range" id="nmSlider" min="380" max="700" value="550" step="1">
            <span class="val" id="nmVal">550</span>
        </div>
        <div class="slider-row">
            <label>Intensity</label>
            <input type="range" id="intSlider" min="0" max="100" value="80" step="1">
            <span class="val" id="intVal">80</span>
        </div>
    </div>
    <div id="diagram">
        <h4>Opponent Channels</h4>
        <div class="channel-bar">
            <span style="width:70px">L-M (R/G)</span>
            <div class="bar-container">
                <div class="bar-center"></div>
                <div class="bar-fill" id="rgBar" style="background:linear-gradient(90deg,#0a0,#f00)"></div>
            </div>
            <span class="val" id="rgVal">0</span>
        </div>
        <div class="channel-bar">
            <span style="width:70px">S-(L+M) (B/Y)</span>
            <div class="bar-container">
                <div class="bar-center"></div>
                <div class="bar-fill" id="byBar" style="background:linear-gradient(90deg,#dd0,#33f)"></div>
            </div>
            <span class="val" id="byVal">0</span>
        </div>
        <div class="channel-bar">
            <span style="width:70px">L+M (Light)</span>
            <div class="bar-container">
                <div class="bar-fill" id="lumBar" style="background:linear-gradient(90deg,#333,#fff)"></div>
            </div>
            <span class="val" id="lumVal">0</span>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        // Cone fundamentals (approximate LMS sensitivities at 5nm, 380-700nm)
        const L_cone = [0.0039,0.0064,0.0120,0.0217,0.0396,0.0640,0.1082,0.1782,0.2778,0.3930,0.4703,0.5219,0.5487,0.5575,0.5563,0.5509,0.5343,0.5027,0.4442,0.3755,0.3069,0.2488,0.2014,0.1662,0.1422,0.1283,0.1242,0.1300,0.1458,0.1715,0.2054,0.2424,0.2824,0.3276,0.3771,0.4304,0.4875,0.5459,0.6030,0.6564,0.7039,0.7440,0.7745,0.7930,0.7978,0.7883,0.7634,0.7231,0.6691,0.6037,0.5306,0.4560,0.3824,0.3115,0.2474,0.1918,0.1458,0.1072,0.0774,0.0563,0.0414,0.0291,0.0200,0.0139,0.0100];
        const M_cone = [0.0002,0.0004,0.0009,0.0018,0.0038,0.0070,0.0141,0.0264,0.0497,0.0908,0.1490,0.2186,0.2872,0.3457,0.3992,0.4505,0.4968,0.5325,0.5459,0.5373,0.5108,0.4742,0.4331,0.3921,0.3555,0.3270,0.3063,0.2905,0.2764,0.2610,0.2419,0.2196,0.1953,0.1700,0.1452,0.1218,0.1003,0.0811,0.0646,0.0506,0.0390,0.0296,0.0222,0.0164,0.0121,0.0088,0.0063,0.0044,0.0031,0.0021,0.0015,0.0010,0.0007,0.0005,0.0003,0.0002,0.0002,0.0001,0.0001,0.0001,0.0000,0.0000,0.0000,0.0000,0.0000];
        const S_cone = [0.0069,0.0111,0.0209,0.0380,0.0708,0.1163,0.2149,0.3828,0.6618,1.0567,1.3978,1.6159,1.7081,1.7038,1.6429,1.5559,1.4258,1.2522,1.0149,0.7890,0.5918,0.4323,0.3146,0.2275,0.1673,0.1260,0.0923,0.0642,0.0447,0.0326,0.0242,0.0170,0.0116,0.0078,0.0051,0.0034,0.0024,0.0017,0.0014,0.0012,0.0011,0.0009,0.0007,0.0006,0.0005,0.0004,0.0002,0.0001,0.0001,0.0001,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000,0.0000];

        function wavelengthToRGB(nm) {
            let r=0,g=0,b=0;
            if(nm>=380&&nm<440){r=-(nm-440)/60;b=1}
            else if(nm>=440&&nm<490){g=(nm-440)/50;b=1}
            else if(nm>=490&&nm<510){g=1;b=-(nm-510)/20}
            else if(nm>=510&&nm<580){r=(nm-510)/70;g=1}
            else if(nm>=580&&nm<645){r=1;g=-(nm-645)/65}
            else if(nm>=645&&nm<=700){r=1}
            let f=1;
            if(nm>=380&&nm<420)f=0.3+0.7*(nm-380)/40;
            else if(nm>700)f=0.3+0.7*(780-nm)/80;
            return[Math.round(r*f*255),Math.round(g*f*255),Math.round(b*f*255)];
        }

        function getConeResponse(nm) {
            const idx = (nm - 380) / 5;
            const i = Math.floor(idx);
            const t = idx - i;
            if (i < 0 || i >= L_cone.length - 1) return [0, 0, 0];
            const L = L_cone[i] + (L_cone[i+1] - L_cone[i]) * t;
            const M = M_cone[i] + (M_cone[i+1] - M_cone[i]) * t;
            const S = S_cone[i] + (S_cone[i+1] - S_cone[i]) * t;
            return [L, M, S];
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, W, H);

            const nm = parseInt(document.getElementById('nmSlider').value);
            const intensity = parseInt(document.getElementById('intSlider').value) / 100;
            document.getElementById('nmVal').textContent = nm;
            document.getElementById('intVal').textContent = Math.round(intensity * 100);

            const padL = 80, padR = 40, padT = 60, padB = 160;
            const gW = W - padL - padR;
            const gH = H - padT - padB;

            // Draw cone sensitivity curves
            const maxCone = 1.8;
            const nmToX = n => padL + ((n - 380) / 320) * gW;
            const valToY = v => padT + gH - (v / maxCone) * gH;

            // Spectrum fill at bottom
            for (let px = padL; px <= padL + gW; px++) {
                const n = 380 + (px - padL) / gW * 320;
                const [r, g, b] = wavelengthToRGB(n);
                ctx.fillStyle = `rgba(${r},${g},${b},0.15)`;
                ctx.fillRect(px, padT, 1, gH);
            }

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 0.5;
            for (let v = 0; v <= maxCone; v += 0.2) {
                ctx.beginPath(); ctx.moveTo(padL, valToY(v)); ctx.lineTo(padL + gW, valToY(v)); ctx.stroke();
            }

            // Draw L, M, S curves
            function drawCurve(data, color, label) {
                ctx.beginPath();
                for (let i = 0; i < data.length; i++) {
                    const n = 380 + i * 5;
                    const x = nmToX(n), y = valToY(data[i]);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Fill under
                const lastN = 380 + (data.length - 1) * 5;
                ctx.lineTo(nmToX(lastN), valToY(0));
                ctx.lineTo(nmToX(380), valToY(0));
                ctx.closePath();
                ctx.fillStyle = color.replace(',1)', ',0.06)');
                ctx.fill();

                // Label at peak
                let peakI = 0, peakV = 0;
                data.forEach((v, i) => { if (v > peakV) { peakV = v; peakI = i; } });
                const px = nmToX(380 + peakI * 5);
                const py = valToY(peakV);
                ctx.fillStyle = color;
                ctx.font = 'bold 14px system-ui';
                ctx.fillText(label, px - 5, py - 12);
            }

            drawCurve(L_cone, 'rgba(255,80,80,1)', 'L (Long)');
            drawCurve(M_cone, 'rgba(80,200,80,1)', 'M (Medium)');
            drawCurve(S_cone, 'rgba(80,80,255,1)', 'S (Short)');

            // Current wavelength marker
            const [r, g, b] = wavelengthToRGB(nm);
            const markerX = nmToX(nm);
            ctx.strokeStyle = `rgb(${r},${g},${b})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.beginPath(); ctx.moveTo(markerX, padT); ctx.lineTo(markerX, padT + gH); ctx.stroke();
            ctx.setLineDash([]);

            // Draw cone response dots
            const [L, M, S] = getConeResponse(nm);
            [[L, 'rgba(255,80,80,1)'], [M, 'rgba(80,200,80,1)'], [S, 'rgba(80,80,255,1)']].forEach(([v, c]) => {
                const y = valToY(v * intensity);
                ctx.beginPath();
                ctx.arc(markerX, y, 7, 0, Math.PI * 2);
                ctx.fillStyle = c;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Opponent process computation
            const Ls = L * intensity, Ms = M * intensity, Ss = S * intensity;
            const redGreen = Ls - Ms;        // L-M: positive = red, negative = green
            const blueYellow = Ss - (Ls + Ms) * 0.5; // S-(L+M): positive = blue, negative = yellow
            const luminance = Ls + Ms;         // L+M: achromatic/luminance channel

            // Update bars
            const maxRG = 0.5, maxBY = 1.0, maxLum = 1.5;
            const rgNorm = redGreen / maxRG;  // -1 to 1
            const byNorm = blueYellow / maxBY;
            const lumNorm = Math.min(luminance / maxLum, 1);

            const rgBar = document.getElementById('rgBar');
            const byBar = document.getElementById('byBar');
            const lumBar = document.getElementById('lumBar');

            if (rgNorm >= 0) {
                rgBar.style.width = (50 + rgNorm * 50) + '%';
                rgBar.style.background = `linear-gradient(90deg, #555 50%, #f44 100%)`;
            } else {
                rgBar.style.width = (50 + rgNorm * 50) + '%';
                rgBar.style.background = `linear-gradient(90deg, #0c0, #555)`;
            }
            if (byNorm >= 0) {
                byBar.style.width = (50 + byNorm * 50) + '%';
                byBar.style.background = `linear-gradient(90deg, #555 50%, #44f 100%)`;
            } else {
                byBar.style.width = (50 - Math.abs(byNorm) * 50) + '%';
                byBar.style.background = `linear-gradient(90deg, #dd0, #555)`;
            }
            lumBar.style.width = (lumNorm * 100) + '%';

            document.getElementById('rgVal').textContent = redGreen.toFixed(3);
            document.getElementById('byVal').textContent = blueYellow.toFixed(3);
            document.getElementById('lumVal').textContent = luminance.toFixed(3);

            // Big color swatch
            const swatchSize = 80;
            const sx = W / 2 - swatchSize / 2;
            const sy = padT + gH + 30;
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath();
            ctx.roundRect(sx, sy, swatchSize, swatchSize, 12);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(`${nm} nm`, sx + swatchSize / 2, sy + swatchSize + 18);
            ctx.textAlign = 'left';

            // Cone response text
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '12px system-ui';
            ctx.fillText(`L: ${(Ls).toFixed(3)}  M: ${(Ms).toFixed(3)}  S: ${(Ss).toFixed(3)}`, sx + swatchSize + 20, sy + 25);

            // Axes
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '12px system-ui';
            ctx.fillText('Sensitivity', padL - 60, padT + gH / 2);
            ctx.fillText('Wavelength (nm)', W / 2 - 40, padT + gH + 20);
            for (let n = 400; n <= 700; n += 50) {
                ctx.fillText(n.toString(), nmToX(n) - 10, padT + gH + 18);
            }
        }

        document.getElementById('nmSlider').addEventListener('input', draw);
        document.getElementById('intSlider').addEventListener('input', draw);
        canvas.addEventListener('mousemove', e => {
            const padL = 80, padR = 40, gW = W - padL - padR;
            const frac = (e.clientX - padL) / gW;
            if (frac >= 0 && frac <= 1) {
                const nm = Math.round(380 + frac * 320);
                document.getElementById('nmSlider').value = nm;
                draw();
            }
        });

        window.addEventListener('resize', () => { resize(); draw(); });
        window.reset = function() {
            document.getElementById('nmSlider').value = 550;
            document.getElementById('intSlider').value = 80;
            draw();
        };

        resize();
        draw();
    })();
    </script>
</body>
</html>
