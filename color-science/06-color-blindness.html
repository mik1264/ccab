<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Blindness Simulator - Color Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 20px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1); max-width: 260px;
        }
        #controls h3 { margin-bottom: 8px; font-size: 14px; }
        .mode-btn {
            display: block; width: 100%; padding: 8px 12px; margin: 4px 0; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03);
            color: #ddd; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.2s;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.1); }
        .mode-btn.active { border-color: #8A9A5B; background: rgba(138,154,91,0.15); }
        .mode-btn small { display: block; color: #888; font-size: 11px; margin-top: 2px; }
        #scene-btns { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
        .scene-btn {
            padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 12px;
        }
        .scene-btn:hover { background: rgba(255,255,255,0.1); }
        .scene-btn.active { border-color: #8A9A5B; }
        #info {
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 10px;
            font-size: 12px; z-index: 100; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Vision Type</h3>
        <button class="mode-btn active" data-mode="normal">Normal Vision<small>Trichromatic - all 3 cone types</small></button>
        <button class="mode-btn" data-mode="protanopia">Protanopia<small>No L cones (red-blind) ~1% males</small></button>
        <button class="mode-btn" data-mode="deuteranopia">Deuteranopia<small>No M cones (green-blind) ~1% males</small></button>
        <button class="mode-btn" data-mode="tritanopia">Tritanopia<small>No S cones (blue-blind) ~0.003%</small></button>
        <button class="mode-btn" data-mode="achromatopsia">Achromatopsia<small>No cones at all (total color blindness)</small></button>
        <div id="scene-btns">
            <button class="scene-btn active" data-scene="ishihara">Ishihara</button>
            <button class="scene-btn" data-scene="gradient">Spectrum</button>
            <button class="scene-btn" data-scene="nature">Nature</button>
            <button class="scene-btn" data-scene="traffic">Traffic</button>
        </div>
    </div>
    <div id="info">Click anywhere to compare original vs simulated color</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mode = 'normal';
        let scene = 'ishihara';
        let clickedColor = null;

        // Simulation matrices (Vienot 1999 method - linear RGB to simulated linear RGB)
        const matrices = {
            normal: [1,0,0, 0,1,0, 0,0,1],
            protanopia: [0.1121,0.8853,0.0026, 0.1127,0.8897,-0.0024, 0.0045,0.0015,0.9940],
            deuteranopia: [0.2920,0.7054,0.0026, 0.2934,0.7089,-0.0024, -0.0216,0.0261,0.9955],
            tritanopia: [1.0155,-0.0171,0.0016, -0.0078,0.9897,0.0181, 0.0456,0.0541,0.9003],
            achromatopsia: [0.2126,0.7152,0.0722, 0.2126,0.7152,0.0722, 0.2126,0.7152,0.0722]
        };

        function srgbToLinear(c) { c /= 255; return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); }
        function linearToSrgb(c) { c = c <= 0.0031308 ? c * 12.92 : 1.055 * Math.pow(c, 1/2.4) - 0.055; return Math.round(Math.max(0, Math.min(1, c)) * 255); }

        function simulateColor(r, g, b, mat) {
            const lr = srgbToLinear(r), lg = srgbToLinear(g), lb = srgbToLinear(b);
            const sr = mat[0]*lr + mat[1]*lg + mat[2]*lb;
            const sg = mat[3]*lr + mat[4]*lg + mat[5]*lb;
            const sb = mat[6]*lr + mat[7]*lg + mat[8]*lb;
            return [linearToSrgb(sr), linearToSrgb(sg), linearToSrgb(sb)];
        }

        function drawIshihara() {
            // Draw Ishihara-style plate: number 74 in dots
            const cx = W / 2, cy = H / 2;
            const radius = Math.min(W, H) * 0.35;

            // Background circle
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#222';
            ctx.fill();

            // Generate random dots
            const rng = (function(s) { return function() { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; })(42);
            const dots = [];
            for (let i = 0; i < 1500; i++) {
                const a = rng() * Math.PI * 2;
                const r = Math.sqrt(rng()) * radius * 0.95;
                const x = cx + Math.cos(a) * r;
                const y = cy + Math.sin(a) * r;
                const size = 4 + rng() * 8;
                dots.push({ x, y, size });
            }

            // Define "74" shape
            function isIn74(px, py) {
                const nx = (px - cx) / radius;
                const ny = (py - cy) / radius;
                // "7"
                if (nx > -0.35 && nx < 0.05 && ny > -0.5 && ny < -0.35) return true;
                const slope7 = (nx - 0.05) / (-0.35 - 0.05);
                if (nx > -0.3 && nx < 0.05 && ny > -0.35 && ny < 0.5 && Math.abs(nx - (0.05 - slope7 * (ny + 0.35))) < 0.12) return true;
                // "4"
                if (nx > 0.1 && nx < 0.45 && ny > 0.05 && ny < 0.2) return true;
                if (nx > 0.3 && nx < 0.45 && ny > -0.5 && ny < 0.5) return true;
                if (nx > 0.1 && nx < 0.3 && ny > -0.5 && ny < -0.35) return true;
                const slope4 = (ny + 0.5) / (0.1 - 0.3);
                if (nx > 0.1 && nx < 0.3 && ny > -0.5 && ny < 0.1 && Math.abs(nx - (0.1 + (ny + 0.5) * (0.3 - 0.1) / (0.1 + 0.5))) < 0.1) return true;
                return false;
            }

            const mat = matrices[mode];
            dots.forEach(d => {
                const isNum = isIn74(d.x, d.y);
                let r, g, b;
                if (isNum) {
                    // Red-orange tones
                    const t = d.size / 12;
                    r = 180 + Math.round(t * 60);
                    g = 60 + Math.round(t * 40);
                    b = 20 + Math.round(t * 20);
                } else {
                    // Green tones
                    const t = d.size / 12;
                    r = 60 + Math.round(t * 50);
                    g = 140 + Math.round(t * 80);
                    b = 40 + Math.round(t * 30);
                }
                const [sr, sg, sb] = simulateColor(r, g, b, mat);
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.fill();
            });
        }

        function drawGradient() {
            const barH = H * 0.3;
            const barY = (H - barH) / 2;
            const mat = matrices[mode];

            for (let x = 0; x < W; x++) {
                const nm = 380 + (x / W) * 320;
                let r=0,g=0,b=0;
                if(nm>=380&&nm<440){r=-(nm-440)/60;b=1}
                else if(nm>=440&&nm<490){g=(nm-440)/50;b=1}
                else if(nm>=490&&nm<510){g=1;b=-(nm-510)/20}
                else if(nm>=510&&nm<580){r=(nm-510)/70;g=1}
                else if(nm>=580&&nm<645){r=1;g=-(nm-645)/65}
                else if(nm>=645&&nm<=700){r=1}
                let f=1;
                if(nm<420)f=0.3+0.7*(nm-380)/40;
                else if(nm>700)f=0.3+0.7*(780-nm)/80;
                r=Math.round(r*f*255); g=Math.round(g*f*255); b=Math.round(b*f*255);

                // Original
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(x, barY - barH * 0.6, 1, barH * 0.5);

                // Simulated
                const [sr, sg, sb] = simulateColor(r, g, b, mat);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.fillRect(x, barY + barH * 0.1, 1, barH * 0.5);
            }

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '14px system-ui';
            ctx.fillText('Normal Vision', 20, barY - barH * 0.65);
            ctx.fillText(mode.charAt(0).toUpperCase() + mode.slice(1), 20, barY + barH * 0.05);

            // Wavelength labels
            ctx.font = '11px system-ui';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            for (let nm = 400; nm <= 700; nm += 50) {
                const x = ((nm - 380) / 320) * W;
                ctx.fillText(nm + 'nm', x - 12, barY + barH * 0.7);
            }
        }

        function drawNature() {
            const mat = matrices[mode];
            // Draw a nature-inspired scene with rich colors
            const halfW = W / 2;

            // Sky gradient
            for (let y = 0; y < H * 0.6; y++) {
                const t = y / (H * 0.6);
                const r = Math.round(70 + t * 60);
                const g = Math.round(130 + t * 50);
                const b = Math.round(220 - t * 40);
                // Left: original
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(0, y, halfW - 2, 1);
                // Right: simulated
                const [sr, sg, sb] = simulateColor(r, g, b, mat);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.fillRect(halfW + 2, y, halfW, 1);
            }

            // Ground/grass
            for (let y = Math.floor(H * 0.6); y < H; y++) {
                const t = (y - H * 0.6) / (H * 0.4);
                const r = Math.round(40 + t * 30);
                const g = Math.round(120 - t * 40);
                const b = Math.round(20 + t * 15);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(0, y, halfW - 2, 1);
                const [sr, sg, sb] = simulateColor(r, g, b, mat);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.fillRect(halfW + 2, y, halfW, 1);
            }

            // Flowers
            const flowers = [
                { x: 0.15, y: 0.7, r: 220, g: 40, b: 40, size: 25 },
                { x: 0.25, y: 0.75, r: 255, g: 165, b: 0, size: 20 },
                { x: 0.35, y: 0.68, r: 180, g: 0, b: 180, size: 22 },
                { x: 0.1, y: 0.8, r: 255, g: 255, b: 50, size: 18 },
                { x: 0.4, y: 0.78, r: 255, g: 100, b: 150, size: 20 },
            ];

            flowers.forEach(f => {
                // Left
                ctx.beginPath();
                ctx.arc(f.x * halfW, f.y * H, f.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${f.r},${f.g},${f.b})`;
                ctx.fill();
                // Right
                const [sr, sg, sb] = simulateColor(f.r, f.g, f.b, mat);
                ctx.beginPath();
                ctx.arc(halfW + 2 + f.x * halfW, f.y * H, f.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.fill();
            });

            // Sun
            ctx.beginPath();
            ctx.arc(halfW * 0.7, H * 0.15, 40, 0, Math.PI * 2);
            ctx.fillStyle = 'rgb(255,230,80)';
            ctx.fill();
            const [ssr, ssg, ssb] = simulateColor(255, 230, 80, mat);
            ctx.beginPath();
            ctx.arc(halfW + 2 + halfW * 0.7, H * 0.15, 40, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${ssr},${ssg},${ssb})`;
            ctx.fill();

            // Divider
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(halfW - 1, 0, 2, H);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '13px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('Normal', halfW / 2, 25);
            ctx.fillText(mode.charAt(0).toUpperCase() + mode.slice(1), halfW + halfW / 2, 25);
            ctx.textAlign = 'left';
        }

        function drawTraffic() {
            const mat = matrices[mode];
            const halfW = W / 2;

            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, W, H);

            // Traffic light
            function drawLight(ox) {
                const lx = ox + halfW * 0.4;
                const ly = H * 0.15;
                const lw = 60, lh = 180;

                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.roundRect(lx - lw/2, ly, lw, lh, 10);
                ctx.fill();

                const colors = [[255,0,0],[255,200,0],[0,200,0]];
                colors.forEach((c, i) => {
                    const cy = ly + 30 + i * 55;
                    let [r, g, b] = c;
                    if (ox > 0) [r, g, b] = simulateColor(r, g, b, mat);
                    ctx.beginPath();
                    ctx.arc(lx, cy, 20, 0, Math.PI * 2);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fill();
                });
            }

            drawLight(0);
            drawLight(halfW + 2);

            // Color-coded signs
            const signs = [
                { text: 'STOP', bg: [220,30,30], y: 0.55 },
                { text: 'GO', bg: [0,160,0], y: 0.65 },
                { text: 'CAUTION', bg: [255,180,0], y: 0.75 },
                { text: 'INFO', bg: [0,100,200], y: 0.85 },
            ];

            signs.forEach(s => {
                // Left
                ctx.fillStyle = `rgb(${s.bg.join(',')})`;
                ctx.beginPath();
                ctx.roundRect(halfW * 0.15, s.y * H, halfW * 0.7, 35, 8);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(s.text, halfW * 0.5, s.y * H + 24);

                // Right
                const [sr, sg, sb] = simulateColor(...s.bg, mat);
                ctx.fillStyle = `rgb(${sr},${sg},${sb})`;
                ctx.beginPath();
                ctx.roundRect(halfW + 2 + halfW * 0.15, s.y * H, halfW * 0.7, 35, 8);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillText(s.text, halfW + 2 + halfW * 0.5, s.y * H + 24);
            });
            ctx.textAlign = 'left';

            // Divider
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(halfW - 1, 0, 2, H);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '13px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('Normal', halfW / 2, 25);
            ctx.fillText(mode.charAt(0).toUpperCase() + mode.slice(1), halfW + halfW / 2, 25);
            ctx.textAlign = 'left';
        }

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, W, H);
            if (scene === 'ishihara') drawIshihara();
            else if (scene === 'gradient') drawGradient();
            else if (scene === 'nature') drawNature();
            else if (scene === 'traffic') drawTraffic();
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = btn.dataset.mode;
                draw();
            });
        });

        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                scene = btn.dataset.scene;
                draw();
            });
        });

        canvas.addEventListener('click', e => {
            const data = ctx.getImageData(e.clientX, e.clientY, 1, 1).data;
            const [r, g, b] = data;
            const info = document.getElementById('info');
            info.innerHTML = `Picked: <span style="color:rgb(${r},${g},${b})">rgb(${r}, ${g}, ${b})</span>`;
            // Show all simulations
            Object.keys(matrices).forEach(m => {
                if (m === 'normal') return;
                const [sr, sg, sb] = simulateColor(r, g, b, matrices[m]);
                info.innerHTML += ` | <span style="color:rgb(${sr},${sg},${sb})">${m.charAt(0).toUpperCase()+m.slice(1)}</span>`;
            });
        });

        window.addEventListener('resize', () => { resize(); draw(); });
        window.reset = function() { mode = 'normal'; scene = 'ishihara'; draw(); };

        resize();
        draw();
    })();
    </script>
</body>
</html>
