<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Airplane Builder - Paper Airplane Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; width: 260px;
            border: 1px solid rgba(138,154,91,0.3); max-height: 90vh; overflow-y: auto;
        }
        #controls h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
        .section-label { color: #8A9A5B; font-size: 0.75rem; font-weight: bold; margin-top: 8px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; border-top: 1px solid rgba(138,154,91,0.2); padding-top: 6px; }
        .control-group { margin-bottom: 6px; }
        .control-group label { display: block; color: #8A9A5B; font-size: 0.78rem; margin-bottom: 1px; }
        .control-group input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .val { color: #DDA15E; font-size: 0.78rem; float: right; }
        button {
            width: 100%; padding: 8px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #606C38, #8A9A5B); color: #FEFAE0;
            font-size: 0.85rem; cursor: pointer; font-weight: bold; margin-top: 4px;
        }
        button:hover { opacity: 0.9; }
        .preset-btn {
            background: linear-gradient(135deg, #BC6C25, #DDA15E); padding: 5px; font-size: 0.75rem; margin-top: 3px;
        }
        #flightInfo {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 12px; font-size: 0.85rem;
            border: 1px solid rgba(138,154,91,0.3); display: flex; gap: 20px;
        }
        .fi-item { text-align: center; }
        .fi-label { color: #8A9A5B; font-size: 0.7rem; }
        .fi-val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Paper Airplane Builder</h3>
        <div class="section-label">Wing Shape</div>
        <div class="control-group">
            <label>Wingspan: <span class="val" id="v_span">22</span> cm</label>
            <input type="range" id="span" min="10" max="30" value="22" step="1">
        </div>
        <div class="control-group">
            <label>Root Chord: <span class="val" id="v_rootChord">10</span> cm</label>
            <input type="range" id="rootChord" min="4" max="16" value="10" step="0.5">
        </div>
        <div class="control-group">
            <label>Taper: <span class="val" id="v_taper">0.5</span></label>
            <input type="range" id="taper" min="0.1" max="1" value="0.5" step="0.05">
        </div>
        <div class="control-group">
            <label>Sweep: <span class="val" id="v_sweep">20</span>&deg;</label>
            <input type="range" id="sweep" min="0" max="50" value="20" step="1">
        </div>
        <div class="section-label">Wing Config</div>
        <div class="control-group">
            <label>Dihedral: <span class="val" id="v_dihedral">8</span>&deg;</label>
            <input type="range" id="dihedral" min="-10" max="25" value="8" step="1">
        </div>
        <div class="control-group">
            <label>Elevon Trim: <span class="val" id="v_elevon">2</span>&deg;</label>
            <input type="range" id="elevon" min="-8" max="12" value="2" step="0.5">
        </div>
        <div class="section-label">Nose Weight</div>
        <div class="control-group">
            <label>Nose Folds: <span class="val" id="v_folds">3</span></label>
            <input type="range" id="folds" min="1" max="6" value="3" step="1">
        </div>
        <div class="section-label">Throw</div>
        <div class="control-group">
            <label>Speed: <span class="val" id="v_throwSpeed">10</span> m/s</label>
            <input type="range" id="throwSpeed" min="3" max="20" value="10" step="0.5">
        </div>
        <div class="control-group">
            <label>Angle: <span class="val" id="v_throwAngle">15</span>&deg;</label>
            <input type="range" id="throwAngle" min="-10" max="50" value="15" step="1">
        </div>
        <button id="flyBtn">Throw It!</button>
        <button class="preset-btn" id="presetDart">Preset: Classic Dart</button>
        <button class="preset-btn" id="presetGlider">Preset: Long Glider</button>
        <button class="preset-btn" id="presetSuzanne">Preset: Suzanne (WR)</button>
    </div>
    <div id="flightInfo">
        <div class="fi-item"><div class="fi-label">Distance</div><div class="fi-val" id="fi_dist">--</div></div>
        <div class="fi-item"><div class="fi-label">Time</div><div class="fi-val" id="fi_time">--</div></div>
        <div class="fi-item"><div class="fi-label">Glide Ratio</div><div class="fi-val" id="fi_gr">--</div></div>
        <div class="fi-item"><div class="fi-label">Max Height</div><div class="fi-val" id="fi_maxh">--</div></div>
        <div class="fi-item"><div class="fi-label">Rating</div><div class="fi-val" id="fi_rating">--</div></div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let time = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // State
        let mode = 'design'; // 'design' or 'flight'
        let plane = null;
        let trail = [];
        let maxHeight = 0;

        const sliderIds = ['span', 'rootChord', 'taper', 'sweep', 'dihedral', 'elevon', 'folds', 'throwSpeed', 'throwAngle'];

        function getDesign() {
            const d = {};
            sliderIds.forEach(id => { d[id] = parseFloat(document.getElementById(id).value); });
            // Derived
            d.tipChord = d.rootChord * d.taper;
            d.wingArea = ((d.rootChord + d.tipChord) / 2 * d.span) / 10000; // m^2
            d.AR = (d.span / 100) * (d.span / 100) / d.wingArea;
            d.mass = (0.002 + d.folds * 0.0008 + d.wingArea * 50 * 0.001); // approximate mass
            d.cgFraction = 0.25 + d.folds * 0.03; // more folds = more forward CG
            return d;
        }

        // Update slider labels
        sliderIds.forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                document.getElementById('v_' + id).textContent = this.value;
            });
        });

        // Presets
        document.getElementById('presetDart').addEventListener('click', function() {
            setDesign({ span: 14, rootChord: 14, taper: 0.2, sweep: 40, dihedral: 5, elevon: 1, folds: 5, throwSpeed: 18, throwAngle: 5 });
        });
        document.getElementById('presetGlider').addEventListener('click', function() {
            setDesign({ span: 28, rootChord: 8, taper: 0.7, sweep: 8, dihedral: 12, elevon: 3, folds: 2, throwSpeed: 6, throwAngle: 25 });
        });
        document.getElementById('presetSuzanne').addEventListener('click', function() {
            setDesign({ span: 22, rootChord: 11, taper: 0.5, sweep: 15, dihedral: 8, elevon: 2, folds: 4, throwSpeed: 15, throwAngle: 35 });
        });

        function setDesign(vals) {
            Object.keys(vals).forEach(key => {
                document.getElementById(key).value = vals[key];
                document.getElementById('v_' + key).textContent = vals[key];
            });
        }

        // Fly button
        document.getElementById('flyBtn').addEventListener('click', function() {
            const d = getDesign();
            const angleRad = d.throwAngle * Math.PI / 180;
            plane = {
                x: 0, y: 0,
                vx: d.throwSpeed * Math.cos(angleRad),
                vy: -d.throwSpeed * Math.sin(angleRad),
                theta: -angleRad,
                roll: 0, rollRate: 0,
                time: 0,
                design: d
            };
            trail = [];
            maxHeight = 0;
            mode = 'flight';
        });

        function simulateFlight(dt) {
            if (!plane) return;
            const d = plane.design;
            const V = Math.sqrt(plane.vx * plane.vx + plane.vy * plane.vy);
            if (V < 0.2 && plane.time > 0.5) { mode = 'result'; return; }

            const flightAngle = Math.atan2(-plane.vy, plane.vx);

            // Elevon creates pitch trim
            const elevonRad = d.elevon * Math.PI / 180;
            const targetTheta = flightAngle + 0.05 + elevonRad * 0.3;
            plane.theta += (targetTheta - plane.theta) * 3 * dt;

            const aoa = plane.theta - flightAngle;

            // CL with stall model
            const stallAngle = (14 - d.folds) * Math.PI / 180; // heavier nose = less stall tendency but narrower margin
            let CL;
            if (Math.abs(aoa) < stallAngle) {
                CL = 2 * Math.PI * aoa * (1 + d.elevon * 0.02);
            } else {
                const clMax = 2 * Math.PI * stallAngle;
                CL = clMax * Math.sign(aoa) * Math.max(0, 1 - (Math.abs(aoa) - stallAngle) / 0.5);
            }

            // CD
            const cd0 = 0.015 + d.folds * 0.002; // more folds = slightly more drag
            const e = 0.65 + (d.taper > 0.3 && d.taper < 0.6 ? 0.05 : 0); // optimal taper
            const cdi = (CL * CL) / (Math.PI * d.AR * e);
            const sweepPenalty = 1 + Math.sin(d.sweep * Math.PI / 180) * 0.1;
            const CD = (cd0 + cdi) * sweepPenalty;

            const q = 0.5 * 1.225 * V * V;
            const L = q * d.wingArea * CL;
            const D = q * d.wingArea * CD;

            const ax = (-L * Math.sin(flightAngle) - D * (plane.vx / V)) / d.mass;
            const ay = 9.81 + (-L * Math.cos(flightAngle) - D * (plane.vy / V)) / d.mass;

            plane.vx += ax * dt;
            plane.vy += ay * dt;
            plane.x += plane.vx * dt;
            plane.y += plane.vy * dt;
            plane.time += dt;

            if (-plane.y > maxHeight) maxHeight = -plane.y;

            trail.push({ x: plane.x, y: plane.y });

            // Ground
            if (plane.y > 0 && plane.time > 0.1) {
                plane.y = 0;
                mode = 'result';
                showResults();
            }
            if (plane.time > 20) { mode = 'result'; showResults(); }
        }

        function showResults() {
            const dist = plane.x;
            const t = plane.time;
            const gr = maxHeight > 0.1 ? dist / maxHeight : dist;

            document.getElementById('fi_dist').textContent = dist.toFixed(1) + 'm';
            document.getElementById('fi_time').textContent = t.toFixed(2) + 's';
            document.getElementById('fi_gr').textContent = gr.toFixed(1) + ':1';
            document.getElementById('fi_maxh').textContent = maxHeight.toFixed(1) + 'm';

            // Rating
            let rating;
            if (dist > 25) rating = 'Excellent!';
            else if (dist > 15) rating = 'Great';
            else if (dist > 8) rating = 'Good';
            else if (dist > 4) rating = 'Fair';
            else rating = 'Needs Work';
            document.getElementById('fi_rating').textContent = rating;
        }

        function worldToScreen(wx, wy) {
            const groundY = H * 0.82;
            const scale = Math.min((W - 120) / 60, (groundY - 60) / 20);
            return {
                x: 80 + wx * scale,
                y: groundY + wy * scale
            };
        }

        // Draw top-down design preview
        function drawDesignView() {
            const d = getDesign();
            const cx = W * 0.35;
            const cy = H * 0.45;
            const scale = Math.min(W, H) / 80;

            const sweepRad = d.sweep * Math.PI / 180;
            const halfSpan = d.span / 2 * scale;
            const rootLen = d.rootChord * scale;
            const tipLen = d.tipChord * scale;
            const sweepOff = halfSpan * Math.tan(sweepRad);

            // Shadow/paper
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath();
            ctx.moveTo(cx - rootLen * 0.9, cy);
            // Right wing
            ctx.lineTo(cx - tipLen / 2 + sweepOff, cy - halfSpan);
            ctx.lineTo(cx + tipLen / 2 + sweepOff, cy - halfSpan);
            ctx.lineTo(cx + rootLen / 2, cy);
            // Left wing
            ctx.lineTo(cx + tipLen / 2 + sweepOff, cy + halfSpan);
            ctx.lineTo(cx - tipLen / 2 + sweepOff, cy + halfSpan);
            ctx.closePath();
            ctx.fill();

            // Right wing
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy);
            ctx.lineTo(cx - tipLen / 2 + sweepOff, cy - halfSpan);
            ctx.lineTo(cx + tipLen / 2 + sweepOff, cy - halfSpan);
            ctx.lineTo(cx + rootLen / 2, cy);
            ctx.closePath();
            ctx.fillStyle = 'rgba(138,154,91,0.3)';
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Left wing
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy);
            ctx.lineTo(cx - tipLen / 2 + sweepOff, cy + halfSpan);
            ctx.lineTo(cx + tipLen / 2 + sweepOff, cy + halfSpan);
            ctx.lineTo(cx + rootLen / 2, cy);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Nose (folds)
            const noseLen = d.folds * scale * 1.5;
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy - 4);
            ctx.lineTo(cx - rootLen / 2 - noseLen, cy);
            ctx.lineTo(cx - rootLen / 2, cy + 4);
            ctx.closePath();
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Fold lines
            for (let f = 1; f <= d.folds; f++) {
                const fx = cx - rootLen / 2 - (f / d.folds) * noseLen * 0.8;
                ctx.beginPath();
                ctx.moveTo(fx, cy - 3);
                ctx.lineTo(fx, cy + 3);
                ctx.strokeStyle = 'rgba(188,108,37,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Elevon indicators on trailing edge
            if (Math.abs(d.elevon) > 0.5) {
                const elevColor = d.elevon > 0 ? '#4CAF50' : '#f44336';
                // Right wing elevon
                ctx.beginPath();
                ctx.moveTo(cx + rootLen * 0.3, cy - halfSpan * 0.5);
                ctx.lineTo(cx + tipLen / 2 + sweepOff - 5, cy - halfSpan * 0.95);
                ctx.strokeStyle = elevColor;
                ctx.lineWidth = 3;
                ctx.stroke();
                // Left
                ctx.beginPath();
                ctx.moveTo(cx + rootLen * 0.3, cy + halfSpan * 0.5);
                ctx.lineTo(cx + tipLen / 2 + sweepOff - 5, cy + halfSpan * 0.95);
                ctx.stroke();
            }

            // Stats overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.roundRect(10, H * 0.08, 170, 100, 10);
            ctx.fill();

            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 11px Segoe UI, sans-serif';
            ctx.fillText('Design Stats', 20, H * 0.08 + 18);

            ctx.font = '10px Segoe UI, sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('Wing Area: ' + (d.wingArea * 10000).toFixed(0) + ' cm\u00b2', 20, H * 0.08 + 36);
            ctx.fillText('Aspect Ratio: ' + d.AR.toFixed(1), 20, H * 0.08 + 52);
            ctx.fillText('Mass: ' + (d.mass * 1000).toFixed(1) + ' g', 20, H * 0.08 + 68);
            ctx.fillText('Wing Load: ' + (d.mass * 9.81 / d.wingArea).toFixed(1) + ' N/m\u00b2', 20, H * 0.08 + 84);

            // Rear view inset showing dihedral
            const rvx = 10 + 85;
            const rvy = H * 0.08 + 150;

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(10, H * 0.08 + 108, 170, 80, 10);
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px Segoe UI, sans-serif';
            ctx.fillText('Rear View', 20, H * 0.08 + 124);

            const dihedralRad = d.dihedral * Math.PI / 180;
            const rvSpan = 60;
            // Body
            ctx.beginPath();
            ctx.ellipse(rvx, rvy, 5, 8, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#606C38';
            ctx.fill();
            // Wings with dihedral
            ctx.beginPath();
            ctx.moveTo(rvx - 5, rvy);
            ctx.lineTo(rvx - rvSpan * Math.cos(dihedralRad), rvy - rvSpan * Math.sin(dihedralRad));
            ctx.moveTo(rvx + 5, rvy);
            ctx.lineTo(rvx + rvSpan * Math.cos(dihedralRad), rvy - rvSpan * Math.sin(dihedralRad));
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawFlightScene() {
            // Ground
            const groundY = H * 0.82;
            ctx.fillStyle = '#2a3a1e';
            ctx.fillRect(0, groundY, W, H - groundY);

            // Distance markers
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '10px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let d = 5; d <= 50; d += 5) {
                const p = worldToScreen(d, 0);
                if (p.x < W - 50) {
                    ctx.fillText(d + 'm', p.x, groundY + 15);
                }
            }
            ctx.textAlign = 'left';

            // Trail
            if (trail.length > 1) {
                ctx.beginPath();
                const p0 = worldToScreen(trail[0].x, trail[0].y);
                ctx.moveTo(p0.x, p0.y);
                for (let i = 1; i < trail.length; i++) {
                    const p = worldToScreen(trail[i].x, trail[i].y);
                    ctx.lineTo(p.x, p.y);
                }
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            // Plane
            if (plane && mode !== 'design') {
                const pos = worldToScreen(plane.x, plane.y);
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(-plane.theta);

                const d = plane.design;
                // Simplified plane shape
                ctx.beginPath();
                ctx.moveTo(18, 0);
                ctx.lineTo(-8, -10);
                ctx.lineTo(-5, 0);
                ctx.lineTo(-8, 10);
                ctx.closePath();
                ctx.fillStyle = '#8A9A5B';
                ctx.fill();

                // Nose
                ctx.beginPath();
                ctx.moveTo(18, 0);
                ctx.lineTo(12, -2);
                ctx.lineTo(12, 2);
                ctx.closePath();
                ctx.fillStyle = '#DDA15E';
                ctx.fill();

                ctx.restore();
            }

            // Landing marker
            if (mode === 'result' && trail.length > 0) {
                const last = trail[trail.length - 1];
                const lp = worldToScreen(last.x, 0);
                ctx.beginPath();
                ctx.arc(lp.x, groundY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
            }
        }

        function animate() {
            time += 0.016;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            if (mode === 'design') {
                drawDesignView();
            } else {
                if (mode === 'flight') {
                    for (let i = 0; i < 4; i++) {
                        simulateFlight(0.005);
                        if (mode !== 'flight') break;
                    }
                }
                drawFlightScene();
            }

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            mode = 'design';
            plane = null;
            trail = [];
            maxHeight = 0;
            setDesign({ span: 22, rootChord: 10, taper: 0.5, sweep: 20, dihedral: 8, elevon: 2, folds: 3, throwSpeed: 10, throwAngle: 15 });
            ['fi_dist', 'fi_time', 'fi_gr', 'fi_maxh', 'fi_rating'].forEach(id => {
                document.getElementById(id).textContent = '--';
            });
        };

        animate();
    })();
    </script>
</body>
</html>
