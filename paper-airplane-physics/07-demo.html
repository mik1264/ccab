<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wing Planform Designer - Paper Airplane Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; width: 260px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls h3 { color: #DDA15E; margin-bottom: 8px; font-size: 0.95rem; }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; color: #8A9A5B; font-size: 0.8rem; margin-bottom: 2px; }
        .control-group input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .val { color: #DDA15E; font-size: 0.8rem; float: right; }
        #stats {
            position: fixed; bottom: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 12px; font-size: 0.85rem;
            border: 1px solid rgba(138,154,91,0.3); max-width: 350px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-label { color: #8A9A5B; }
        .stat-value { color: #DDA15E; font-weight: bold; }
        .perf-bar {
            height: 8px; border-radius: 4px; background: rgba(0,0,0,0.3); margin-top: 3px; overflow: hidden;
        }
        .perf-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Wing Planform Designer</h3>
        <div class="control-group">
            <label>Wingspan: <span class="val" id="spanVal">20</span> cm</label>
            <input type="range" id="span" min="8" max="30" value="20" step="1">
        </div>
        <div class="control-group">
            <label>Root Chord: <span class="val" id="rootVal">12</span> cm</label>
            <input type="range" id="root" min="5" max="20" value="12" step="0.5">
        </div>
        <div class="control-group">
            <label>Tip Chord: <span class="val" id="tipVal">6</span> cm</label>
            <input type="range" id="tip" min="1" max="15" value="6" step="0.5">
        </div>
        <div class="control-group">
            <label>Sweep Angle: <span class="val" id="sweepVal">15</span>&deg;</label>
            <input type="range" id="sweep" min="0" max="55" value="15" step="1">
        </div>
        <div class="control-group">
            <label>Wing Loading: <span class="val" id="loadVal">50</span> g/m&sup2;</label>
            <input type="range" id="load" min="20" max="120" value="50" step="5">
        </div>
    </div>
    <div id="stats">
        <h4 style="color:#DDA15E; margin-bottom:8px;">Performance Metrics</h4>
        <div class="stat-row"><span class="stat-label">Aspect Ratio:</span> <span class="stat-value" id="arVal">3.3</span></div>
        <div class="stat-row"><span class="stat-label">Wing Area:</span> <span class="stat-value" id="areaVal">180</span> cm&sup2;</div>
        <div class="stat-row"><span class="stat-label">Taper Ratio:</span> <span class="stat-value" id="taperVal">0.50</span></div>
        <div class="stat-row"><span class="stat-label">Mean Chord:</span> <span class="stat-value" id="macVal">9.0</span> cm</div>
        <div style="margin-top:8px;">
            <div class="stat-row"><span class="stat-label">Glide Efficiency:</span></div>
            <div class="perf-bar"><div class="perf-fill" id="glideBar" style="width:50%; background: #4CAF50;"></div></div>
        </div>
        <div>
            <div class="stat-row"><span class="stat-label">Speed Performance:</span></div>
            <div class="perf-bar"><div class="perf-fill" id="speedBar" style="width:50%; background: #2196F3;"></div></div>
        </div>
        <div>
            <div class="stat-row"><span class="stat-label">Stability:</span></div>
            <div class="perf-bar"><div class="perf-fill" id="stabBar" style="width:50%; background: #DDA15E;"></div></div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let time = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function getVals() {
            return {
                span: parseFloat(document.getElementById('span').value),
                root: parseFloat(document.getElementById('root').value),
                tip: parseFloat(document.getElementById('tip').value),
                sweep: parseFloat(document.getElementById('sweep').value),
                load: parseFloat(document.getElementById('load').value)
            };
        }

        function calcMetrics(v) {
            const area = (v.root + v.tip) / 2 * v.span; // cm^2
            const AR = (v.span * v.span) / area;
            const taper = v.tip / v.root;
            const MAC = (2/3) * v.root * (1 + taper + taper * taper) / (1 + taper);

            // Glide performance: higher AR = better glide, more area = lower wing loading
            const glideScore = Math.min(100, (AR / 8) * 60 + (area / 500) * 20 + (1 - v.load / 120) * 20);

            // Speed: lower AR = faster, higher sweep = faster
            const speedScore = Math.min(100, (1 - AR / 10) * 40 + (v.sweep / 55) * 30 + (v.load / 120) * 30);

            // Stability: moderate sweep helps, moderate AR
            const arPenalty = Math.abs(AR - 5) / 5 * 30;
            const sweepBonus = Math.min(30, v.sweep * 0.6);
            const taperBonus = Math.abs(taper - 0.4) < 0.3 ? 20 : 5;
            const stabScore = Math.max(5, Math.min(100, 50 - arPenalty + sweepBonus + taperBonus));

            return { area, AR, taper, MAC, glideScore, speedScore, stabScore };
        }

        // Draw the wing planform (top view)
        function drawPlanform(cx, cy, scale) {
            const v = getVals();
            const sweepRad = v.sweep * Math.PI / 180;
            const halfSpan = v.span / 2 * scale;
            const rootLen = v.root * scale;
            const tipLen = v.tip * scale;
            const sweepOffset = halfSpan * Math.tan(sweepRad);

            // Right wing
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy); // root LE
            ctx.lineTo(cx - tipLen / 2 + sweepOffset, cy - halfSpan); // tip LE
            ctx.lineTo(cx + tipLen / 2 + sweepOffset, cy - halfSpan); // tip TE
            ctx.lineTo(cx + rootLen / 2, cy); // root TE
            ctx.closePath();

            const gradR = ctx.createLinearGradient(cx, cy, cx, cy - halfSpan);
            gradR.addColorStop(0, 'rgba(138,154,91,0.4)');
            gradR.addColorStop(1, 'rgba(138,154,91,0.15)');
            ctx.fillStyle = gradR;
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Left wing (mirror)
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy);
            ctx.lineTo(cx - tipLen / 2 + sweepOffset, cy + halfSpan);
            ctx.lineTo(cx + tipLen / 2 + sweepOffset, cy + halfSpan);
            ctx.lineTo(cx + rootLen / 2, cy);
            ctx.closePath();

            const gradL = ctx.createLinearGradient(cx, cy, cx, cy + halfSpan);
            gradL.addColorStop(0, 'rgba(138,154,91,0.4)');
            gradL.addColorStop(1, 'rgba(138,154,91,0.15)');
            ctx.fillStyle = gradL;
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Fuselage centerline
            ctx.beginPath();
            ctx.moveTo(cx - rootLen * 0.8, cy);
            ctx.lineTo(cx + rootLen * 0.3, cy);
            ctx.strokeStyle = '#606C38';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Nose
            ctx.beginPath();
            ctx.arc(cx - rootLen * 0.8, cy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Dimension annotations
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.lineWidth = 1;

            // Wingspan
            ctx.beginPath();
            ctx.moveTo(cx + rootLen / 2 + 20, cy - halfSpan);
            ctx.lineTo(cx + rootLen / 2 + 20, cy + halfSpan);
            ctx.stroke();
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px Segoe UI, sans-serif';
            ctx.save();
            ctx.translate(cx + rootLen / 2 + 32, cy);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText(v.span + ' cm span', 0, 0);
            ctx.restore();

            // Root chord
            ctx.beginPath();
            ctx.moveTo(cx - rootLen / 2, cy + halfSpan + 15);
            ctx.lineTo(cx + rootLen / 2, cy + halfSpan + 15);
            ctx.stroke();
            ctx.fillStyle = '#FEFAE0';
            ctx.textAlign = 'center';
            ctx.fillText(v.root + ' cm root', cx, cy + halfSpan + 30);

            // Tip chord
            ctx.beginPath();
            ctx.moveTo(cx - tipLen / 2 + sweepOffset, cy - halfSpan - 10);
            ctx.lineTo(cx + tipLen / 2 + sweepOffset, cy - halfSpan - 10);
            ctx.stroke();
            ctx.fillText(v.tip + ' cm tip', cx + sweepOffset, cy - halfSpan - 18);

            // Sweep angle arc
            if (v.sweep > 2) {
                ctx.beginPath();
                const arcR = halfSpan * 0.3;
                ctx.moveTo(cx - rootLen / 2, cy);
                ctx.lineTo(cx - rootLen / 2, cy - halfSpan * 0.4);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.beginPath();
                ctx.arc(cx - rootLen / 2, cy, arcR, -Math.PI / 2, -Math.PI / 2 + sweepRad);
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = '#DDA15E';
                ctx.font = '10px Segoe UI, sans-serif';
                ctx.fillText(v.sweep + '\u00b0', cx - rootLen / 2 + arcR + 5, cy - arcR * 0.7);
            }

            ctx.setLineDash([]);
            ctx.textAlign = 'left';

            // Quarter-chord line (aerodynamic center)
            const rootQC = cx - rootLen / 4;
            const tipQC = cx - tipLen / 4 + sweepOffset;
            ctx.beginPath();
            ctx.moveTo(rootQC, cy + halfSpan * 0.9);
            ctx.lineTo(tipQC, cy - halfSpan * 0.9);
            ctx.strokeStyle = 'rgba(33,150,243,0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#2196F3';
            ctx.font = '9px Segoe UI, sans-serif';
            ctx.fillText('Quarter chord', tipQC + 5, cy - halfSpan * 0.85);

            // Draw lift distribution
            drawLiftDistribution(cx, cy, halfSpan, v, scale);
        }

        function drawLiftDistribution(cx, cy, halfSpan, v, scale) {
            const taper = v.tip / v.root;

            // Elliptic vs actual lift distribution
            ctx.beginPath();
            for (let i = 0; i <= 30; i++) {
                const t = i / 30;
                const y = cy - t * halfSpan;
                // Approximate lift distribution for tapered wing
                const chord = v.root * (1 - t * (1 - taper));
                const elliptic = Math.sqrt(1 - t * t);
                const actual = chord / v.root * 0.9 + elliptic * 0.1;
                const liftMag = actual * 30 * scale;
                const x = cx - v.root * scale / 2 - 30 - liftMag;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(76,175,80,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Elliptic ideal
            ctx.beginPath();
            for (let i = 0; i <= 30; i++) {
                const t = i / 30;
                const y = cy - t * halfSpan;
                const elliptic = Math.sqrt(1 - t * t);
                const liftMag = elliptic * 30 * scale;
                const x = cx - v.root * scale / 2 - 30 - liftMag;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(33,150,243,0.3)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Legend
            ctx.fillStyle = '#4CAF50';
            ctx.font = '9px Segoe UI, sans-serif';
            ctx.fillText('Actual lift', cx - v.root * scale / 2 - 80, cy - halfSpan + 15);
            ctx.fillStyle = '#2196F3';
            ctx.fillText('Ideal (elliptic)', cx - v.root * scale / 2 - 80, cy - halfSpan + 28);
        }

        // Update labels and metrics
        function updateAll() {
            const v = getVals();
            document.getElementById('spanVal').textContent = v.span;
            document.getElementById('rootVal').textContent = v.root;
            document.getElementById('tipVal').textContent = v.tip;
            document.getElementById('sweepVal').textContent = v.sweep;
            document.getElementById('loadVal').textContent = v.load;

            const m = calcMetrics(v);
            document.getElementById('arVal').textContent = m.AR.toFixed(1);
            document.getElementById('areaVal').textContent = m.area.toFixed(0);
            document.getElementById('taperVal').textContent = m.taper.toFixed(2);
            document.getElementById('macVal').textContent = m.MAC.toFixed(1);

            document.getElementById('glideBar').style.width = m.glideScore + '%';
            document.getElementById('speedBar').style.width = m.speedScore + '%';
            document.getElementById('stabBar').style.width = m.stabScore + '%';

            // Color the bars
            function barColor(score) {
                if (score > 70) return '#4CAF50';
                if (score > 40) return '#FFC107';
                return '#f44336';
            }
            document.getElementById('glideBar').style.background = barColor(m.glideScore);
            document.getElementById('speedBar').style.background = barColor(m.speedScore);
            document.getElementById('stabBar').style.background = barColor(m.stabScore);
        }

        ['span', 'root', 'tip', 'sweep', 'load'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateAll);
        });

        // Famous designs reference
        function drawPresets(x, y) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(x, y, 180, 110, 10);
            ctx.fill();

            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 11px Segoe UI, sans-serif';
            ctx.fillText('Reference Designs', x + 10, y + 18);

            ctx.font = '10px Segoe UI, sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('Classic Dart: AR~3, sweep 35\u00b0', x + 10, y + 38);
            ctx.fillText('Sailplane: AR~8, sweep 5\u00b0', x + 10, y + 55);
            ctx.fillText('Suzanne (WR): AR~5, sweep 15\u00b0', x + 10, y + 72);
            ctx.fillText('Delta: AR~2, sweep 50\u00b0', x + 10, y + 89);
        }

        function animate() {
            time += 0.016;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Grid background
            ctx.strokeStyle = 'rgba(138,154,91,0.05)';
            ctx.lineWidth = 1;
            const gridSize = 30;
            for (let x = 0; x < W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            const scale = Math.min(W, H) / 100;
            drawPlanform(W * 0.38, H * 0.45, scale);
            drawPresets(10, H * 0.06);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            document.getElementById('span').value = 20;
            document.getElementById('root').value = 12;
            document.getElementById('tip').value = 6;
            document.getElementById('sweep').value = 15;
            document.getElementById('load').value = 50;
            updateAll();
        };

        updateAll();
        animate();
    })();
    </script>
</body>
</html>
