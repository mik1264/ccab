<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dihedral Stability Tester - Paper Airplane Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; width: 260px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls h3 { color: #DDA15E; margin-bottom: 8px; font-size: 0.95rem; }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; color: #8A9A5B; font-size: 0.8rem; margin-bottom: 2px; }
        .control-group input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .val { color: #DDA15E; font-size: 0.8rem; float: right; }
        #info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 12px; font-size: 0.85rem;
            border: 1px solid rgba(138,154,91,0.3); text-align: center; max-width: 500px;
        }
        .roll-meter {
            margin-top: 8px; height: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;
            position: relative; overflow: hidden;
        }
        .roll-bar {
            position: absolute; top: 0; height: 100%; border-radius: 10px;
            transition: width 0.1s, left 0.1s;
        }
        button {
            width: 100%; padding: 8px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #606C38, #8A9A5B); color: #FEFAE0;
            font-size: 0.85rem; cursor: pointer; font-weight: bold; margin-top: 5px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Dihedral Stability Tester</h3>
        <div class="control-group">
            <label>Dihedral Angle: <span class="val" id="dihedralVal">10</span>&deg;</label>
            <input type="range" id="dihedral" min="-15" max="30" value="10" step="1">
        </div>
        <div class="control-group">
            <label>Wind Gust Strength: <span class="val" id="gustVal">2</span></label>
            <input type="range" id="gust" min="0" max="8" value="2" step="0.5">
        </div>
        <div class="control-group">
            <label>Airspeed: <span class="val" id="airspeedVal">8</span> m/s</label>
            <input type="range" id="airspeed" min="3" max="15" value="8" step="0.5">
        </div>
        <button id="perturbBtn">Apply Gust!</button>
        <p style="color:#8A9A5B; font-size:0.75rem; margin-top:8px;">
            Positive dihedral (wings angled up like a Y) provides roll stability.
            Negative (anhedral) is unstable. Watch how the airplane recovers from gusts.
        </p>
    </div>
    <div id="info">
        <p>Roll Angle: <span style="color:#DDA15E; font-weight:bold;" id="rollDisp">0.0</span>&deg;
        &nbsp;&nbsp; Stability: <span id="stabDisp" style="color:#4CAF50; font-weight:bold;">Good</span></p>
        <div class="roll-meter">
            <div class="roll-bar" id="rollBar" style="background:#4CAF50; width:2px; left:50%;"></div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let time = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // State
        let rollAngle = 0;      // radians
        let rollRate = 0;        // rad/s
        let yawAngle = 0;
        let sideslip = 0;

        function getDihedral() { return parseFloat(document.getElementById('dihedral').value); }
        function getGust() { return parseFloat(document.getElementById('gust').value); }
        function getAirspeed() { return parseFloat(document.getElementById('airspeed').value); }

        // Apply gust
        document.getElementById('perturbBtn').addEventListener('click', function() {
            const gustStrength = getGust();
            rollRate += (Math.random() - 0.5) * gustStrength * 0.5;
            sideslip += (Math.random() - 0.5) * gustStrength * 2;
        });

        // Update labels
        ['dihedral', 'gust', 'airspeed'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                document.getElementById(id + 'Val').textContent = this.value;
            });
        });

        // Draw rear view of airplane
        function drawRearView(cx, cy, scale, dihedralDeg, roll) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(roll);

            const dihedralRad = dihedralDeg * Math.PI / 180;
            const wingLen = scale * 1.5;
            const bodyH = scale * 0.15;

            // Body (fuselage cross-section)
            ctx.beginPath();
            ctx.ellipse(0, 0, bodyH * 0.8, bodyH, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#606C38';
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Left wing
            const lwx = -wingLen * Math.cos(dihedralRad);
            const lwy = -wingLen * Math.sin(dihedralRad);
            ctx.beginPath();
            ctx.moveTo(-bodyH * 0.8, 0);
            ctx.lineTo(lwx, lwy);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Wing tip
            ctx.beginPath();
            ctx.arc(lwx, lwy, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Right wing
            const rwx = wingLen * Math.cos(dihedralRad);
            const rwy = -wingLen * Math.sin(dihedralRad);
            ctx.beginPath();
            ctx.moveTo(bodyH * 0.8, 0);
            ctx.lineTo(rwx, rwy);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(rwx, rwy, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Dihedral angle arc
            if (Math.abs(dihedralDeg) > 1) {
                ctx.beginPath();
                const arcR = scale * 0.4;
                const startAngle = 0;
                const endAngle = -dihedralRad;
                ctx.arc(bodyH, 0, arcR, startAngle, endAngle, dihedralDeg > 0);
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([3, 3]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Angle label
                const labelAngle = -dihedralRad / 2;
                ctx.fillStyle = '#DDA15E';
                ctx.font = '12px Segoe UI, sans-serif';
                ctx.fillText(dihedralDeg + '\u00b0', bodyH + arcR * Math.cos(labelAngle) + 5, arcR * Math.sin(labelAngle));
            }

            // Horizon line (reference)
            ctx.beginPath();
            ctx.moveTo(-wingLen * 1.3, 0);
            ctx.lineTo(wingLen * 1.3, 0);
            ctx.strokeStyle = 'rgba(254,250,224,0.15)';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 8]);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.restore();
        }

        // Draw force diagram showing how dihedral creates restoring moment
        function drawForceDiagram(cx, cy, dihedralDeg, roll, sideslipVal) {
            const scale = 60;
            ctx.save();
            ctx.translate(cx, cy);

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(-120, -90, 240, 180, 10);
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Force Diagram (Top View)', 0, -72);

            // Draw simplified top view
            const dihedralRad = dihedralDeg * Math.PI / 180;

            // Wind direction arrow
            const windAngle = sideslipVal * 0.05;
            ctx.beginPath();
            ctx.moveTo(-100, 0);
            ctx.lineTo(-50, 0);
            ctx.strokeStyle = '#64B5F6';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-50, 0);
            ctx.lineTo(-58, -5);
            ctx.moveTo(-50, 0);
            ctx.lineTo(-58, 5);
            ctx.stroke();
            ctx.fillStyle = '#64B5F6';
            ctx.font = '9px Segoe UI, sans-serif';
            ctx.fillText('Wind', -75, -10);

            // Simplified airplane top view
            ctx.beginPath();
            ctx.moveTo(30, 0);
            ctx.lineTo(-20, -25);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-20, 25);
            ctx.closePath();
            ctx.fillStyle = 'rgba(138,154,91,0.3)';
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Show sideslip effect
            if (Math.abs(sideslipVal) > 0.5) {
                const sideForce = sideslipVal * dihedralDeg * 0.02;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -sideForce * 20);
                ctx.strokeStyle = '#f44336';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Rolling moment arrow
                const momentDir = sideForce > 0 ? 1 : -1;
                ctx.beginPath();
                ctx.arc(0, 0, 35, -Math.PI / 4, Math.PI / 4);
                ctx.strokeStyle = '#FFC107';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#FFC107';
                ctx.font = '9px Segoe UI, sans-serif';
                ctx.fillText('Restoring', 0, 55);
                ctx.fillText('Moment', 0, 65);
            }

            ctx.textAlign = 'left';
            ctx.restore();
        }

        // Simulate time history of roll angle
        const rollHistory = [];
        const maxHistory = 300;

        function drawRollHistory(x, y, w, h) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 10);
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px Segoe UI, sans-serif';
            ctx.fillText('Roll Angle History', x + 10, y + 16);

            const padX = 10, padY = 25;
            const cw = w - padX * 2;
            const ch = h - padY - 10;
            const midY = y + padY + ch / 2;

            // Zero line
            ctx.beginPath();
            ctx.moveTo(x + padX, midY);
            ctx.lineTo(x + padX + cw, midY);
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            if (rollHistory.length < 2) return;

            ctx.beginPath();
            const maxRoll = Math.max(30, Math.max(...rollHistory.map(r => Math.abs(r))));
            for (let i = 0; i < rollHistory.length; i++) {
                const px = x + padX + (i / maxHistory) * cw;
                const py = midY - (rollHistory[i] / maxRoll) * (ch / 2);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }

            const absCurrent = Math.abs(rollAngle * 180 / Math.PI);
            const color = absCurrent < 5 ? '#4CAF50' : absCurrent < 20 ? '#FFC107' : '#f44336';
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function simulate(dt) {
            const dihedralDeg = getDihedral();
            const airspeed = getAirspeed();

            // Dihedral provides restoring roll moment proportional to sideslip and dihedral angle
            // When rolled, gravity component creates sideslip
            sideslip += rollAngle * 2 * dt; // roll induces sideslip
            sideslip *= 0.95; // damping

            // Restoring moment from dihedral
            const dihedralRad = dihedralDeg * Math.PI / 180;
            const restoringMoment = -sideslip * dihedralRad * airspeed * 0.3;

            // Roll damping
            const rollDamping = -rollRate * 1.5;

            // Random turbulence
            const turb = (Math.random() - 0.5) * 0.02;

            rollRate += (restoringMoment + rollDamping + turb) * dt;
            rollAngle += rollRate * dt;

            // Limit roll
            if (Math.abs(rollAngle) > Math.PI * 0.8) {
                rollAngle = Math.sign(rollAngle) * Math.PI * 0.8;
                rollRate *= -0.3;
            }

            // Record history
            rollHistory.push(rollAngle * 180 / Math.PI);
            if (rollHistory.length > maxHistory) rollHistory.shift();

            // Update display
            const rollDeg = rollAngle * 180 / Math.PI;
            document.getElementById('rollDisp').textContent = rollDeg.toFixed(1);

            const stabEl = document.getElementById('stabDisp');
            const absRoll = Math.abs(rollDeg);
            if (absRoll < 5) {
                stabEl.textContent = 'Excellent';
                stabEl.style.color = '#4CAF50';
            } else if (absRoll < 15) {
                stabEl.textContent = 'Good';
                stabEl.style.color = '#8BC34A';
            } else if (absRoll < 30) {
                stabEl.textContent = 'Fair';
                stabEl.style.color = '#FFC107';
            } else {
                stabEl.textContent = 'Unstable!';
                stabEl.style.color = '#f44336';
            }

            // Roll meter bar
            const bar = document.getElementById('rollBar');
            const barWidth = Math.min(48, Math.abs(rollDeg) / 90 * 50);
            bar.style.width = barWidth + '%';
            bar.style.left = rollDeg < 0 ? (50 - barWidth) + '%' : '50%';
            bar.style.background = absRoll < 15 ? '#4CAF50' : absRoll < 30 ? '#FFC107' : '#f44336';
        }

        function drawBackground() {
            // Sky gradient with horizon that tilts with roll
            ctx.save();
            ctx.translate(W / 2, H / 2);
            ctx.rotate(rollAngle * 0.3); // subtle horizon tilt

            const grad = ctx.createLinearGradient(0, -H, 0, H);
            grad.addColorStop(0, '#0a0a2e');
            grad.addColorStop(0.4, '#1a1a3e');
            grad.addColorStop(0.5, '#2a3a4e');
            grad.addColorStop(0.6, '#2a3a1e');
            grad.addColorStop(1, '#1a2a10');
            ctx.fillStyle = grad;
            ctx.fillRect(-W, -H, W * 2, H * 2);

            ctx.restore();
        }

        function animate() {
            time += 0.016;
            simulate(0.016);

            ctx.clearRect(0, 0, W, H);
            drawBackground();

            const dihedralDeg = getDihedral();

            // Main rear view - large
            const mainScale = Math.min(W * 0.15, H * 0.2);
            drawRearView(W * 0.4, H * 0.4, mainScale, dihedralDeg, rollAngle);

            // Labels
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '14px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Rear View', W * 0.4, H * 0.4 + mainScale * 1.3);

            if (dihedralDeg > 0) {
                ctx.fillStyle = '#4CAF50';
                ctx.fillText('Dihedral (Stable)', W * 0.4, H * 0.4 + mainScale * 1.3 + 20);
            } else if (dihedralDeg < 0) {
                ctx.fillStyle = '#f44336';
                ctx.fillText('Anhedral (Unstable)', W * 0.4, H * 0.4 + mainScale * 1.3 + 20);
            } else {
                ctx.fillStyle = '#FFC107';
                ctx.fillText('Flat Wings (Neutral)', W * 0.4, H * 0.4 + mainScale * 1.3 + 20);
            }
            ctx.textAlign = 'left';

            // Force diagram
            drawForceDiagram(W * 0.15, H * 0.75, dihedralDeg, rollAngle, sideslip);

            // Roll history chart
            drawRollHistory(10, H * 0.55 - 100, Math.min(300, W * 0.3), 120);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            rollAngle = 0;
            rollRate = 0;
            sideslip = 0;
            yawAngle = 0;
            rollHistory.length = 0;
            document.getElementById('dihedral').value = 10;
            document.getElementById('gust').value = 2;
            document.getElementById('airspeed').value = 8;
            document.getElementById('dihedralVal').textContent = '10';
            document.getElementById('gustVal').textContent = '2';
            document.getElementById('airspeedVal').textContent = '8';
        };

        animate();
    })();
    </script>
</body>
</html>
