<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide Ratio Calculator - Paper Airplane Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; width: 260px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls h3 { color: #DDA15E; margin-bottom: 8px; font-size: 0.95rem; }
        .control-group { margin-bottom: 8px; }
        .control-group label { display: block; color: #8A9A5B; font-size: 0.8rem; margin-bottom: 2px; }
        .control-group input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .val { color: #DDA15E; font-size: 0.8rem; float: right; }
        button {
            width: 100%; padding: 8px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #606C38, #8A9A5B); color: #FEFAE0;
            font-size: 0.85rem; cursor: pointer; font-weight: bold; margin-top: 5px;
        }
        #results {
            position: fixed; bottom: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 12px; font-size: 0.85rem;
            border: 1px solid rgba(138,154,91,0.3); width: 230px;
        }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .result-label { color: #8A9A5B; }
        .result-val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <h3>Glide Ratio Calculator</h3>
        <div class="control-group">
            <label>Launch Height: <span class="val" id="heightVal">5</span> m</label>
            <input type="range" id="height" min="1" max="15" value="5" step="0.5">
        </div>
        <div class="control-group">
            <label>Launch Speed: <span class="val" id="launchVal">8</span> m/s</label>
            <input type="range" id="launch" min="2" max="18" value="8" step="0.5">
        </div>
        <div class="control-group">
            <label>Wing Area: <span class="val" id="areaVal">40</span> cm&sup2;</label>
            <input type="range" id="area" min="15" max="80" value="40" step="1">
        </div>
        <div class="control-group">
            <label>Mass: <span class="val" id="massVal">4.5</span> g</label>
            <input type="range" id="mass" min="2" max="8" value="4.5" step="0.5">
        </div>
        <div class="control-group">
            <label>Aspect Ratio: <span class="val" id="arVal">5</span></label>
            <input type="range" id="ar" min="2" max="9" value="5" step="0.5">
        </div>
        <button id="launchBtn">Launch Glider!</button>
    </div>
    <div id="results">
        <h4 style="color:#DDA15E; margin-bottom:6px;">Flight Results</h4>
        <div class="result-row"><span class="result-label">Glide Ratio:</span> <span class="result-val" id="grVal">--</span></div>
        <div class="result-row"><span class="result-label">Glide Angle:</span> <span class="result-val" id="gaVal">--</span></div>
        <div class="result-row"><span class="result-label">Distance:</span> <span class="result-val" id="distVal">--</span></div>
        <div class="result-row"><span class="result-label">Hang Time:</span> <span class="result-val" id="timeVal">--</span></div>
        <div class="result-row"><span class="result-label">Sink Rate:</span> <span class="result-val" id="sinkVal">--</span></div>
        <div class="result-row"><span class="result-label">Best L/D Speed:</span> <span class="result-val" id="bestVVal">--</span></div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let time = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let plane = null;
        let trail = [];
        let simulating = false;
        let bestFlight = null;

        const groundFrac = 0.85;
        const g = 9.81;
        const rho = 1.225;

        function getParams() {
            return {
                height: parseFloat(document.getElementById('height').value),
                launchSpeed: parseFloat(document.getElementById('launch').value),
                wingArea: parseFloat(document.getElementById('area').value) / 10000, // cm^2 to m^2
                mass: parseFloat(document.getElementById('mass').value) / 1000, // g to kg
                AR: parseFloat(document.getElementById('ar').value)
            };
        }

        // Calculate optimal speed for best glide ratio
        function calcBestGlideSpeed(p) {
            const cd0 = 0.02;
            const e = 0.7;
            const k = 1 / (Math.PI * p.AR * e);
            // Best L/D speed: V = sqrt(2mg / (rho * S * sqrt(CD0/k)))
            const clBest = Math.sqrt(cd0 / k);
            const vBest = Math.sqrt(2 * p.mass * g / (rho * p.wingArea * clBest));
            const bestLD = 0.5 * Math.sqrt(1 / (cd0 * k)); // max L/D
            return { vBest, bestLD, clBest };
        }

        function launch() {
            const p = getParams();
            const { vBest, bestLD } = calcBestGlideSpeed(p);

            plane = {
                x: 0,
                y: -p.height,
                vx: p.launchSpeed,
                vy: 0,
                theta: 0,
                time: 0,
                maxDist: 0,
                params: p
            };
            trail = [];
            simulating = true;

            document.getElementById('bestVVal').textContent = vBest.toFixed(1) + ' m/s';
        }

        document.getElementById('launchBtn').addEventListener('click', launch);

        function simulateStep(dt) {
            if (!plane || !simulating) return;

            const p = plane.params;
            const V = Math.sqrt(plane.vx * plane.vx + plane.vy * plane.vy);
            if (V < 0.3) { simulating = false; return; }

            const flightAngle = Math.atan2(-plane.vy, plane.vx);

            // Trim to best glide: pitch adjusts to maintain optimal AoA
            const targetTheta = flightAngle + 0.08; // ~5 degree AoA for best glide
            plane.theta += (targetTheta - plane.theta) * 5 * dt;

            const aoa = plane.theta - flightAngle;

            // CL
            const clSlope = 2 * Math.PI; // thin airfoil
            let CL = clSlope * aoa;
            if (Math.abs(aoa) > 0.25) {
                CL = clSlope * 0.25 * Math.sign(aoa);
            }

            // CD
            const cd0 = 0.02;
            const e = 0.7;
            const cdi = (CL * CL) / (Math.PI * p.AR * e);
            const CD = cd0 + cdi;

            // Forces
            const q = 0.5 * rho * V * V;
            const L = q * p.wingArea * CL;
            const D = q * p.wingArea * CD;

            const ax = (-L * Math.sin(flightAngle) - D * (plane.vx / V)) / p.mass;
            const ay = g + (-L * Math.cos(flightAngle) - D * (plane.vy / V)) / p.mass;

            plane.vx += ax * dt;
            plane.vy += ay * dt;
            plane.x += plane.vx * dt;
            plane.y += plane.vy * dt;
            plane.time += dt;

            trail.push({ x: plane.x, y: plane.y, V });

            // Ground hit
            if (plane.y >= 0) {
                simulating = false;
                const distance = plane.x;
                const glideRatio = distance / p.height;
                const glideAngle = Math.atan(p.height / distance) * 180 / Math.PI;
                const sinkRate = p.height / plane.time;

                document.getElementById('grVal').textContent = glideRatio.toFixed(1) + ':1';
                document.getElementById('gaVal').textContent = glideAngle.toFixed(1) + '\u00b0';
                document.getElementById('distVal').textContent = distance.toFixed(1) + ' m';
                document.getElementById('timeVal').textContent = plane.time.toFixed(2) + ' s';
                document.getElementById('sinkVal').textContent = sinkRate.toFixed(2) + ' m/s';

                if (!bestFlight || distance > bestFlight.distance) {
                    bestFlight = { distance, glideRatio, trail: [...trail] };
                }
            }

            if (plane.time > 20) simulating = false;
        }

        function worldToScreen(wx, wy) {
            const groundY = H * groundFrac;
            const maxH = 16;
            const maxD = 80;
            const scaleX = (W - 140) / maxD;
            const scaleY = (groundY - 50) / maxH;
            return {
                x: 80 + wx * scaleX,
                y: groundY + wy * scaleY
            };
        }

        function drawScene() {
            // Sky
            const grad = ctx.createLinearGradient(0, 0, 0, H * groundFrac);
            grad.addColorStop(0, '#0a0a1e');
            grad.addColorStop(0.6, '#1a1a3e');
            grad.addColorStop(1, '#2a2a4e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H * groundFrac);

            // Ground
            ctx.fillStyle = '#2a3a1e';
            ctx.fillRect(0, H * groundFrac, W, H * (1 - groundFrac));

            // Grid
            ctx.strokeStyle = 'rgba(254,250,224,0.05)';
            ctx.lineWidth = 1;
            for (let d = 0; d <= 80; d += 5) {
                const p = worldToScreen(d, 0);
                ctx.beginPath();
                ctx.moveTo(p.x, 50);
                ctx.lineTo(p.x, H * groundFrac);
                ctx.stroke();
            }
            for (let h = 0; h <= 15; h += 2.5) {
                const p = worldToScreen(0, -h);
                ctx.beginPath();
                ctx.moveTo(80, p.y);
                ctx.lineTo(W - 60, p.y);
                ctx.stroke();
            }

            // Axis labels
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.font = '10px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let d = 10; d <= 80; d += 10) {
                const p = worldToScreen(d, 0);
                ctx.fillText(d + 'm', p.x, H * groundFrac + 15);
            }
            for (let h = 0; h <= 15; h += 5) {
                const p = worldToScreen(0, -h);
                ctx.fillText(h + 'm', 55, p.y + 4);
            }
            ctx.textAlign = 'left';

            // Launch platform
            const p = getParams();
            const platPos = worldToScreen(0, -p.height);
            ctx.fillStyle = '#606C38';
            ctx.fillRect(platPos.x - 15, platPos.y, 15, H * groundFrac - platPos.y);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(platPos.x - 20, platPos.y - 3, 25, 6);

            // Height label
            ctx.fillStyle = '#DDA15E';
            ctx.font = '11px Segoe UI, sans-serif';
            ctx.fillText(p.height + 'm', platPos.x - 50, platPos.y + (H * groundFrac - platPos.y) / 2);
        }

        function drawTrail() {
            if (trail.length < 2) return;

            // Trail with speed coloring
            for (let i = 1; i < trail.length; i++) {
                const p1 = worldToScreen(trail[i - 1].x, trail[i - 1].y);
                const p2 = worldToScreen(trail[i].x, trail[i].y);

                const speedNorm = Math.min(1, trail[i].V / 15);
                const r = Math.round(50 + speedNorm * 200);
                const g = Math.round(200 - speedNorm * 100);
                const b = Math.round(100 - speedNorm * 50);

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = `rgba(${r},${g},${b},0.7)`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            // Landing spot
            if (!simulating && trail.length > 0) {
                const last = trail[trail.length - 1];
                const lp = worldToScreen(last.x, 0);
                ctx.beginPath();
                ctx.arc(lp.x, H * groundFrac, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();

                ctx.fillStyle = '#DDA15E';
                ctx.font = 'bold 12px Segoe UI, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(last.x.toFixed(1) + 'm', lp.x, H * groundFrac + 28);
                ctx.textAlign = 'left';
            }
        }

        // Draw best flight ghost trail
        function drawBestTrail() {
            if (!bestFlight || bestFlight.trail === trail) return;

            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            for (let i = 0; i < bestFlight.trail.length; i++) {
                const p = worldToScreen(bestFlight.trail[i].x, bestFlight.trail[i].y);
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = 'rgba(76,175,80,0.25)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Draw glide ratio diagram
        function drawGlideAngle() {
            if (trail.length < 5 || simulating) return;

            const p = getParams();
            const startPos = worldToScreen(0, -p.height);
            const last = trail[trail.length - 1];
            const endPos = worldToScreen(last.x, 0);

            // Direct glide line
            ctx.beginPath();
            ctx.moveTo(startPos.x, startPos.y);
            ctx.lineTo(endPos.x, endPos.y);
            ctx.strokeStyle = 'rgba(221,161,94,0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 6]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Glide angle arc
            const arcR = 50;
            const angle = Math.atan2(H * groundFrac - startPos.y, endPos.x - startPos.x);
            ctx.beginPath();
            ctx.arc(startPos.x, startPos.y, arcR, 0, angle);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            const glideAngle = Math.atan(p.height / last.x) * 180 / Math.PI;
            ctx.fillStyle = '#DDA15E';
            ctx.font = '11px Segoe UI, sans-serif';
            ctx.fillText(glideAngle.toFixed(1) + '\u00b0', startPos.x + arcR + 5, startPos.y + arcR * Math.sin(angle / 2));
        }

        function drawPlane() {
            if (!plane) return;
            const pos = worldToScreen(plane.x, plane.y);

            ctx.save();
            ctx.translate(pos.x, pos.y);
            ctx.rotate(-plane.theta);

            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-10, -6);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(3, 0);
            ctx.lineTo(-5, -12);
            ctx.lineTo(-8, 0);
            ctx.lineTo(-5, 12);
            ctx.closePath();
            ctx.fillStyle = 'rgba(138,154,91,0.6)';
            ctx.fill();

            ctx.restore();
        }

        // Speed color legend
        function drawLegend() {
            const lx = 10, ly = H * 0.07;
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(lx, ly, 130, 50, 8);
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px Segoe UI, sans-serif';
            ctx.fillText('Trail = airspeed', lx + 10, ly + 16);

            // Gradient bar
            const gradBar = ctx.createLinearGradient(lx + 10, 0, lx + 110, 0);
            gradBar.addColorStop(0, 'rgb(50,200,100)');
            gradBar.addColorStop(1, 'rgb(250,100,50)');
            ctx.fillStyle = gradBar;
            ctx.fillRect(lx + 10, ly + 22, 100, 8);

            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '9px Segoe UI, sans-serif';
            ctx.fillText('Slow', lx + 10, ly + 44);
            ctx.fillText('Fast', lx + 88, ly + 44);
        }

        ['height', 'launch', 'area', 'mass', 'ar'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                document.getElementById(id + 'Val').textContent = this.value;
            });
        });

        function animate() {
            time += 0.016;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            drawScene();
            drawBestTrail();

            if (simulating) {
                for (let i = 0; i < 5; i++) {
                    simulateStep(0.005);
                }
            }

            drawTrail();
            drawGlideAngle();
            if (simulating) drawPlane();
            drawLegend();

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            plane = null;
            trail = [];
            simulating = false;
            bestFlight = null;
            document.getElementById('height').value = 5;
            document.getElementById('launch').value = 8;
            document.getElementById('area').value = 40;
            document.getElementById('mass').value = 4.5;
            document.getElementById('ar').value = 5;
            ['height', 'launch', 'area', 'mass', 'ar'].forEach(id => {
                document.getElementById(id + 'Val').textContent = document.getElementById(id).value;
            });
            ['grVal', 'gaVal', 'distVal', 'timeVal', 'sinkVal', 'bestVVal'].forEach(id => {
                document.getElementById(id).textContent = '--';
            });
        };

        animate();
    })();
    </script>
</body>
</html>
