<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octagon-Square Weave - Ribbonics</title>
    <meta name="description" content="Truncated-square tiling of octagons and small squares, with ribbon arcs weaving continuously through both tile types in rich multicolour.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Octagon-Square Weave</h1>
        <p>A truncated-square tiling of regular octagons and small squares. Each octagon holds two quarter-circle ribbon arcs; the small squares connect them. Arcs join across shared edges into continuous woven loops.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="court">Court</option>
                    <option value="jewel">Jewel</option>
                    <option value="pastel">Pastel</option>
                    <option value="neon">Neon</option>
                    <option value="earth">Earth</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Cell size <span class="value-display" id="sizeVal">70</span></label>
            <input type="range" id="size" min="35" max="140" value="70">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        court: ['#C0392B','#2E86AB','#27AE60','#E67E22','#E84393','#F1C40F','#16A085'],
        jewel: ['#E63946','#457B9D','#2A9D8F','#E9C46A','#F4A261','#8338EC','#06D6A0'],
        pastel:['#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF','#D0BAFF','#FFB3F7'],
        neon:  ['#FF00FF','#00FFFF','#FFFF00','#FF4500','#00FF7F','#FF69B4','#7FFF00'],
        earth: ['#BC6C25','#DDA15E','#E9C46A','#606C38','#8A9A5B','#A3B18A','#DDA15E'],
    };
    const BG = '#0f0f18';
    const CASING = '#080810';

    let cellSize = 70;
    let widthPct = 0.38;
    let paletteName = 'court';
    let W, H;
    let arcs = [];

    const PI = Math.PI;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Octagon-square tiling (4.8.8 tiling):
    // The tiling has a repeating unit: one octagon + one square.
    // Period along x and y: P = a + a*sqrt(2) where a = side length
    // We set a = cellSize * (sqrt(2)-1), so the period P = cellSize
    // Octagon side a, truncation t = a/sqrt(2), total span = a + 2t = a(1+sqrt(2))
    // Let cell = a*(1+sqrt(2)) = cellSize
    // So a = cellSize / (1+sqrt(2)) = cellSize*(sqrt(2)-1)

    function build() {
        const SQRT2 = Math.SQRT2;
        const a = cellSize * (SQRT2 - 1);    // octagon side
        const t = a / SQRT2;                  // truncation length = a/sqrt(2) = a*sqrt(2)/2
        const P = cellSize;                   // period

        const pal = PALETTES[paletteName];
        const parent = new Map();
        function find(k) {
            if (!parent.has(k)) parent.set(k, k);
            let r = k;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(k) !== r) { const nk = parent.get(k); parent.set(k, r); k = nk; }
            return r;
        }
        function union(aa, b) { parent.set(find(aa), find(b)); }

        arcs = [];

        const cols = Math.ceil(W / P) + 2;
        const rows = Math.ceil(H / P) + 2;

        // In the 4.8.8 tiling, we can use the Truchet approach on the octagons:
        // Each octagon has 8 edges. We connect opposite-edge midpoints via arcs.
        // We use 4 arcs per octagon, each connecting two adjacent edges (quarter-circle).
        // For Truchet: pick 2 of the 4 possible arc orientations at random.
        //
        // Simpler approach: treat each cell as two Truchet squares arranged in a cross pattern.
        // Use standard 2D Truchet on a grid, but the cells are square sub-tiles of the octagon grid.
        //
        // Best approach for visual quality: plain Truchet on the full cell grid,
        // but draw arcs that respect the octagonal geometry by using corner arcs at the
        // truncated vertices (diagonal corners).

        for (let row = -1; row < rows; row++) {
            for (let col = -1; col < cols; col++) {
                // Cell origin
                const ox = col * P;
                const oy = row * P;

                // The octagon occupies the cell minus the 4 corners (squares of size t×t)
                // The small squares are at the corners between 4 octagon cells.
                // For Truchet on the octagon cell, we use 4 arcs at the cardinal midpoints:
                // top (T), right (R), bottom (B), left (L) at distance a/2+t = P/2 from center

                // Edge midpoint coordinates (on the straight edges of the octagon):
                const T  = [ox + P/2, oy];
                const TR = [ox + P, oy + t/2];   // not used here; we use the 4 cardinal edges
                const R  = [ox + P, oy + P/2];
                const B  = [ox + P/2, oy + P];
                const L  = [ox, oy + P/2];

                // Diagonal edge midpoints (on the truncated corners / small-square edges):
                // top-right corner: between T and R, approx at (ox+P-t/2, oy+t/2)
                // These connect to the small squares.

                // For the main arcs inside the octagon, use standard Truchet with radius P/2:
                const config = Math.random() < 0.5 ? 0 : 1;

                // Edge keys for connectivity
                const kT = `T${col}_${row}`;
                const kB = `T${col}_${row+1}`;
                const kL = `L${col}_${row}`;
                const kR = `L${col+1}_${row}`;

                let pairs;
                if (config === 0) {
                    // TL arc + BR arc
                    pairs = [
                        { cx: ox,     cy: oy,     a0: 0,            a1: PI / 2,    n1: kT,  n2: kL },
                        { cx: ox + P, cy: oy + P, a0: PI,           a1: PI * 1.5,  n1: kB,  n2: kR }
                    ];
                } else {
                    // TR arc + BL arc
                    pairs = [
                        { cx: ox + P, cy: oy,     a0: PI / 2,       a1: PI,        n1: kT,  n2: kR },
                        { cx: ox,     cy: oy + P, a0: PI * 1.5,     a1: PI * 2,    n1: kB,  n2: kL }
                    ];
                }

                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r: P / 2, a0: p.a0, a1: p.a1, n1: p.n1 });
                }

                // Add small arc for each diagonal corner (connecting the small squares)
                // These are tiny arcs at the corner of the cell, radius = t/2
                // They always connect the same two diagonal-edge midpoints
                const corners = [
                    { cx: ox,     cy: oy,     a0: 0,           a1: PI / 2,   n1: `dTL_${col}_${row}` },
                    { cx: ox + P, cy: oy,     a0: PI / 2,      a1: PI,       n1: `dTR_${col}_${row}` },
                    { cx: ox + P, cy: oy + P, a0: PI,          a1: PI * 1.5, n1: `dBR_${col}_${row}` },
                    { cx: ox,     cy: oy + P, a0: PI * 1.5,    a1: PI * 2,   n1: `dBL_${col}_${row}` },
                ];
                for (const c of corners) {
                    arcs.push({ cx: c.cx, cy: c.cy, r: t, a0: c.a0, a1: c.a1, n1: c.n1 });
                }
            }
        }

        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(4, cellSize * widthPct * 0.5);
        const casing = fill + Math.max(3, cellSize * 0.09);

        // Casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colors
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { cellSize = +e.target.value; document.getElementById('sizeVal').textContent = cellSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
