<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilbert Ribbon - Ribbonics</title>
    <meta name="description" content="A Hilbert space-filling curve drawn as one thick rainbow ribbon — colour progresses continuously from head to tail along the entire path.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0b14;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Hilbert Ribbon</h1>
        <p>A Hilbert space-filling curve drawn as one continuous thick ribbon. Colour transitions smoothly from head to tail through the full spectrum, revealing the curve&rsquo;s remarkable ability to visit every part of the plane.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Colour map
                <select id="cmap">
                    <option value="rainbow">Rainbow</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="neon">Neon Pulse</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Order <span class="value-display" id="orderVal">5</span></label>
            <input type="range" id="order" min="2" max="8" value="5">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="rwVal">60</span>%</label>
            <input type="range" id="rw" min="20" max="90" value="60">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CMAPS = {
        rainbow: t => `hsl(${t * 360},90%,55%)`,
        fire:    t => {
            // black -> red -> orange -> yellow -> white
            const stops = [[0,0,0],[220,30,10],[255,120,0],[255,220,50],[255,255,220]];
            return interpStops(stops, t);
        },
        ocean:   t => {
            const stops = [[5,5,20],[0,60,120],[0,140,200],[40,200,230],[160,240,255]];
            return interpStops(stops, t);
        },
        neon:    t => {
            // Cycle through neon colours
            const h = (t * 720) % 360;
            const l = 45 + 20 * Math.sin(t * Math.PI * 4);
            return `hsl(${h},100%,${l}%)`;
        }
    };

    function interpStops(stops, t) {
        t = Math.max(0, Math.min(1, t));
        const n = stops.length - 1;
        const i = Math.min(Math.floor(t * n), n - 1);
        const f = t * n - i;
        const a = stops[i], b = stops[i + 1];
        const r = Math.round(a[0] + (b[0] - a[0]) * f);
        const g = Math.round(a[1] + (b[1] - a[1]) * f);
        const bv = Math.round(a[2] + (b[2] - a[2]) * f);
        return `rgb(${r},${g},${bv})`;
    }

    let order = 5, ribbonPct = 0.60, cmap = 'rainbow';
    let W, H, pts = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Generate Hilbert curve points using index->xy mapping
    function hilbertPoints(n) {
        // n = order; generates (2^n)^2 points
        const side = 1 << n; // 2^n
        const total = side * side;
        const result = new Array(total);

        for (let i = 0; i < total; i++) {
            let rx, ry, s, t = i, x = 0, y = 0;
            for (s = 1; s < side; s <<= 1) {
                rx = 1 & (t >> 1);
                ry = 1 & (t ^ rx);
                // Rotate
                if (ry === 0) {
                    if (rx === 1) { x = s - 1 - x; y = s - 1 - y; }
                    const tmp = x; x = y; y = tmp;
                }
                x += s * rx;
                y += s * ry;
                t >>= 2;
            }
            result[i] = { x, y };
        }
        return result;
    }

    function build() {
        const side = 1 << order;
        const rawPts = hilbertPoints(order);

        // Scale to canvas with margin
        const margin = 40;
        const size = Math.min(W, H) - margin * 2;
        const step = size / (side - 1 + 1); // cell size

        pts = rawPts.map(p => ({
            x: margin + step * 0.5 + p.x * step,
            y: margin + step * 0.5 + p.y * step
        }));
    }

    function draw() {
        ctx.fillStyle = '#0a0b14';
        ctx.fillRect(0, 0, W, H);

        if (pts.length < 2) return;

        const side = 1 << order;
        const cellSize = (Math.min(W, H) - 80) / side;
        const ribbonW = Math.max(1.5, cellSize * ribbonPct);
        const casingW = ribbonW + Math.max(2, cellSize * 0.12);
        const colorFn = CMAPS[cmap];
        const N = pts.length;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Draw casing as one big path
        ctx.strokeStyle = '#07080f';
        ctx.lineWidth = casingW;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < N; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();

        // Draw ribbon in colour segments
        // Use short polyline segments, each coloured by position
        const segLen = Math.max(1, Math.floor(N / 400));
        ctx.lineWidth = ribbonW;
        for (let i = 0; i < N - 1; i += segLen) {
            const end = Math.min(i + segLen + 1, N);
            const t = i / (N - 1);
            ctx.strokeStyle = colorFn(t);
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            for (let j = i + 1; j < end; j++) ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('cmap').addEventListener('change', e => { cmap = e.target.value; draw(); });
    document.getElementById('order').addEventListener('input', e => {
        order = +e.target.value;
        document.getElementById('orderVal').textContent = order;
        regenerate();
    });
    document.getElementById('rw').addEventListener('input', e => {
        ribbonPct = +e.target.value / 100;
        document.getElementById('rwVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
