<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Ribbon Weave - Ribbonics</title>
    <meta name="description" content="Interweaving colored Truchet ribbons: random quarter-circle arcs join into continuous loops, each painted as a distinct ribbon.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Classic Ribbon Weave</h1>
        <p>Each square tile holds two quarter-circle arcs in one of two random orientations. Where arcs meet across edges they join tangentially into continuous closed loops &mdash; and every loop is painted as its own coloured ribbon.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="court">Basketball Court</option>
                    <option value="candy">Candy Pop</option>
                    <option value="meadow">Meadow</option>
                    <option value="sunset">Sunset</option>
                    <option value="mono">Monochrome</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="28" max="130" value="64">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">42</span>%</label>
            <input type="range" id="width" min="20" max="72" value="42">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        court:  ['#C0392B', '#2E86AB', '#27AE60', '#E67E22', '#E84393', '#F1C40F', '#16A085'],
        candy:  ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6A4C93', '#FF8FA3', '#1A535C', '#FFA630'],
        meadow: ['#606C38', '#8A9A5B', '#DDA15E', '#BC6C25', '#A3B18A', '#588157', '#E9C46A'],
        sunset: ['#F72585', '#7209B7', '#3A0CA3', '#4361EE', '#F77F00', '#FCBF49', '#E63946'],
        mono:   ['#222831', '#393E46', '#5C6470', '#8A929E', '#B6BDC7']
    };
    const BG = '#FEFAE0';
    const CASING = '#14151f';

    let tileSize = 64;
    let widthPct = 0.42;
    let paletteName = 'court';
    let W, H, cols, rows;
    let cells = [];          // config 0 or 1 per cell
    let arcs = [];           // {cx,cy,r,a0,a1, n1,n2, color}

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // --- union-find over edge-midpoint nodes ---
    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);

        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        const h = (c, r) => 'h_' + c + '_' + r;   // horizontal edge (top side of cell c,r)
        const v = (c, r) => 'v_' + c + '_' + r;   // vertical edge (left side of cell c,r)

        arcs = [];
        const s = tileSize, rad = s / 2;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r + 1), left = v(c, r), right = v(c + 1, r);
                const config = cells[r * cols + c];
                let pairs;
                if (config === 0) {
                    // TL arc (top-left corner) + BR arc (bottom-right corner)
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,            a1: Math.PI / 2,     n1: top,    n2: left  },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,      a1: Math.PI * 1.5,   n1: bottom, n2: right }
                    ];
                } else {
                    // TR arc (top-right corner) + BL arc (bottom-left corner)
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,  a1: Math.PI,         n1: top,    n2: right },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,    n1: bottom, n2: left  }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, root: null, n1: p.n1 });
                }
            }
        }

        // assign one palette colour per connected loop
        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(4, tileSize * 0.10);

        // pass 1: dark casing for every arc
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) { ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r); ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1); }
        ctx.stroke();

        // pass 2: coloured ribbon fill (grouped by colour to cut state changes)
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) { ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r); ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1); }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
