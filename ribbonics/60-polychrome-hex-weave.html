<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polychrome Hex Weave - Ribbonics</title>
    <meta name="description" content="Dense rhombille hex ribbon weave with rich many-colour per-loop ribbons on a warm cream background, outlined with a dark casing for depth.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Polychrome Hex Weave</h1>
        <p>A dense rhombille-lattice ribbon weave: each rhombus tile carries two arcs and the resulting closed loops are coloured with a rich saturated palette. Dark casing on warm cream gives the feel of enamel cloisonné.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="jewel">Jewel</option>
                    <option value="sunset">Sunset</option>
                    <option value="candy">Candy</option>
                    <option value="forest">Forest</option>
                    <option value="neon">Neon</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Hex size <span class="value-display" id="sizeVal">48</span></label>
            <input type="range" id="size" min="20" max="100" value="48">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="18" max="65" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        jewel:  ['#E63946','#457B9D','#2A9D8F','#E9C46A','#F4A261','#264653','#8338EC','#3A86FF'],
        sunset: ['#F72585','#B5179E','#7209B7','#560BAD','#480CA8','#3A0CA3','#3F37C9','#4361EE','#4895EF','#4CC9F0'],
        candy:  ['#FF6B6B','#FF8E53','#FFCC02','#56C596','#4ECDC4','#45B7D1','#A855F7','#EC4899'],
        forest: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#3A5A40','#344E41'],
        neon:   ['#FF073A','#FF6200','#FFFF00','#39FF14','#00FFFF','#0080FF','#FF00FF','#FF1177']
    };
    const BG = '#FEFAE0';
    const CASING = '#1a1008';

    let hexSize = 48;
    let widthPct = 0.38;
    let paletteName = 'jewel';
    let W, H;
    let arcList = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function makeUF() {
        const par = new Map();
        function find(x) {
            if (!par.has(x)) par.set(x, x);
            let r = x;
            while (par.get(r) !== r) r = par.get(r);
            while (par.get(x) !== r) { const nx = par.get(x); par.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { par.set(find(a), find(b)); }
        return { find, union };
    }

    // Rhombille lattice: tile the plane with rhombi (each rhombus = parallelogram)
    // We generate a grid of rhombi in axial/offset coordinates.
    // Each rhombus has 4 edge-midpoints as nodes. Arcs connect opposite edges.
    function build() {
        const s = hexSize;
        // Hex grid vectors (pointy-top)
        const dx = s * Math.sqrt(3);
        const dy = s * 1.5;
        // Rhombille: 3 rhombi per hex, pointing in different directions
        // We'll use a simpler approach: draw a skewed grid of parallelograms
        // A = s*cos(30°), B = s*sin(30°) = s/2
        const A = s * Math.sqrt(3) / 2; // half-width
        const B = s * 0.5;              // half-height lean

        const uf = makeUF();
        arcList = [];

        // Grid spans: columns along x, rows along y
        const cols = Math.ceil(W / (2 * A)) + 2;
        const rows = Math.ceil(H / (s)) + 2;

        // For each parallelogram cell, define 4 midpoints and 2 arcs
        // Parallelogram corners: (x0,y0), (x0+2A, y0), (x0+2A+2B, y0+s), (x0+2B, y0+s)
        // Edge midpoints: top-mid, right-mid, bottom-mid, left-mid
        // Two arcs: config 0 = (top↔left) + (right↔bottom), config 1 = (top↔right) + (left↔bottom)

        const node = (c, r, side) => `${c}_${r}_${side}`; // side: 0=top,1=right,2=bottom,3=left

        // Type A rhombi (lean right)
        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                // origin of this rhombus
                const x0 = c * 2 * A + (r % 2 === 0 ? 0 : A);
                const y0 = r * s;

                // 4 midpoints
                const mTop    = { x: x0 + A + B,       y: y0 };          // midpoint of top edge
                const mRight  = { x: x0 + 2 * A + B,   y: y0 + s / 2 }; // midpoint of right edge
                const mBottom = { x: x0 + A + B,        y: y0 + s };      // midpoint of bottom edge (wait this would be same x as top for sym)
                const mLeft   = { x: x0 + B,            y: y0 + s / 2 }; // midpoint of left edge

                // Actually for rhombus with corners P0=(x0,y0), P1=(x0+2A,y0), P2=(x0+2A+2B,y0+s), P3=(x0+2B,y0+s):
                // midpoint of top edge (P0..P1) = (x0+A, y0)
                // midpoint of right edge (P1..P2) = (x0+2A+B, y0+s/2)
                // midpoint of bottom edge (P2..P3) = (x0+A+2B, y0+s)
                // midpoint of left edge (P3..P0) = (x0+B, y0+s/2)
                const mt = { x: x0 + A,       y: y0 };
                const mr = { x: x0 + 2*A + B, y: y0 + s/2 };
                const mb = { x: x0 + A + 2*B, y: y0 + s };
                const ml = { x: x0 + B,       y: y0 + s/2 };

                // Arc radius ≈ half the shorter diagonal of the rhombus (≈ s/2 for equilateral)
                const arcR = s * 0.55;

                const nTop    = node(c,   r,   0);
                const nRight  = node(c+1, r,   3); // right of this = left of c+1
                const nBottom = node(c,   r+1, 0); // bottom of this = top of r+1
                const nLeft   = node(c,   r,   3);

                const config = Math.random() < 0.5 ? 0 : 1;
                const center1 = config === 0
                    ? { x: x0,       y: y0 }     // top-left corner
                    : { x: x0 + 2*A, y: y0 };    // top-right corner

                // For each rhombus, we create two arcs connecting opposing edge-midpoints
                // Arc 1: top-mid to left-mid (pivot at TL corner) OR top-mid to right-mid (pivot at TR corner)
                // Arc 2: bottom-mid to right-mid (pivot at BR) OR bottom-mid to left-mid (pivot at BL)

                let a0_1, a1_1, cx1, cy1, a0_2, a1_2, cx2, cy2;

                if (config === 0) {
                    // arc1: top-mid to left-mid, pivot TL = (x0, y0)
                    cx1 = x0; cy1 = y0;
                    a0_1 = Math.atan2(mt.y - cy1, mt.x - cx1);
                    a1_1 = Math.atan2(ml.y - cy1, ml.x - cx1);
                    // arc2: right-mid to bottom-mid, pivot BR = (x0+2A+2B, y0+s)
                    cx2 = x0 + 2*A + 2*B; cy2 = y0 + s;
                    a0_2 = Math.atan2(mr.y - cy2, mr.x - cx2);
                    a1_2 = Math.atan2(mb.y - cy2, mb.x - cx2);
                } else {
                    // arc1: top-mid to right-mid, pivot TR = (x0+2A, y0)
                    cx1 = x0 + 2*A; cy1 = y0;
                    a0_1 = Math.atan2(mt.y - cy1, mt.x - cx1);
                    a1_1 = Math.atan2(mr.y - cy1, mr.x - cx1);
                    // arc2: bottom-mid to left-mid, pivot BL = (x0+2B, y0+s)
                    cx2 = x0 + 2*B; cy2 = y0 + s;
                    a0_2 = Math.atan2(mb.y - cy2, mb.x - cx2);
                    a1_2 = Math.atan2(ml.y - cy2, ml.x - cx2);
                }

                // Shared edge nodes
                const topNode    = `T_${c}_${r}`;
                const rightNode  = `R_${c}_${r}`;
                const bottomNode = `T_${c}_${r+1}`;
                const leftNode   = `L_${c}_${r}`;

                // For arc radius, use distance from corner to edge midpoint
                const r1 = Math.hypot(mt.x - cx1, mt.y - cy1);
                const r2 = Math.hypot(mr.x - cx2, mr.y - cy2);

                // Ensure arc goes the short way
                let da1 = a1_1 - a0_1;
                while (da1 > Math.PI)  da1 -= 2 * Math.PI;
                while (da1 < -Math.PI) da1 += 2 * Math.PI;
                let da2 = a1_2 - a0_2;
                while (da2 > Math.PI)  da2 -= 2 * Math.PI;
                while (da2 < -Math.PI) da2 += 2 * Math.PI;

                if (config === 0) {
                    uf.union(topNode, leftNode);
                    uf.union(rightNode, bottomNode);
                    arcList.push({ cx: cx1, cy: cy1, r: r1, a0: a0_1, a1: a0_1 + da1, n1: topNode,   color: '#888' });
                    arcList.push({ cx: cx2, cy: cy2, r: r2, a0: a0_2, a1: a0_2 + da2, n1: rightNode, color: '#888' });
                } else {
                    uf.union(topNode, rightNode);
                    uf.union(leftNode, bottomNode);
                    arcList.push({ cx: cx1, cy: cy1, r: r1, a0: a0_1, a1: a0_1 + da1, n1: topNode,   color: '#888' });
                    arcList.push({ cx: cx2, cy: cy2, r: r2, a0: a0_2, a1: a0_2 + da2, n1: leftNode,  color: '#888' });
                }
            }
        }

        // Assign colours by root
        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(3, hexSize * widthPct);
        const casing = fill + Math.max(3, hexSize * 0.12);

        // Filter to visible arcs only
        const visible = arcList.filter(a =>
            a.cx + a.r > -10 && a.cx - a.r < W + 10 &&
            a.cy + a.r > -10 && a.cy - a.r < H + 10
        );

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of visible) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colour pass
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of visible) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => {
        hexSize = +e.target.value;
        document.getElementById('sizeVal').textContent = hexSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
