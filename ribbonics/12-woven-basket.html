<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woven Basket - Ribbonics</title>
    <meta name="description" content="Horizontal and vertical straight ribbons interlaced over/under in a checkerboard basket-weave pattern using two warm wood tones with subtle shading.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #d4a96a;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(60, 35, 10, 0.85);
            color: #f7e8d0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #e8a85a; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9b090; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(60, 35, 10, 0.85);
            color: #f7e8d0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9b090; }
        .control-group input[type="range"] { width: 100%; accent-color: #e8a85a; }
        .value-display { float: right; color: #e8a85a; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #6b3a1f, #e8a85a);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Woven Basket</h1>
        <p>Horizontal and vertical wicker strips interlace in a classic over-under checkerboard pattern. Edge shading and a shadow strip give each crossing the feel of genuine woven cane.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Strip width <span class="value-display" id="wVal">38</span>px</label>
            <input type="range" id="sw" min="12" max="90" value="38">
        </div>
        <div class="control-group">
            <label>Gap <span class="value-display" id="gVal">6</span>px</label>
            <input type="range" id="gap" min="1" max="20" value="6">
        </div>
        <div class="control-group">
            <label>Shading <span class="value-display" id="shVal">40</span>%</label>
            <input type="range" id="shade" min="0" max="80" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Warm wood tones
    const WOODS = [
        { light: '#c8873a', dark: '#8b4f1c', edge: '#e8b870', shadow: 'rgba(40,15,5,0.45)' },
        { light: '#a0522d', dark: '#6b2e0f', edge: '#c87840', shadow: 'rgba(30,10,5,0.45)' },
        { light: '#cd853f', dark: '#8b5e2a', edge: '#e8c06a', shadow: 'rgba(50,20,5,0.40)' },
        { light: '#b8860b', dark: '#7a5200', edge: '#daa520', shadow: 'rgba(40,20,0,0.40)' },
    ];

    let stripW = 38;
    let gap = 6;
    let shadePct = 0.40;
    let W, H;
    let woodIdx = 0;
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function draw() {
        const wood = WOODS[woodIdx];
        const pitch = stripW + gap;
        const halfGap = gap / 2;

        // Background fill (gaps between strips)
        ctx.fillStyle = wood.dark;
        ctx.fillRect(0, 0, W, H);

        const hCount = Math.ceil(H / pitch) + 2;
        const vCount = Math.ceil(W / pitch) + 2;

        // We draw in two passes per crossing to create over/under illusion.
        // "over" = horizontal over vertical when (hi + vi) is even.

        // --- First pass: horizontal strips fully ---
        for (let hi = 0; hi < hCount; hi++) {
            const y = hi * pitch - halfGap;
            // Base fill
            ctx.fillStyle = wood.light;
            ctx.fillRect(0, y, W, stripW);
            // Top highlight
            const htop = ctx.createLinearGradient(0, y, 0, y + stripW * 0.35);
            htop.addColorStop(0, wood.edge);
            htop.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = htop;
            ctx.fillRect(0, y, W, stripW * 0.35);
            // Bottom shadow
            const hbot = ctx.createLinearGradient(0, y + stripW * 0.65, 0, y + stripW);
            hbot.addColorStop(0, 'rgba(0,0,0,0)');
            hbot.addColorStop(1, `rgba(0,0,0,${shadePct * 0.6})`);
            ctx.fillStyle = hbot;
            ctx.fillRect(0, y + stripW * 0.65, W, stripW * 0.35);
        }

        // --- Second pass: vertical strips, covering horizontal where "under" ---
        for (let vi = 0; vi < vCount; vi++) {
            const x = vi * pitch - halfGap;

            // Draw vertical strip in segments
            for (let hi = 0; hi < hCount; hi++) {
                const y = hi * pitch - halfGap;
                const isOver = (hi + vi) % 2 === 0;

                if (!isOver) {
                    // vertical is "under" — draw just the gap regions
                    // gap above this horizontal strip
                    const gapY1 = y - gap;
                    ctx.fillStyle = wood.dark;
                    ctx.fillRect(x, gapY1, stripW, gap);

                    // Draw the vertical strip segment in the gap
                    ctx.fillStyle = wood.dark;
                    ctx.fillRect(x, gapY1, stripW, gap);

                    // Actually draw vertical strip through the gap above
                    ctx.fillStyle = wood.light;
                    ctx.fillRect(x, gapY1, stripW, gap + 1);
                    // highlight
                    const vl = ctx.createLinearGradient(x, 0, x + stripW, 0);
                    vl.addColorStop(0, wood.edge);
                    vl.addColorStop(0.4, 'rgba(255,255,255,0)');
                    ctx.fillStyle = vl;
                    ctx.fillRect(x, gapY1, stripW * 0.35, gap + 1);
                } else {
                    // vertical is "over" — cover horizontal strip + draw with shadow on the horizontal
                    ctx.fillStyle = wood.light;
                    ctx.fillRect(x, y, stripW, stripW);
                    // left highlight
                    const vl = ctx.createLinearGradient(x, 0, x + stripW, 0);
                    vl.addColorStop(0, wood.edge);
                    vl.addColorStop(0.4, 'rgba(255,255,255,0)');
                    ctx.fillStyle = vl;
                    ctx.fillRect(x, y, stripW * 0.35, stripW);
                    // right shadow
                    const vr = ctx.createLinearGradient(x + stripW * 0.65, 0, x + stripW, 0);
                    vr.addColorStop(0, 'rgba(0,0,0,0)');
                    vr.addColorStop(1, `rgba(0,0,0,${shadePct * 0.5})`);
                    ctx.fillStyle = vr;
                    ctx.fillRect(x + stripW * 0.65, y, stripW * 0.35, stripW);
                    // Cast shadow on horizontal below (left edge of vertical)
                    ctx.fillStyle = wood.shadow;
                    ctx.fillRect(x - gap, y, gap, stripW);
                }
                // Draw gap region as background
                ctx.fillStyle = wood.dark;
                ctx.fillRect(x, y + stripW, stripW, gap);
            }
            // Vertical gap strips between horizontals (the "over" gap fills)
            for (let hi = 0; hi < hCount; hi++) {
                const y = hi * pitch - halfGap;
                const isOver = (hi + vi) % 2 === 0;
                if (!isOver) {
                    // vertical continues through here — fill with vertical colour
                    ctx.fillStyle = wood.light;
                    ctx.fillRect(x, y, stripW, stripW);
                    // left highlight
                    const vl = ctx.createLinearGradient(x, 0, x + stripW, 0);
                    vl.addColorStop(0, wood.edge);
                    vl.addColorStop(0.4, 'rgba(255,255,255,0)');
                    ctx.fillStyle = vl;
                    ctx.fillRect(x, y, stripW * 0.35, stripW);
                }
            }
        }

        // --- Final pass: redraw vertical strips cleanly with proper over/under ---
        // Clear and redo more carefully
        ctx.fillStyle = wood.dark;
        ctx.fillRect(0, 0, W, H);

        // horizontal strips
        for (let hi = 0; hi < hCount; hi++) {
            const y = hi * pitch - halfGap;
            ctx.fillStyle = wood.light;
            ctx.fillRect(0, y, W, stripW);
            const ht = ctx.createLinearGradient(0, y, 0, y + stripW);
            ht.addColorStop(0, wood.edge);
            ht.addColorStop(0.3, 'rgba(255,255,255,0)');
            ht.addColorStop(0.7, 'rgba(0,0,0,0)');
            ht.addColorStop(1, `rgba(0,0,0,${shadePct * 0.5})`);
            ctx.fillStyle = ht;
            ctx.fillRect(0, y, W, stripW);
        }

        // vertical strips — cover horizontals where "over"
        for (let vi = 0; vi < vCount; vi++) {
            const x = vi * pitch - halfGap;
            // draw full vertical bar
            ctx.fillStyle = wood.dark;
            ctx.fillRect(x, 0, stripW, H);

            // For each row segment, either show or hide behind horizontal
            for (let hi = 0; hi < hCount; hi++) {
                const y = hi * pitch - halfGap;
                const isOver = (hi + vi) % 2 === 0;
                if (isOver) {
                    // Draw vertical segment over the horizontal
                    ctx.fillStyle = wood.dark;
                    ctx.fillRect(x, y, stripW, stripW);
                    // slightly different shade for vertical
                    const shade = Math.min(1, 0.08 + vi * 0.02) % 0.2;
                    ctx.fillStyle = shadeColor(wood.light, -0.05);
                    ctx.fillRect(x, y, stripW, stripW);
                    // left edge highlight
                    const vl = ctx.createLinearGradient(x, 0, x + stripW, 0);
                    vl.addColorStop(0, wood.edge);
                    vl.addColorStop(0.35, 'rgba(255,255,255,0)');
                    ctx.fillStyle = vl;
                    ctx.fillRect(x, y, stripW, stripW);
                    // right edge shadow
                    const vr = ctx.createLinearGradient(x + stripW * 0.6, 0, x + stripW, 0);
                    vr.addColorStop(0, 'rgba(0,0,0,0)');
                    vr.addColorStop(1, `rgba(0,0,0,${shadePct * 0.55})`);
                    ctx.fillStyle = vr;
                    ctx.fillRect(x, y, stripW, stripW);
                    // cast shadow on horizontal to the left of vertical
                    ctx.fillStyle = `rgba(0,0,0,${shadePct * 0.35})`;
                    ctx.fillRect(x - Math.min(gap * 1.5, stripW * 0.3), y, Math.min(gap * 1.5, stripW * 0.3), stripW);
                    // cast shadow on horizontal to the right
                    ctx.fillStyle = `rgba(0,0,0,${shadePct * 0.15})`;
                    ctx.fillRect(x + stripW, y, Math.min(gap * 1.5, stripW * 0.3), stripW);
                }
                // draw the gap between horizontal rows
                const gy = y + stripW;
                ctx.fillStyle = shadeColor(wood.light, -0.05);
                ctx.fillRect(x, gy, stripW, gap);
                const vl = ctx.createLinearGradient(x, 0, x + stripW, 0);
                vl.addColorStop(0, wood.edge);
                vl.addColorStop(0.35, 'rgba(255,255,255,0)');
                ctx.fillStyle = vl;
                ctx.fillRect(x, gy, stripW, gap);
            }
        }
    }

    function shadeColor(hex, amt) {
        const r = Math.min(255, Math.max(0, parseInt(hex.slice(1,3),16) + Math.round(amt*255)));
        const g = Math.min(255, Math.max(0, parseInt(hex.slice(3,5),16) + Math.round(amt*255)));
        const b = Math.min(255, Math.max(0, parseInt(hex.slice(5,7),16) + Math.round(amt*255)));
        return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        woodIdx = Math.floor(Math.random() * WOODS.length);
        resize();
        draw();
    }

    document.getElementById('sw').addEventListener('input', e => {
        stripW = +e.target.value;
        document.getElementById('wVal').textContent = stripW;
        draw();
    });
    document.getElementById('gap').addEventListener('input', e => {
        gap = +e.target.value;
        document.getElementById('gVal').textContent = gap;
        draw();
    });
    document.getElementById('shade').addEventListener('input', e => {
        shadePct = +e.target.value / 100;
        document.getElementById('shVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', () => { resize(); draw(); });
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
