<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Ribbonics - Ribbonics</title>
    <meta name="description" content="Rhombille (tumbling-blocks) tiling where every rhombus carries a Truchet arc; arcs join across the hexagonal lattice into continuous colourful woven loops — a ribbony basketball-court pattern.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Hex Ribbonics</h1>
        <p>A rhombille (tumbling-blocks) lattice — three rhombi per hexagon — where every rhombus holds a Truchet arc. Arcs chain across the hex lattice into continuous woven loops in bold basketball-court colours.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="court">Basketball Court</option>
                    <option value="candy">Candy Pop</option>
                    <option value="meadow">Meadow</option>
                    <option value="sunset">Sunset</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Hex size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="32" max="140" value="72">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">44</span>%</label>
            <input type="range" id="width" min="20" max="70" value="44">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        court:  ['#C0392B','#2E86AB','#27AE60','#E67E22','#E84393','#F1C40F','#16A085'],
        candy:  ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#1A535C','#FFA630'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A'],
        sunset: ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49','#E63946']
    };
    const BG = '#FEFAE0';
    const CASING = '#14151f';

    let hexSize = 72;
    let widthPct = 0.44;
    let paletteName = 'court';
    let W, H;
    let arcList = [];

    /*
      Rhombille tiling: each "hexagon" centred at (hx, hy) contains 3 rhombi.
      Hex flat-top layout: centre offset grid.
      Each rhombus has 4 vertices; we treat midpoints of the 4 edges as
      Truchet nodes. Two arcs per rhombus connect opposite edge-midpoints
      through one of the two corners. Random orientation 0 or 1.

      For simplicity we build the rhombus grid directly:
        The rhombille lattice has two basis vectors at 60° and 120°.
        We enumerate rhombi by (u,v,k) where k∈{0,1,2} is the sub-rhombus.
    */

    // Union-Find
    function makeUF() {
        const p = {};
        const find = k => { if (p[k] === undefined) p[k] = k; if (p[k] !== k) p[k] = find(p[k]); return p[k]; };
        const union = (a, b) => { p[find(a)] = find(b); };
        return { find, union };
    }

    function build() {
        arcList = [];
        const uf = makeUF();

        // Rhombille: three rhombus types per hexagonal super-cell
        // Hex centres on flat-top grid with hex radius hexSize
        const R = hexSize;
        // axial hex grid, flat-top
        // For each hex (q,r) we generate 3 rhombi inside it
        // Hex centre: cx = R * (3/2 * q), cy = R * (sqrt3 * (r + q/2))
        const sqrt3 = Math.sqrt(3);
        const hexW = R * 2;
        const hexH = R * sqrt3;

        // extend grid beyond canvas
        const qMin = Math.floor(-W / (R * 1.5)) - 2;
        const qMax = Math.ceil(W / (R * 1.5)) + 2;
        const rMin = Math.floor(-H / hexH) - 2;
        const rMax = Math.ceil(H / hexH) + 2;

        // The three rhombus types inside hex (q,r):
        // k=0: "right" rhombus, k=1: "upper-left", k=2: "lower-left"
        // Each rhombus is defined by its 4 vertices (in order).
        // We use edge-midpoints as Truchet nodes.
        // nodeKey: string of midpoint x,y rounded to 0.5px for matching across tiles

        const nodeKey = (x, y) => Math.round(x * 2) + '_' + Math.round(y * 2);

        for (let q = qMin; q <= qMax; q++) {
            for (let r = rMin; r <= rMax; r++) {
                // Hex centre (flat-top)
                const cx = R * 1.5 * q;
                const cy = R * sqrt3 * (r + q * 0.5);

                // 6 hex vertices (flat-top, starting from right)
                const verts = [];
                for (let i = 0; i < 6; i++) {
                    const a = (i * 60) * Math.PI / 180;
                    verts.push([cx + R * Math.cos(a), cy + R * Math.sin(a)]);
                }
                // centre point
                const C = [cx, cy];

                // 3 rhombi: each is (centre, verts[i], verts[(i+1)%6], verts[(i+2)%6]) → but
                // the rhombus tiles that fill the plane are pairs of triangles from centre.
                // Actually rhombille: the 3 rhombi are formed by pairs of adjacent triangles.
                // Rhombus i (i=0,1,2): vertices = verts[2i], verts[2i+1], C_opposite, verts[2i-1]
                // Simpler: each of the 3 rhombi has vertices: C, verts[2k], verts[2k+1], verts[2k+2]
                // No — correct rhombille decomposition:
                // The hex is split into 3 rhombi, each spanning from one vertex pair to its opposite.
                // Rhombus k (k=0,1,2): [verts[2k], C, verts[2k+2], verts[2k+1]]
                // (a rhombus with the hex centre as one vertex)
                // Actually for a flat-top hex the 3-rhombus split is:
                // Each rhombus connects two opposite vertices through the centre
                // Rhombus 0: verts[0], verts[1], verts[3], verts[4] → No, that's wrong

                // Standard rhombille: hex centre + adjacent vertex pairs
                // Rhombus k: [C, verts[2k], verts[2k+1], verts[(2k+2)%6]]
                // That gives a quadrilateral with centre + 3 consecutive vertices
                // But that's a triangle, not a rhombus.

                // Correct approach for rhombille tiling:
                // Each rhombus is: verts[2k], midpoint(verts[2k],C)... no.
                //
                // The proper rhombille: divide each hex into 3 rhombi as:
                // Rhombus k (k=0,1,2): verts[2k], verts[2k+1], verts[(2k+2)%6], but with centre as connector
                // Actually: verts[2k+1], C, verts[(2k+3)%6], externalPoint
                //
                // Let's just use the simple known form:
                // Rhombus k: vertices are verts[2k], C, verts[(2k+2)%6], external_midpt
                // This doesn't tile.
                //
                // SIMPLEST correct approach: The 3 rhombi in a flat-top hex are:
                // Each rhombus connects a "top" vertex to a "bottom" vertex via the centre.
                // For k=0,1,2: rhombus = verts[2k], verts[(2k+1)%6], verts[(2k+2)%6], C
                // (this is actually a kite not a rhombus, but visually works)
                //
                // For a TRUE rhombille we use an offset trick:
                // Place centres at the hex vertices too; each rhombus is [C, v, adjacentC, v']
                // This gets complex. Let's use the visual approach that looks like tumbling blocks:
                // Generate rhombi at isometric grid positions.

                for (let k = 0; k < 3; k++) {
                    // Each "lozenge" inside the hex:
                    const v0 = verts[2 * k];
                    const v1 = verts[(2 * k + 1) % 6];
                    const v2 = verts[(2 * k + 2) % 6];
                    // Rhombus: C, v0, v1, v2 (quadrilateral — actually a kite for regular hex)
                    // But we treat it as a Truchet tile with 4 edge midpoints:
                    const m01 = [(C[0]+v0[0])/2, (C[1]+v0[1])/2];  // mid of C-v0
                    const m12 = [(v0[0]+v1[0])/2, (v0[1]+v1[1])/2]; // mid of v0-v1
                    const m23 = [(v1[0]+v2[0])/2, (v1[1]+v2[1])/2]; // mid of v1-v2
                    const m30 = [(C[0]+v2[0])/2, (C[1]+v2[1])/2];  // mid of C-v2

                    const n01 = nodeKey(m01[0], m01[1]);
                    const n12 = nodeKey(m12[0], m12[1]);
                    const n23 = nodeKey(m23[0], m23[1]);
                    const n30 = nodeKey(m30[0], m30[1]);

                    // Truchet: 2 random states
                    // State 0: arc through v0 (connects n01–n12) and arc through v2 (connects n23–n30)
                    // State 1: arc through v1 (connects n12–n23) and arc through C (connects n30–n01)
                    const state = Math.random() < 0.5 ? 0 : 1;

                    if (state === 0) {
                        // arc at corner v0: from m01 to m12
                        uf.union(n01, n12);
                        arcList.push({ type:'corner', cx:v0[0], cy:v0[1], pm1:m01, pm2:m12, n1:n01 });
                        // arc at corner v2: from m23 to m30
                        uf.union(n23, n30);
                        arcList.push({ type:'corner', cx:v2[0], cy:v2[1], pm1:m23, pm2:m30, n1:n23 });
                    } else {
                        // arc at corner v1: from m12 to m23
                        uf.union(n12, n23);
                        arcList.push({ type:'corner', cx:v1[0], cy:v1[1], pm1:m12, pm2:m23, n1:n12 });
                        // arc at corner C: from m30 to n01
                        uf.union(n30, n01);
                        arcList.push({ type:'corner', cx:C[0], cy:C[1], pm1:m30, pm2:m01, n1:n30 });
                    }
                }
            }
        }

        // colour by connected component
        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function drawArcThroughCorner(cx, cy, pm1, pm2) {
        // The arc goes from pm1 to pm2 curving through corner (cx,cy).
        // Radius = distance from corner to midpoint (they're equal for a regular rhombus).
        // The corner is the centre of curvature's "outside"; the arc centre is the reflection.
        // Actually: arc centred at corner, sweeping from pm1 to pm2.
        const r = Math.hypot(pm1[0]-cx, pm1[1]-cy);
        let a0 = Math.atan2(pm1[1]-cy, pm1[0]-cx);
        let a1 = Math.atan2(pm2[1]-cy, pm2[0]-cx);
        // Always draw the short arc
        let diff = a1 - a0;
        while (diff < -Math.PI) diff += 2*Math.PI;
        while (diff >  Math.PI) diff -= 2*Math.PI;
        // Use counter-clockwise or clockwise based on diff sign
        const ccw = diff < 0;
        ctx.moveTo(pm1[0], pm1[1]);
        ctx.arc(cx, cy, r, a0, a1, ccw);
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(4, hexSize * widthPct * 0.6);
        const casing = fill + Math.max(3, hexSize * 0.08);

        // pass 1: casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) drawArcThroughCorner(a.cx, a.cy, a.pm1, a.pm2);
        ctx.stroke();

        // pass 2: coloured fills grouped by colour
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) drawArcThroughCorner(a.cx, a.cy, a.pm1, a.pm2);
            ctx.stroke();
        }
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { hexSize = +e.target.value; document.getElementById('sizeVal').textContent = hexSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
