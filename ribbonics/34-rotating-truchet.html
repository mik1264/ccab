<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Truchet - Ribbonics</title>
    <meta name="description" content="Each Truchet tile's arc pair smoothly rotates over time, creating a living animated weave that constantly morphs.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Rotating Truchet</h1>
        <p>Each tile's arc pair smoothly rotates over time, creating a living weave that breathes and morphs in place. Regenerate re-seeds the colour map.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="32" max="140" value="72">
        </div>
        <div class="control-group">
            <label>Speed <span class="value-display" id="speedVal">5</span></label>
            <input type="range" id="speed" min="1" max="20" value="5">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="18" max="70" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = [
        ['#C0392B','#2E86AB','#27AE60','#E67E22','#E84393','#F1C40F','#16A085'],
        ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#1A535C','#FFA630'],
        ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49'],
    ];
    const CASING = '#0d0e1a';
    const BG = '#11121e';

    let tileSize = 72;
    let widthPct = 0.38;
    let speedMult = 5;
    let W, H, cols, rows;
    let cells = [];   // per-cell phase offset (random)
    let colors = [];  // per-cell color
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols = Math.ceil(W / tileSize) + 2;
        rows = Math.ceil(H / tileSize) + 2;
    }

    function build() {
        const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
        cells = [];
        colors = [];
        for (let i = 0; i < cols * rows; i++) {
            cells.push(Math.random() * Math.PI * 2);
            colors.push(pal[Math.floor(Math.random() * pal.length)]);
        }
    }

    function drawFrame(ts) {
        const t = ts * 0.001 * speedMult * 0.3;
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const s = tileSize;
        const rad = s * 0.5;
        const fill = Math.max(4, s * widthPct);
        const casingW = fill + Math.max(4, s * 0.10);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // draw each tile
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const phase = cells[idx];
                const color = colors[idx];
                const x0 = c * s;
                const y0 = r * s;

                // rotation angle for this tile oscillates between 0 and PI/2
                const theta = (Math.sin(t + phase) * 0.5 + 0.5) * (Math.PI / 2);

                // two arcs per tile, rotated by theta
                // arc A: from angle theta to theta + PI/2 at corner top-left
                // arc B: from angle PI+theta to PI*1.5+theta at corner bottom-right
                const corners = [
                    { cx: x0,     cy: y0,     a0: theta,              a1: theta + Math.PI / 2 },
                    { cx: x0 + s, cy: y0 + s, a0: Math.PI + theta,   a1: Math.PI * 1.5 + theta }
                ];

                // casing pass
                ctx.strokeStyle = CASING;
                ctx.lineWidth = casingW;
                ctx.beginPath();
                for (const arc of corners) {
                    ctx.moveTo(arc.cx + Math.cos(arc.a0) * rad, arc.cy + Math.sin(arc.a0) * rad);
                    ctx.arc(arc.cx, arc.cy, rad, arc.a0, arc.a1);
                }
                ctx.stroke();

                // colour pass
                ctx.strokeStyle = color;
                ctx.lineWidth = fill;
                ctx.beginPath();
                for (const arc of corners) {
                    ctx.moveTo(arc.cx + Math.cos(arc.a0) * rad, arc.cy + Math.sin(arc.a0) * rad);
                    ctx.arc(arc.cx, arc.cy, rad, arc.a0, arc.a1);
                }
                ctx.stroke();
            }
        }

        rafId = requestAnimationFrame(drawFrame);
    }

    function regenerate() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        resize();
        build();
        rafId = requestAnimationFrame(drawFrame);
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        resize(); build();
        rafId = requestAnimationFrame(drawFrame);
    });
    document.getElementById('speed').addEventListener('input', e => {
        speedMult = +e.target.value;
        document.getElementById('speedVal').textContent = speedMult;
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
