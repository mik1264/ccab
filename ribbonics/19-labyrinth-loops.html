<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labyrinth Loops - Ribbonics</title>
    <meta name="description" content="Truchet tiling tuned to produce long winding paths; the longest connected loop is highlighted in a bold accent colour while others remain muted.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Labyrinth Loops</h1>
        <p>Standard Truchet quarter-arcs produce a maze of interlocking loops. The longest connected loop is traced and highlighted in a bold accent; all shorter loops recede in muted grey-blue.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">56</span></label>
            <input type="range" id="size" min="24" max="120" value="56">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="18" max="68" value="40">
        </div>
        <div class="control-group">
            <label>Accent colour
                <select id="accent">
                    <option value="#F72585">Magenta</option>
                    <option value="#FFD93D">Gold</option>
                    <option value="#4ECDC4">Cyan</option>
                    <option value="#FF6B6B">Coral</option>
                    <option value="#A8DADC">Ice Blue</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CASING = '#0d0e18';
    const MUTED = '#3a3f5c';

    let tileSize = 56;
    let widthPct = 0.40;
    let accentColor = '#F72585';
    let W, H;
    let arcs = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = tileSize;
        const r = s / 2;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;

        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let root = x;
            while (parent.get(root) !== root) root = parent.get(root);
            while (parent.get(x) !== root) { const nx = parent.get(x); parent.set(x, root); x = nx; }
            return root;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        arcs = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x0 = col * s, y0 = row * s;
                const top = h(col, row), bottom = h(col, row + 1);
                const left = v(col, row), right = v(col + 1, row);
                const config = Math.random() < 0.5 ? 0 : 1;
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,    n1: top,    n2: left   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5,  n1: bottom, n2: right  }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI,        n1: top,    n2: right  },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,    n1: bottom, n2: left   }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r, a0: p.a0, a1: p.a1, n1: p.n1 });
                }
            }
        }

        // Count loop sizes
        const sizeMap = new Map();
        for (const a of arcs) {
            const root = find(a.n1);
            sizeMap.set(root, (sizeMap.get(root) || 0) + 1);
        }
        let maxSize = 0, maxRoot = null;
        for (const [root, sz] of sizeMap) {
            if (sz > maxSize) { maxSize = sz; maxRoot = root; }
        }

        for (const a of arcs) {
            const root = find(a.n1);
            a.isLongest = (root === maxRoot);
        }
    }

    function draw() {
        ctx.fillStyle = '#11121e';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(3, tileSize * 0.10);

        // casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // muted loops
        ctx.strokeStyle = MUTED;
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const a of arcs) {
            if (!a.isLongest) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
        }
        ctx.stroke();

        // accent loop
        ctx.strokeStyle = accentColor;
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const a of arcs) {
            if (a.isLongest) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
        }
        ctx.stroke();
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('accent').addEventListener('change', e => {
        accentColor = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
