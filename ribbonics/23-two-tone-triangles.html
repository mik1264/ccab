<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Tone Triangles - Ribbonics</title>
    <meta name="description" content="A triangular grid where each triangle is randomly split and filled with two bold flat colours, creating a vivid geometric Truchet patchwork.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Two-Tone Triangles</h1>
        <p>Every square tile is diagonally split into two triangles, each independently filled with a bold flat colour chosen from a palette. The result is a vivid geometric mosaic with a triangle-Truchet character.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">56</span></label>
            <input type="range" id="size" min="20" max="120" value="56">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="bold">Bold Primary</option>
                    <option value="neon">Neon Night</option>
                    <option value="earth">Earthy Tones</option>
                    <option value="pastel">Soft Pastel</option>
                    <option value="mono">Mono Contrast</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Split style
                <select id="split">
                    <option value="rand">Random diagonal</option>
                    <option value="tl">Always top-left</option>
                    <option value="tr">Always top-right</option>
                    <option value="checker">Checkerboard</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        bold:   ['#E63946','#457B9D','#2A9D8F','#E9C46A','#F4A261','#264653','#A8DADC'],
        neon:   ['#FF0080','#00FFCC','#FFE600','#7B2FBE','#00B4D8','#FF6600','#00FF41'],
        earth:  ['#606C38','#DDA15E','#BC6C25','#8A9A5B','#FEFAE0','#3d4423','#E9C46A'],
        pastel: ['#FFADAD','#FFD6A5','#FDFFB6','#CAFFBF','#9BF6FF','#A0C4FF','#BDB2FF'],
        mono:   ['#FFFFFF','#CCCCCC','#999999','#555555','#222222']
    };

    let tileSize = 56;
    let paletteName = 'bold';
    let splitStyle = 'rand';
    let W, H;
    let tris = []; // {ax,ay,bx,by,cx,cy, color}

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = tileSize;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;
        const pal = PALETTES[paletteName];

        tris = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x = col * s, y = row * s;
                let diag; // true = TL-BR split, false = TR-BL split
                if (splitStyle === 'rand') diag = Math.random() < 0.5;
                else if (splitStyle === 'tl') diag = true;
                else if (splitStyle === 'tr') diag = false;
                else diag = (col + row) % 2 === 0; // checker

                const c1 = pal[Math.floor(Math.random() * pal.length)];
                let c2 = pal[Math.floor(Math.random() * pal.length)];
                // avoid same colour both halves
                let tries = 0;
                while (c2 === c1 && pal.length > 1 && tries++ < 8) c2 = pal[Math.floor(Math.random() * pal.length)];

                if (diag) {
                    // TL-BR: tri1 = TL,TR,BL; tri2 = TR,BR,BL
                    tris.push({ pts: [[x,y],[x+s,y],[x,y+s]], color: c1 });
                    tris.push({ pts: [[x+s,y],[x+s,y+s],[x,y+s]], color: c2 });
                } else {
                    // TR-BL: tri1 = TL,TR,BR; tri2 = TL,BR,BL
                    tris.push({ pts: [[x,y],[x+s,y],[x+s,y+s]], color: c1 });
                    tris.push({ pts: [[x,y],[x+s,y+s],[x,y+s]], color: c2 });
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#0d0e18';
        ctx.fillRect(0, 0, W, H);

        // Group by color for performance
        const byColor = {};
        for (const t of tris) (byColor[t.color] = byColor[t.color] || []).push(t);

        for (const col in byColor) {
            ctx.fillStyle = col;
            ctx.beginPath();
            for (const t of byColor[col]) {
                ctx.moveTo(t.pts[0][0], t.pts[0][1]);
                ctx.lineTo(t.pts[1][0], t.pts[1][1]);
                ctx.lineTo(t.pts[2][0], t.pts[2][1]);
                ctx.closePath();
            }
            ctx.fill();
        }

        // Thin separator lines
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        for (const t of tris) {
            ctx.moveTo(t.pts[0][0], t.pts[0][1]);
            ctx.lineTo(t.pts[1][0], t.pts[1][1]);
            ctx.lineTo(t.pts[2][0], t.pts[2][1]);
            ctx.closePath();
        }
        ctx.stroke();
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        regenerate();
    });
    document.getElementById('split').addEventListener('change', e => {
        splitStyle = e.target.value;
        regenerate();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
