<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stained Glass Truchet - Ribbonics</title>
    <meta name="description" content="Truchet loops where regions between ribbons are filled with translucent jewel colours, and the ribbons themselves become black leading lines like stained glass.">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #e8b86d; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #e8b86d; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #1a1a2e; }
        .value-display { float: right; color: #e8b86d; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #4a1c5c, #e8b86d);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Stained Glass Truchet</h1>
        <p>Each tile is flood-filled with translucent jewel tones before thick black leading lines are laid over the arcs, mimicking the look of cathedral stained glass.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Lead width <span class="value-display" id="leadVal">12</span>%</label>
            <input type="range" id="lead" min="6" max="22" value="12">
        </div>
        <div class="control-group">
            <label>Glass opacity <span class="value-display" id="opacVal">72</span>%</label>
            <input type="range" id="opac" min="30" max="100" value="72">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Jewel colours in hex (alpha handled separately)
    const JEWELS = [
        '#c0392b','#e74c3c', // reds
        '#8e44ad','#9b59b6', // purples
        '#2980b9','#3498db', // blues
        '#16a085','#1abc9c', // teals
        '#27ae60','#2ecc71', // greens
        '#f39c12','#f1c40f', // ambers
        '#d35400','#e67e22', // oranges
        '#1a5276','#2471a3', // deep blues
    ];

    let tileSize = 80;
    let leadPct = 0.12;
    let glassOpac = 0.72;
    let W, H, cols, rows;
    let cells = [];
    let tileColors = [];
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        tileColors = [];
        for (let i = 0; i < cols * rows; i++) {
            cells.push(Math.random() < 0.5 ? 0 : 1);
            // Each tile gets two random jewel colours for its two arc regions
            tileColors.push([
                JEWELS[Math.floor(Math.random() * JEWELS.length)],
                JEWELS[Math.floor(Math.random() * JEWELS.length)]
            ]);
        }
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
    }

    function draw() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const s = tileSize;
        const r = s / 2;
        const lead = Math.max(3, s * leadPct);

        // Pass 1: fill arcs as thick coloured ribbons to paint the glass panes
        for (let row = 0; row < rows; row++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = row * s;
                const config = cells[row * cols + c];
                const [col1, col2] = tileColors[row * cols + c];
                const [r1,g1,b1] = hexToRgb(col1);
                const [r2,g2,b2] = hexToRgb(col2);

                let arcs;
                if (config === 0) {
                    arcs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI/2,   col: `rgba(${r1},${g1},${b1},${glassOpac})` },
                        { cx: x0+s,   cy: y0+s,   a0: Math.PI,       a1: Math.PI*1.5, col: `rgba(${r2},${g2},${b2},${glassOpac})` }
                    ];
                } else {
                    arcs = [
                        { cx: x0+s,   cy: y0,     a0: Math.PI/2,     a1: Math.PI,     col: `rgba(${r1},${g1},${b1},${glassOpac})` },
                        { cx: x0,     cy: y0+s,   a0: Math.PI*1.5,   a1: Math.PI*2,   col: `rgba(${r2},${g2},${b2},${glassOpac})` }
                    ];
                }

                // Draw wide ribbon fill
                ctx.lineWidth = r * 1.8;
                for (const a of arcs) {
                    ctx.strokeStyle = a.col;
                    ctx.beginPath();
                    ctx.arc(a.cx, a.cy, r, a.a0, a.a1);
                    ctx.stroke();
                }
            }
        }

        // Pass 2: black leading lines over arc paths
        ctx.strokeStyle = '#0d0d1a';
        ctx.lineWidth = lead;
        ctx.beginPath();
        for (let row = 0; row < rows; row++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = row * s;
                const config = cells[row * cols + c];
                let arcs;
                if (config === 0) {
                    arcs = [
                        { cx: x0,   cy: y0,   a0: 0,           a1: Math.PI/2   },
                        { cx: x0+s, cy: y0+s, a0: Math.PI,     a1: Math.PI*1.5 }
                    ];
                } else {
                    arcs = [
                        { cx: x0+s, cy: y0,   a0: Math.PI/2,   a1: Math.PI     },
                        { cx: x0,   cy: y0+s, a0: Math.PI*1.5, a1: Math.PI*2   }
                    ];
                }
                for (const a of arcs) {
                    ctx.moveTo(a.cx + Math.cos(a.a0)*r, a.cy + Math.sin(a.a0)*r);
                    ctx.arc(a.cx, a.cy, r, a.a0, a.a1);
                }
            }
        }
        ctx.stroke();

        // Pass 3: thin highlight on leading lines
        ctx.strokeStyle = 'rgba(255,255,255,0.10)';
        ctx.lineWidth = Math.max(1, lead * 0.25);
        ctx.beginPath();
        for (let row = 0; row < rows; row++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = row * s;
                const config = cells[row * cols + c];
                let arcs;
                if (config === 0) {
                    arcs = [
                        { cx: x0,   cy: y0,   a0: 0,           a1: Math.PI/2   },
                        { cx: x0+s, cy: y0+s, a0: Math.PI,     a1: Math.PI*1.5 }
                    ];
                } else {
                    arcs = [
                        { cx: x0+s, cy: y0,   a0: Math.PI/2,   a1: Math.PI     },
                        { cx: x0,   cy: y0+s, a0: Math.PI*1.5, a1: Math.PI*2   }
                    ];
                }
                for (const a of arcs) {
                    ctx.moveTo(a.cx + Math.cos(a.a0)*r, a.cy + Math.sin(a.a0)*r);
                    ctx.arc(a.cx, a.cy, r, a.a0, a.a1);
                }
            }
        }
        ctx.stroke();
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('lead').addEventListener('input', e => {
        leadPct = +e.target.value / 100;
        document.getElementById('leadVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('opac').addEventListener('input', e => {
        glassOpac = +e.target.value / 100;
        document.getElementById('opacVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
