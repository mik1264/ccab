<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Embroidery - Ribbonics</title>
    <meta name="description" content="Cross-stitch and running-stitch styled ribbons on a subtle linen-texture background — Truchet paths rendered as folk embroidery in a warm folk colour palette.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Stitch Embroidery</h1>
        <p>Truchet ribbon paths are rendered as embroidery thread: a solid satin-stitch base with a dashed running-stitch overlay and cross-stitch markers at tile corners, all on a woven linen ground.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Thread palette
                <select id="palette">
                    <option value="folk">Folk Florals</option>
                    <option value="nordic">Nordic Blue</option>
                    <option value="mexican">Mexican Fiesta</option>
                    <option value="vintage">Vintage Muted</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="28" max="120" value="64">
        </div>
        <div class="control-group">
            <label>Thread width <span class="value-display" id="widthVal">30</span>%</label>
            <input type="range" id="width" min="14" max="55" value="30">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        folk:    ['#C0392B', '#27AE60', '#F39C12', '#8E44AD', '#2980B9', '#E74C3C', '#16A085'],
        nordic:  ['#1A3C7C', '#2E86AB', '#A8D8EA', '#1C5E8A', '#6EB4D0', '#3A6EA5', '#96C8DC'],
        mexican: ['#E63946', '#F1A208', '#2DC653', '#E040FB', '#00B4D8', '#FF6B35', '#FCBF49'],
        vintage: ['#8B4A4A', '#4A6B8B', '#6B8B4A', '#8B6B4A', '#6B4A8B', '#8B8B4A', '#4A8B6B']
    };

    const LINEN_BG = '#E8DFC8';
    const LINEN_DARK = '#C8B898';

    let tileSize = 64;
    let widthPct = 0.30;
    let paletteName = 'folk';
    let W, H, cols, rows;
    let cells = [];
    let arcColors = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function drawLinen() {
        // Draw a woven linen background using thin horizontal and vertical lines
        ctx.fillStyle = LINEN_BG;
        ctx.fillRect(0, 0, W, H);

        const weaveSize = 3;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.18;

        // Horizontal threads
        ctx.strokeStyle = LINEN_DARK;
        for (let y = 0; y < H; y += weaveSize * 2) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
        // Vertical threads
        for (let x = 0; x < W; x += weaveSize * 2) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        // Subtle noise dots
        ctx.fillStyle = LINEN_DARK;
        for (let y = weaveSize; y < H; y += weaveSize * 6) {
            for (let x = weaveSize; x < W; x += weaveSize * 6) {
                ctx.globalAlpha = 0.08 + 0.05 * Math.random();
                ctx.fillRect(x, y, 1.5, 1.5);
            }
        }
        ctx.globalAlpha = 1;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        arcColors = [];
        const pal = PALETTES[paletteName];
        for (let i = 0; i < cols * rows; i++) {
            cells.push(Math.random() < 0.5 ? 0 : 1);
            arcColors.push(pal[i % pal.length]);
        }
    }

    function drawStitchArc(cx, cy, r, a0, a1, color, strokeW) {
        const STEPS = Math.max(12, Math.round(r * Math.abs(a1 - a0) * 0.5));

        // --- Base satin stitch (solid thick arc) ---
        ctx.strokeStyle = color;
        ctx.lineWidth = strokeW;
        ctx.lineCap = 'round';
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(cx, cy, r, a0, a1);
        ctx.stroke();

        // --- Thread shadow (subtle underside) ---
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = strokeW + 2;
        ctx.lineCap = 'butt';
        ctx.beginPath();
        ctx.arc(cx, cy, r, a0, a1);
        ctx.stroke();

        // Re-draw solid base on top of shadow
        ctx.strokeStyle = color;
        ctx.lineWidth = strokeW;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(cx, cy, r, a0, a1);
        ctx.stroke();

        // --- Running-stitch overlay (dashed white/light) ---
        const arcLen = r * Math.abs(a1 - a0);
        const dashLen = strokeW * 0.9;
        const gapLen = strokeW * 0.7;
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = Math.max(1, strokeW * 0.22);
        ctx.lineCap = 'round';
        ctx.setLineDash([dashLen, gapLen]);
        ctx.lineDashOffset = 0;
        ctx.beginPath();
        ctx.arc(cx, cy, r, a0, a1);
        ctx.stroke();
        ctx.setLineDash([]);

        // --- Cross-stitch tick marks perpendicular to arc at intervals ---
        const tickStep = strokeW * 2.2;
        const nTicks = Math.max(1, Math.floor(arcLen / tickStep));
        const tickH = strokeW * 0.5;
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = Math.max(0.8, strokeW * 0.15);
        ctx.lineCap = 'butt';
        for (let t = 1; t < nTicks; t++) {
            const frac = t / nTicks;
            const a = a0 + frac * (a1 - a0);
            const bx = cx + Math.cos(a) * r;
            const by = cy + Math.sin(a) * r;
            const ta = a + Math.PI / 2; // tangent
            ctx.beginPath();
            ctx.moveTo(bx + Math.cos(ta) * tickH, by + Math.sin(ta) * tickH);
            ctx.lineTo(bx - Math.cos(ta) * tickH, by - Math.sin(ta) * tickH);
            ctx.stroke();
        }
    }

    function draw() {
        drawLinen();

        const rw = Math.max(3, tileSize * widthPct);
        const s = tileSize, rad = s / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const x0 = c * s, y0 = r * s;
                const cfg = cells[idx];
                const color = arcColors[idx];
                let arcs;
                if (cfg === 0) {
                    arcs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI/2    },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,     a1: Math.PI*1.5  }
                    ];
                } else {
                    arcs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI/2,   a1: Math.PI      },
                        { cx: x0,     cy: y0 + s, a0: Math.PI*1.5, a1: Math.PI*2    }
                    ];
                }
                for (const a of arcs) {
                    drawStitchArc(a.cx, a.cy, rad, a.a0, a.a1, color, rw);
                }
            }
        }

        // Draw corner cross-stitch markers
        ctx.strokeStyle = 'rgba(80,40,20,0.35)';
        ctx.lineWidth = 1.5;
        const xSize = Math.max(3, tileSize * 0.08);
        for (let r = 0; r <= rows; r++) {
            for (let c = 0; c <= cols; c++) {
                const x = c * s, y = r * s;
                ctx.beginPath();
                ctx.moveTo(x - xSize, y - xSize); ctx.lineTo(x + xSize, y + xSize);
                ctx.moveTo(x + xSize, y - xSize); ctx.lineTo(x - xSize, y + xSize);
                ctx.stroke();
            }
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
