<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twill Fabric - Ribbonics</title>
    <meta name="description" content="A diagonal twill weave (over-2 / under-1) of warp and weft threads producing prominent diagonal ridges in denim and indigo tones.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Twill Fabric</h1>
        <p>A diagonal 2/1 twill weave: warp threads pass over two weft threads then under one, offset by one column each row. The result is bold diagonal ridges — classic denim structure rendered as ribbon art.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Fabric
                <select id="palette">
                    <option value="denim">Denim Blue</option>
                    <option value="khaki">Khaki Chino</option>
                    <option value="tartan">Red Tartan</option>
                    <option value="dark">Dark Serge</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Thread size <span class="value-display" id="sizeVal">16</span></label>
            <input type="range" id="size" min="6" max="40" value="16">
        </div>
        <div class="control-group">
            <label>Thread width <span class="value-display" id="widthVal">78</span>%</label>
            <input type="range" id="width" min="50" max="95" value="78">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        denim:  { bg: '#0a0e1a', warp: '#2A52BE', weft: '#1a3070', shadow: '#070a12', hi: '#4A72DE' },
        khaki:  { bg: '#15120a', warp: '#B5A370', weft: '#7A6A40', shadow: '#0d0b05', hi: '#D5C390' },
        tartan: { bg: '#0f0808', warp: '#8B2020', weft: '#3a0a0a', shadow: '#060404', hi: '#C84040' },
        dark:   { bg: '#0a0a0e', warp: '#303848', weft: '#1a2030', shadow: '#050508', hi: '#506070' }
    };

    let threadSize = 16;
    let widthPct = 0.78;
    let paletteName = 'denim';
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Twill 2/1: in each 3-thread repeat, warp is over-2, under-1
    // We determine if warp is "over" at cell (col, row) by:
    // warpOver(col, row) = ((col + row) % 3) !== 2  (under on 3rd in sequence)
    function warpIsOver(col, row) {
        return ((col + row) % 3) !== 2;
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);

        const s = threadSize;
        const tw = Math.max(2, s * widthPct); // thread width
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;
        const gap = (s - tw) / 2;

        ctx.lineCap = 'butt';

        // Draw weft threads (horizontal) — drawn first (underneath)
        for (let r = -1; r < rows; r++) {
            const y = r * s + s / 2;
            // Weft thread is a single horizontal stripe
            ctx.strokeStyle = pal.shadow;
            ctx.lineWidth = tw + 2;
            ctx.beginPath();
            ctx.moveTo(-s, y);
            ctx.lineTo(W + s, y);
            ctx.stroke();

            ctx.strokeStyle = pal.weft;
            ctx.lineWidth = tw;
            ctx.beginPath();
            ctx.moveTo(-s, y);
            ctx.lineTo(W + s, y);
            ctx.stroke();

            // Weft highlight
            ctx.strokeStyle = pal.hi;
            ctx.lineWidth = Math.max(1, tw * 0.15);
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.moveTo(-s, y - tw * 0.3);
            ctx.lineTo(W + s, y - tw * 0.3);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // Draw warp threads (vertical) — segments that go over weft are drawn on top
        // For each warp column and each cell, draw a tw × tw square clipping segment when warp is over
        for (let c = -1; c < cols; c++) {
            const x = c * s + s / 2;

            // First draw continuous warp thread (below weft)
            ctx.strokeStyle = pal.shadow;
            ctx.lineWidth = tw + 2;
            ctx.beginPath();
            ctx.moveTo(x, -s);
            ctx.lineTo(x, H + s);
            ctx.stroke();

            ctx.strokeStyle = pal.warp;
            ctx.lineWidth = tw;
            ctx.beginPath();
            ctx.moveTo(x, -s);
            ctx.lineTo(x, H + s);
            ctx.stroke();

            // Then overdraw "over" segments on top of weft
            for (let r = -1; r < rows; r++) {
                if (!warpIsOver(c, r)) continue;
                const y = r * s + s / 2;
                const y0 = y - s / 2 - 1;
                const y1 = y + s / 2 + 1;

                ctx.strokeStyle = pal.shadow;
                ctx.lineWidth = tw + 2;
                ctx.beginPath();
                ctx.moveTo(x, y0);
                ctx.lineTo(x, y1);
                ctx.stroke();

                ctx.strokeStyle = pal.warp;
                ctx.lineWidth = tw;
                ctx.beginPath();
                ctx.moveTo(x, y0);
                ctx.lineTo(x, y1);
                ctx.stroke();

                // Warp highlight
                ctx.strokeStyle = pal.hi;
                ctx.lineWidth = Math.max(1, tw * 0.2);
                ctx.globalAlpha = 0.45;
                ctx.beginPath();
                ctx.moveTo(x - tw * 0.3, y0);
                ctx.lineTo(x - tw * 0.3, y1);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }

    function regenerate() { resize(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        threadSize = +e.target.value;
        document.getElementById('sizeVal').textContent = threadSize;
        draw();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
