<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagonal Stripe Truchet - Ribbonics</title>
    <meta name="description" content="Tiles of parallel diagonal stripes in two orientations form a herringbone-like weave; 2–3 colours alternate across stripes producing bold geometric rhythm.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Diagonal Stripe Truchet</h1>
        <p>Each square tile is filled with parallel diagonal stripes in one of two orientations (↗ or ↘). When tiles are placed randomly the stripes connect and break to form a bold herringbone-like stripe weave.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="30" max="120" value="64">
        </div>
        <div class="control-group">
            <label>Stripe count <span class="value-display" id="stripesVal">4</span></label>
            <input type="range" id="stripes" min="2" max="8" value="4" step="1">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="bold">Bold Contrast</option>
                    <option value="warm">Warm Sunset</option>
                    <option value="cool">Cool Ocean</option>
                    <option value="bw">Black &amp; White</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        bold: ['#E63946','#457B9D','#2A9D8F','#E9C46A'],
        warm: ['#F72585','#F77F00','#FCBF49','#E63946'],
        cool: ['#4361EE','#4CC9F0','#7209B7','#3A0CA3'],
        bw:   ['#FFFFFF','#333333']
    };

    let tileSize = 64;
    let stripeCount = 4;
    let paletteName = 'bold';
    let W, H;
    let tiles = []; // 0 or 1 per cell
    let tileCols, tileRows;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        tileCols = Math.ceil(W / tileSize) + 1;
        tileRows = Math.ceil(H / tileSize) + 1;
        tiles = [];
        for (let i = 0; i < tileCols * tileRows; i++) tiles.push(Math.random() < 0.5 ? 0 : 1);
    }

    function drawTile(x0, y0, orient, s, pal, n) {
        // orient 0: stripes run from bottom-left to top-right (↗)
        // orient 1: stripes run from top-left to bottom-right (↘)
        // We clip to the tile square and draw n+1 stripe bands
        ctx.save();
        ctx.beginPath();
        ctx.rect(x0, y0, s, s);
        ctx.clip();

        const bw = s / n; // band width along perpendicular
        // For orient 0: project along direction (1,1)/sqrt2; stripes spaced by bw*sqrt2/2
        // Simpler: use shear clipping. Draw diagonal bands.
        // A band k has colour pal[k % pal.length]
        // We cover from -s to 2s diagonally
        const total = n * 2 + 2; // number of diagonal stripes to cover the tile
        for (let k = -n; k <= n * 2; k++) {
            const c = pal[((k % pal.length) + pal.length) % pal.length];
            ctx.fillStyle = c;
            ctx.beginPath();
            if (orient === 0) {
                // ↗ stripes: parallel lines going from BL to TR
                // stripe k occupies the band between diagonals y = x + k*bw*√2 and y = x + (k+1)*bw*√2
                // expressed as offset along perpendicular to (1,-1) direction
                const d = bw * Math.SQRT2;
                const o0 = k * d;
                const o1 = (k + 1) * d;
                // Points of the parallelogram clipped to tile
                // line equation: x - y = const; const=o0 for one edge, o1 for other
                // corners of infinite band intersected with bounding box done by polygon
                // Use 4-corner approach
                ctx.moveTo(x0 + o0,       y0);
                ctx.lineTo(x0 + o1,       y0);
                ctx.lineTo(x0 + o1 - s,   y0 + s);
                ctx.lineTo(x0 + o0 - s,   y0 + s);
            } else {
                // ↘ stripes: parallel lines going from TL to BR
                // x + y = const per edge
                const d = bw * Math.SQRT2;
                const o0 = k * d;
                const o1 = (k + 1) * d;
                ctx.moveTo(x0 + o0,       y0);
                ctx.lineTo(x0 + o1,       y0);
                ctx.lineTo(x0 + o1 + s,   y0 + s);  // Hmm, let's think again
                ctx.lineTo(x0 + o0 + s,   y0 + s);
                // Actually for ↘, the direction perpendicular to stripes is (1,1)/√2
                // Band between x+y = const lines
                // Recompute
            }
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    }

    // Cleaner stripe rendering via clip + line-by-line
    function drawTile2(x0, y0, orient, s, pal, n) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x0, y0, s, s);
        ctx.clip();

        const d = s / n; // distance between parallel lines in screen space projected

        // We draw bands. For orient 0 (↗): slope -1 lines (y = -x + c)
        //   stripe band k: between c = k*d*√2 and c = (k+1)*d*√2
        // For orient 1 (↘): slope +1 lines (y = x + c)
        //   stripe band k: between c = k*d*√2 and c = (k+1)*d*√2

        const span = s * Math.SQRT2 * 2;
        const bandW = d * Math.SQRT2;
        const numBands = Math.ceil(span / bandW) + 2;

        for (let k = -2; k < numBands; k++) {
            const c0 = k * bandW;
            const c1 = (k + 1) * bandW;
            const col = pal[((k % pal.length) + pal.length) % pal.length];
            ctx.fillStyle = col;
            ctx.beginPath();
            if (orient === 0) {
                // lines: y = -x + c, i.e. x + y = c
                // polygon between c0 and c1 within tile
                // parametrise: at x=0, y=c; at y=0, x=c; at x=s, y=c-s; at y=s, x=c-s
                polyBand(ctx, x0, y0, s, c0, c1, 1);
            } else {
                // lines: y = x - c, i.e. x - y = c (↘ direction, slope +1)
                polyBand(ctx, x0, y0, s, c0, c1, -1);
            }
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    }

    // Draw a band polygon between two parallel lines within the tile
    // sign=1: x+y=c (↗ stripes perpendicular to (1,1))
    // sign=-1: x-y=c (↘ stripes perpendicular to (1,-1))
    function polyBand(ctx, x0, y0, s, c0, c1, sign) {
        // Build polygon vertices for the band [c0,c1] along the perpendicular axis
        // within the square [x0..x0+s] x [y0..y0+s]
        // We'll compute edge intersections
        const pts0 = linePolyIntersect(x0, y0, s, c0, sign);
        const pts1 = linePolyIntersect(x0, y0, s, c1, sign);
        // Build a convex polygon
        if (pts0.length < 1 && pts1.length < 1) return;
        const allPts = [...pts0, ...pts1.reverse()];
        if (allPts.length === 0) return;
        ctx.moveTo(allPts[0][0], allPts[0][1]);
        for (let i = 1; i < allPts.length; i++) ctx.lineTo(allPts[i][0], allPts[i][1]);
    }

    // Returns up to 2 intersection points of line (sign*x + y = c) with tile square
    // plus corner points of the tile that are "below" c0 and "above" c1
    function linePolyIntersect(x0, y0, s, c, sign) {
        // The line: sign===1 → x+y=c, sign===-1 → x-y=c
        // Intersect with 4 edges of square and return points
        const pts = [];
        // left edge x=x0, y varies [y0..y0+s]
        {
            const yy = c - sign * x0;
            if (yy >= y0 && yy <= y0 + s) pts.push([x0, yy]);
        }
        // right edge x=x0+s
        {
            const yy = c - sign * (x0 + s);
            if (yy >= y0 && yy <= y0 + s) pts.push([x0 + s, yy]);
        }
        // top edge y=y0
        {
            const xx = sign === 1 ? c - y0 : c + y0;
            if (xx >= x0 && xx <= x0 + s) pts.push([xx, y0]);
        }
        // bottom edge y=y0+s
        {
            const xx = sign === 1 ? c - (y0 + s) : c + (y0 + s);
            if (xx >= x0 && xx <= x0 + s) pts.push([xx, y0 + s]);
        }
        // Deduplicate corners
        const unique = [];
        for (const p of pts) {
            if (!unique.some(q => Math.abs(q[0]-p[0])<0.01 && Math.abs(q[1]-p[1])<0.01)) unique.push(p);
        }
        return unique;
    }

    // Now we need to build the actual band polygon = all tile points where c0 <= proj <= c1
    // Better approach: just draw the entire band polygon using corner inclusion
    function drawBand(ctx, x0, y0, s, c0, c1, sign, col) {
        // All tile corners plus line intersections, filtered to band
        const corners = [[x0,y0],[x0+s,y0],[x0+s,y0+s],[x0,y0+s]];
        const proj = sign === 1
            ? ([x,y]) => x + y - x0
            : ([x,y]) => x - y - x0;

        const pts = [];
        // Add corners inside band
        for (const c of corners) {
            const p = proj(c);
            if (p >= c0 && p <= c1) pts.push(c);
        }
        // Add intersection points with c0 and c1 lines
        for (const cc of [c0, c1]) {
            const ip = linePolyIntersect(x0, y0, s, cc + x0, sign === 1 ? 1 : -1);
            pts.push(...ip);
        }
        if (pts.length < 3) return;
        // Sort by angle from centroid
        const cx = pts.reduce((a,p)=>a+p[0],0)/pts.length;
        const cy2 = pts.reduce((a,p)=>a+p[1],0)/pts.length;
        pts.sort((a,b) => Math.atan2(a[1]-cy2,a[0]-cx) - Math.atan2(b[1]-cy2,b[0]-cx));

        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
        ctx.closePath();
        ctx.fill();
    }

    function draw() {
        ctx.fillStyle = '#0d0e18';
        ctx.fillRect(0, 0, W, H);

        const s = tileSize;
        const pal = PALETTES[paletteName];
        const n = stripeCount;
        const bandW = s / n; // band width along perpendicular in tile coords

        for (let row = 0; row < tileRows; row++) {
            for (let col = 0; col < tileCols; col++) {
                const x0 = col * s, y0 = row * s;
                const orient = tiles[row * tileCols + col];

                ctx.save();
                ctx.beginPath();
                ctx.rect(x0, y0, s, s);
                ctx.clip();

                // cover the tile with n bands
                for (let k = 0; k < n + 2; k++) {
                    const c0 = (k - 1) * bandW;
                    const c1 = k * bandW;
                    const color = pal[((k % pal.length) + pal.length) % pal.length];
                    drawBand(ctx, x0, y0, s, c0, c1, orient === 0 ? 1 : -1, color);
                }
                ctx.restore();
            }
        }

        // Thin grid lines
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let col = 0; col <= tileCols; col++) {
            ctx.moveTo(col * s, 0); ctx.lineTo(col * s, H);
        }
        for (let row = 0; row <= tileRows; row++) {
            ctx.moveTo(0, row * s); ctx.lineTo(W, row * s);
        }
        ctx.stroke();
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('stripes').addEventListener('input', e => {
        stripeCount = +e.target.value;
        document.getElementById('stripesVal').textContent = stripeCount;
        regenerate();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
