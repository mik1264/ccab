<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Maze - Ribbonics</title>
    <meta name="description" content="A Truchet tile maze where every connected loop path is painted with a long smooth colour gradient progressing along its arc length.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Gradient Maze</h1>
        <p>Random Truchet tiles form continuous loops; each arc segment is coloured by a smooth gradient that flows along the path's total arc length — turning the maze into a river of light.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Gradient scheme
                <select id="palette">
                    <option value="spectrum">Spectrum</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="neon">Neon</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="28" max="120" value="64">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="20" max="68" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const GRADIENTS = {
        spectrum: t => `hsl(${t * 360},90%,60%)`,
        fire:     t => { const r = Math.round(255 * Math.min(1, t * 2)); const g = Math.round(180 * Math.max(0, t * 2 - 1)); return `rgb(${r},${g},20)`; },
        ocean:    t => `hsl(${180 + t * 60},80%,${40 + t * 30}%)`,
        neon:     t => `hsl(${t * 300 + 60},100%,65%)`
    };

    let tileSize = 64;
    let widthPct = 0.40;
    let paletteName = 'spectrum';
    let W, H, cols, rows;
    let cells = [];
    let loopArcs = []; // [{arcs: [{cx,cy,r,a0,a1,t}], totalLen}]

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);

        // Union-Find
        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;
        const s = tileSize, rad = s / 2;

        const arcList = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c,r), bot = h(c,r+1), left = v(c,r), right = v(c+1,r);
                const cfg = cells[r * cols + c];
                let pairs;
                if (cfg === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI/2,   n1: top,  n2: left  },
                        { cx: x0+s,   cy: y0+s,   a0: Math.PI,     a1: Math.PI*1.5, n1: bot,  n2: right }
                    ];
                } else {
                    pairs = [
                        { cx: x0+s,   cy: y0,     a0: Math.PI/2,   a1: Math.PI,     n1: top,  n2: right },
                        { cx: x0,     cy: y0+s,   a0: Math.PI*1.5, a1: Math.PI*2,   n1: bot,  n2: left  }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcList.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1 });
                }
            }
        }

        // Group arcs by loop, compute cumulative arc-length fraction
        const loopMap = new Map();
        for (const a of arcList) {
            const root = find(a.n1);
            if (!loopMap.has(root)) loopMap.set(root, []);
            loopMap.get(root).push(a);
        }

        loopArcs = [];
        for (const [, arcs] of loopMap) {
            const arcLen = rad * Math.PI / 2; // each arc is quarter circle
            const total = arcs.length * arcLen;
            let cum = 0;
            const annotated = arcs.map(a => {
                const t0 = cum / total;
                cum += arcLen;
                const t1 = cum / total;
                return { ...a, t0, t1 };
            });
            loopArcs.push({ arcs: annotated, total });
        }
    }

    function draw() {
        ctx.fillStyle = '#0c0d18';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const rw = Math.max(4, tileSize * widthPct);
        const cw = rw + Math.max(3, tileSize * 0.09);
        const rad = tileSize / 2;
        const STEPS = Math.max(8, Math.round(rad * 0.4));
        const colorFn = GRADIENTS[paletteName];

        for (const loop of loopArcs) {
            // Casing first
            ctx.strokeStyle = '#050608';
            ctx.lineWidth = cw;
            ctx.beginPath();
            for (const a of loop.arcs) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();

            // Gradient ribbon: draw tiny arc segments, each with its own color
            ctx.lineWidth = rw;
            for (const a of loop.arcs) {
                for (let i = 0; i < STEPS; i++) {
                    const f0 = i / STEPS, f1 = (i + 1) / STEPS;
                    const ang0 = a.a0 + (a.a1 - a.a0) * f0;
                    const ang1 = a.a0 + (a.a1 - a.a0) * f1;
                    const t = a.t0 + (a.t1 - a.t0) * (f0 + f1) * 0.5;
                    ctx.strokeStyle = colorFn(t);
                    ctx.beginPath();
                    ctx.moveTo(a.cx + Math.cos(ang0)*a.r, a.cy + Math.sin(ang0)*a.r);
                    ctx.arc(a.cx, a.cy, a.r, ang0, ang1);
                    ctx.stroke();
                }
            }
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
