<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Loops - Ribbonics</title>
    <meta name="description" content="Square Truchet tiles form closed loops, each coloured across the full rainbow spectrum according to its length — longer loops glow warmer, shorter ones cooler.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Rainbow Loops</h1>
        <p>Every closed loop in the square Truchet weave is individually coloured across the full rainbow spectrum, ranked by arc-count: short tight loops appear at one hue end, the longest sweeping loops at the other.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="24" max="140" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">44</span>%</label>
            <input type="range" id="width" min="18" max="72" value="44">
        </div>
        <div class="control-group">
            <label>Saturation <span class="value-display" id="satVal">95</span>%</label>
            <input type="range" id="sat" min="40" max="100" value="95">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const BG = '#ffffff';
    const CASING = '#222222';

    let tileSize = 60;
    let widthPct = 0.44;
    let saturation = 95;
    let W, H, cols, rows;
    let arcList = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function makeUF() {
        const par = new Map();
        function find(x) {
            if (!par.has(x)) par.set(x, x);
            let r = x;
            while (par.get(r) !== r) r = par.get(r);
            while (par.get(x) !== r) { const nx = par.get(x); par.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { par.set(find(a), find(b)); }
        return { find, union };
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;

        const uf = makeUF();
        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        arcList = [];
        const s = tileSize, rad = s / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r + 1), left = v(c, r), right = v(c + 1, r);
                const config = Math.random() < 0.5 ? 0 : 1;
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,    n1: top,    n2: left   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5,  n1: bottom, n2: right  }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI,        n1: top,    n2: right  },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,    n1: bottom, n2: left   }
                    ];
                }
                for (const p of pairs) {
                    uf.union(p.n1, p.n2);
                    arcList.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1, color: '#888' });
                }
            }
        }

        // Group arcs by root, sort roots by loop size
        const rootArcs = new Map();
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootArcs.has(root)) rootArcs.set(root, []);
            rootArcs.get(root).push(a);
        }

        // Sort roots by arc count ascending
        const sortedRoots = [...rootArcs.keys()].sort((a, b) => rootArcs.get(a).length - rootArcs.get(b).length);
        const total = sortedRoots.length;

        // Assign rainbow colours by rank
        for (let i = 0; i < sortedRoots.length; i++) {
            const t = total <= 1 ? 0 : i / (total - 1);
            const hue = Math.round(t * 330); // 0=red .. 330=magenta
            const color = `hsl(${hue}, ${saturation}%, 52%)`;
            for (const a of rootArcs.get(sortedRoots[i])) {
                a.color = color;
            }
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(4, tileSize * 0.10);

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colour pass — grouped by colour
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('sat').addEventListener('input', e => {
        saturation = +e.target.value;
        document.getElementById('satVal').textContent = saturation;
        build(); draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
