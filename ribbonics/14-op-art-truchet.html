<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Op-Art Truchet - Ribbonics</title>
    <meta name="description" content="Pure black and white Truchet arcs at high contrast, creating optical illusion patterns that vibrate and undulate with depth.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(240,240,240,0.92);
            color: #111;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.12);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #111; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #444; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(240,240,240,0.92);
            color: #111;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.12);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #444; }
        .control-group input[type="range"] { width: 100%; accent-color: #111; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(0,0,0,0.05); color: #111;
            border: 1px solid rgba(0,0,0,0.2); border-radius: 6px;
        }
        .control-group option { background: #eee; }
        .value-display { float: right; color: #111; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #111, #444);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.3); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Op-Art Truchet</h1>
        <p>Pure black and white quarter-circle arcs arranged randomly produce mesmerising optical illusions &mdash; concentric rings, spirals and undulating waves emerge from simple binary tile choices.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">56</span></label>
            <input type="range" id="size" min="20" max="130" value="56">
        </div>
        <div class="control-group">
            <label>Arc width <span class="value-display" id="wVal">48</span>%</label>
            <input type="range" id="width" min="20" max="90" value="48">
        </div>
        <div class="control-group">
            <label>Mode
                <select id="mode">
                    <option value="bw">Black on White</option>
                    <option value="wb">White on Black</option>
                    <option value="invert">Inverted Rows</option>
                    <option value="checker">Checker Tint</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let tileSize = 56;
    let widthPct = 0.48;
    let mode = 'bw';
    let W, H, cols, rows;
    let cells = [];
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);
    }

    function drawTile(x0, y0, config, fg, bg) {
        const s = tileSize, r = s / 2;
        const fill = Math.max(2, s * widthPct);

        // Background square
        ctx.fillStyle = bg;
        ctx.fillRect(x0, y0, s, s);

        // Two arcs
        ctx.strokeStyle = fg;
        ctx.lineWidth = fill;
        ctx.lineCap = 'round';

        ctx.beginPath();
        if (config === 0) {
            // TL + BR
            ctx.moveTo(x0,       y0 + r);
            ctx.arc(x0,     y0,     r, Math.PI/2, 0, true);
            ctx.moveTo(x0 + s, y0 + r);
            ctx.arc(x0 + s, y0 + s, r, Math.PI*1.5, Math.PI, true);
        } else {
            // TR + BL
            ctx.moveTo(x0 + r, y0);
            ctx.arc(x0 + s, y0,     r, Math.PI, Math.PI/2, true);
            ctx.moveTo(x0 + r, y0 + s);
            ctx.arc(x0,     y0 + s, r, 0, Math.PI*1.5, true);
        }
        ctx.stroke();
    }

    function draw() {
        ctx.fillStyle = mode === 'wb' ? '#000' : '#fff';
        ctx.fillRect(0, 0, W, H);

        const s = tileSize;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const config = cells[r * cols + c];
                let fg, bg;
                switch (mode) {
                    case 'bw':
                        fg = '#000'; bg = '#fff'; break;
                    case 'wb':
                        fg = '#fff'; bg = '#000'; break;
                    case 'invert':
                        if (r % 2 === 0) { fg = '#000'; bg = '#fff'; }
                        else             { fg = '#fff'; bg = '#000'; }
                        break;
                    case 'checker':
                        if ((r + c) % 2 === 0) { fg = '#000'; bg = '#f0f0f0'; }
                        else                    { fg = '#222'; bg = '#e8e8e8'; }
                        break;
                }
                drawTile(x0, y0, config, fg, bg);
            }
        }

        // Draw grid lines for crisp cell boundaries
        ctx.strokeStyle = mode === 'wb' ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let c = 0; c <= cols; c++) { ctx.moveTo(c * s, 0); ctx.lineTo(c * s, H); }
        for (let r = 0; r <= rows; r++) { ctx.moveTo(0, r * s); ctx.lineTo(W, r * s); }
        ctx.stroke();
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('wVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('mode').addEventListener('change', e => {
        mode = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
