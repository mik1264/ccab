<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truchet Contours - Ribbonics</title>
    <meta name="description" content="Truchet arcs arranged into topographic contour-like nested loops, with gradient-filled bands between contours for depth.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Truchet Contours</h1>
        <p>Truchet arcs nest into topographic contour-like loops; gradient colour bands between contours give each level its own depth and hue.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="28" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Line width <span class="value-display" id="lwVal">4</span></label>
            <input type="range" id="lw" min="1" max="12" value="4">
        </div>
        <div class="control-group">
            <label>Colour scheme
                <select id="scheme">
                    <option value="topo">Topographic</option>
                    <option value="ocean">Ocean Depth</option>
                    <option value="thermal">Thermal</option>
                    <option value="forest">Forest</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const SCHEMES = {
        topo:    ['#2c4a1e','#3d6b2a','#5a8c3c','#88b04b','#c8d96a','#e6e890','#f5f5c8','#e8d5a0'],
        ocean:   ['#03045e','#023e8a','#0077b6','#0096c7','#00b4d8','#48cae4','#90e0ef','#caf0f8'],
        thermal: ['#1a001a','#4a0040','#8b0057','#c0003c','#e8001a','#ff4500','#ff8c00','#ffd700'],
        forest:  ['#1b2a1b','#2d4a2a','#3d6b3a','#5a8c4a','#7aad5a','#a3c87a','#c8e09a','#e8f0c0'],
    };

    let tileSize = 60;
    let lineW = 4;
    let schemeName = 'topo';
    let W, H;
    let arcs = [];     // {cx,cy,r,a0,a1, level}
    let bgCells = [];  // background fill cells

    // Simple hash for pseudo-random seeding
    let seedVal = 42;
    function seededRand() {
        seedVal = (seedVal * 9301 + 49297) % 233280;
        return seedVal / 233280;
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        seedVal = Math.floor(Math.random() * 100000);
        arcs = [];
        bgCells = [];

        const s = tileSize;
        const rad = s / 2;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;
        const scheme = SCHEMES[schemeName];

        // Build a "height field" using smooth pseudo-noise
        // Then choose Truchet orientation based on height gradient direction
        function height(c, r) {
            const n1 = Math.sin(c * 0.3 + seedVal * 0.01) * Math.cos(r * 0.25 + seedVal * 0.007);
            const n2 = Math.sin(c * 0.17 + r * 0.22 + seedVal * 0.013) * 0.5;
            const n3 = Math.cos(c * 0.08 - r * 0.11 + seedVal * 0.009) * 0.3;
            return (n1 + n2 + n3 + 1.8) / 3.6; // 0..1
        }

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s;
                const y0 = r * s;
                const h = height(c, r);
                const level = Math.floor(h * (scheme.length - 1));

                // Choose tile orientation based on height comparison with neighbours
                const hr = height(c + 1, r);
                const hb = height(c, r + 1);
                const config = (h + hr > hb + height(c+1, r+1)) ? 0 : 1;

                // Background fill colour
                bgCells.push({ x: x0, y: y0, s, color: scheme[level] });

                // Arcs
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI / 2     },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,     a1: Math.PI * 1.5   }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2, a1: Math.PI         },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2   }
                    ];
                }
                for (const p of pairs) {
                    arcs.push({ ...p, r: rad, level });
                }
            }
        }
    }

    function draw() {
        const scheme = SCHEMES[schemeName];

        // Draw background fills
        for (const cell of bgCells) {
            ctx.fillStyle = cell.color;
            ctx.fillRect(cell.x, cell.y, cell.s, cell.s);
        }

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Draw contour lines grouped by level
        // Darker line between level bands
        const CASING = 'rgba(0,0,0,0.5)';

        for (let pass = 0; pass < 2; pass++) {
            for (let lv = 0; lv < scheme.length; lv++) {
                const levelArcs = arcs.filter(a => a.level === lv);
                if (!levelArcs.length) continue;

                // Pick line colour: slightly darker than next level
                const nextColor = scheme[Math.min(lv + 1, scheme.length - 1)];
                const lineColor = pass === 0 ? CASING : darken(nextColor, 0.5);

                ctx.strokeStyle = lineColor;
                ctx.lineWidth = pass === 0 ? lineW + 3 : lineW;

                ctx.beginPath();
                for (const a of levelArcs) {
                    ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                    ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
                }
                ctx.stroke();
            }
        }

        // Final bright thin highlight pass
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = Math.max(1, lineW * 0.4);
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();
    }

    function darken(hex, factor) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgb(${Math.round(r * factor)},${Math.round(g * factor)},${Math.round(b * factor)})`;
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        build();
        draw();
    });
    document.getElementById('lw').addEventListener('input', e => {
        lineW = +e.target.value;
        document.getElementById('lwVal').textContent = lineW;
        draw();
    });
    document.getElementById('scheme').addEventListener('change', e => {
        schemeName = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
