<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Pipe Maze - Ribbonics</title>
    <meta name="description" content="Hexagonal pipe network with random pipe connections between hex edges — metallic pipes with a glowing fluid core flowing through the maze.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Hex Pipe Maze</h1>
        <p>Hexagonal tiles connected by metallic pipes with a luminous fluid core — random pipe routing creates an intricate glowing network.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Hex size <span class="value-display" id="sizeVal">50</span></label>
            <input type="range" id="size" min="24" max="100" value="50">
        </div>
        <div class="control-group">
            <label>Pipe width <span class="value-display" id="pwVal">10</span></label>
            <input type="range" id="pw" min="4" max="24" value="10">
        </div>
        <div class="control-group">
            <label>Fluid colour
                <select id="fluid">
                    <option value="cyan">Cyan</option>
                    <option value="magenta">Magenta</option>
                    <option value="amber">Amber</option>
                    <option value="green">Neon Green</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const FLUID_COLORS = {
        cyan:    { core: '#00f5ff', mid: '#0088aa', glow: 'rgba(0,245,255,0.35)' },
        magenta: { core: '#ff00ff', mid: '#aa0088', glow: 'rgba(255,0,255,0.35)' },
        amber:   { core: '#ffcc00', mid: '#aa6600', glow: 'rgba(255,204,0,0.35)'  },
        green:   { core: '#00ff88', mid: '#008844', glow: 'rgba(0,255,136,0.35)'  },
    };
    const METAL_DARK  = '#1a1a2a';
    const METAL_MID   = '#3a3a5a';
    const METAL_LIGHT = '#7a7a9a';
    const BG = '#0a0a14';

    let hexSize = 50;
    let pipeW = 10;
    let fluidName = 'cyan';
    let W, H;
    let pipes = [];    // {x1,y1,x2,y2}
    let hexCentres = [];
    let joints = [];   // {cx,cy} hex centres that have pipes

    function hexCorner(cx, cy, r, i) {
        const angle = Math.PI / 180 * (60 * i - 30); // flat-top hex
        return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        pipes = [];
        joints = [];
        hexCentres = [];

        const r = hexSize;
        const hw = r * Math.sqrt(3);       // flat-top hex width
        const hh = r * 2;                  // flat-top hex height
        const colStep = hw;
        const rowStep = hh * 0.75;

        const cols = Math.ceil(W / colStep) + 2;
        const rows = Math.ceil(H / rowStep) + 2;

        const jointSet = new Set();
        const pipeSet = new Set();

        for (let row = -1; row < rows; row++) {
            for (let col = -1; col < cols; col++) {
                const cx = col * colStep + (row % 2 === 0 ? 0 : hw / 2) + hw / 2;
                const cy = row * rowStep + r;
                hexCentres.push({ cx, cy });
            }
        }

        // Build pipes: for each hex, connect to a random subset of its 6 edge midpoints
        // then link pairs of edges through the centre
        for (const { cx, cy } of hexCentres) {
            if (cx < -r * 2 || cx > W + r * 2 || cy < -r * 2 || cy > H + r * 2) continue;

            const edgeMids = [];
            for (let i = 0; i < 6; i++) {
                const c0 = hexCorner(cx, cy, r, i);
                const c1 = hexCorner(cx, cy, r, (i + 1) % 6);
                edgeMids.push({ x: (c0.x + c1.x) / 2, y: (c0.y + c1.y) / 2 });
            }

            // Randomly pick 1 or 2 pairs of edges to connect through centre
            // Shuffle edge indices
            const indices = [0, 1, 2, 3, 4, 5];
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }

            const nPairs = Math.random() < 0.4 ? 1 : (Math.random() < 0.7 ? 2 : 3);
            for (let p = 0; p < nPairs && p * 2 + 1 < 6; p++) {
                const ia = indices[p * 2];
                const ib = indices[p * 2 + 1];
                const a = edgeMids[ia];
                const b = edgeMids[ib];

                // Pipe goes: edge midpoint A → hex centre → edge midpoint B
                const key1 = `${Math.round(a.x)},${Math.round(a.y)}-${Math.round(cx)},${Math.round(cy)}`;
                const key2 = `${Math.round(cx)},${Math.round(cy)}-${Math.round(b.x)},${Math.round(b.y)}`;
                if (!pipeSet.has(key1)) { pipes.push({ x1: a.x, y1: a.y, x2: cx, y2: cy }); pipeSet.add(key1); }
                if (!pipeSet.has(key2)) { pipes.push({ x1: cx, y1: cy, x2: b.x, y2: b.y }); pipeSet.add(key2); }
                jointSet.add(`${Math.round(cx)},${Math.round(cy)}`);
            }
        }

        for (const key of jointSet) {
            const [x, y] = key.split(',').map(Number);
            joints.push({ cx: x, cy: y });
        }
    }

    function drawPipe(x1, y1, x2, y2, fluid) {
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 1) return;

        // Metallic outer shell
        ctx.strokeStyle = METAL_DARK;
        ctx.lineWidth = pipeW + 4;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        ctx.strokeStyle = METAL_MID;
        ctx.lineWidth = pipeW;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // Highlight stripe
        ctx.strokeStyle = METAL_LIGHT;
        ctx.lineWidth = Math.max(1, pipeW * 0.25);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // Glow halo
        ctx.strokeStyle = fluid.glow;
        ctx.lineWidth = pipeW * 1.8;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // Fluid core
        ctx.strokeStyle = fluid.mid;
        ctx.lineWidth = Math.max(2, pipeW * 0.45);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        ctx.strokeStyle = fluid.core;
        ctx.lineWidth = Math.max(1, pipeW * 0.22);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }

    function drawJoint(cx, cy, fluid) {
        const jr = pipeW * 0.85;

        // Outer ring
        ctx.fillStyle = METAL_DARK;
        ctx.beginPath();
        ctx.arc(cx, cy, jr + 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = METAL_MID;
        ctx.beginPath();
        ctx.arc(cx, cy, jr, 0, Math.PI * 2);
        ctx.fill();

        // Glow
        ctx.fillStyle = fluid.glow;
        ctx.beginPath();
        ctx.arc(cx, cy, jr * 1.2, 0, Math.PI * 2);
        ctx.fill();

        // Core dot
        ctx.fillStyle = fluid.core;
        ctx.beginPath();
        ctx.arc(cx, cy, jr * 0.45, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const fluid = FLUID_COLORS[fluidName];

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Draw hex grid faintly
        ctx.strokeStyle = 'rgba(80,80,120,0.15)';
        ctx.lineWidth = 0.5;
        for (const { cx, cy } of hexCentres) {
            if (cx < -hexSize * 2 || cx > W + hexSize * 2 || cy < -hexSize * 2 || cy > H + hexSize * 2) continue;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const p = hexCorner(cx, cy, hexSize, i);
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        // Draw pipes
        for (const p of pipes) {
            drawPipe(p.x1, p.y1, p.x2, p.y2, fluid);
        }

        // Draw joints on top
        for (const j of joints) {
            drawJoint(j.cx, j.cy, fluid);
        }
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        hexSize = +e.target.value;
        document.getElementById('sizeVal').textContent = hexSize;
        regenerate();
    });
    document.getElementById('pw').addEventListener('input', e => {
        pipeW = +e.target.value;
        document.getElementById('pwVal').textContent = pipeW;
        draw();
    });
    document.getElementById('fluid').addEventListener('change', e => {
        fluidName = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
