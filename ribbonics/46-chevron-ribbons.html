<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron Ribbons - Ribbonics</title>
    <meta name="description" content="Zigzag chevron bands of alternating colours rendered as thick rounded ribbons with dark casing outlines, scrolling across the canvas.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Chevron Ribbons</h1>
        <p>Bold zigzag chevron bands sweep across the canvas, each stripe a thick rounded ribbon with a dark casing outline. Alternating palette colours create a crisp herringbone weave effect.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="bold">Bold</option>
                    <option value="candy">Candy Pop</option>
                    <option value="sunset">Sunset</option>
                    <option value="meadow">Meadow</option>
                    <option value="mono">Monochrome</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Band height <span class="value-display" id="heightVal">60</span></label>
            <input type="range" id="height" min="20" max="150" value="60">
        </div>
        <div class="control-group">
            <label>Zigzag depth <span class="value-display" id="depthVal">40</span></label>
            <input type="range" id="depth" min="10" max="100" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        bold:   ['#E63946','#2196F3','#4CAF50','#FF9800','#9C27B0','#00BCD4'],
        candy:  ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#FFA630'],
        sunset: ['#F72585','#7209B7','#4361EE','#F77F00','#FCBF49','#E63946'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#E9C46A'],
        mono:   ['#f0f0f0','#c0c0c0','#909090','#606060','#383838'],
    };
    const BG = '#11121e';
    const CASING = '#0a0a14';

    let bandHeight = 60;
    let zigzagDepth = 40;
    let paletteName = 'bold';
    let W, H;
    let bands = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const pal = PALETTES[paletteName];
        bands = [];
        // We arrange bands diagonally - each band is a ribbon running across
        // alternating up and down chevron peaks
        const totalBands = Math.ceil((H + zigzagDepth * 2) / bandHeight) + 4;
        for (let i = 0; i < totalBands; i++) {
            bands.push({
                index: i,
                color: pal[i % pal.length],
                yBase: (i - 2) * bandHeight,
            });
        }
    }

    // Draw a single chevron band as a filled path with rounded ribbon styling
    function drawChevronBand(yBase, bH, depth, color, lineW, isStroke) {
        // Build zigzag polyline: peaks alternate up/down
        // period = some fraction of W
        const period = Math.max(80, W / Math.ceil(W / 120));
        const nPeaks = Math.ceil(W / period) + 3;

        const points = [];
        for (let i = -1; i < nPeaks; i++) {
            const x = i * period;
            const peakY = i % 2 === 0 ? yBase - depth / 2 : yBase + depth / 2;
            points.push([x, peakY]);
        }

        if (isStroke) {
            ctx.strokeStyle = color;
            ctx.lineWidth = lineW;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(points[0][0], points[0][1] + bH / 2);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i][0], points[i][1] + bH / 2);
            }
            ctx.stroke();
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const ribbonWidth = bandHeight * 0.72;
        const casingWidth = ribbonWidth + Math.max(4, bandHeight * 0.12);

        // Draw all casings first
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casingWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const period = Math.max(80, W / Math.ceil(W / 120));

        for (const band of bands) {
            const nPeaks = Math.ceil(W / period) + 3;
            ctx.beginPath();
            for (let i = -1; i < nPeaks; i++) {
                const x = i * period;
                const peakY = i % 2 === 0
                    ? band.yBase - zigzagDepth / 2
                    : band.yBase + zigzagDepth / 2;
                if (i === -1) ctx.moveTo(x, peakY);
                else ctx.lineTo(x, peakY);
            }
            ctx.stroke();
        }

        // Draw all colored ribbons
        ctx.lineWidth = ribbonWidth;
        for (const band of bands) {
            const nPeaks = Math.ceil(W / period) + 3;
            ctx.strokeStyle = band.color;
            ctx.beginPath();
            for (let i = -1; i < nPeaks; i++) {
                const x = i * period;
                const peakY = i % 2 === 0
                    ? band.yBase - zigzagDepth / 2
                    : band.yBase + zigzagDepth / 2;
                if (i === -1) ctx.moveTo(x, peakY);
                else ctx.lineTo(x, peakY);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('height').addEventListener('input', e => { bandHeight = +e.target.value; document.getElementById('heightVal').textContent = bandHeight; regenerate(); });
    document.getElementById('depth').addEventListener('input', e => { zigzagDepth = +e.target.value; document.getElementById('depthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
