<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herringbone Ribbons - Ribbonics</title>
    <meta name="description" content="Herringbone parquet arrangement of rectangular ribbon segments in two alternating wood tones, with edge shading that gives each plank a 3D relief.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Herringbone Ribbons</h1>
        <p>Classic herringbone parquet: rectangular ribbon planks alternate direction in a V-pattern. Two contrasting wood tones plus top/shadow edge shading give each plank a sculpted relief effect.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Wood tones
                <select id="palette">
                    <option value="oak">Light &amp; Dark Oak</option>
                    <option value="walnut">Walnut &amp; Maple</option>
                    <option value="ebony">Ebony &amp; Ash</option>
                    <option value="color">Color Pop</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Plank width <span class="value-display" id="sizeVal">24</span></label>
            <input type="range" id="size" min="10" max="60" value="24">
        </div>
        <div class="control-group">
            <label>Plank length <span class="value-display" id="lenVal">3.0</span>×</label>
            <input type="range" id="len" min="15" max="50" value="30">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        oak:    { bg: '#1a1008', a: '#C49A5A', b: '#8B6030', edge: '#3a2008', hi: '#E8C080' },
        walnut: { bg: '#0e0b07', a: '#6B3A1A', b: '#C4A060', edge: '#200c04', hi: '#D4B070' },
        ebony:  { bg: '#060606', a: '#1a1a1a', b: '#C0C0A8', edge: '#000000', hi: '#E0E0D0' },
        color:  { bg: '#0d0820', a: '#2255AA', b: '#CC4422', edge: '#030212', hi: '#88AAFF' }
    };

    let plankW = 24;
    let plankRatio = 3.0;
    let paletteName = 'oak';
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function drawPlank(x, y, w, h, colorA, colorB, edgeCol, hiCol, isHorizontal) {
        // Fill
        ctx.fillStyle = colorA;
        ctx.fillRect(x, y, w, h);

        // Grain lines (subtle)
        ctx.strokeStyle = colorB;
        ctx.lineWidth = Math.max(0.5, (isHorizontal ? h : w) * 0.08);
        ctx.globalAlpha = 0.4;
        if (isHorizontal) {
            const step = h / 4;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(x + w * 0.05, y + i * step);
                ctx.lineTo(x + w * 0.95, y + i * step);
                ctx.stroke();
            }
        } else {
            const step = w / 4;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(x + i * step, y + h * 0.05);
                ctx.lineTo(x + i * step, y + h * 0.95);
                ctx.stroke();
            }
        }
        ctx.globalAlpha = 1;

        // Edge highlight (top/left)
        const e = Math.max(1.5, Math.min(w, h) * 0.1);
        ctx.fillStyle = hiCol;
        ctx.globalAlpha = 0.45;
        ctx.fillRect(x, y, w, e);      // top
        ctx.fillRect(x, y, e, h);      // left
        ctx.globalAlpha = 1;

        // Edge shadow (bottom/right)
        ctx.fillStyle = edgeCol;
        ctx.globalAlpha = 0.6;
        ctx.fillRect(x, y + h - e, w, e);  // bottom
        ctx.fillRect(x + w - e, y, e, h);  // right
        ctx.globalAlpha = 1;

        // Border
        ctx.strokeStyle = edgeCol;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);

        const pw = plankW;
        const pl = Math.round(pw * plankRatio);

        // Herringbone unit: 2×2 blocks of 4 planks arranged in L-shapes
        // Unit size = 2*pl × 2*pl
        // Within each unit, 4 planks: 2 horizontal (top-left & bottom-right), 2 vertical (top-right & bottom-left)
        const unitW = 2 * pl;
        const unitH = 2 * pl;

        const cols = Math.ceil(W / unitW) + 2;
        const rows = Math.ceil(H / unitH) + 2;

        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                const ox = c * unitW;
                const oy = r * unitH;
                const flip = (c + r) % 2 === 0;
                const colorA = flip ? pal.a : pal.b;
                const colorB = flip ? pal.b : pal.a;

                // Plank 1: horizontal top-left (y=oy, x=ox, w=pl, h=pw)
                drawPlank(ox, oy, pl, pw, colorA, colorB, pal.edge, pal.hi, true);
                // Plank 2: horizontal below (y=oy+pw, x=ox, w=pl, h=pw) — 2nd in pair
                drawPlank(ox, oy + pw, pl, pw, colorA, colorB, pal.edge, pal.hi, true);

                // Plank 3: vertical top-right (x=ox+pl, y=oy, w=pw, h=pl)
                drawPlank(ox + pl, oy, pw, pl, colorB, colorA, pal.edge, pal.hi, false);
                // Plank 4: vertical right (x=ox+pl+pw, y=oy, w=pw, h=pl)
                drawPlank(ox + pl + pw, oy, pw, pl, colorB, colorA, pal.edge, pal.hi, false);

                // Plank 5: horizontal bottom-left (y=oy+pl, x=ox, w=pl, h=pw)
                drawPlank(ox, oy + pl, pl, pw, colorB, colorA, pal.edge, pal.hi, true);
                drawPlank(ox, oy + pl + pw, pl, pw, colorB, colorA, pal.edge, pal.hi, true);

                // Plank 6: vertical bottom-right
                drawPlank(ox + pl, oy + pl, pw, pl, colorA, colorB, pal.edge, pal.hi, false);
                drawPlank(ox + pl + pw, oy + pl, pw, pl, colorA, colorB, pal.edge, pal.hi, false);
            }
        }
    }

    function regenerate() { resize(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        plankW = +e.target.value;
        document.getElementById('sizeVal').textContent = plankW;
        draw();
    });
    document.getElementById('len').addEventListener('input', e => {
        plankRatio = +e.target.value / 10;
        document.getElementById('lenVal').textContent = plankRatio.toFixed(1);
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
