<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi Ribbon Borders - Ribbonics</title>
    <meta name="description" content="Random seed points generate a Voronoi diagram; the borders between cells are drawn as thick rounded coloured ribbons forming an organic woven network.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0c0d14;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Voronoi Ribbon Borders</h1>
        <p>Random seed points divide the plane into Voronoi cells. The borders between neighbouring cells are traced as thick rounded coloured ribbons, making the cell walls read as a woven organic network.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="vivid">Vivid</option>
                    <option value="neon">Neon</option>
                    <option value="meadow">Meadow</option>
                    <option value="dusk">Dusk</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Num sites <span class="value-display" id="nsVal">40</span></label>
            <input type="range" id="ns" min="8" max="120" value="40">
        </div>
        <div class="control-group">
            <label>Border width <span class="value-display" id="bwVal">14</span>px</label>
            <input type="range" id="bw" min="4" max="40" value="14">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        vivid:  ['#E63946','#2A9D8F','#E9C46A','#264653','#F4A261','#6A0572','#43AA8B','#F72585'],
        neon:   ['#FF00FF','#00FFFF','#FF4400','#00FF88','#FFFF00','#FF0055','#44FFFF','#FF8800'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A','#3A5A40'],
        dusk:   ['#F72585','#7209B7','#3A0CA3','#4361EE','#4CC9F0','#B5179E','#560BAD','#480CA8']
    };
    const BG = '#0c0d14';
    const CASING = '#07080f';

    let numSites = 40, borderW = 14, paletteName = 'vivid';
    let W, H, sites = [], siteColors = [];
    // Edge map: for each pair of adjacent sites, store the border edge
    let edges = []; // { x1,y1,x2,y2, color }

    const GRID = 8; // resolution for nearest-site computation

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const pal = PALETTES[paletteName];
        sites = [];
        siteColors = [];
        for (let i = 0; i < numSites; i++) {
            sites.push({ x: Math.random() * W, y: Math.random() * H });
            siteColors.push(pal[i % pal.length]);
        }

        // Build nearest-site map on a coarse grid
        const gCols = Math.ceil(W / GRID) + 1;
        const gRows = Math.ceil(H / GRID) + 1;
        const nearest = new Int32Array(gCols * gRows);

        for (let gy = 0; gy < gRows; gy++) {
            for (let gx = 0; gx < gCols; gx++) {
                const px = gx * GRID, py = gy * GRID;
                let best = 0, bestD = Infinity;
                for (let i = 0; i < sites.length; i++) {
                    const d = (px - sites[i].x) ** 2 + (py - sites[i].y) ** 2;
                    if (d < bestD) { bestD = d; best = i; }
                }
                nearest[gy * gCols + gx] = best;
            }
        }

        // Find edges: adjacent grid cells with different site ownership
        const edgeSet = new Map(); // key: "minSite_maxSite" -> segments list
        for (let gy = 0; gy < gRows; gy++) {
            for (let gx = 0; gx < gCols; gx++) {
                const a = nearest[gy * gCols + gx];
                // Check right neighbor
                if (gx + 1 < gCols) {
                    const b = nearest[gy * gCols + gx + 1];
                    if (a !== b) {
                        const key = Math.min(a, b) + '_' + Math.max(a, b);
                        if (!edgeSet.has(key)) edgeSet.set(key, { siteA: a, siteB: b, pts: [] });
                        edgeSet.get(key).pts.push({ x: (gx + 0.5) * GRID, y: gy * GRID });
                    }
                }
                // Check bottom neighbor
                if (gy + 1 < gRows) {
                    const b = nearest[(gy + 1) * gCols + gx];
                    if (a !== b) {
                        const key = Math.min(a, b) + '_' + Math.max(a, b);
                        if (!edgeSet.has(key)) edgeSet.set(key, { siteA: a, siteB: b, pts: [] });
                        edgeSet.get(key).pts.push({ x: gx * GRID, y: (gy + 0.5) * GRID });
                    }
                }
            }
        }

        // Convert edge point clouds to polylines by finding bounding segment
        edges = [];
        for (const [, edge] of edgeSet) {
            if (edge.pts.length < 2) continue;
            // Sort points along the edge direction
            const pts = edge.pts;
            // Find min/max extent
            let minX = pts[0].x, maxX = pts[0].x, minY = pts[0].y, maxY = pts[0].y;
            for (const p of pts) {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            }
            // Use midpoint of border zone
            const mx = (minX + maxX) / 2;
            const my = (minY + maxY) / 2;
            // Sort by projection along longest axis
            const dx = maxX - minX, dy = maxY - minY;
            pts.sort((a, b) => (a.x * dx + a.y * dy) - (b.x * dx + b.y * dy));

            // Assign color: mix of the two site colors
            const cA = siteColors[edge.siteA];
            const cB = siteColors[edge.siteB];
            // Use site A's color (could alternate or mix)
            const color = siteColors[(edge.siteA + edge.siteB) % siteColors.length];

            edges.push({ pts, color });
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        // Draw site fills first (subtle)
        const pal = PALETTES[paletteName];
        for (let i = 0; i < sites.length; i++) {
            // We don't have polygon shapes; just skip the fill
        }

        const cw = borderW + 4;

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = cw;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        for (const edge of edges) {
            if (edge.pts.length < 2) continue;
            ctx.beginPath();
            ctx.moveTo(edge.pts[0].x, edge.pts[0].y);
            for (let i = 1; i < edge.pts.length; i++) ctx.lineTo(edge.pts[i].x, edge.pts[i].y);
            ctx.stroke();
        }

        // Colour pass
        ctx.lineWidth = borderW;
        for (const edge of edges) {
            if (edge.pts.length < 2) continue;
            ctx.strokeStyle = edge.color;
            ctx.beginPath();
            ctx.moveTo(edge.pts[0].x, edge.pts[0].y);
            for (let i = 1; i < edge.pts.length; i++) ctx.lineTo(edge.pts[i].x, edge.pts[i].y);
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('ns').addEventListener('input', e => {
        numSites = +e.target.value;
        document.getElementById('nsVal').textContent = numSites;
        regenerate();
    });
    document.getElementById('bw').addEventListener('input', e => {
        borderW = +e.target.value;
        document.getElementById('bwVal').textContent = borderW;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
