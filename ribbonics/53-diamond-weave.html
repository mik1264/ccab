<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Weave - Ribbonics</title>
    <meta name="description" content="A 45°-rotated diamond-grid Truchet ribbon weave with an argyle feel — interleaved coloured ribbons arc through diamond-shaped tiles.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Diamond Weave</h1>
        <p>Standard Truchet arc tiles drawn on a 45°-rotated diamond grid. Ribbons arc through rhombus cells, creating an interlocked argyle-like weave with deep casing outlines.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="argyle">Argyle Classic</option>
                    <option value="jewel">Jewel Tones</option>
                    <option value="pastel">Pastel Diamond</option>
                    <option value="dark">Dark Luxe</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Diamond size <span class="value-display" id="sizeVal">70</span></label>
            <input type="range" id="size" min="32" max="130" value="70">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="18" max="62" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        argyle: ['#8B1C3A', '#1C3A8B', '#2E7D4F', '#8B6B1C', '#6B1C8B'],
        jewel:  ['#C0392B', '#2980B9', '#27AE60', '#8E44AD', '#D35400'],
        pastel: ['#E88A9A', '#8AACE8', '#8AE8A0', '#E8D48A', '#C08AE8'],
        dark:   ['#7C1A3A', '#1A3C7C', '#1A6B3A', '#7C5A1A', '#5A1A7C']
    };
    const BG = '#0e0e18';
    const CASING = '#09090f';

    let tileSize = 70;
    let widthPct = 0.38;
    let paletteName = 'argyle';
    let W, H;
    let cells = [];
    let arcData = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        // Diamond grid: offset rows
        // Each diamond has half-size = tileSize/2
        // Centers at (c + 0.5*(r%2)) * tileSize, r * tileSize * 0.5 * sqrt(2)
        // We rotate the Truchet: each "tile" is a rotated square.
        // Simpler approach: use standard grid but rotate canvas 45° per tile center.
        // Actually: tile a rotated grid.
        // Diamond cell centers: use isometric layout
        const half = tileSize / 2;
        const step = tileSize; // spacing along both diagonal axes
        // Axis vectors: (1,1)/sqrt(2)*step and (1,-1)/sqrt(2)*step
        const ax = half, ay = half;  // axis A step
        const bx = half, by = -half; // axis B step

        cells = [];
        arcData = [];

        // How many diamonds we need in each axis direction
        const nA = Math.ceil((W + H) / step) + 2;
        const nB = Math.ceil((W + H) / step) + 2;
        const originX = -tileSize;
        const originY = H / 2;

        const pal = PALETTES[paletteName];
        let colorIdx = 0;

        for (let a = -2; a < nA; a++) {
            for (let b = -nB / 2; b < nB / 2; b++) {
                const cx = originX + a * ax + b * bx;
                const cy = originY + a * ay + b * by;
                if (cx < -tileSize || cx > W + tileSize || cy < -tileSize || cy > H + tileSize) continue;
                const config = Math.random() < 0.5 ? 0 : 1;
                // Two arcs per diamond tile, corners at: top=(cx,cy-half), right=(cx+half,cy), bottom=(cx,cy+half), left=(cx-half,cy)
                // Config 0: connect top-left and bottom-right (two arcs at those corners)
                // Config 1: connect top-right and bottom-left
                const color = pal[colorIdx++ % pal.length];
                if (config === 0) {
                    // Arc at top-left corner (cx-half, cy-half rotated) — center of arc at left vertex
                    arcData.push({ cx: cx - half, cy,    r: half, a0: -Math.PI/4, a1: Math.PI/4,        color, rot: Math.PI/4 });
                    arcData.push({ cx: cx + half, cy,    r: half, a0: Math.PI*3/4, a1: Math.PI*5/4,     color, rot: Math.PI/4 });
                } else {
                    arcData.push({ cx: cx, cy: cy - half, r: half, a0: Math.PI/4, a1: Math.PI*3/4,   color, rot: Math.PI/4 });
                    arcData.push({ cx: cx, cy: cy + half, r: half, a0: -Math.PI*3/4, a1: -Math.PI/4, color, rot: Math.PI/4 });
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const rw = Math.max(4, tileSize * widthPct);
        const cw = rw + Math.max(3, tileSize * 0.10);

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = cw;
        ctx.beginPath();
        for (const a of arcData) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Color pass
        ctx.lineWidth = rw;
        const byColor = {};
        for (const a of arcData) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
