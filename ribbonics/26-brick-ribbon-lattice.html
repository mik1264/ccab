<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Ribbon Lattice - Ribbonics</title>
    <meta name="description" content="An offset brick grid of interlocking rounded-rectangle ribbon segments forming a woven lattice with alternating over/under passes.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Brick Ribbon Lattice</h1>
        <p>An offset brick grid of interlocking rounded-rectangle ribbon segments. Horizontal ribbons weave over and under vertical ribbons, forming a woven lattice where each brick course is staggered by half a brick.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="vivid">Vivid</option>
                    <option value="terracotta">Terracotta</option>
                    <option value="jewel">Jewel</option>
                    <option value="pastel">Pastel</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Brick width <span class="value-display" id="bwVal">80</span>px</label>
            <input type="range" id="bw" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="rwVal">38</span>%</label>
            <input type="range" id="rw" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        vivid:      ['#E63946','#2A9D8F','#E9C46A','#264653','#F4A261','#6A0572','#43AA8B'],
        terracotta: ['#BC6C25','#DDA15E','#8A9A5B','#606C38','#E9C46A','#A07850','#D4956A'],
        jewel:      ['#9B2335','#1B4F72','#1D6A3D','#7D3C98','#B7770D','#145A32','#6C3483'],
        pastel:     ['#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF','#D5BAFF','#FFBAEC']
    };
    const CASING = '#0e0f1a';

    let brickW = 80;
    let brickH, ribbonPct = 0.38, paletteName = 'vivid';
    let W, H;
    let segments = []; // {x,y,w,h,r, layer, color}

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        brickH = Math.round(brickW * 0.5);
        const pal = PALETTES[paletteName];
        segments = [];

        const rw = brickW * ribbonPct;
        const rh = brickH * ribbonPct;
        const rad = Math.min(rw, rh) * 0.45;

        // Horizontal ribbons (layer 1): run full width, cut by vertical gaps
        const hRows = Math.ceil(H / brickH) + 2;
        const vCols = Math.ceil(W / brickW) + 2;

        // Color per horizontal ribbon row (even) and vertical column (odd)
        // We'll assign colors per row/column index
        const hColors = [];
        for (let row = 0; row <= hRows; row++) hColors.push(pal[row % pal.length]);
        const vColors = [];
        for (let col = 0; col <= vCols; col++) vColors.push(pal[(col + 3) % pal.length]);

        // Vertical ribbon segments (drawn first = under)
        for (let col = 0; col <= vCols; col++) {
            const x = col * brickW;
            const color = vColors[col];
            for (let row = -1; row <= hRows; row++) {
                // Offset every other column by half brickH for the brick stagger
                const yBase = row * brickH;
                segments.push({
                    x: x - rw / 2, y: yBase, w: rw, h: brickH,
                    r: rad, layer: 0, color
                });
            }
        }

        // Horizontal ribbon segments (drawn on top = over), staggered brick offset
        for (let row = -1; row <= hRows; row++) {
            const y = row * brickH;
            const offset = (row % 2 !== 0) ? brickW * 0.5 : 0;
            const color = hColors[row + 1];
            for (let col = -1; col <= vCols + 1; col++) {
                const x = col * brickW - offset;
                segments.push({
                    x: x, y: y - rh / 2, w: brickW, h: rh,
                    r: rad, layer: 1, color
                });
            }
        }
    }

    function roundRect(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
    }

    function draw() {
        ctx.fillStyle = '#1a1b2e';
        ctx.fillRect(0, 0, W, H);

        // Draw casing for all, then fill
        const casingInset = -3;
        // Under-layer casing
        for (const s of segments.filter(s => s.layer === 0)) {
            ctx.fillStyle = CASING;
            roundRect(s.x - casingInset, s.y - casingInset, s.w + casingInset * 2, s.h + casingInset * 2, s.r + 2);
            ctx.fill();
            ctx.fillStyle = s.color;
            roundRect(s.x, s.y, s.w, s.h, s.r);
            ctx.fill();
        }
        // Over-layer casing
        for (const s of segments.filter(s => s.layer === 1)) {
            ctx.fillStyle = CASING;
            roundRect(s.x - casingInset, s.y - casingInset, s.w + casingInset * 2, s.h + casingInset * 2, s.r + 2);
            ctx.fill();
            ctx.fillStyle = s.color;
            roundRect(s.x, s.y, s.w, s.h, s.r);
            ctx.fill();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('bw').addEventListener('input', e => {
        brickW = +e.target.value;
        document.getElementById('bwVal').textContent = brickW;
        regenerate();
    });
    document.getElementById('rw').addEventListener('input', e => {
        ribbonPct = +e.target.value / 100;
        document.getElementById('rwVal').textContent = e.target.value;
        build(); draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
