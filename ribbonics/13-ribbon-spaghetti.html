<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribbon Spaghetti - Ribbonics</title>
    <meta name="description" content="Dense multicoloured Truchet loops on a white background using very thin ribbons, creating a tangled spaghetti of interlocking coloured threads.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(250, 250, 255, 0.92);
            color: #222;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #c0392b; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #555; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(250, 250, 255, 0.92);
            color: #222;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #555; }
        .control-group input[type="range"] { width: 100%; accent-color: #c0392b; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(0,0,0,0.04); color: #222;
            border: 1px solid rgba(0,0,0,0.18); border-radius: 6px;
        }
        .control-group option { background: #fff; }
        .value-display { float: right; color: #c0392b; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #8e44ad, #c0392b);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Ribbon Spaghetti</h1>
        <p>Hundreds of tiny Truchet tiles pack the canvas with thin looping ribbons in a vivid rainbow palette, creating a dense tangle of coloured spaghetti strands.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">22</span></label>
            <input type="range" id="size" min="8" max="60" value="22">
        </div>
        <div class="control-group">
            <label>Thread width <span class="value-display" id="wVal">28</span>%</label>
            <input type="range" id="width" min="10" max="55" value="28">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="rainbow">Rainbow</option>
                    <option value="pastel">Pastel</option>
                    <option value="neon">Neon</option>
                    <option value="earth">Earth</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        rainbow: ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e84393','#00bcd4'],
        pastel:  ['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff','#e8baff','#ffd1dc','#b5ead7','#c7ceea'],
        neon:    ['#ff0090','#00ffb0','#ffee00','#8855ff','#00fff7','#ff6600','#00ff44'],
        earth:   ['#8d6e63','#a1887f','#6d4c41','#bf8a60','#d4a96a','#795548','#5d4037','#4e342e'],
    };

    let tileSize = 22;
    let widthPct = 0.28;
    let paletteName = 'rainbow';
    let W, H, cols, rows;
    let cells = [];
    let arcs = [];
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);

        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        arcs = [];
        const s = tileSize, rad = s / 2;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r + 1), left = v(c, r), right = v(c + 1, r);
                const config = cells[r * cols + c];
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI/2,     n1: top,    n2: left  },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI*1.5,   n1: bottom, n2: right }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI/2,     a1: Math.PI,       n1: top,    n2: right },
                        { cx: x0,     cy: y0 + s, a0: Math.PI*1.5,   a1: Math.PI*2,     n1: bottom, n2: left  }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1 });
                }
            }
        }

        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = Math.floor(Math.random() * pal.length);
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(1.5, tileSize * widthPct);
        const casing = fill + Math.max(1.5, tileSize * 0.08);

        // Casing (very subtle grey on white)
        ctx.strokeStyle = 'rgba(200,200,200,0.6)';
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Coloured threads
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('wVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
