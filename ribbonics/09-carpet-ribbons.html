<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpet Ribbons - Ribbonics</title>
    <meta name="description" content="A square ribbon weave of thick pastel ribbons with a decorative fabric-like border frame — warm palette Truchet arcs resembling a woven carpet or kilim rug.">
    <meta name="theme-color" content="#F4ECD8">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F4ECD8;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Carpet Ribbons</h1>
        <p>Thick pastel Truchet ribbon loops woven in a square grid with a decorative kilim-inspired border frame — like a colourful hand-knotted carpet seen from above.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="kilim">Kilim Warm</option>
                    <option value="pastel">Pastel Soft</option>
                    <option value="nordic">Nordic Cool</option>
                    <option value="aztec">Aztec Bold</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">68</span></label>
            <input type="range" id="size" min="28" max="130" value="68">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">46</span>%</label>
            <input type="range" id="width" min="25" max="70" value="46">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        kilim:  ['#BC6C25','#DDA15E','#E9C46A','#606C38','#8A9A5B','#A3B18A','#9B2335'],
        pastel: ['#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF','#D4BAFF','#FFB3E6'],
        nordic: ['#5E8A9E','#8FB8C8','#C7DDE8','#2E4057','#048A81','#54C6EB','#EEF5DB'],
        aztec:  ['#C0392B','#E67E22','#F1C40F','#27AE60','#2980B9','#8E44AD','#ECF0F1']
    };
    const BG      = '#F4ECD8';
    const CASING  = '#3d2a14';
    const BORDER_DARK  = '#3d2a14';
    const BORDER_MID   = '#8A6040';

    let tileSize = 68;
    let widthPct = 0.46;
    let paletteName = 'kilim';
    let W, H;
    let arcList = [];

    function makeUF() {
        const p = {};
        const find = k => { if(p[k]===undefined)p[k]=k; if(p[k]!==k)p[k]=find(p[k]); return p[k]; };
        const union = (a,b)=>{ p[find(a)]=find(b); };
        return {find,union};
    }

    function build() {
        arcList = [];
        const uf = makeUF();

        // Leave a border margin for the decorative frame
        const border = Math.round(tileSize * 1.2);
        const s = tileSize;

        const x0 = border, y0 = border;
        const aW = W - 2*border, aH = H - 2*border;
        if (aW <= 0 || aH <= 0) return;

        const cols = Math.ceil(aW / s) + 1;
        const rows = Math.ceil(aH / s) + 1;

        const h = (c, r) => 'h_'+c+'_'+r;
        const v = (c, r) => 'v_'+c+'_'+r;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tx = x0 + c * s, ty = y0 + r * s;
                const cfg = Math.random() < 0.5 ? 0 : 1;
                const rad = s / 2;
                const top = h(c,r), bot = h(c,r+1), lft = v(c,r), rgt = v(c+1,r);

                if (cfg === 0) {
                    uf.union(top, lft); uf.union(bot, rgt);
                    arcList.push({ cx: tx,     cy: ty,     r: rad, a0: 0,          a1: Math.PI/2,   n1: top });
                    arcList.push({ cx: tx+s,   cy: ty+s,   r: rad, a0: Math.PI,    a1: Math.PI*1.5, n1: bot });
                } else {
                    uf.union(top, rgt); uf.union(bot, lft);
                    arcList.push({ cx: tx+s,   cy: ty,     r: rad, a0: Math.PI/2,  a1: Math.PI,     n1: top });
                    arcList.push({ cx: tx,     cy: ty+s,   r: rad, a0: Math.PI*1.5,a1: Math.PI*2,   n1: bot });
                }
            }
        }

        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function drawBorderFrame() {
        const b = Math.round(tileSize * 1.2);
        const lw1 = Math.max(4, tileSize * 0.08);
        const lw2 = Math.max(2, tileSize * 0.04);
        const lw3 = Math.max(6, tileSize * 0.12);

        // Outer solid border fill
        const pal = PALETTES[paletteName];
        const borderColor = pal[0];

        // Fill the border region with a warm background
        ctx.fillStyle = pal[pal.length - 1];
        // Top band
        ctx.fillRect(0, 0, W, b);
        // Bottom band
        ctx.fillRect(0, H - b, W, b);
        // Left band
        ctx.fillRect(0, 0, b, H);
        // Right band
        ctx.fillRect(W - b, 0, b, H);

        // Draw geometric border pattern: series of rectangles
        const step = b / 3;
        ctx.lineJoin = 'miter';

        // Outer dark border line
        ctx.strokeStyle = BORDER_DARK;
        ctx.lineWidth = lw1;
        ctx.strokeRect(lw1/2, lw1/2, W - lw1, H - lw1);

        // Middle decorative band - zigzag using small squares in alternating colours
        const zigH = step;
        const zigY1 = b - step * 2;
        const zigY2 = H - b + step;
        const cols = Math.ceil(W / zigH);

        for (let i = 0; i < cols; i++) {
            const col = pal[i % pal.length];
            const col2 = pal[(i+1) % pal.length];
            const x = i * zigH;
            // Top band squares
            ctx.fillStyle = (i % 2 === 0) ? col : col2;
            ctx.fillRect(x, zigY1, zigH, zigH);
            // Bottom band squares
            ctx.fillStyle = (i % 2 !== 0) ? col : col2;
            ctx.fillRect(x, zigY2, zigH, zigH);
        }
        const rows = Math.ceil(H / zigH);
        for (let i = 0; i < rows; i++) {
            const col = pal[i % pal.length];
            const col2 = pal[(i+1) % pal.length];
            const y = i * zigH;
            const zigX1 = b - step * 2;
            const zigX2 = W - b + step;
            ctx.fillStyle = (i % 2 === 0) ? col : col2;
            ctx.fillRect(zigX1, y, zigH, zigH);
            ctx.fillStyle = (i % 2 !== 0) ? col : col2;
            ctx.fillRect(zigX2, y, zigH, zigH);
        }

        // Inner border lines (on top of pattern)
        ctx.strokeStyle = BORDER_DARK;
        ctx.lineWidth = lw3;
        const m = b;
        ctx.strokeRect(m - lw3/2, m - lw3/2, W - 2*m + lw3, H - 2*m + lw3);

        // Second inner line
        ctx.strokeStyle = BORDER_MID;
        ctx.lineWidth = lw2;
        const m2 = b - step;
        ctx.strokeRect(m2, m2, W - 2*m2, H - 2*m2);
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        // Draw ribbon weave
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(4, tileSize * 0.10);

        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) {
            ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color]||[]).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }

        // Draw decorative border frame on top
        drawBorderFrame();
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
