<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ribbon Tubes - Ribbonics</title>
    <meta name="description" content="Truchet ribbons rendered as luminous neon tubes on a dark background using canvas glow shadows. Cyan, magenta, and lime ribbons pulse with electric light.">
    <meta name="theme-color" content="#11121e">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #060810;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(6, 8, 16, 0.85);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #00fff7; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(6, 8, 16, 0.85);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #00fff7; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #111; }
        .value-display { float: right; color: #00fff7; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #0a3a6e, #00fff7);
            color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.12); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Neon Ribbon Tubes</h1>
        <p>Truchet quarter-circle arcs become luminous neon tubes on a deep-dark background. Multiple glow passes build up electric cyan, magenta, and lime halos around each ribbon.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="32" max="140" value="72">
        </div>
        <div class="control-group">
            <label>Glow radius <span class="value-display" id="glowVal">18</span></label>
            <input type="range" id="glow" min="4" max="40" value="18">
        </div>
        <div class="control-group">
            <label>Tube width <span class="value-display" id="tubeVal">30</span>%</label>
            <input type="range" id="tube" min="15" max="60" value="30">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const NEON_PALETTES = [
        ['#00fff7','#ff00c8','#aaff00','#ff6600','#00cfff'],
        ['#ff0090','#00ffb0','#ffee00','#8855ff'],
        ['#ff2255','#00ffff','#ffaa00','#44ff44'],
    ];

    let tileSize = 72;
    let glowRadius = 18;
    let tubePct = 0.30;
    let W, H, cols, rows;
    let cells = [];
    let arcs = [];
    let paletteIdx = 0;
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);
        paletteIdx = Math.floor(Math.random() * NEON_PALETTES.length);

        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        arcs = [];
        const s = tileSize, rad = s / 2;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r + 1), left = v(c, r), right = v(c + 1, r);
                const config = cells[r * cols + c];
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,     n1: top,    n2: left  },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5,   n1: bottom, n2: right }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI,         n1: top,    n2: right },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,     n1: bottom, n2: left  }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1 });
                }
            }
        }

        const pal = NEON_PALETTES[paletteIdx];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function drawArcs(arcs) {
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
    }

    function draw() {
        ctx.fillStyle = '#060810';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(3, tileSize * tubePct);

        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);

        // Dark core casing
        ctx.strokeStyle = '#000';
        ctx.lineWidth = fill + 6;
        ctx.shadowBlur = 0;
        for (const col in byColor) { drawArcs(byColor[col]); ctx.stroke(); }

        // Outer wide glow pass
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.lineWidth = fill + 2;
            ctx.shadowColor = col;
            ctx.shadowBlur = glowRadius * 2.5;
            drawArcs(byColor[col]);
            ctx.stroke();
        }

        // Mid glow pass
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.lineWidth = fill * 0.55;
            ctx.shadowColor = col;
            ctx.shadowBlur = glowRadius;
            drawArcs(byColor[col]);
            ctx.stroke();
        }

        // Bright core pass
        for (const col in byColor) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = Math.max(1.5, fill * 0.20);
            ctx.shadowColor = col;
            ctx.shadowBlur = glowRadius * 0.5;
            drawArcs(byColor[col]);
            ctx.stroke();
        }

        ctx.shadowBlur = 0;
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('glow').addEventListener('input', e => {
        glowRadius = +e.target.value;
        document.getElementById('glowVal').textContent = glowRadius;
        draw();
    });
    document.getElementById('tube').addEventListener('input', e => {
        tubePct = +e.target.value / 100;
        document.getElementById('tubeVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
