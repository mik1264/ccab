<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woven Mat - Ribbonics</title>
    <meta name="description" content="Straight over/under warp and weft ribbons in natural fibre tones, with per-strand shading and fringed edges evoking a hand-woven mat.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #e8d5a3;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Woven Mat</h1>
        <p>Horizontal warp and vertical weft strands interleave in plain, twill, or basket weave. Each strand has subtle shading to simulate fibre texture, and fringed ends dangle from the mat edges.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Weave pattern
                <select id="weave">
                    <option value="plain">Plain (1/1)</option>
                    <option value="twill2">Twill (2/2)</option>
                    <option value="basket">Basket (2×2)</option>
                    <option value="satin4">Satin (4/1)</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Strand width <span class="value-display" id="strandVal">28</span></label>
            <input type="range" id="strand" min="10" max="60" value="28">
        </div>
        <div class="control-group">
            <label>Fringe length <span class="value-display" id="fringeVal">40</span></label>
            <input type="range" id="fringe" min="0" max="100" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let strandW = 28;
    let fringeLen = 40;
    let weavePattern = 'plain';
    let W, H;

    // Natural fibre palette
    const WARP_COLORS = [
        '#C49A6C', '#B5873A', '#D4B483', '#A0784A', '#C8AA74',
        '#8B6B3D', '#DEC591', '#BF9050', '#E8D5A3', '#9E7140'
    ];
    const WEFT_COLORS = [
        '#7D5C3A', '#966B3E', '#5E4020', '#8C6535', '#6B4A28',
        '#A07848', '#4E3018', '#B58C50', '#3D2510', '#C49A6C'
    ];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Determine if weft is over warp at intersection (col, row)
    function weftOver(col, row) {
        switch (weavePattern) {
            case 'plain':
                return (col + row) % 2 === 0;
            case 'twill2':
                return ((col - row + 100) % 2 < 1);
            case 'basket':
                return (Math.floor(col / 2) + Math.floor(row / 2)) % 2 === 0;
            case 'satin4':
                return (col * 2 + row) % 5 === 0;
            default:
                return (col + row) % 2 === 0;
        }
    }

    let warpData = [], weftData = [];

    function build() {
        const gap = strandW * 0.12;
        const pitch = strandW + gap;

        // Mat bounds (leave room for fringe)
        const margin = fringeLen + pitch;
        const matL = margin;
        const matT = margin;
        const matR = W - margin;
        const matB = H - margin;

        const numWarp = Math.floor((matR - matL) / pitch) + 1;
        const numWeft = Math.floor((matB - matT) / pitch) + 1;

        warpData = [];
        for (let i = 0; i < numWarp; i++) {
            const x = matL + i * pitch + strandW / 2;
            const baseColor = WARP_COLORS[i % WARP_COLORS.length];
            // Add subtle hue variation per strand
            warpData.push({ x, color: baseColor, index: i });
        }

        weftData = [];
        for (let j = 0; j < numWeft; j++) {
            const y = matT + j * pitch + strandW / 2;
            const baseColor = WEFT_COLORS[j % WEFT_COLORS.length];
            weftData.push({ y, color: baseColor, index: j });
        }
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return [r, g, b];
    }

    function shade(hex, factor) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
    }

    function drawStrandSegment(x0, y0, x1, y1, color, w, above) {
        // Draw a segment with shading: lighter top, darker bottom
        const gx = (x0 + x1) / 2;
        const gy = (y0 + y1) / 2;
        const isH = Math.abs(y1 - y0) < Math.abs(x1 - x0);

        // Shadow/highlight
        const shadowOffset = w * 0.25;

        if (above) {
            // Draw shadow under
            ctx.strokeStyle = shade(color, 0.55);
            ctx.lineWidth = w + shadowOffset * 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.stroke();
        }

        // Main strand body
        ctx.strokeStyle = color;
        ctx.lineWidth = w;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();

        // Highlight
        if (above) {
            ctx.strokeStyle = shade(color, 1.3);
            ctx.lineWidth = w * 0.3;
            ctx.lineCap = 'butt';
            ctx.globalAlpha = 0.5;
            if (isH) {
                ctx.beginPath();
                ctx.moveTo(x0, y0 - w * 0.2);
                ctx.lineTo(x1, y1 - w * 0.2);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(x0 - w * 0.2, y0);
                ctx.lineTo(x1 - w * 0.2, y1);
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
        }
    }

    function drawFringe(x, y, horizontal, color) {
        if (fringeLen < 3) return;
        const numStrands = 3 + Math.floor(Math.random() * 3);
        for (let k = 0; k < numStrands; k++) {
            const spread = strandW * 0.35;
            const ox = horizontal ? (Math.random() - 0.5) * spread : 0;
            const oy = horizontal ? 0 : (Math.random() - 0.5) * spread;
            const len = fringeLen * (0.7 + Math.random() * 0.5);
            const curl = (Math.random() - 0.5) * 8;

            ctx.strokeStyle = shade(color, 0.7 + Math.random() * 0.4);
            ctx.lineWidth = 1.5 + Math.random() * 1.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x + ox, y + oy);
            if (horizontal) {
                ctx.bezierCurveTo(
                    x + ox, y + oy + len * 0.3,
                    x + ox + curl, y + oy + len * 0.7,
                    x + ox + curl * 0.5, y + oy + len
                );
            } else {
                ctx.bezierCurveTo(
                    x + ox + len * 0.3, y + oy,
                    x + ox + len * 0.7, y + oy + curl,
                    x + ox + len, y + oy + curl * 0.5
                );
            }
            ctx.stroke();
        }
    }

    function draw() {
        const gap = strandW * 0.12;
        const pitch = strandW + gap;
        const margin = fringeLen + pitch;
        const matL = margin;
        const matT = margin;
        const matR = W - margin;
        const matB = H - margin;

        // Background
        ctx.fillStyle = '#C8AA74';
        ctx.fillRect(0, 0, W, H);

        // Mat background
        ctx.fillStyle = '#D4B483';
        ctx.fillRect(matL - strandW/2, matT - strandW/2, matR - matL + strandW, matB - matT + strandW);

        if (warpData.length === 0) return;

        // Draw fringe first (behind mat)
        // Top fringe (horizontal weft strands hanging down from top)
        for (const weft of weftData) {
            drawFringe(matL - strandW/2, weft.y, false, weft.color);
            drawFringe(matR + strandW/2, weft.y, false, weft.color);
        }
        // Left/right fringe (vertical warp strands)
        for (const warp of warpData) {
            drawFringe(warp.x, matT - strandW/2, true, warp.color);
            drawFringe(warp.x, matB + strandW/2, true, warp.color);
        }

        // Draw weave: two passes - below and above
        // Pass 1: draw all warp segments that go UNDER weft
        // Pass 2: draw all weft segments
        // Pass 3: draw all warp segments that go OVER weft (on top)

        const numWarp = warpData.length;
        const numWeft = weftData.length;

        // Build intersection grid
        // For each warp i and weft j: weftOver(i, j) tells us who's on top

        // Draw warp under-segments first
        for (let i = 0; i < numWarp; i++) {
            const warp = warpData[i];
            // Collect y-segments where warp goes under
            let segStart = matT;
            for (let j = 0; j <= numWeft; j++) {
                const weft = j < numWeft ? weftData[j] : null;
                const over = weft ? weftOver(i, j) : false; // true = weft over warp = warp under

                if (j === numWeft || !over) {
                    // Draw from segStart to weft.y - halfW (or matB if last)
                    const segEnd = weft ? weft.y - strandW / 2 : matB;
                    if (segEnd > segStart) {
                        drawStrandSegment(warp.x, segStart, warp.x, segEnd, warp.color, strandW, false);
                    }
                    if (weft) segStart = weft.y + strandW / 2;
                } else {
                    // weft is over this warp: stop warp segment before, will draw warp gap here
                    const segEnd = weft.y - strandW / 2;
                    if (segEnd > segStart) {
                        drawStrandSegment(warp.x, segStart, warp.x, segEnd, warp.color, strandW, false);
                    }
                    segStart = weft.y + strandW / 2;
                }
            }
        }

        // Draw all weft strands fully
        for (let j = 0; j < numWeft; j++) {
            const weft = weftData[j];
            drawStrandSegment(matL, weft.y, matR, weft.y, weft.color, strandW, true);
        }

        // Draw warp over-segments (on top of weft)
        for (let i = 0; i < numWarp; i++) {
            const warp = warpData[i];
            for (let j = 0; j < numWeft; j++) {
                const weft = weftData[j];
                const over = !weftOver(i, j); // warp over weft
                if (over) {
                    drawStrandSegment(warp.x, weft.y - strandW/2, warp.x, weft.y + strandW/2, warp.color, strandW, true);
                }
            }
        }

        // Mat border
        ctx.strokeStyle = shade(WARP_COLORS[0], 0.5);
        ctx.lineWidth = 3;
        ctx.strokeRect(matL - strandW/2, matT - strandW/2, matR - matL + strandW, matB - matT + strandW);
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('weave').addEventListener('change', e => {
        weavePattern = e.target.value;
        draw();
    });
    document.getElementById('strand').addEventListener('input', e => {
        strandW = +e.target.value;
        document.getElementById('strandVal').textContent = strandW;
        regenerate();
    });
    document.getElementById('fringe').addEventListener('input', e => {
        fringeLen = +e.target.value;
        document.getElementById('fringeVal').textContent = fringeLen;
        regenerate();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
