<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Tile Weave - Ribbonics</title>
    <meta name="description" content="Edge-coloured Wang tiles are laid so colours match across shared edges, weaving continuous coloured bands across the grid in a satisfying interlocking pattern.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Wang Tile Weave</h1>
        <p>Each tile has four edge colours (top, right, bottom, left). Tiles are chosen so the colour on each shared edge matches its neighbour, producing continuous coloured bands weaving across the grid.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="30" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <label>Colours
                <select id="ncolors">
                    <option value="2">2 colours</option>
                    <option value="3" selected>3 colours</option>
                    <option value="4">4 colours</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CASING = '#0d0e18';

    const ALL_COLORS = [
        '#E63946','#4ECDC4','#FFD93D','#7209B7','#F77F00','#2EC4B6','#FF6B6B'
    ];

    let tileSize = 60;
    let widthPct = 0.38;
    let nColors = 3;
    let W, H;
    // For each cell: {top, right, bottom, left} edge colours + arcs to draw
    let cellData = [];
    let cols, rows;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = tileSize;
        cols = Math.ceil(W / s) + 1;
        rows = Math.ceil(H / s) + 1;
        // Shuffle palette
        const pal = ALL_COLORS.slice(0, nColors);

        // Edge arrays: topEdge[row][col] and leftEdge[row][col]
        const topEdge  = Array.from({length: rows + 1}, () => new Array(cols));
        const leftEdge = Array.from({length: rows}, () => new Array(cols + 1));

        // Fill top row and left col randomly
        for (let c = 0; c < cols; c++) topEdge[0][c] = pal[Math.floor(Math.random() * nColors)];
        for (let r = 0; r < rows; r++) leftEdge[r][0] = pal[Math.floor(Math.random() * nColors)];

        cellData = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const T = topEdge[row][col];
                const L = leftEdge[row][col];
                // Choose B and R randomly; propagate to neighbours
                const B = pal[Math.floor(Math.random() * nColors)];
                const R = pal[Math.floor(Math.random() * nColors)];
                topEdge[row + 1][col] = B;
                leftEdge[row][col + 1] = R;

                const x0 = col * s, y0 = row * s;
                const r = s / 2;

                // Wang ribbon: draw a half-circle arc connecting each pair of adjacent edges
                // Each tile has 4 edges; we pair them: T-R, R-B, B-L, L-T
                // Each pair gets a colour from the two edge colours (use start edge colour)
                // We draw an arc from the midpoint of edge A to midpoint of edge B via a corner
                // Pairs: T↔L (TL corner), T↔R (TR corner), B↔R (BR corner), B↔L (BL corner)
                // We draw one of two standard Truchet configs ensuring edge-colour continuity.
                // Config: connect T-R and B-L if those pairs share compatible colours, else T-L and B-R.
                // For visual interest use T and L edges as the arc colour basis.

                const arcs = [
                    // TL arc: connects top midpoint to left midpoint
                    { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,    color: T },
                    // BR arc: connects bottom midpoint to right midpoint
                    { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5,  color: B },
                    // Horizontal band connecting L-R through cell centre
                    // We omit and just use standard Truchet with Wang edge colouring
                ];

                // Actually use per-edge arc: each arc carries the colour of its "start" edge
                // TL corner: from top to left
                // TR corner: from right to top  → colour R
                // BR corner: from bottom to right
                // BL corner: from left to bottom → colour L

                // Randomly choose config 0 (TL+BR) or config 1 (TR+BL)
                const config = Math.random() < 0.5 ? 0 : 1;
                const wArcs = config === 0
                    ? [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,   color: T },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5, color: B }
                      ]
                    : [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI,       color: R },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,   color: L }
                      ];

                for (const a of wArcs) { a.r = r; cellData.push(a); }
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#0d0e18';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(3, tileSize * 0.10);

        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of cellData) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Group by colour
        const byColor = {};
        for (const a of cellData) (byColor[a.color] = byColor[a.color] || []).push(a);
        ctx.lineWidth = fill;
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('ncolors').addEventListener('change', e => {
        nColors = +e.target.value;
        regenerate();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
