<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Pinwheel - Ribbonics</title>
    <meta name="description" content="Triangular grid with pinwheel arcs spinning around shared vertices; bright multicolour weave of interleaved curved ribbons.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Triangle Pinwheel</h1>
        <p>A triangular grid where arcs spin around each shared vertex like pinwheels. Each trio of arcs forms a swirling rosette, and connected loops are painted as distinct bright ribbons.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="vivid">Vivid</option>
                    <option value="candy">Candy Pop</option>
                    <option value="sunset">Sunset</option>
                    <option value="neon">Neon</option>
                    <option value="meadow">Meadow</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Cell size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        vivid:  ['#E63946','#2196F3','#4CAF50','#FF9800','#9C27B0','#00BCD4','#FFEB3B'],
        candy:  ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#1A535C','#FFA630'],
        sunset: ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49','#E63946'],
        neon:   ['#FF00FF','#00FFFF','#FFFF00','#FF4500','#00FF7F','#FF69B4','#7FFF00'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A'],
    };
    const BG = '#11121e';
    const CASING = '#0a0a14';

    let tileSize = 80;
    let widthPct = 0.38;
    let paletteName = 'vivid';
    let W, H;
    let arcs = [];

    const PI = Math.PI;
    const TAU = Math.PI * 2;
    // Equilateral triangle grid: rows of triangles
    // We tile with unit triangles. Each up-triangle and down-triangle share edges.
    // For a triangular grid with side length S:
    //   row height h = S * sqrt(3)/2
    // We identify each triangle by (col, row, upDown)
    // vertices of up-triangle at (col, row):
    //   A=(col*S, row*h), B=((col+1)*S, row*h), C=(col*0.5*S + 0.5*S, (row+1)*h)
    // vertices of down-triangle at (col, row):
    //   A=((col+0.5)*S, row*h), B=((col+1.5)*S, row*h), C=((col+1)*S, (row+1)*h) -- shifted

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // For each triangle we draw 3 arcs, one at each corner, curving from the midpoint
    // of one adjacent edge to the midpoint of the next, going around the vertex.
    // The arc radius equals half the side (S/2) -- actually we use a smaller inset radius.

    function build() {
        const S = tileSize;
        const h = S * Math.sqrt(3) / 2;
        const cols = Math.ceil(W / S) + 2;
        const rows = Math.ceil(H / h) + 2;

        const pal = PALETTES[paletteName];
        // We use a simple union-find on arc endpoints (edge midpoints) to color connected strands.
        const parent = new Map();
        function find(k) {
            if (!parent.has(k)) parent.set(k, k);
            let r = k;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(k) !== r) { const nk = parent.get(k); parent.set(k, r); k = nk; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        arcs = [];
        // Generate triangles and their arcs
        // Each triangle: 3 vertices, 3 edge midpoints
        // pinwheel: at each vertex, one arc curves from edge-mid1 to edge-mid2
        // Each edge is shared between two triangles; the arcs at the shared edge midpoints
        // connect into a continuous ribbon.

        // Key edge midpoints by a canonical string of the two vertex keys
        // Vertices rounded to nearest 0.5 to identify
        function vkey(x, y) {
            return Math.round(x * 2) + '_' + Math.round(y * 2);
        }
        function ekey(x1, y1, x2, y2) {
            const k1 = vkey(x1, y1), k2 = vkey(x2, y2);
            return k1 < k2 ? k1 + '|' + k2 : k2 + '|' + k1;
        }
        function midpoint(x1, y1, x2, y2) {
            return [(x1 + x2) / 2, (y1 + y2) / 2];
        }

        for (let row = -1; row < rows; row++) {
            for (let col = -1; col < cols * 2; col++) {
                // Two types of triangles per cell
                // Up-triangle: apex at top
                //   V0=(col*S/2, row*h), V1=((col+1)*S/2, row*h+(nope, use even col))
                // Simpler: iterate col steps of S/2, each row has alternating up/down
                // Let's use: triangle (col, row) where col indexes half-widths
                // For even col: up-triangle; odd col: down-triangle
                const x0 = col * S / 2;
                const y0 = row * h;
                let V; // 3 vertices
                if (col % 2 === 0) {
                    // up-triangle
                    V = [
                        [x0, y0 + h],
                        [x0 + S / 2, y0],
                        [x0 + S, y0 + h]
                    ];
                } else {
                    // down-triangle
                    V = [
                        [x0, y0],
                        [x0 + S / 2, y0 + h],
                        [x0 + S, y0]
                    ];
                }
                // For each corner, draw a pinwheel arc from mid(V[i],V[(i+1)%3]) to mid(V[i],V[(i+2)%3])
                // curving around vertex V[i]
                for (let i = 0; i < 3; i++) {
                    const vx = V[i][0], vy = V[i][1];
                    const j = (i + 1) % 3, k = (i + 2) % 3;
                    const [mx1, my1] = midpoint(vx, vy, V[j][0], V[j][1]);
                    const [mx2, my2] = midpoint(vx, vy, V[k][0], V[k][1]);
                    // arc center is vertex; radius = S/2
                    const r = S / 2;
                    const a0 = Math.atan2(my1 - vy, mx1 - vx);
                    const a1 = Math.atan2(my2 - vy, mx2 - vx);
                    // choose consistent direction: pinwheel spin
                    // use counterclockwise if (col+row) even, clockwise otherwise for pinwheel
                    const ccw = (col + row) % 2 === 0;
                    // edge node keys
                    const ek1 = ekey(vx, vy, V[j][0], V[j][1]);
                    const ek2 = ekey(vx, vy, V[k][0], V[k][1]);
                    union(ek1, ek2);
                    arcs.push({ cx: vx, cy: vy, r, a0, a1, ccw, n1: ek1 });
                }
            }
        }

        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(4, tileSize * widthPct * 0.5);
        const casing = fill + Math.max(3, tileSize * 0.08);

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1, a.ccw);
        }
        ctx.stroke();

        // Color pass
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1, a.ccw);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
