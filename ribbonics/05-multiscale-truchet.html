<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiscale Truchet - Ribbonics</title>
    <meta name="description" content="Recursive multiscale Truchet tiling: some large tiles subdivide into 2×2 grids of smaller Truchet tiles, creating a multi-resolution arc weave in monochrome ink on cream.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Multiscale Truchet</h1>
        <p>Large Truchet tiles randomly subdivide into 2×2 grids of finer tiles, producing a recursive multi-resolution arc weave. The interplay of scales creates complex organic texture in monochrome ink on cream.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Base tile size <span class="value-display" id="sizeVal">96</span></label>
            <input type="range" id="size" min="40" max="180" value="96">
        </div>
        <div class="control-group">
            <label>Subdivision chance <span class="value-display" id="subVal">50</span>%</label>
            <input type="range" id="sub" min="0" max="90" value="50">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="15" max="65" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const BG     = '#FEFAE0';
    const FILL   = '#2c2c2c';
    const CASING = '#FEFAE0';

    let baseSize = 96;
    let subChance = 0.50;
    let widthPct = 0.40;
    let W, H;
    let arcList = [];

    // Standard quarter-circle Truchet arc at corner (cx,cy), radius r, orientation
    // orientation 0: TL+BR, orientation 1: TR+BL
    // We emit arc descriptors
    function addTruchet(x0, y0, s) {
        const r = s / 2;
        const orient = Math.random() < 0.5 ? 0 : 1;
        if (orient === 0) {
            // TL arc: from top-midpoint to left-midpoint around corner (x0,y0)
            arcList.push({ cx: x0,   cy: y0,   r, a0: 0,            a1: Math.PI/2   });
            // BR arc: from bottom-midpoint to right-midpoint around corner (x0+s,y0+s)
            arcList.push({ cx: x0+s, cy: y0+s, r, a0: Math.PI,      a1: Math.PI*1.5 });
        } else {
            // TR arc: from top-midpoint to right-midpoint around corner (x0+s,y0)
            arcList.push({ cx: x0+s, cy: y0,   r, a0: Math.PI/2,    a1: Math.PI     });
            // BL arc: from bottom-midpoint to left-midpoint around corner (x0,y0+s)
            arcList.push({ cx: x0,   cy: y0+s, r, a0: Math.PI*1.5,  a1: Math.PI*2   });
        }
    }

    function addTile(x0, y0, s, depth) {
        // decide whether to subdivide
        if (depth < 2 && s >= baseSize / 2 && Math.random() < subChance) {
            const h = s / 2;
            addTile(x0,     y0,     h, depth + 1);
            addTile(x0 + h, y0,     h, depth + 1);
            addTile(x0,     y0 + h, h, depth + 1);
            addTile(x0 + h, y0 + h, h, depth + 1);
        } else {
            addTruchet(x0, y0, s);
        }
    }

    function build() {
        arcList = [];
        const cols = Math.ceil(W / baseSize) + 1;
        const rows = Math.ceil(H / baseSize) + 1;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                addTile(c * baseSize, r * baseSize, baseSize, 0);
            }
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Two passes: casing (cream, slightly wider) then ink fill
        // Casing = background colour to create the "outline" effect
        // For monochrome: we just draw a slightly thicker cream line then the ink line
        // But the cream casing would erase the background, so instead use dark line slightly thicker
        // Actually for monochrome on cream: draw dark line, then slightly thinner cream line
        // to leave a thin border... that doesn't look right either.
        // Best mono approach: just draw dark lines with round caps, no casing.
        // The "outline" comes from the cream gaps between tiles.
        // We'll draw a slightly thicker cream path first to create separation, then ink.

        // Group by scale (use radius as proxy for scale):
        // Sort arcs by radius descending so large arcs are drawn first (under small ones)
        const sorted = arcList.slice().sort((a, b) => b.r - a.r);

        // Cream separation pass
        ctx.strokeStyle = BG;
        ctx.lineWidth = 0; // skip
        ctx.stroke();

        // Draw dark arcs, using width proportional to their tile size
        ctx.beginPath();
        // We need to draw each arc with a width based on its r (tileSize/2)
        // Since widths vary, we must draw groups by width.
        const byR = {};
        for (const a of sorted) {
            const w = Math.max(2, a.r * 2 * widthPct);
            const key = Math.round(w);
            if (!byR[key]) byR[key] = { w, arcs: [] };
            byR[key].arcs.push(a);
        }

        // First pass: cream "halo" (slightly wider than fill)
        ctx.strokeStyle = BG;
        for (const key in byR) {
            const { w, arcs } = byR[key];
            ctx.lineWidth = w + Math.max(2, w * 0.2);
            ctx.beginPath();
            for (const a of arcs) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }

        // Second pass: ink fill
        ctx.strokeStyle = FILL;
        for (const key in byR) {
            const { w, arcs } = byR[key];
            ctx.lineWidth = w;
            ctx.beginPath();
            for (const a of arcs) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => { baseSize = +e.target.value; document.getElementById('sizeVal').textContent = baseSize; regenerate(); });
    document.getElementById('sub').addEventListener('input', e => { subChance = +e.target.value/100; document.getElementById('subVal').textContent = e.target.value; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
