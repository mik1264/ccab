<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Truchet - Ribbonics</title>
    <meta name="description" content="Truchet weave biased toward a single long continuous loop, traced head-to-tail with a rainbow gradient so it reads as one vivid snake.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Snake Truchet</h1>
        <p>The Truchet weave is biased to favour a single long continuous loop. That dominant loop is traced head-to-tail and painted with a full-spectrum rainbow so it reads as one giant winding snake.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">56</span></label>
            <input type="range" id="size" min="24" max="120" value="56">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="20" max="70" value="40">
        </div>
        <div class="control-group">
            <label>Background
                <select id="bg">
                    <option value="#0d0d0d">Deep Black</option>
                    <option value="#11121e">Dark Navy</option>
                    <option value="#1a0a2e">Cosmic Purple</option>
                    <option value="#0a1a0a">Forest Dark</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CASING = 'rgba(0,0,0,0.85)';
    let tileSize = 56;
    let widthPct = 0.40;
    let bgColor = '#0d0d0d';
    let W, H, cols, rows;

    // Rainbow colour from position 0..1
    function rainbow(t) {
        const h = t * 360;
        return `hsl(${h},100%,55%)`;
    }

    // Union-Find
    function makeUF() {
        const par = new Map();
        function find(x) {
            if (!par.has(x)) par.set(x, x);
            let r = x;
            while (par.get(r) !== r) r = par.get(r);
            while (par.get(x) !== r) { const nx = par.get(x); par.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { par.set(find(a), find(b)); }
        return { find, union };
    }

    // Arc data
    let arcList = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;

        const uf = makeUF();
        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        // Adjacency: each node -> list of (neighbour-node, arc-index)
        const adj = new Map();
        function addAdj(a, b, idx) {
            if (!adj.has(a)) adj.set(a, []);
            if (!adj.has(b)) adj.set(b, []);
            adj.get(a).push({ to: b, arc: idx });
            adj.get(b).push({ to: a, arc: idx });
        }

        arcList = [];
        const s = tileSize, rad = s / 2;
        const cells = [];

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                cells.push(Math.random() < 0.5 ? 0 : 1);
            }
        }

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r + 1), left = v(c, r), right = v(c + 1, r);
                const config = cells[r * cols + c];
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2,    n1: top,    n2: left   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5,  n1: bottom, n2: right  }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI,        n1: top,    n2: right  },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,    n1: bottom, n2: left   }
                    ];
                }
                for (const p of pairs) {
                    const idx = arcList.length;
                    uf.union(p.n1, p.n2);
                    arcList.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1, n2: p.n2, color: '#888', t: 0 });
                    addAdj(p.n1, p.n2, idx);
                }
            }
        }

        // Find the longest loop by traversal
        const visited = new Set();
        let longestPath = [];

        function traverseLoop(startNode) {
            const path = []; // list of arc indices in order
            let cur = startNode;
            let prev = null;
            const seen = new Set();
            seen.add(cur);
            let steps = 0;
            while (steps < arcList.length * 2) {
                const neighbours = adj.get(cur) || [];
                let next = null, nextArc = -1;
                for (const e of neighbours) {
                    if (e.arc !== prev) { next = e.to; nextArc = e.arc; break; }
                }
                if (next === null) break;
                if (next === startNode && path.length > 0) { break; }
                if (seen.has(next) && next !== startNode) break;
                seen.add(next);
                path.push(nextArc);
                prev = nextArc;
                cur = next;
                steps++;
            }
            return path;
        }

        // Group arcs by their root
        const rootArcs = new Map();
        for (let i = 0; i < arcList.length; i++) {
            const root = uf.find(arcList[i].n1);
            if (!rootArcs.has(root)) rootArcs.set(root, []);
            rootArcs.get(root).push(i);
        }

        // Find root with most arcs
        let bestRoot = null, bestCount = 0;
        for (const [root, indices] of rootArcs) {
            if (indices.length > bestCount) { bestCount = indices.length; bestRoot = root; }
        }

        // Mark the snake arcs
        const snakeSet = bestRoot ? new Set(rootArcs.get(bestRoot)) : new Set();

        // For ordering snake arcs, do a simple BFS/walk from one end
        const snakeArcs = bestRoot ? rootArcs.get(bestRoot) : [];
        const total = snakeArcs.length;

        // Build ordered path along snake loop
        // Find start node that is in snakeSet
        let orderedPath = [];
        if (snakeArcs.length > 0) {
            // pick a starting arc
            const startArc = snakeArcs[0];
            const startNode = arcList[startArc].n1;

            // walk the chain
            const usedArcs = new Set();
            let cur = startNode;
            let steps = 0;
            while (steps < snakeArcs.length * 2 + 4) {
                const neighbours = adj.get(cur) || [];
                let moved = false;
                for (const e of neighbours) {
                    if (!usedArcs.has(e.arc) && snakeSet.has(e.arc)) {
                        usedArcs.add(e.arc);
                        orderedPath.push(e.arc);
                        cur = e.to;
                        moved = true;
                        break;
                    }
                }
                if (!moved) break;
                steps++;
            }
        }

        // Assign colours: snake gets rainbow, others get dim grey
        const pathLen = orderedPath.length;
        for (let i = 0; i < orderedPath.length; i++) {
            arcList[orderedPath[i]].color = rainbow(i / Math.max(1, pathLen - 1));
            arcList[orderedPath[i]].isSnake = true;
        }
        for (const a of arcList) {
            if (!a.isSnake) a.color = 'rgba(120,120,140,0.25)';
        }
    }

    function draw() {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(4, tileSize * 0.10);

        // Pass 1: casing (only snake arcs)
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) {
            if (!a.isSnake) continue;
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Pass 2: dim background arcs
        ctx.strokeStyle = 'rgba(100,100,120,0.18)';
        ctx.lineWidth = fill * 0.5;
        ctx.beginPath();
        for (const a of arcList) {
            if (a.isSnake) continue;
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Pass 3: rainbow snake — draw each arc individually for per-arc colour
        ctx.lineWidth = fill;
        for (const a of arcList) {
            if (!a.isSnake) continue;
            ctx.strokeStyle = a.color;
            ctx.beginPath();
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('bg').addEventListener('change', e => {
        bgColor = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
