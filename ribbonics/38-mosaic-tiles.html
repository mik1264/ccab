<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic Tiles - Ribbonics</title>
    <meta name="description" content="Solid coloured square and triangle tiles forming a randomized mosaic with thin grout lines and a ceramic colour palette.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Mosaic Tiles</h1>
        <p>Randomized square and triangle tile mosaic with thin grout lines, using authentic ceramic colour palettes. Each tile is individually placed.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">40</span></label>
            <input type="range" id="size" min="16" max="100" value="40">
        </div>
        <div class="control-group">
            <label>Grout width <span class="value-display" id="groutVal">2</span></label>
            <input type="range" id="grout" min="1" max="8" value="2">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="ceramic">Ceramic</option>
                    <option value="mediterranean">Mediterranean</option>
                    <option value="aztec">Aztec</option>
                    <option value="nordic">Nordic</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        ceramic:       ['#E8D5C4','#C4A882','#8B6914','#D4956B','#A0522D','#DEB887','#F5DEB3','#CD853F'],
        mediterranean: ['#1B4F72','#2E86C1','#85C1E9','#FAD7A0','#E59866','#C0392B','#FFFFFF','#F0E68C'],
        aztec:         ['#7D3C98','#1A5276','#117A65','#D4AC0D','#CA6F1E','#922B21','#F8C471','#ABEBC6'],
        nordic:        ['#FEFAE0','#DDA15E','#BC6C25','#606C38','#8A9A5B','#3d4423','#A3B18A','#5C4A1E'],
    };
    const GROUT = '#b0a898';

    let tileSize = 40;
    let groutW = 2;
    let paletteName = 'ceramic';
    let W, H;
    let tiles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const pal = PALETTES[paletteName];
        tiles = [];
        const g = groutW;
        const s = tileSize;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = c * s;
                const y = r * s;
                const inner = s - g;
                const rand = Math.random();

                if (rand < 0.5) {
                    // Single square tile
                    tiles.push({
                        type: 'square',
                        x: x + g / 2, y: y + g / 2,
                        w: inner, h: inner,
                        color: pal[Math.floor(Math.random() * pal.length)]
                    });
                } else if (rand < 0.75) {
                    // Two triangle tiles (diagonal split)
                    const diag = Math.random() < 0.5 ? 0 : 1;
                    const c1 = pal[Math.floor(Math.random() * pal.length)];
                    const c2 = pal[Math.floor(Math.random() * pal.length)];
                    const gx = x + g / 2, gy = y + g / 2;
                    const gx2 = gx + inner, gy2 = gy + inner;

                    if (diag === 0) {
                        tiles.push({ type: 'tri', pts: [[gx, gy], [gx2, gy], [gx, gy2]], color: c1 });
                        tiles.push({ type: 'tri', pts: [[gx2, gy], [gx2, gy2], [gx, gy2]], color: c2 });
                    } else {
                        tiles.push({ type: 'tri', pts: [[gx, gy], [gx2, gy], [gx2, gy2]], color: c1 });
                        tiles.push({ type: 'tri', pts: [[gx, gy], [gx2, gy2], [gx, gy2]], color: c2 });
                    }
                } else {
                    // Four small square tiles (2x2)
                    const h = inner / 2;
                    const g2 = g / 2;
                    for (let dr = 0; dr < 2; dr++) {
                        for (let dc = 0; dc < 2; dc++) {
                            tiles.push({
                                type: 'square',
                                x: x + g2 + dc * (h + g2),
                                y: y + g2 + dr * (h + g2),
                                w: h - g2, h: h - g2,
                                color: pal[Math.floor(Math.random() * pal.length)]
                            });
                        }
                    }
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = GROUT;
        ctx.fillRect(0, 0, W, H);

        for (const tile of tiles) {
            ctx.fillStyle = tile.color;

            if (tile.type === 'square') {
                ctx.fillRect(tile.x, tile.y, tile.w, tile.h);

                // Subtle highlight on top-left edges for depth
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#fff';
                ctx.fillRect(tile.x, tile.y, tile.w, 2);
                ctx.fillRect(tile.x, tile.y, 2, tile.h);
                ctx.globalAlpha = 0.12;
                ctx.fillStyle = '#000';
                ctx.fillRect(tile.x, tile.y + tile.h - 2, tile.w, 2);
                ctx.fillRect(tile.x + tile.w - 2, tile.y, 2, tile.h);
                ctx.restore();

            } else if (tile.type === 'tri') {
                ctx.beginPath();
                ctx.moveTo(tile.pts[0][0], tile.pts[0][1]);
                ctx.lineTo(tile.pts[1][0], tile.pts[1][1]);
                ctx.lineTo(tile.pts[2][0], tile.pts[2][1]);
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('grout').addEventListener('input', e => {
        groutW = +e.target.value;
        document.getElementById('groutVal').textContent = groutW;
        build();
        draw();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
