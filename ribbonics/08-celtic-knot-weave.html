<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celtic Knot Weave - Ribbonics</title>
    <meta name="description" content="Truchet arcs rendered with true over-and-under interlacing like Celtic knotwork — strands alternate over and under at every crossing, creating intricate golden knot loops on a dark teal ground.">
    <meta name="theme-color" content="#0a2e2e">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a2e2e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 20, 20, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.10);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(5, 20, 20, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.10);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #0a2e2e; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Celtic Knot Weave</h1>
        <p>Truchet arcs interlace with true over-and-under crossings in the Celtic knotwork tradition. At each crossing point one strand gaps so the other appears to pass over it — gold on dark teal.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Strand colour
                <select id="strand">
                    <option value="gold">Gold</option>
                    <option value="silver">Silver</option>
                    <option value="copper">Copper</option>
                    <option value="jade">Jade</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="28" max="140" value="72">
        </div>
        <div class="control-group">
            <label>Strand width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="20" max="65" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const STRAND_COLORS = {
        gold:   { fill: '#F1C40F', hi: '#FFE066', edge: '#8a6800' },
        silver: { fill: '#C0C8D0', hi: '#E8EEF2', edge: '#5a6068' },
        copper: { fill: '#E67E22', hi: '#F5AC68', edge: '#7a3800' },
        jade:   { fill: '#27AE60', hi: '#68E0A0', edge: '#0a4a28' }
    };
    const BG = '#0a2e2e';
    const GROUND = '#0d3535';

    let tileSize = 72;
    let widthPct = 0.40;
    let strandName = 'gold';
    let W, H;
    let arcData = [];   // {cx,cy,r,a0,a1, crossX,crossY, over}
    // 'over' = true means this arc crosses OVER at its crossing point

    /*
      Celtic knot over/under:
      In a standard Truchet tiling, each arc sweeps 90°.
      Two arcs in adjacent tiles will "cross" near the shared edge midpoint.
      To simulate Celtic knotwork, at each edge midpoint we decide which arc
      crosses over. We alternate the over/under across the grid (checkerboard).

      Implementation:
      For each arc, we split it into 3 segments:
        1. First third (entry)
        2. Middle third (at the crossing) — drawn in the "under" pass
        3. Last third (exit)
      The "over" arc draws all 3 segments.
      The "under" arc draws only segments 1 and 3 (with a gap in the middle).
      The gap is covered by the "over" arc drawn on top.

      We identify crossing points as edge midpoints shared between adjacent tiles.
      Crossing parity: edge (c, r, 'h') → over if (c+r) even, etc.
    */

    function build() {
        arcData = [];
        const s = tileSize;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const cfg = Math.random() < 0.5 ? 0 : 1;
                const rad = s / 2;

                // Determine over/under for the two edge midpoints this tile uses:
                // cfg=0: top-midpoint (h, c, r) and left-midpoint (v, c, r)
                //        bottom-midpoint (h, c, r+1) and right-midpoint (v, c+1, r)
                // The arc at TL corner crosses near the top-left area; its "crossing node"
                // is the shared edge between this tile and its neighbour.
                // For simplicity: arc is "over" based on (c+r) parity for cfg=0 TL arc.
                const over0 = (c + r) % 2 === 0;  // TL/BR arc in cfg=0, or TR arc in cfg=1
                const over1 = !over0;              // the other arc

                let pairs;
                if (cfg === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI/2,   over: over0,
                          crossFrac: 0.5 },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,     a1: Math.PI*1.5, over: over1,
                          crossFrac: 0.5 }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI/2,   a1: Math.PI,     over: over0,
                          crossFrac: 0.5 },
                        { cx: x0,     cy: y0 + s, a0: Math.PI*1.5, a1: Math.PI*2,   over: over1,
                          crossFrac: 0.5 }
                    ];
                }
                for (const p of pairs) {
                    arcData.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, over: p.over });
                }
            }
        }
    }

    function drawArcSegment(cx, cy, r, a0, a1, fracStart, fracEnd) {
        const start = a0 + (a1 - a0) * fracStart;
        const end   = a0 + (a1 - a0) * fracEnd;
        ctx.moveTo(cx + Math.cos(start)*r, cy + Math.sin(start)*r);
        ctx.arc(cx, cy, r, start, end);
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        // Draw subtle ground texture
        ctx.fillStyle = GROUND;
        const s = tileSize;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if ((c + r) % 2 === 0) {
                    ctx.fillRect(c*s, r*s, s, s);
                }
            }
        }

        const sc = STRAND_COLORS[strandName];
        const fill = Math.max(3, tileSize * widthPct);
        const casing = fill + Math.max(4, tileSize * 0.12);
        const gap = fill * 0.55; // the gap width for the "under" arc

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const underArcs = arcData.filter(a => !a.over);
        const overArcs  = arcData.filter(a =>  a.over);

        // PASS 1: dark casing for ALL arcs
        ctx.strokeStyle = '#051010';
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcData) {
            ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // PASS 2: draw under-arcs as two halves (gap in the middle third)
        ctx.strokeStyle = sc.fill;
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const a of underArcs) {
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0,    0.35);
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0.65, 1.0 );
        }
        ctx.stroke();

        // PASS 3: over-arcs drawn fully (cover the gaps)
        // First re-casing under the over-arcs to cut the under-arc at crossing
        ctx.strokeStyle = '#051010';
        ctx.lineWidth = casing * 0.9;
        ctx.beginPath();
        for (const a of overArcs) {
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0.3, 0.7);
        }
        ctx.stroke();

        // Full over-arc fill
        ctx.strokeStyle = sc.fill;
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const a of overArcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // PASS 4: highlight on over-arcs
        ctx.strokeStyle = sc.hi;
        ctx.lineWidth = fill * 0.25;
        ctx.beginPath();
        for (const a of overArcs) {
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0.08, 0.42);
        }
        ctx.stroke();

        // Highlight on under-arc segments too
        ctx.beginPath();
        for (const a of underArcs) {
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0.08, 0.28);
            drawArcSegment(a.cx, a.cy, a.r, a.a0, a.a1, 0.70, 0.90);
        }
        ctx.stroke();
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('strand').addEventListener('change', e => { strandName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
