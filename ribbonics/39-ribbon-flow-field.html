<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribbon Flow Field - Ribbonics</title>
    <meta name="description" content="A value-noise flow field traced by many parallel coloured ribbon streamlines that bend smoothly into organic flowing patterns.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Ribbon Flow Field</h1>
        <p>Pseudo-Perlin noise drives a flow field traced by parallel ribbon streamlines. Each ribbon follows the field direction, bending organically through the frame.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Ribbons <span class="value-display" id="countVal">60</span></label>
            <input type="range" id="count" min="10" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">6</span></label>
            <input type="range" id="width" min="2" max="20" value="6">
        </div>
        <div class="control-group">
            <label>Noise scale <span class="value-display" id="scaleVal">4</span></label>
            <input type="range" id="scale" min="1" max="12" value="4">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = [
        ['#FF6B6B','#FF8E53','#FFC300','#2ECC71','#3498DB','#9B59B6','#E91E63'],
        ['#F72585','#7209B7','#3A0CA3','#4361EE','#4CC9F0','#06D6A0'],
        ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A'],
        ['#E63946','#2A9D8F','#E9C46A','#264653','#F4A261','#A8DADC'],
    ];
    const BG = '#0a0a0f';
    const CASING = 'rgba(0,0,0,0.6)';

    let ribbonCount = 60;
    let ribbonWidth = 6;
    let noiseScale = 4;
    let W, H;
    let seed = Math.random() * 1000;

    // Pseudo-noise using hash-based approach
    function hash(x, y) {
        let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
        return h - Math.floor(h);
    }

    function smoothNoise(x, y) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = x - ix;
        const fy = y - iy;
        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);
        return (
            hash(ix, iy) * (1 - ux) * (1 - uy) +
            hash(ix + 1, iy) * ux * (1 - uy) +
            hash(ix, iy + 1) * (1 - ux) * uy +
            hash(ix + 1, iy + 1) * ux * uy
        );
    }

    function fbm(x, y) {
        let val = 0;
        let amp = 0.5, freq = 1;
        for (let i = 0; i < 4; i++) {
            val += smoothNoise(x * freq + seed, y * freq + seed * 1.3) * amp;
            amp *= 0.5;
            freq *= 2;
        }
        return val;
    }

    function flowAngle(x, y) {
        const s = noiseScale / Math.max(W, H);
        const n = fbm(x * s, y * s);
        return n * Math.PI * 4;
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const pal = PALETTES[Math.floor(seed * PALETTES.length) % PALETTES.length];
        const stepLen = Math.max(W, H) / 200;
        const maxSteps = 400;
        const casingW = ribbonWidth + Math.max(2, ribbonWidth * 0.4);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (let i = 0; i < ribbonCount; i++) {
            // Start position: spread across the left edge mostly, some random
            const t = i / ribbonCount;
            let px = Math.random() * W;
            let py = Math.random() * H;
            const color = pal[i % pal.length];

            // Trace path
            const pts = [[px, py]];
            for (let step = 0; step < maxSteps; step++) {
                const angle = flowAngle(px, py);
                px += Math.cos(angle) * stepLen;
                py += Math.sin(angle) * stepLen;
                if (px < -ribbonWidth * 2 || px > W + ribbonWidth * 2 || py < -ribbonWidth * 2 || py > H + ribbonWidth * 2) break;
                pts.push([px, py]);
            }

            if (pts.length < 3) continue;

            // Draw casing
            ctx.strokeStyle = CASING;
            ctx.lineWidth = casingW;
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let k = 1; k < pts.length; k++) {
                ctx.lineTo(pts[k][0], pts[k][1]);
            }
            ctx.stroke();

            // Draw ribbon with alpha fade at ends
            const grad = ctx.createLinearGradient(pts[0][0], pts[0][1], pts[pts.length-1][0], pts[pts.length-1][1]);
            const baseColor = color;
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(0.05, baseColor);
            grad.addColorStop(0.95, baseColor);
            grad.addColorStop(1, 'transparent');

            ctx.strokeStyle = grad;
            ctx.lineWidth = ribbonWidth;
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let k = 1; k < pts.length; k++) {
                ctx.lineTo(pts[k][0], pts[k][1]);
            }
            ctx.stroke();
        }
    }

    function regenerate() {
        seed = Math.random() * 1000;
        resize();
        draw();
    }

    document.getElementById('count').addEventListener('input', e => {
        ribbonCount = +e.target.value;
        document.getElementById('countVal').textContent = ribbonCount;
        draw();
    });
    document.getElementById('width').addEventListener('input', e => {
        ribbonWidth = +e.target.value;
        document.getElementById('widthVal').textContent = ribbonWidth;
        draw();
    });
    document.getElementById('scale').addEventListener('input', e => {
        noiseScale = +e.target.value;
        document.getElementById('scaleVal').textContent = noiseScale;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', () => { resize(); draw(); });
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
