<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smith Diagonal Weave - Ribbonics</title>
    <meta name="description" content="Each tile carries a pair of offset crossing diagonals that read as over-and-under woven strips — the Smith diagonal weave pattern in two alternating ribbon colours.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Smith Diagonal Weave</h1>
        <p>Each tile holds two offset crossing diagonals that together read as woven over-and-under strips. Two alternating ribbon colours create a crisp fabric-like diagonal weave across the entire canvas.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Colour pair
                <select id="pair">
                    <option value="0">Coral / Teal</option>
                    <option value="1">Gold / Indigo</option>
                    <option value="2">Sage / Terracotta</option>
                    <option value="3">Sky / Rose</option>
                    <option value="4">Lime / Violet</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="20" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">35</span>%</label>
            <input type="range" id="width" min="15" max="60" value="35">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PAIRS = [
        ['#E84393', '#4ECDC4'],
        ['#F1C40F', '#3A0CA3'],
        ['#606C38', '#BC6C25'],
        ['#2E86AB', '#E84393'],
        ['#27AE60', '#7209B7']
    ];
    const BG = '#FEFAE0';
    const CASING = '#14151f';

    let tileSize = 60;
    let widthPct = 0.35;
    let pairIndex = 0;
    let W, H;
    let segs = []; // {x1,y1,x2,y2, color, layer}

    /*
      Smith diagonal weave:
      The pattern alternates which diagonal type a tile has based on checkerboard parity.
      But we also add a random flip per-tile to create variety.
      Each tile has TWO segments:
        - a "warp" strip (drawn first, under)
        - a "weft" strip (drawn on top)
      The crossing midpoint determines which is "over."

      The two diagonals per tile:
        Warp: from left-mid to right-mid, slightly offset (angled upward)
        Weft: from top-mid to bottom-mid, slightly offset (angled right)
      Actually the classic Smith weave uses simple diagonal lines that cross,
      and "over/under" is simulated by drawing the crossing stripe in two halves
      with one colour covering the other at the crossing.

      Simpler approach: each tile has a random diagonal pair orientation (0: ╲╱, 1: ╱╲).
      We draw all "colour A" diagonals, then all "colour B" diagonals, simulating weaving
      by globally alternating which colour is "on top."
      The two sets of diagonals weave across tile boundaries.

      For a pleasing structured weave, use a FIXED checkerboard of diagonals
      (no randomisation) — this produces the regular Smith diagonal weave.
    */

    function build() {
        segs = [];
        const s = tileSize;
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;
        const [colA, colB] = PAIRS[pairIndex];

        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                // Checkerboard determines weave orientation
                const even = (c + r) % 2 === 0;

                // Each tile: two curves (Bézier diagonals with slight curve)
                // diagonal A: connects top-left area to bottom-right area
                // diagonal B: connects top-right area to bottom-left area
                // We use quadratic Bézier for a slight curve (ribbon feel)

                if (even) {
                    // A is \ (TL→BR), B is / (TR→BL)
                    // Warp (A, colour A): top-mid to right-mid curving through TR corner
                    segs.push({ type: 'q', x0: x0, y0: y0 + s/2, cpx: x0 + s/2, cpy: y0 + s/2, x1: x0 + s, y1: y0 + s/2, color: colA, z: 0 });
                    // Weft (B, colour B): top-mid to bottom-mid... actually:
                    // Let's make it: A = left→right horizontal ribbon (tilted),  B = top→bottom (tilted)
                    // For a genuine diagonal look:
                    // A: from (x0, y0) to (x0+s, y0+s) as a straight ribbon
                    // B: from (x0+s, y0) to (x0, y0+s) as a straight ribbon
                    // We draw segments that go BEYOND tile boundaries to create continuous stripes.
                } else {
                    // mirror
                }
            }
        }

        // Actually, let's use a cleaner approach:
        // Draw continuous diagonal stripes across the whole canvas.
        // Stripe family A: NE-SW diagonals at spacing s, colour A
        // Stripe family B: NW-SE diagonals at spacing s, colour B
        // This always looks like a woven diagonal fabric.
        segs = [];
        const diag = Math.sqrt(W*W + H*H) + s*2;
        const cx = W/2, cy = H/2;
        const [cA, cB] = PAIRS[pairIndex];

        // Family A: NW→SE stripes (angle 45°)
        const nA = Math.ceil(diag / s) + 2;
        for (let i = -nA; i <= nA; i++) {
            const off = i * s;
            // stripe centre line goes through (cx+off, cy) at 45°
            const ox = cx + off * Math.cos(Math.PI/4 - Math.PI/2);
            const oy = cy + off * Math.sin(Math.PI/4 - Math.PI/2);
            // simplified: offset from corner
            segs.push({
                type: 'line',
                x0: ox - diag * Math.cos(Math.PI/4),
                y0: oy - diag * Math.sin(Math.PI/4),
                x1: ox + diag * Math.cos(Math.PI/4),
                y1: oy + diag * Math.sin(Math.PI/4),
                color: cA,
                z: 0
            });
        }
        // Family B: NE→SW stripes (angle 135° = -45°)
        for (let i = -nA; i <= nA; i++) {
            const off = i * s;
            const ox = cx + off * Math.cos(-Math.PI/4 + Math.PI/2);
            const oy = cy + off * Math.sin(-Math.PI/4 + Math.PI/2);
            segs.push({
                type: 'line',
                x0: ox - diag * Math.cos(-Math.PI/4),
                y0: oy - diag * Math.sin(-Math.PI/4),
                x1: ox + diag * Math.cos(-Math.PI/4),
                y1: oy + diag * Math.sin(-Math.PI/4),
                color: cB,
                z: 1
            });
        }
    }

    /*
      For the over/under illusion we draw family A first (under), then family B on top.
      But every other crossing, we want B to be under. We simulate this by:
        - Drawing full A stripes with a small gap at every-other crossing
        - Drawing full B stripes with a small gap at the remaining crossings
      This is complex. A simpler visual trick: draw B fully, then draw clipped A segments
      only in alternating tiles. We'll use the canvas clip rect trick per tile.
    */

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const s = tileSize;
        const fill = Math.max(3, s * widthPct);
        const casing = fill + Math.max(3, s * 0.10);
        const [cA, cB] = PAIRS[pairIndex];

        const diag = Math.sqrt(W*W+H*H) + s*2;
        const nA = Math.ceil(diag / s) + 4;

        // Helper: draw a set of parallel stripes
        function stripes(angle, count, color, lw) {
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.beginPath();
            const perpAngle = angle + Math.PI/2;
            const cosP = Math.cos(perpAngle), sinP = Math.sin(perpAngle);
            const cosA = Math.cos(angle), sinA = Math.sin(angle);
            const cx = W/2, cy = H/2;
            for (let i = -count; i <= count; i++) {
                const ox = cx + i * s * cosP;
                const oy = cy + i * s * sinP;
                ctx.moveTo(ox - diag * cosA, oy - diag * sinA);
                ctx.lineTo(ox + diag * cosA, oy + diag * sinA);
            }
            ctx.stroke();
        }

        const angleA = Math.PI / 4;   // 45°
        const angleB = -Math.PI / 4;  // -45°

        // CASING (dark, slightly wider)
        stripes(angleA, nA, CASING, casing);
        stripes(angleB, nA, CASING, casing);

        // FILL: draw B under A, but simulate over/under by clipping alternating tiles
        // Draw B fully first
        stripes(angleB, nA, cB, fill);

        // Draw A in alternating tile columns (even columns only) fully
        // Draw A in odd columns over B (already there)
        // For pure over/under: use canvas save/clip approach
        // Tile-based clip: for each tile, clip to tile rect and draw A
        // where A is "on top" (even parity), then for odd parity tiles draw B on top of A.
        // Simple approach: just draw both fully, then overdraw the "crossing" squares:
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;

        // Draw A fully
        stripes(angleA, nA, cA, fill);

        // Now overdraw B in "odd" tiles to make it appear over A
        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                if ((c + r) % 2 !== 0) {
                    const x = c * s, y = r * s;
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, s, s);
                    ctx.clip();
                    // redraw casing for B in this tile
                    stripes(angleB, nA, CASING, casing);
                    // redraw B fill
                    stripes(angleB, nA, cB, fill);
                    ctx.restore();
                }
            }
        }
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('pair').addEventListener('change', e => { pairIndex = +e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
