<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Truchet - Ribbonics</title>
    <meta name="description" content="Truchet quarter-circle arcs laid on a running-bond brick grid with offset rows, rendered in warm terracotta and cream with dark casing outlines.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Brick Truchet</h1>
        <p>Classic Truchet quarter-circle arc tiles placed on a running-bond brick layout: every other row is offset by half a brick width. The result is a warm terracotta-and-cream ribbon weave.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="terracotta">Terracotta</option>
                    <option value="adobe">Adobe</option>
                    <option value="cobalt">Cobalt & Cream</option>
                    <option value="forest">Forest</option>
                    <option value="vivid">Vivid</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Brick width <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="18" max="70" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        terracotta: ['#BC6C25','#DDA15E','#E9C46A','#F4A261','#E76F51'],
        adobe:      ['#C1440E','#E87722','#F5C77A','#D4956A','#8B3A0F'],
        cobalt:     ['#1565C0','#1976D2','#42A5F5','#90CAF9','#FEFAE0'],
        forest:     ['#1B4332','#2D6A4F','#40916C','#74C69D','#B7E4C7'],
        vivid:      ['#E63946','#2196F3','#4CAF50','#FF9800','#9C27B0','#00BCD4'],
    };
    // Brick proportions: 2:1 width:height
    const BG_COLORS = {
        terracotta: '#2a1305',
        adobe:      '#1f0e04',
        cobalt:     '#0d1b2e',
        forest:     '#0a1f14',
        vivid:      '#11121e',
    };
    const CASING = '#0a0608';

    let brickW = 80;
    let widthPct = 0.40;
    let paletteName = 'terracotta';
    let W, H;
    let arcs = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const bW = brickW;
        const bH = Math.round(bW / 2);   // running bond: 2:1 ratio
        const rad = bH / 2;               // arc radius = half brick height

        const cols = Math.ceil(W / bW) + 3;
        const rows = Math.ceil(H / bH) + 2;
        const pal = PALETTES[paletteName];

        const parent = new Map();
        function find(k) {
            if (!parent.has(k)) parent.set(k, k);
            let r = k;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(k) !== r) { const nk = parent.get(k); parent.set(k, r); k = nk; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        arcs = [];
        // Running bond: odd rows offset by bW/2
        for (let row = -1; row < rows; row++) {
            const offset = (row % 2 !== 0) ? bW / 2 : 0;
            for (let col = -1; col < cols; col++) {
                const x0 = col * bW - offset;
                const y0 = row * bH;

                // Standard Truchet tile (using bH as the "square" unit with two arcs)
                // The "square" is bH x bH; we tile two per brick horizontally
                // Actually treat each bH×bH sub-square as a Truchet tile
                for (let sub = 0; sub < 2; sub++) {
                    const sx = x0 + sub * bH;
                    const sy = y0;
                    const s = bH;

                    const top    = `h_${Math.round((sx + s/2)*2)}_${Math.round(sy*2)}`;
                    const bottom = `h_${Math.round((sx + s/2)*2)}_${Math.round((sy+s)*2)}`;
                    const left   = `v_${Math.round(sx*2)}_${Math.round((sy + s/2)*2)}`;
                    const right  = `v_${Math.round((sx+s)*2)}_${Math.round((sy + s/2)*2)}`;

                    const config = Math.random() < 0.5 ? 0 : 1;
                    let pairs;
                    if (config === 0) {
                        pairs = [
                            { cx: sx,     cy: sy,     a0: 0,            a1: Math.PI / 2,   n1: top,    n2: left   },
                            { cx: sx + s, cy: sy + s, a0: Math.PI,      a1: Math.PI * 1.5, n1: bottom, n2: right  }
                        ];
                    } else {
                        pairs = [
                            { cx: sx + s, cy: sy,     a0: Math.PI / 2,  a1: Math.PI,       n1: top,    n2: right  },
                            { cx: sx,     cy: sy + s, a0: Math.PI * 1.5, a1: Math.PI * 2,  n1: bottom, n2: left   }
                        ];
                    }
                    for (const p of pairs) {
                        union(p.n1, p.n2);
                        arcs.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1 });
                    }
                }
            }
        }

        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = BG_COLORS[paletteName] || '#11121e';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const bH = Math.round(brickW / 2);
        const fill = Math.max(4, bH * widthPct);
        const casing = fill + Math.max(3, bH * 0.12);

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Color pass
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { brickW = +e.target.value; document.getElementById('sizeVal').textContent = brickW; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
