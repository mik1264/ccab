<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interlaced Rings - Ribbonics</title>
    <meta name="description" content="Grid of overlapping rings with proper over/under interlacing at intersections, like Olympic rings — multicolour with realistic weave depth.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Interlaced Rings</h1>
        <p>A grid of rings woven together with proper over/under interlacing at every intersection. Alternating weave directions create the illusion of real depth.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Ring size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Stroke width <span class="value-display" id="swVal">14</span></label>
            <input type="range" id="sw" min="4" max="36" value="14">
        </div>
        <div class="control-group">
            <label>Overlap <span class="value-display" id="ovVal">30</span>%</label>
            <input type="range" id="ov" min="10" max="48" value="30">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = [
        ['#0085C7','#F4C300','#009F6B','#EE0000','#000000'],
        ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3'],
        ['#E63946','#2A9D8F','#E9C46A','#264653','#F4A261'],
        ['#F72585','#7209B7','#3A0CA3','#4361EE','#06D6A0'],
    ];
    const CASING = '#0d0e1a';
    const BG = '#11121e';

    let ringR = 80;
    let strokeW = 14;
    let overlapPct = 0.30;
    let W, H;
    let rings = [];
    let palette = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
        const overlap = ringR * overlapPct * 2;
        const step = ringR * 2 - overlap;

        rings = [];
        const offX = -ringR;
        const offY = -ringR;
        let row = 0;

        for (let y = offY; y < H + ringR; y += step, row++) {
            let col = 0;
            for (let x = offX; x < W + ringR; x += step, col++) {
                rings.push({
                    x, y,
                    r: ringR,
                    color: palette[(row + col) % palette.length],
                    row, col
                });
            }
        }
    }

    function drawRingSegment(ring, aStart, aEnd) {
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.r, aStart, aEnd);
        ctx.stroke();
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const overlap = ringR * overlapPct * 2;
        const step = ringR * 2 - overlap;
        const casingW = strokeW + Math.max(3, strokeW * 0.35);

        // Strategy: for each ring, draw it in segments
        // At intersection with a ring to its right and below,
        // alternate over/under based on (row+col) parity

        // Pass 1: all rings casing (under everything)
        ctx.lineCap = 'round';
        for (const ring of rings) {
            ctx.strokeStyle = CASING;
            ctx.lineWidth = casingW;
            ctx.beginPath();
            ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Pass 2: draw rings
        // For correct interlacing, we need to paint sections that go "under" first,
        // then repaint the "over" sections on top.
        // Approximate: draw all rings, then repaint intersection "bridge" arcs
        for (const ring of rings) {
            ctx.strokeStyle = ring.color;
            ctx.lineWidth = strokeW;
            ctx.beginPath();
            ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Pass 3: at each intersection, determine which ring goes over
        // Find intersections between horizontally/vertically adjacent rings
        for (let i = 0; i < rings.length; i++) {
            for (let j = i + 1; j < rings.length; j++) {
                const a = rings[i];
                const b = rings[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < a.r + b.r - strokeW && dist > Math.abs(a.r - b.r) + strokeW / 2) {
                    // These rings intersect — find intersection angles
                    // Using law of cosines
                    const cosA = (dist * dist + a.r * a.r - b.r * b.r) / (2 * dist * a.r);
                    const cosB = (dist * dist + b.r * b.r - a.r * a.r) / (2 * dist * b.r);

                    if (Math.abs(cosA) > 1 || Math.abs(cosB) > 1) continue;

                    const angleToB = Math.atan2(dy, dx);
                    const halfSpan = Math.acos(Math.max(-1, Math.min(1, cosA)));

                    const int1A = angleToB - halfSpan;
                    const int2A = angleToB + halfSpan;

                    const angleToA = Math.atan2(-dy, -dx);
                    const halfSpanB = Math.acos(Math.max(-1, Math.min(1, cosB)));
                    const int1B = angleToA - halfSpanB;
                    const int2B = angleToA + halfSpanB;

                    const spanAngle = 0.12; // arc to redraw near intersection

                    // Determine who goes over: alternate by position parity
                    const parity = (a.row + a.col) % 2;
                    const over = parity === 0 ? a : b;
                    const overAngles = parity === 0
                        ? [[int1A - spanAngle, int1A + spanAngle], [int2A - spanAngle, int2A + spanAngle]]
                        : [[int1B - spanAngle, int1B + spanAngle], [int2B - spanAngle, int2B + spanAngle]];

                    // Repaint casing then color for the "over" ring near intersection
                    for (const [aS, aE] of overAngles) {
                        // casing
                        ctx.strokeStyle = CASING;
                        ctx.lineWidth = casingW;
                        ctx.beginPath();
                        ctx.arc(over.x, over.y, over.r, aS, aE);
                        ctx.stroke();

                        // color
                        ctx.strokeStyle = over.color;
                        ctx.lineWidth = strokeW;
                        ctx.beginPath();
                        ctx.arc(over.x, over.y, over.r, aS, aE);
                        ctx.stroke();
                    }
                }
            }
        }
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        ringR = +e.target.value;
        document.getElementById('sizeVal').textContent = ringR;
        regenerate();
    });
    document.getElementById('sw').addEventListener('input', e => {
        strokeW = +e.target.value;
        document.getElementById('swVal').textContent = strokeW;
        draw();
    });
    document.getElementById('ov').addEventListener('input', e => {
        overlapPct = +e.target.value / 100;
        document.getElementById('ovVal').textContent = e.target.value;
        regenerate();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
