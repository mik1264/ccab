<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeycomb Ribbons - Ribbonics</title>
    <meta name="description" content="Hexagonal tiling where each hexagon draws arcs connecting its 6 edges in a random non-crossing matching. Ribbons weave across the hex grid in a multicolour palette.">
    <meta name="theme-color" content="#1a1208">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1208;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(26, 18, 8, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,200,50,0.12);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #FFD700; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9b87a; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 18, 8, 0.88);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,200,50,0.12);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9b87a; }
        .control-group input[type="range"] { width: 100%; accent-color: #FFD700; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,200,50,0.08); color: #f3efe0;
            border: 1px solid rgba(255,200,50,0.2); border-radius: 6px;
        }
        .control-group option { background: #1a1208; }
        .value-display { float: right; color: #FFD700; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #7a5200, #FFD700);
            color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Honeycomb Ribbons</h1>
        <p>Each hexagon in the hex grid draws smooth arcs connecting pairs of its 6 edge midpoints in a random non-crossing matching. Continuous multicolour ribbons weave across the honeycomb.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Hex size <span class="value-display" id="sizeVal">55</span></label>
            <input type="range" id="size" min="25" max="120" value="55">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="wVal">38</span>%</label>
            <input type="range" id="width" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="jewel">Jewel</option>
                    <option value="neon">Neon</option>
                    <option value="earth">Earth</option>
                    <option value="pastel">Pastel</option>
                    <option value="mono">Mono gold</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        jewel:  ['#e91e63','#9c27b0','#3f51b5','#00bcd4','#009688','#4caf50','#ff9800','#f44336'],
        neon:   ['#ff00c8','#00fff7','#aaff00','#ff6600','#8800ff','#00ff88'],
        earth:  ['#8d6e63','#a1887f','#bf8a60','#d4a96a','#795548','#6d4c41','#a68b6e'],
        pastel: ['#f48fb1','#ce93d8','#90caf9','#80deea','#a5d6a7','#fff59d','#ffcc80'],
        mono:   ['#FFD700','#FFC200','#FFAA00','#E8A800','#D4960a','#c88800'],
    };

    let hexSize = 55;
    let widthPct = 0.38;
    let paletteName = 'jewel';
    let W, H;
    let hexCells = [];
    let ribbonArcs = [];
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Flat-top hex: center (cx,cy), size R
    // Vertices at angles: 0,60,120,180,240,300 degrees
    // Edge midpoints between consecutive vertices
    function hexVertices(cx, cy, R) {
        const verts = [];
        for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i; // flat-top: 0 deg = right
            verts.push({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
        }
        return verts;
    }

    function hexEdgeMidpoints(cx, cy, R) {
        const v = hexVertices(cx, cy, R);
        const mids = [];
        for (let i = 0; i < 6; i++) {
            const j = (i + 1) % 6;
            mids.push({
                x: (v[i].x + v[j].x) / 2,
                y: (v[i].y + v[j].y) / 2,
                angle: Math.atan2((v[i].y + v[j].y) / 2 - cy, (v[i].x + v[j].x) / 2 - cx)
            });
        }
        return mids;
    }

    // Non-crossing perfect matchings of 6 items (Catalan number C_3 = 5)
    // These are all 3 non-crossing perfect matchings of {0,1,2,3,4,5}:
    const NON_CROSSING_MATCHINGS = [
        [[0,1],[2,3],[4,5]],
        [[0,1],[2,5],[3,4]],
        [[0,3],[1,2],[4,5]],
        [[0,5],[1,2],[3,4]],
        [[0,5],[1,4],[2,3]],
    ];

    // Edge key for union-find: tile edge index
    function edgeKey(col, row, edgeIdx) {
        return `${col},${row},${edgeIdx}`;
    }

    // For each hex tile, map its local edge to its neighbour's shared edge
    // Flat-top hex neighbours (axial offset coords)
    // Edge 0: right neighbour, shared edge 3
    // Edge 1: bottom-right neighbour, shared edge 4
    // Edge 2: bottom-left neighbour, shared edge 5
    // Edge 3: left neighbour, shared edge 0
    // Edge 4: top-left neighbour, shared edge 1
    // Edge 5: top-right neighbour, shared edge 2
    const EDGE_NEIGHBOUR = [
        { dq: 1,  dr: 0,  shared: 3 },
        { dq: 0,  dr: 1,  shared: 4 },
        { dq: -1, dr: 1,  shared: 5 },
        { dq: -1, dr: 0,  shared: 0 },
        { dq: 0,  dr: -1, shared: 1 },
        { dq: 1,  dr: -1, shared: 2 },
    ];

    function build() {
        hexCells = [];
        ribbonArcs = [];

        const R = hexSize;
        // Flat-top hex layout
        // col spacing: R * sqrt(3)
        // row spacing: R * 1.5
        const colW = R * Math.sqrt(3);
        const rowH = R * 1.5;

        const numCols = Math.ceil(W / colW) + 3;
        const numRows = Math.ceil(H / rowH) + 3;

        // Build cells map: key -> { q, r, cx, cy, matching }
        const cellMap = new Map();

        for (let row = -1; row < numRows; row++) {
            for (let col = -1; col < numCols; col++) {
                const cx = col * colW + (row % 2 === 0 ? 0 : colW / 2);
                const cy = row * rowH;
                const matchIdx = Math.floor(Math.random() * NON_CROSSING_MATCHINGS.length);
                cellMap.set(`${col},${row}`, {
                    col, row, cx, cy,
                    matching: NON_CROSSING_MATCHINGS[matchIdx]
                });
            }
        }

        // Union-find over edge midpoints
        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        // For each cell, for each arc in the matching, union the two edge midpoints
        // and also union shared edges between neighbours
        for (const [key, cell] of cellMap) {
            const { col, row, matching } = cell;
            // Union shared edges between neighbours
            for (let e = 0; e < 6; e++) {
                const nb = EDGE_NEIGHBOUR[e];
                const nKey = `${col + nb.dq},${row + nb.dr}`;
                if (cellMap.has(nKey)) {
                    union(edgeKey(col, row, e), edgeKey(col + nb.dq, row + nb.dr, nb.shared));
                }
            }
        }

        // Now union arcs within each cell
        for (const [key, cell] of cellMap) {
            const { col, row, matching } = cell;
            for (const [e0, e1] of matching) {
                union(edgeKey(col, row, e0), edgeKey(col, row, e1));
            }
        }

        // Assign colours
        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const [key, cell] of cellMap) {
            const { col, row, cx, cy, matching } = cell;
            const mids = hexEdgeMidpoints(cx, cy, R);

            for (const [e0, e1] of matching) {
                const root = find(edgeKey(col, row, e0));
                if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
                const color = rootColor.get(root);

                // Compute the arc for this pair of edge midpoints
                // We draw a smooth curve inside the hexagon connecting mids[e0] to mids[e1]
                // Use a quadratic bezier control point at the hexagon center (scaled)
                const p0 = mids[e0];
                const p1 = mids[e1];

                // Determine the arc direction: if edges are adjacent (diff=1 or 5), tight curve
                // If opposite (diff=3), straight line. Otherwise medium curve.
                const diff = Math.min(Math.abs(e1 - e0), 6 - Math.abs(e1 - e0));

                // Control point: towards center for adjacent arcs, away for far arcs
                let cpScale;
                if (diff === 1) cpScale = 0.35;
                else if (diff === 2) cpScale = 0.55;
                else cpScale = 0.0; // opposite: straight through center

                const cpx = cx * (1 - cpScale) + (p0.x + p1.x) / 2 * cpScale;
                const cpy = cy * (1 - cpScale) + (p0.y + p1.y) / 2 * cpScale;

                ribbonArcs.push({ p0, p1, cpx, cpy, cx, cy, diff, color });
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#1a1208';
        ctx.fillRect(0, 0, W, H);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const ribbonW = Math.max(2, hexSize * widthPct);
        const casingW = ribbonW + Math.max(3, hexSize * 0.08);

        // Pass 1: dark casing
        ctx.strokeStyle = '#0a0806';
        ctx.lineWidth = casingW;
        ctx.beginPath();
        for (const a of ribbonArcs) {
            ctx.moveTo(a.p0.x, a.p0.y);
            if (a.diff === 3) {
                // Opposite edges: line through center
                ctx.lineTo(a.cx, a.cy);
                ctx.lineTo(a.p1.x, a.p1.y);
            } else {
                ctx.quadraticCurveTo(a.cpx, a.cpy, a.p1.x, a.p1.y);
            }
        }
        ctx.stroke();

        // Pass 2: coloured ribbons
        ctx.lineWidth = ribbonW;
        const byColor = {};
        for (const a of ribbonArcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.p0.x, a.p0.y);
                if (a.diff === 3) {
                    ctx.lineTo(a.cx, a.cy);
                    ctx.lineTo(a.p1.x, a.p1.y);
                } else {
                    ctx.quadraticCurveTo(a.cpx, a.cpy, a.p1.x, a.p1.y);
                }
            }
            ctx.stroke();
        }

        // Pass 3: thin highlight sheen
        ctx.lineWidth = Math.max(1, ribbonW * 0.22);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.beginPath();
        for (const a of ribbonArcs) {
            ctx.moveTo(a.p0.x, a.p0.y);
            if (a.diff === 3) {
                ctx.lineTo(a.cx, a.cy);
                ctx.lineTo(a.p1.x, a.p1.y);
            } else {
                ctx.quadraticCurveTo(a.cpx, a.cpy, a.p1.x, a.p1.y);
            }
        }
        ctx.stroke();
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        hexSize = +e.target.value;
        document.getElementById('sizeVal').textContent = hexSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('wVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
