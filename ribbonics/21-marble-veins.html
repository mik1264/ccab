<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Veins - Ribbonics</title>
    <meta name="description" content="Truchet arcs with organic jitter and varying stroke width evoke marble or wood veining; a warm earthy palette on cream background.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,252,240,0.88);
            color: #3d3220;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(188,108,37,0.2);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #BC6C25; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #5c4a30; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,252,240,0.88);
            color: #3d3220;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(188,108,37,0.2);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #5c4a30; }
        .control-group input[type="range"] { width: 100%; accent-color: #BC6C25; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.7); color: #3d3220;
            border: 1px solid rgba(188,108,37,0.3); border-radius: 6px;
        }
        .control-group option { background: #fffbe8; }
        .value-display { float: right; color: #BC6C25; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Marble Veins</h1>
        <p>Quarter-circle arcs are drawn with organic random jitter in radius and position, plus variable stroke width, imitating the flowing veins found in polished marble or wood grain.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="30" max="130" value="72">
        </div>
        <div class="control-group">
            <label>Jitter <span class="value-display" id="jitterVal">30</span>%</label>
            <input type="range" id="jitter" min="0" max="60" value="30">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="marble">White Marble</option>
                    <option value="wood">Walnut Wood</option>
                    <option value="slate">Grey Slate</option>
                    <option value="verde">Verde Antico</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        marble: { bg: '#f8f4ee', veins: ['#c8b89a','#b09070','#8a6848','#d8cfc0','#9c8060'], casing: '#e8e0d4' },
        wood:   { bg: '#c8923a', veins: ['#7a4a18','#5c3210','#9a6228','#b87830','#4a2808'], casing: '#9a6228' },
        slate:  { bg: '#d4d8dc', veins: ['#4a5058','#6a7078','#3a4048','#8a9098','#2a3038'], casing: '#c0c4c8' },
        verde:  { bg: '#c8d8c0', veins: ['#386048','#284838','#507858','#204030','#689068'], casing: '#b0c8a8' }
    };

    let tileSize = 72;
    let jitterPct = 0.30;
    let paletteName = 'marble';
    let W, H;
    let arcs = [];

    function seededRand(seed) {
        // simple lcg for per-arc deterministic jitter; actually we just store jitter in arcs
        return Math.random;
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = tileSize;
        const baseR = s / 2;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;
        const pal = PALETTES[paletteName];

        arcs = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x0 = col * s, y0 = row * s;
                const config = Math.random() < 0.5 ? 0 : 1;
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5 }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI       },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2   }
                    ];
                }
                for (const p of pairs) {
                    // organic jitter: offset cx,cy and radius
                    const jMax = s * jitterPct * 0.25;
                    const jcx = (Math.random() - 0.5) * jMax * 2;
                    const jcy = (Math.random() - 0.5) * jMax * 2;
                    const jr  = baseR + (Math.random() - 0.5) * jMax * 2;
                    const veinWidth = 1.5 + Math.random() * (s * 0.12);
                    const color = pal.veins[Math.floor(Math.random() * pal.veins.length)];
                    arcs.push({
                        cx: p.cx + jcx, cy: p.cy + jcy, r: jr,
                        a0: p.a0, a1: p.a1,
                        width: veinWidth, color
                    });
                }
            }
        }
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        // Light background casing pass
        ctx.strokeStyle = pal.casing;
        for (const a of arcs) {
            ctx.lineWidth = a.width + 2;
            ctx.beginPath();
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            ctx.stroke();
        }

        // Vein pass
        for (const a of arcs) {
            ctx.strokeStyle = a.color;
            ctx.lineWidth = a.width;
            ctx.globalAlpha = 0.55 + Math.random() * 0.3;
            ctx.beginPath();
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('jitter').addEventListener('input', e => {
        jitterPct = +e.target.value / 100;
        document.getElementById('jitterVal').textContent = e.target.value;
        regenerate();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        regenerate();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
