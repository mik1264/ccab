<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ribbonics - Review</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1b26; color: #e6e6e6; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 16px; background: #24283b; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; color: #DDA15E; }
  #progress { font-size: 13px; color: #9aa5ce; }
  button { background: #414868; color: #fff; border: none; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #565f89; }
  .main { flex: 1; display: flex; overflow: hidden; }
  .sidebar { width: 280px; overflow-y: auto; background: #16161e; border-right: 1px solid #333; }
  .item { padding: 8px 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .item:hover { background: #24283b; }
  .item.active { background: #2d3148; }
  .item .nm { flex: 1; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; }
  .b-new { background: #7aa2f7; color: #000; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; flex-shrink: 0; }
  .dot.good { background: #9ece6a; } .dot.okay { background: #e0af68; } .dot.bad { background: #f7768e; }
  .viewer { flex: 1; display: flex; flex-direction: column; }
  iframe { flex: 1; border: none; background: #fff; width: 100%; }
  .rate { padding: 10px; background: #24283b; display: flex; gap: 10px; justify-content: center; }
  .rate button { padding: 10px 26px; font-size: 14px; font-weight: 700; }
  .r-good { background: #9ece6a; color: #000; } .r-okay { background: #e0af68; color: #000; } .r-bad { background: #f7768e; color: #000; }
</style>
</head>
<body>
<header>
  <h1>Ribbonics Review</h1>
  <span id="progress"></span>
  <button onclick="exportReport()">Export Report</button>
  <button onclick="if(confirm('Reset all ratings?')){localStorage.removeItem(STORAGE_KEY);location.reload();}">Reset</button>
</header>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="viewer">
    <iframe id="frame" src=""></iframe>
    <div class="rate">
      <button class="r-good" onclick="rate('good')">Good (1)</button>
      <button class="r-okay" onclick="rate('okay')">Okay (2)</button>
      <button class="r-bad" onclick="rate('bad')">Bad (3)</button>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY = 'ribbonics-review-v1';
const DEMOS = [
  ['01-classic-ribbon-weave', 'Classic Ribbon Weave', true],
  ['02-hex-ribbonics', 'Hex Ribbonics', true],
  ['03-triangular-truchet', 'Triangular Truchet', true],
  ['04-maze-truchet', 'Maze Truchet', true],
  ['05-multiscale-truchet', 'Multiscale Truchet', true],
  ['06-smith-diagonal-weave', 'Smith Diagonal Weave', true],
  ['07-quarter-circle-mosaic', 'Quarter-Circle Mosaic', true],
  ['08-celtic-knot-weave', 'Celtic Knot Weave', true],
  ['09-carpet-ribbons', 'Carpet Ribbons', true],
  ['10-neon-ribbon-tubes', 'Neon Ribbon Tubes', true],
  ['11-stained-glass-truchet', 'Stained Glass Truchet', true],
  ['12-woven-basket', 'Woven Basket', true],
  ['13-ribbon-spaghetti', 'Ribbon Spaghetti', true],
  ['14-op-art-truchet', 'Op-Art Truchet', true],
  ['15-pipe-network', 'Pipe Network', true],
  ['16-circuit-traces', 'Circuit Traces', true],
  ['17-honeycomb-ribbons', 'Honeycomb Ribbons', true],
  ['18-pinwheel-truchet', 'Pinwheel Truchet', true],
  ['19-labyrinth-loops', 'Labyrinth Loops', true],
  ['20-gradient-ribbons', 'Gradient Ribbons', true],
  ['21-marble-veins', 'Marble Veins', true],
  ['22-wang-tile-weave', 'Wang Tile Weave', true],
  ['23-two-tone-triangles', 'Two-Tone Triangles', true],
  ['24-diagonal-stripe-truchet', 'Diagonal Stripe Truchet', true],
  ['25-concentric-arc-ribbons', 'Concentric Arc Ribbons', true],
  ['26-brick-ribbon-lattice', 'Brick Ribbon Lattice', true],
  ['27-rounded-square-maze', 'Rounded Square Maze', true],
  ['28-spiral-truchet', 'Spiral Truchet', true],
  ['29-knotwork-bands', 'Knotwork Bands', true],
  ['30-tatami-weave', 'Tatami Weave', true],
  ['31-penrose-ribbons', 'Penrose Ribbons', true],
  ['32-voronoi-ribbon-borders', 'Voronoi Ribbon Borders', true],
  ['33-hilbert-ribbon', 'Hilbert Ribbon', true],
  ['34-rotating-truchet', 'Rotating Truchet', true],
  ['35-isometric-cube-weave', 'Isometric Cube Weave', true],
  ['36-tartan-plaid', 'Tartan Plaid', true],
  ['37-interlaced-rings', 'Interlaced Rings', true],
  ['38-mosaic-tiles', 'Mosaic Tiles', true],
  ['39-ribbon-flow-field', 'Ribbon Flow Field', true],
  ['40-truchet-contours', 'Truchet Contours', true],
  ['41-hex-pipe-maze', 'Hex Pipe Maze', true],
  ['42-triangle-pinwheel', 'Triangle Pinwheel', true],
  ['43-quilt-blocks', 'Quilt Blocks', true],
  ['44-ribbon-mandala', 'Ribbon Mandala', true],
  ['45-crosshatch-weave', 'Crosshatch Weave', true],
  ['46-chevron-ribbons', 'Chevron Ribbons', true],
  ['47-brick-truchet', 'Brick Truchet', true],
  ['48-octagon-square-weave', 'Octagon-Square Weave', true],
  ['49-kagome-weave', 'Kagome Weave', true],
  ['50-greek-key-meander', 'Greek Key Meander', true],
  ['51-rope-coils', 'Rope Coils', true],
  ['52-gradient-maze', 'Gradient Maze', true],
  ['53-diamond-weave', 'Diamond Weave', true],
  ['54-twill-fabric', 'Twill Fabric', true],
  ['55-herringbone-ribbons', 'Herringbone Ribbons', true],
  ['56-celtic-rope', 'Celtic Rope', true],
  ['57-stitch-embroidery', 'Stitch Embroidery', true],
  ['58-snake-truchet', 'Snake Truchet', true],
  ['59-rainbow-loops', 'Rainbow Loops', true],
  ['60-polychrome-hex-weave', 'Polychrome Hex Weave', true],
  ['61-ribbon-swirl', 'Ribbon Swirl', true],
  ['62-mixed-tessellation', 'Mixed Tessellation', true],
  ['63-woven-mat', 'Woven Mat', true],
  ['64-truchet-tapestry', 'Truchet Tapestry', true]
];
let ratings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let current = 0;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings)); }
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  DEMOS.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'item' + (i === current ? ' active' : '');
    el.onclick = () => { current = i; load(); };
    el.innerHTML = `<span class="dot ${ratings[d[0]]||''}"></span><span class="nm">${i+1}. ${d[1]}</span>` + (d[2] ? '<span class="badge b-new">NEW</span>' : '');
    sb.appendChild(el);
  });
  const rated = Object.keys(ratings).length;
  document.getElementById('progress').textContent = `${rated} / ${DEMOS.length} rated`;
}
function load() { document.getElementById('frame').src = DEMOS[current][0] + '.html'; renderSidebar(); }
function rate(r) {
  ratings[DEMOS[current][0]] = r; save();
  if (current < DEMOS.length - 1) { current++; load(); } else renderSidebar();
}
function exportReport() {
  const report = DEMOS.map(d => ({ file: d[0], name: d[1], rating: ratings[d[0]] || 'unrated' }));
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'ribbonics-review.json'; a.click();
}
document.addEventListener('keydown', e => {
  if (e.key === '1') rate('good'); else if (e.key === '2') rate('okay'); else if (e.key === '3') rate('bad');
  else if (e.key === 'ArrowDown' && current < DEMOS.length-1) { current++; load(); }
  else if (e.key === 'ArrowUp' && current > 0) { current--; load(); }
});
load();
</script>
</body>
</html>
