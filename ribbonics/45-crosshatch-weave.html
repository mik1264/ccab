<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosshatch Weave - Ribbonics</title>
    <meta name="description" content="Fine crosshatched line tiles in varied orientations forming a tonal woven texture — ink lines on cream, with each tile a unique hatch direction.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Crosshatch Weave</h1>
        <p>Each tile is filled with a unique crosshatch orientation — horizontal, vertical, diagonal, or combined — building up a tonal etching that reads as a woven textile from a distance.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Style
                <select id="style">
                    <option value="inkCream">Ink on Cream</option>
                    <option value="color">Multicolor</option>
                    <option value="blueprint">Blueprint</option>
                    <option value="charcoal">Charcoal</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">48</span></label>
            <input type="range" id="size" min="24" max="120" value="48">
        </div>
        <div class="control-group">
            <label>Line spacing <span class="value-display" id="spacingVal">6</span></label>
            <input type="range" id="spacing" min="3" max="16" value="6">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const STYLES = {
        inkCream: { bg: '#F8F0DC', colors: ['rgba(40,25,10,0.85)','rgba(40,25,10,0.65)','rgba(40,25,10,0.45)','rgba(40,25,10,0.30)'], tileBg: null },
        color:    { bg: '#1a1a2e', colors: ['#E63946','#2196F3','#4CAF50','#FF9800','#9C27B0','#00BCD4','#FFEB3B'], tileBg: 'rgba(255,255,255,0.04)' },
        blueprint:{ bg: '#1a3a5c', colors: ['rgba(180,210,255,0.9)','rgba(160,200,255,0.7)','rgba(140,185,255,0.5)'], tileBg: null },
        charcoal: { bg: '#e8e4dc', colors: ['rgba(30,30,30,0.9)','rgba(50,50,50,0.7)','rgba(80,80,80,0.5)','rgba(110,110,110,0.35)'], tileBg: null },
    };

    // 8 hatch types: 0=none,1=horiz,2=vert,3=diag-right,4=diag-left,5=cross,6=cross-diag,7=dense
    const HATCH_TYPES = [0,1,2,3,4,5,6,7];

    let tileSize = 48;
    let lineSpacing = 6;
    let styleName = 'inkCream';
    let W, H;
    let tiles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const S = tileSize;
        const cols = Math.ceil(W / S) + 1;
        const rows = Math.ceil(H / S) + 1;
        const sty = STYLES[styleName];
        tiles = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const hatch = HATCH_TYPES[Math.floor(Math.random() * HATCH_TYPES.length)];
                const colorIdx = Math.floor(Math.random() * sty.colors.length);
                tiles.push({ x: c * S, y: r * S, hatch, colorIdx });
            }
        }
    }

    function drawHatchLines(x, y, S, hatch, color, spacing) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, S, S);
        ctx.clip();

        ctx.strokeStyle = color;
        ctx.lineWidth = 0.9;
        ctx.lineCap = 'butt';

        const pad = 2;

        function drawLines(angle) {
            ctx.save();
            ctx.translate(x + S / 2, y + S / 2);
            ctx.rotate(angle);
            const ext = S * 1.5;
            for (let t = -ext; t <= ext; t += spacing) {
                ctx.beginPath();
                ctx.moveTo(-ext, t);
                ctx.lineTo(ext, t);
                ctx.stroke();
            }
            ctx.restore();
        }

        const PI = Math.PI;
        switch (hatch) {
            case 0: /* none */ break;
            case 1: drawLines(0); break;             // horizontal
            case 2: drawLines(PI / 2); break;        // vertical
            case 3: drawLines(PI / 4); break;        // diag right
            case 4: drawLines(-PI / 4); break;       // diag left
            case 5: drawLines(0); drawLines(PI / 2); break;  // cross
            case 6: drawLines(PI / 4); drawLines(-PI / 4); break; // cross-diag
            case 7: // dense all 4
                drawLines(0); drawLines(PI / 2);
                drawLines(PI / 4); drawLines(-PI / 4);
                break;
        }
        ctx.restore();
    }

    function draw() {
        const sty = STYLES[styleName];
        ctx.fillStyle = sty.bg;
        ctx.fillRect(0, 0, W, H);

        const S = tileSize;
        for (const t of tiles) {
            if (sty.tileBg) {
                ctx.fillStyle = sty.tileBg;
                ctx.fillRect(t.x, t.y, S, S);
            }
            drawHatchLines(t.x, t.y, S, t.hatch, sty.colors[t.colorIdx], lineSpacing);

            // subtle tile border
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(t.x + 0.5, t.y + 0.5, S - 1, S - 1);
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('style').addEventListener('change', e => { styleName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('spacing').addEventListener('input', e => { lineSpacing = +e.target.value; document.getElementById('spacingVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
