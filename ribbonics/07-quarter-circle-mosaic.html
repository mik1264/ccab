<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter-Circle Mosaic - Ribbonics</title>
    <meta name="description" content="Truchet tiles where each quarter-circle is a solid filled pie wedge rather than a stroke — producing a vivid blob mosaic of flowing colour shapes.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Quarter-Circle Mosaic</h1>
        <p>Classic Truchet tiling rendered as solid filled pie wedges instead of strokes. Two quarter-circles per tile combine into amoeba-like blobs and smooth curves — a vivid stained-glass mosaic.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="court">Basketball Court</option>
                    <option value="candy">Candy Pop</option>
                    <option value="meadow">Meadow</option>
                    <option value="sunset">Sunset</option>
                    <option value="neon">Neon Night</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="20" max="160" value="64">
        </div>
        <div class="control-group">
            <label>Gap width <span class="value-display" id="gapVal">2</span>px</label>
            <input type="range" id="gap" min="0" max="12" value="2">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        court:  ['#C0392B','#2E86AB','#27AE60','#E67E22','#E84393','#F1C40F','#16A085'],
        candy:  ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#1A535C','#FFA630'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A'],
        sunset: ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49','#E63946'],
        neon:   ['#ff00ff','#00ffff','#ffff00','#ff6600','#00ff88','#6600ff','#ff0044']
    };
    const BG = '#FEFAE0';

    let tileSize = 64;
    let gap = 2;
    let paletteName = 'court';
    let W, H;
    let cells = [];

    function makeUF() {
        const p = {};
        const find = k => { if(p[k]===undefined)p[k]=k; if(p[k]!==k)p[k]=find(p[k]); return p[k]; };
        const union = (a,b)=>{ p[find(a)]=find(b); };
        return {find,union};
    }

    function build() {
        cells = [];
        const cols = Math.ceil(W / tileSize) + 1;
        const rows = Math.ceil(H / tileSize) + 1;
        const uf = makeUF();

        // We assign colours per connected blob (same as classic Truchet but filled)
        // Edge-midpoint union-find for colouring
        const h = (c, r) => 'h_'+c+'_'+r;
        const v = (c, r) => 'v_'+c+'_'+r;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cfg = Math.random() < 0.5 ? 0 : 1;
                cells.push({ c, r, cfg });
                const top = h(c,r), bot = h(c,r+1), lft = v(c,r), rgt = v(c+1,r);
                if (cfg === 0) { uf.union(top, lft); uf.union(bot, rgt); }
                else           { uf.union(top, rgt); uf.union(bot, lft); }
            }
        }

        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        const h2 = (c, r) => 'h_'+c+'_'+r;
        const v2 = (c, r) => 'v_'+c+'_'+r;
        for (const cell of cells) {
            const {c, r, cfg} = cell;
            const top = h2(c,r), lft = v2(c,r), rgt = v2(c+1,r);
            const nodeA = cfg === 0 ? top : top;
            const rootA = uf.find(top);
            if (!rootColor.has(rootA)) rootColor.set(rootA, pal[next++ % pal.length]);
            cell.colorA = rootColor.get(rootA);

            const bot = h2(c,r+1);
            const rootB = uf.find(bot);
            if (!rootColor.has(rootB)) rootColor.set(rootB, pal[next++ % pal.length]);
            cell.colorB = rootColor.get(rootB);
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const s = tileSize;
        const g = gap;

        for (const cell of cells) {
            const { c, r, cfg, colorA, colorB } = cell;
            const x0 = c * s + g;
            const y0 = r * s + g;
            const ts = s - g * 2;
            if (ts <= 0) continue;

            /*
              Each tile: two filled quarter-circle wedges (pie slices) of radius = tile size.
              cfg=0: TL quarter (corner at x0,y0, radius ts) + BR quarter (corner at x0+ts,y0+ts)
              cfg=1: TR quarter + BL quarter
            */

            if (cfg === 0) {
                // TL wedge: pie from 0 to PI/2 at corner (x0, y0)
                ctx.fillStyle = colorA;
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                ctx.arc(x0, y0, ts, 0, Math.PI / 2);
                ctx.closePath();
                ctx.fill();

                // BR wedge: pie from PI to 3*PI/2 at corner (x0+ts, y0+ts)
                ctx.fillStyle = colorB;
                ctx.beginPath();
                ctx.moveTo(x0 + ts, y0 + ts);
                ctx.arc(x0 + ts, y0 + ts, ts, Math.PI, Math.PI * 1.5);
                ctx.closePath();
                ctx.fill();
            } else {
                // TR wedge: pie from PI/2 to PI at corner (x0+ts, y0)
                ctx.fillStyle = colorA;
                ctx.beginPath();
                ctx.moveTo(x0 + ts, y0);
                ctx.arc(x0 + ts, y0, ts, Math.PI / 2, Math.PI);
                ctx.closePath();
                ctx.fill();

                // BL wedge: pie from 3*PI/2 to 2*PI at corner (x0, y0+ts)
                ctx.fillStyle = colorB;
                ctx.beginPath();
                ctx.moveTo(x0, y0 + ts);
                ctx.arc(x0, y0 + ts, ts, Math.PI * 1.5, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('gap').addEventListener('input', e => { gap = +e.target.value; document.getElementById('gapVal').textContent = gap; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
