<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penrose Ribbons - Ribbonics</title>
    <meta name="description" content="Penrose P3 rhombus tiling generated by subdivision of fat and thin rhombi, with ribbon arcs crossing each rhombus to form 5-fold woven patterns.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0e18;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Penrose Ribbons</h1>
        <p>A Penrose P3 rhombus tiling built by deflation/subdivision of fat (&amp; thin) rhombi. Ribbon arcs cross each rhombus, chaining into 5-fold quasi-periodic woven patterns with no true repetition.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="gold">Gold & Blue</option>
                    <option value="rose">Rose & Teal</option>
                    <option value="jewel">Jewel</option>
                    <option value="sunset">Sunset</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Subdivisions <span class="value-display" id="divVal">4</span></label>
            <input type="range" id="div" min="2" max="6" value="4">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="rwVal">40</span>%</label>
            <input type="range" id="rw" min="10" max="70" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        gold:   { fat: '#E9C46A', thin: '#2A9D8F', bg: '#0d0e18', casing: '#07080f' },
        rose:   { fat: '#FF6B9D', thin: '#4ECDC4', bg: '#0f0d14', casing: '#08060a' },
        jewel:  { fat: '#9B59B6', thin: '#2E86AB', bg: '#0a0b12', casing: '#050609' },
        sunset: { fat: '#F77F00', thin: '#7209B7', bg: '#10080e', casing: '#060305' }
    };

    const PHI = (1 + Math.sqrt(5)) / 2;
    let subdivisions = 4, ribbonPct = 0.40, paletteName = 'gold';
    let W, H, triangles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Penrose P3 tiling via "triangle" (Robinson triangle) subdivision
    // Each triangle is { type: 'fat'|'thin', A, B, C } where A is the apex
    function subdivide(tris) {
        const out = [];
        for (const { type, A, B, C } of tris) {
            if (type === 'fat') {
                // Fat rhombus triangle: golden gnomon
                // Split: P divides BC such that BP/BC = 1/phi
                const P = { x: A.x + (B.x - A.x) / PHI, y: A.y + (B.y - A.y) / PHI };
                out.push({ type: 'fat',  A: C,  B: P,  C: B });
                out.push({ type: 'thin', A: P,  B: C,  C: A });
            } else {
                // Thin triangle: split into one fat and one thin
                const Q = { x: B.x + (C.x - B.x) / PHI, y: B.y + (C.y - B.y) / PHI };
                const R = { x: B.x + (A.x - B.x) / PHI, y: B.y + (A.y - B.y) / PHI };
                out.push({ type: 'thin', A: R,  B: C,  C: A });
                out.push({ type: 'thin', A: Q,  B: R,  C: B });
                out.push({ type: 'fat',  A: R,  B: Q,  C: C });
            }
        }
        return out;
    }

    function build() {
        // Start with a wheel of 10 fat triangles (forming a decagon)
        const cx = W / 2, cy = H / 2;
        const size = Math.min(W, H) * 0.6;
        const initial = [];
        for (let i = 0; i < 10; i++) {
            const a1 = (2 * i - 1) * Math.PI / 10;
            const a2 = (2 * i + 1) * Math.PI / 10;
            const B = { x: cx + size * Math.cos(a1), y: cy + size * Math.sin(a1) };
            const C = { x: cx + size * Math.cos(a2), y: cy + size * Math.sin(a2) };
            const A = { x: cx, y: cy };
            // Alternate type for full pattern
            if (i % 2 === 0) {
                initial.push({ type: 'fat', A, B, C });
            } else {
                initial.push({ type: 'fat', A, B: C, C: B });
            }
        }

        triangles = initial;
        for (let d = 0; d < subdivisions; d++) triangles = subdivide(triangles);
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Draw rhombus faces by pairing triangles (or just draw each triangle distinctly)
        // For each triangle, draw a ribbon arc from midpoint of one edge to midpoint of another
        const ribbonW = ribbonPct;

        // First pass: draw all triangle fills
        for (const tri of triangles) {
            ctx.fillStyle = tri.type === 'fat' ? pal.fat + '22' : pal.thin + '22';
            ctx.beginPath();
            ctx.moveTo(tri.A.x, tri.A.y);
            ctx.lineTo(tri.B.x, tri.B.y);
            ctx.lineTo(tri.C.x, tri.C.y);
            ctx.closePath();
            ctx.fill();
        }

        // Second pass: draw ribbon arcs on each triangle
        // Arc connects midpoint of AB to midpoint of AC, curving through the interior
        for (const tri of triangles) {
            const mAB = { x: (tri.A.x + tri.B.x) * 0.5, y: (tri.A.y + tri.B.y) * 0.5 };
            const mAC = { x: (tri.A.x + tri.C.x) * 0.5, y: (tri.A.y + tri.C.y) * 0.5 };

            // Edge length for ribbon thickness
            const lenAB = Math.hypot(tri.B.x - tri.A.x, tri.B.y - tri.A.y);
            const rw = Math.max(1, lenAB * ribbonW);
            const cw = rw + Math.max(1.5, rw * 0.2);

            // Draw a bezier arc from mAB to mAC curving toward A
            const cpX = tri.A.x * 0.7 + (mAB.x + mAC.x) * 0.15;
            const cpY = tri.A.y * 0.7 + (mAB.y + mAC.y) * 0.15;

            // Casing
            ctx.strokeStyle = pal.casing;
            ctx.lineWidth = cw;
            ctx.beginPath();
            ctx.moveTo(mAB.x, mAB.y);
            ctx.quadraticCurveTo(cpX, cpY, mAC.x, mAC.y);
            ctx.stroke();

            // Ribbon
            ctx.strokeStyle = tri.type === 'fat' ? pal.fat : pal.thin;
            ctx.lineWidth = rw;
            ctx.beginPath();
            ctx.moveTo(mAB.x, mAB.y);
            ctx.quadraticCurveTo(cpX, cpY, mAC.x, mAC.y);
            ctx.stroke();
        }

        // Third pass: draw edges
        ctx.strokeStyle = pal.casing;
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = 0.3;
        for (const tri of triangles) {
            ctx.beginPath();
            ctx.moveTo(tri.A.x, tri.A.y);
            ctx.lineTo(tri.B.x, tri.B.y);
            ctx.lineTo(tri.C.x, tri.C.y);
            ctx.closePath();
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('div').addEventListener('input', e => {
        subdivisions = +e.target.value;
        document.getElementById('divVal').textContent = subdivisions;
        regenerate();
    });
    document.getElementById('rw').addEventListener('input', e => {
        ribbonPct = +e.target.value / 100;
        document.getElementById('rwVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
