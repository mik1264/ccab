<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Truchet - Ribbonics</title>
    <meta name="description" content="Classic 10-PRINT style maze: each square tile holds a random diagonal (╲ or ╱) rendered as a thick rounded ribbon on a dark background, tracing continuous winding corridors.">
    <meta name="theme-color" content="#11121e">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.85);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.85);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Maze Truchet</h1>
        <p>Each tile draws a single diagonal — backslash or forward-slash — as a thick rounded ribbon. The 10-PRINT maze pattern emerges: winding corridors snake across the dark canvas in a bold accent colour.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Accent colour
                <select id="accent">
                    <option value="#4ECDC4">Teal</option>
                    <option value="#F1C40F">Gold</option>
                    <option value="#E84393">Magenta</option>
                    <option value="#2E86AB">Blue</option>
                    <option value="#27AE60">Green</option>
                    <option value="#E67E22">Orange</option>
                    <option value="#C0392B">Red</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">52</span></label>
            <input type="range" id="size" min="18" max="120" value="52">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">50</span>%</label>
            <input type="range" id="width" min="20" max="80" value="50">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const BG = '#11121e';
    const CASING = '#070810';

    let tileSize = 52;
    let widthPct = 0.50;
    let accent = '#4ECDC4';
    let W, H;
    let tiles = [];

    function build() {
        tiles = [];
        const cols = Math.ceil(W / tileSize) + 1;
        const rows = Math.ceil(H / tileSize) + 1;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                tiles.push({ c, r, diag: Math.random() < 0.5 ? 0 : 1 });
            }
        }
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const s = tileSize;
        const fill = Math.max(3, s * widthPct);
        const casing = fill + Math.max(3, s * 0.12);

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // We draw two passes: casing then fill.
        // Each tile: diag=0 → top-left to bottom-right (\)
        //            diag=1 → top-right to bottom-left (/)
        // But to make them look like arcs (curvy Truchet), we use quadratic curves
        // with control points at the tile centre.

        function drawTile(t) {
            const x0 = t.c * s, y0 = t.r * s;
            // midpoints of edges
            const top    = [x0 + s/2, y0];
            const bottom = [x0 + s/2, y0 + s];
            const left   = [x0,       y0 + s/2];
            const right  = [x0 + s,   y0 + s/2];
            const cx = x0 + s/2, cy = y0 + s/2;

            if (t.diag === 0) {
                // top-left arc: top → left via corner TL
                ctx.moveTo(top[0], top[1]);
                ctx.quadraticCurveTo(x0, y0, left[0], left[1]);
                // bottom-right arc: bottom → right via corner BR
                ctx.moveTo(bottom[0], bottom[1]);
                ctx.quadraticCurveTo(x0+s, y0+s, right[0], right[1]);
            } else {
                // top-right arc: top → right via corner TR
                ctx.moveTo(top[0], top[1]);
                ctx.quadraticCurveTo(x0+s, y0, right[0], right[1]);
                // bottom-left arc: bottom → left via corner BL
                ctx.moveTo(bottom[0], bottom[1]);
                ctx.quadraticCurveTo(x0, y0+s, left[0], left[1]);
            }
        }

        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const t of tiles) drawTile(t);
        ctx.stroke();

        ctx.strokeStyle = accent;
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const t of tiles) drawTile(t);
        ctx.stroke();
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('accent').addEventListener('change', e => { accent = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => { tileSize = +e.target.value; document.getElementById('sizeVal').textContent = tileSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
