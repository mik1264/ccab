<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinwheel Truchet - Ribbonics</title>
    <meta name="description" content="Each tile is a rotating pinwheel of four arcs; colour shifts subtly by angle, creating a lively spinning look across the grid.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Pinwheel Truchet</h1>
        <p>Each tile holds a pinwheel of four quarter-circle arcs drawn from each corner. Colour shifts subtly by arc angle, giving the grid a lively spinning, kaleidoscopic look.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="30" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">36</span>%</label>
            <input type="range" id="width" min="15" max="65" value="36">
        </div>
        <div class="control-group">
            <label>Hue spread <span class="value-display" id="hueVal">180</span>°</label>
            <input type="range" id="hue" min="30" max="360" value="180">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CASING = '#0d0e18';

    let tileSize = 60;
    let widthPct = 0.36;
    let hueSpread = 180;
    let W, H;
    let baseHue = 0;
    let tiles = []; // per cell rotation offset 0,1,2,3

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        baseHue = Math.random() * 360;
        const cols = Math.ceil(W / tileSize) + 1;
        const rows = Math.ceil(H / tileSize) + 1;
        tiles = [];
        for (let i = 0; i < cols * rows; i++) tiles.push(Math.floor(Math.random() * 4));
        tiles._cols = cols;
        tiles._rows = rows;
    }

    function arcColor(baseAngle) {
        // map angle 0..2pi to hue shift within spread
        const t = (baseAngle % (Math.PI * 2)) / (Math.PI * 2);
        const h = (baseHue + t * hueSpread) % 360;
        return `hsl(${h},85%,60%)`;
    }

    function draw() {
        ctx.fillStyle = '#0d0e18';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const s = tileSize;
        const r = s / 2;
        const fill = Math.max(3, s * widthPct);
        const casing = fill + Math.max(3, s * 0.10);
        const cols = tiles._cols;
        const rows = tiles._rows;

        // Each tile: 4 quarter arcs from each corner, rotated by tile's offset
        // corners: TL, TR, BR, BL → offsets in multiples of PI/2
        const corners = [
            { dx: 0, dy: 0, a0base: 0 },
            { dx: s, dy: 0, a0base: Math.PI / 2 },
            { dx: s, dy: s, a0base: Math.PI },
            { dx: 0, dy: s, a0base: Math.PI * 1.5 }
        ];

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const rot = tiles[row * cols + col] * (Math.PI / 2);
                const x0 = col * s, y0 = row * s;
                for (const c of corners) {
                    const a0 = c.a0base + rot;
                    const a1 = a0 + Math.PI / 2;
                    ctx.moveTo(x0 + c.dx + Math.cos(a0) * r, y0 + c.dy + Math.sin(a0) * r);
                    ctx.arc(x0 + c.dx, y0 + c.dy, r, a0, a1);
                }
            }
        }
        ctx.stroke();

        // Colour pass — each arc individually (small tile count, fine)
        ctx.lineWidth = fill;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const rot = tiles[row * cols + col] * (Math.PI / 2);
                const x0 = col * s, y0 = row * s;
                for (const c of corners) {
                    const a0 = c.a0base + rot;
                    const a1 = a0 + Math.PI / 2;
                    ctx.strokeStyle = arcColor(a0);
                    ctx.beginPath();
                    ctx.moveTo(x0 + c.dx + Math.cos(a0) * r, y0 + c.dy + Math.sin(a0) * r);
                    ctx.arc(x0 + c.dx, y0 + c.dy, r, a0, a1);
                    ctx.stroke();
                }
            }
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('hue').addEventListener('input', e => {
        hueSpread = +e.target.value;
        document.getElementById('hueVal').textContent = hueSpread;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
