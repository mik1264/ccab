<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilt Blocks - Ribbonics</title>
    <meta name="description" content="Patchwork quilt of classic block motifs — half-square triangles, flying geese, and pinwheels — arranged in a grid with decorative stitching lines.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Quilt Blocks</h1>
        <p>A patchwork quilt grid of classic block motifs: half-square triangles, flying geese, and pinwheels randomly assembled. Each block is finished with fine dotted stitching lines.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="quilt">Classic Quilt</option>
                    <option value="prairie">Prairie</option>
                    <option value="modern">Modern</option>
                    <option value="jewel">Jewel Tones</option>
                    <option value="vintage">Vintage</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Block size <span class="value-display" id="sizeVal">90</span></label>
            <input type="range" id="size" min="50" max="180" value="90">
        </div>
        <div class="control-group">
            <label>Block variety <span class="value-display" id="varVal">3</span></label>
            <input type="range" id="variety" min="1" max="3" value="3" step="1">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        quilt:   [['#C0392B','#F8F0E3'],['#2980B9','#F8F0E3'],['#27AE60','#F8F0E3'],['#8E44AD','#F8F0E3'],['#E67E22','#F8F0E3']],
        prairie: [['#8B4513','#F5DEB3'],['#2E8B57','#F5DEB3'],['#4682B4','#FFFAF0'],['#CD853F','#FFFAF0'],['#A0522D','#FFF8DC']],
        modern:  [['#FF6B6B','#1a1a2e'],['#4ECDC4','#1a1a2e'],['#FFD93D','#1a1a2e'],['#6A4C93','#e8e8f0'],['#FF8FA3','#1a1a2e']],
        jewel:   [['#E63946','#F1FAEE'],['#1D3557','#F1FAEE'],['#457B9D','#F1FAEE'],['#A8DADC','#1D3557'],['#E63946','#457B9D']],
        vintage: [['#BC4B51','#F2E8DC'],['#5B8E7D','#F2E8DC'],['#F4A261','#264653'],['#2A9D8F','#F2E8DC'],['#E76F51','#F2E8DC']],
    };
    const STITCH_COLOR = 'rgba(255,255,255,0.25)';
    const BORDER_COLOR = 'rgba(0,0,0,0.4)';

    let blockSize = 90;
    let variety = 3;
    let paletteName = 'quilt';
    let W, H;
    let blocks = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    const MOTIFS = ['hst', 'flying-geese', 'pinwheel'];

    function randomMotif() {
        return MOTIFS[Math.floor(Math.random() * variety)];
    }

    function build() {
        const S = blockSize;
        const cols = Math.ceil(W / S) + 1;
        const rows = Math.ceil(H / S) + 1;
        const pal = PALETTES[paletteName];

        blocks = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const colors = pal[Math.floor(Math.random() * pal.length)];
                const rotation = [0, Math.PI / 2, Math.PI, Math.PI * 1.5][Math.floor(Math.random() * 4)];
                blocks.push({
                    x: c * S, y: r * S, S,
                    motif: randomMotif(),
                    c1: colors[0], c2: colors[1],
                    rotation
                });
            }
        }
    }

    function drawHST(x, y, S, c1, c2, rot) {
        ctx.save();
        ctx.translate(x + S / 2, y + S / 2);
        ctx.rotate(rot);
        ctx.translate(-S / 2, -S / 2);

        // Half-square triangle: diagonal split
        ctx.fillStyle = c1;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(S, 0); ctx.lineTo(0, S); ctx.closePath();
        ctx.fill();

        ctx.fillStyle = c2;
        ctx.beginPath();
        ctx.moveTo(S, 0); ctx.lineTo(S, S); ctx.lineTo(0, S); ctx.closePath();
        ctx.fill();

        // Stitching along diagonal
        ctx.strokeStyle = STITCH_COLOR;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(4, 4); ctx.lineTo(S - 4, S - 4);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.restore();
    }

    function drawFlyingGeese(x, y, S, c1, c2, rot) {
        ctx.save();
        ctx.translate(x + S / 2, y + S / 2);
        ctx.rotate(rot);
        ctx.translate(-S / 2, -S / 2);

        // Flying geese: center triangle (goose) + two corner triangles (sky)
        ctx.fillStyle = c1;
        ctx.beginPath();
        ctx.moveTo(S / 2, S * 0.1);
        ctx.lineTo(S * 0.9, S * 0.9);
        ctx.lineTo(S * 0.1, S * 0.9);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = c2;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(S / 2, S * 0.1); ctx.lineTo(S * 0.1, S * 0.9); ctx.lineTo(0, S); ctx.closePath();
        ctx.fill();

        ctx.fillStyle = c2;
        ctx.beginPath();
        ctx.moveTo(S, 0); ctx.lineTo(S * 0.9, S * 0.9); ctx.lineTo(S / 2, S * 0.1); ctx.closePath();
        ctx.fill();

        // Stitching
        ctx.strokeStyle = STITCH_COLOR;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 4]);
        ctx.beginPath();
        ctx.moveTo(S / 2, S * 0.15); ctx.lineTo(S * 0.85, S * 0.85); ctx.lineTo(S * 0.15, S * 0.85); ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.restore();
    }

    function drawPinwheel(x, y, S, c1, c2, rot) {
        ctx.save();
        ctx.translate(x + S / 2, y + S / 2);
        ctx.rotate(rot);
        ctx.translate(-S / 2, -S / 2);

        // 4 pinwheel triangles alternating
        const cx = S / 2, cy = S / 2;
        const pts = [
            [[0,0],[S/2,0],[0,S/2]],
            [[S/2,0],[S,0],[S,S/2]],
            [[S,S/2],[S,S],[S/2,S]],
            [[S/2,S],[0,S],[0,S/2]]
        ];
        for (let i = 0; i < 4; i++) {
            ctx.fillStyle = i % 2 === 0 ? c1 : c2;
            ctx.beginPath();
            const [p1,p2,p3] = pts[i];
            ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.lineTo(cx,cy); ctx.closePath();
            ctx.fill();
            // small stitch
            ctx.strokeStyle = STITCH_COLOR;
            ctx.lineWidth = 1;
            ctx.setLineDash([2,3]);
            ctx.beginPath();
            const mx = (p1[0]+p2[0])/2, my = (p1[1]+p2[1])/2;
            ctx.moveTo(mx + (cx-mx)*0.25, my + (cy-my)*0.25);
            ctx.lineTo(mx + (cx-mx)*0.75, my + (cy-my)*0.75);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = '#3a1f10';
        ctx.fillRect(0, 0, W, H);

        for (const b of blocks) {
            // Block background
            ctx.fillStyle = b.c2;
            ctx.fillRect(b.x, b.y, b.S, b.S);

            switch (b.motif) {
                case 'hst': drawHST(b.x, b.y, b.S, b.c1, b.c2, b.rotation); break;
                case 'flying-geese': drawFlyingGeese(b.x, b.y, b.S, b.c1, b.c2, b.rotation); break;
                case 'pinwheel': drawPinwheel(b.x, b.y, b.S, b.c1, b.c2, b.rotation); break;
            }

            // Block border / sashing
            ctx.strokeStyle = BORDER_COLOR;
            ctx.lineWidth = 2;
            ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.S - 1, b.S - 1);

            // Outer stitching frame
            ctx.strokeStyle = STITCH_COLOR;
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 4]);
            const m = 6;
            ctx.strokeRect(b.x + m, b.y + m, b.S - m * 2, b.S - m * 2);
            ctx.setLineDash([]);
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { blockSize = +e.target.value; document.getElementById('sizeVal').textContent = blockSize; regenerate(); });
    document.getElementById('variety').addEventListener('input', e => { variety = +e.target.value; document.getElementById('varVal').textContent = e.target.value; build(); draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
