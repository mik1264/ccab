<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knotwork Bands - Ribbonics</title>
    <meta name="description" content="Interlaced bands on a grid with regular over/under crossings giving a Celtic plait and knotwork appearance, with jewel tones on a dark background.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0c12;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Knotwork Bands</h1>
        <p>Horizontal and vertical ribbon bands interlace on a regular grid. At every crossing, one band passes over the other, alternating in a strict checker pattern to produce a Celtic knotwork appearance.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="jewel">Jewel Tones</option>
                    <option value="neon">Neon</option>
                    <option value="medieval">Medieval</option>
                    <option value="fire">Fire & Ice</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Cell size <span class="value-display" id="cellVal">50</span>px</label>
            <input type="range" id="cell" min="20" max="120" value="50">
        </div>
        <div class="control-group">
            <label>Band width <span class="value-display" id="bwVal">45</span>%</label>
            <input type="range" id="bw" min="15" max="70" value="45">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        jewel:    ['#9B2335','#1B4F72','#1D6A3D','#7D3C98','#B7770D','#0E6655','#943126'],
        neon:     ['#FF00FF','#00FFFF','#FF4400','#00FF44','#FFFF00','#4400FF','#FF0044'],
        medieval: ['#8B0000','#00008B','#006400','#8B6914','#4B0082','#8B4513','#2F4F4F'],
        fire:     ['#FF0000','#FF4500','#FF8C00','#FFD700','#00BFFF','#1E90FF','#0000FF']
    };
    const CASING = '#090a10';
    const BG = '#0b0c12';

    let cellSize = 50, bandPct = 0.45, paletteName = 'jewel';
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        // No state to build per-regenerate beyond random color assignments
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const pal = PALETTES[paletteName];
        const s = cellSize;
        const bw = s * bandPct;
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;

        // Randomly assign a color from palette to each row and column band
        // Use seeded randomness based on stored seed
        const rowColors = [];
        const colColors = [];
        for (let r = 0; r < rows; r++) rowColors.push(pal[r % pal.length]);
        for (let c = 0; c < cols; c++) colColors.push(pal[(c + Math.floor(pal.length / 2)) % pal.length]);

        // The over/under checker: cell (r,c) with r+c even => row over col; odd => col over row
        // Draw in 4 passes:
        // Pass 1: horizontal bands (the under-segments at crossings)
        // Pass 2: vertical casing
        // Pass 3: vertical bands
        // Pass 4: horizontal bands at over-crossings

        const casingExtra = Math.max(3, s * 0.08);
        const cw = bw + casingExtra * 2;

        // We simulate over/under by drawing crossing segments with breaks.
        // Strategy: draw all horizontal stripes, then vertical stripes but blank the "over" horizontals with background, then redraw those horizontals.

        // Draw all horizontal bands (full width)
        for (let r = 0; r < rows; r++) {
            const y = (r - 0.5) * s;
            const color = rowColors[r];
            // Casing
            ctx.strokeStyle = CASING;
            ctx.lineWidth = cw;
            ctx.lineCap = 'butt';
            ctx.beginPath();
            ctx.moveTo(-s, y); ctx.lineTo(W + s, y);
            ctx.stroke();
            // Color
            ctx.strokeStyle = color;
            ctx.lineWidth = bw;
            ctx.beginPath();
            ctx.moveTo(-s, y); ctx.lineTo(W + s, y);
            ctx.stroke();
        }

        // Draw vertical bands, but where a horizontal crosses over (r+c even => horizontal over vertical),
        // we skip drawing vertical in those crossing zones.
        for (let c = 0; c < cols; c++) {
            const x = (c - 0.5) * s;
            const color = colColors[c];
            // Draw vertical as segments between crossings
            for (let r = 0; r < rows; r++) {
                const y = (r - 0.5) * s;
                const isHorizOver = (r + c) % 2 === 0;
                if (isHorizOver) continue; // skip this segment, vertical goes under here

                // Draw vertical segment for this cell
                const y0 = y - s * 0.5 + bw * 0.5;
                const y1 = y + s * 0.5 - bw * 0.5;

                ctx.strokeStyle = CASING;
                ctx.lineWidth = cw;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x, y0); ctx.lineTo(x, y1);
                ctx.stroke();
                ctx.strokeStyle = color;
                ctx.lineWidth = bw;
                ctx.beginPath();
                ctx.moveTo(x, y0); ctx.lineTo(x, y1);
                ctx.stroke();
            }
        }

        // Now draw horizontal "over" segments on top of vertical bands
        for (let r = 0; r < rows; r++) {
            const y = (r - 0.5) * s;
            const color = rowColors[r];
            for (let c = 0; c < cols; c++) {
                const x = (c - 0.5) * s;
                const isHorizOver = (r + c) % 2 === 0;
                if (!isHorizOver) continue;

                const x0 = x - s * 0.5 + bw * 0.5;
                const x1 = x + s * 0.5 - bw * 0.5;

                ctx.strokeStyle = CASING;
                ctx.lineWidth = cw;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x0, y); ctx.lineTo(x1, y);
                ctx.stroke();
                ctx.strokeStyle = color;
                ctx.lineWidth = bw;
                ctx.beginPath();
                ctx.moveTo(x0, y); ctx.lineTo(x1, y);
                ctx.stroke();
            }
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('cell').addEventListener('input', e => {
        cellSize = +e.target.value;
        document.getElementById('cellVal').textContent = cellSize;
        regenerate();
    });
    document.getElementById('bw').addEventListener('input', e => {
        bandPct = +e.target.value / 100;
        document.getElementById('bwVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
