<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celtic Rope - Ribbonics</title>
    <meta name="description" content="Circular Celtic rope-knot tiles connect into a continuous braided rope grid with over/under interlacing — a living knotwork tapestry.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Celtic Rope</h1>
        <p>Each tile holds a pair of crossing arc strands with correct over/under interlacing — drawn twice (casing then colour) so crossings appear to weave above and below one another across the grid.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="bronze">Bronze Knotwork</option>
                    <option value="silver">Silver Celtic</option>
                    <option value="emerald">Emerald Isle</option>
                    <option value="obsidian">Obsidian</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="160" value="80">
        </div>
        <div class="control-group">
            <label>Rope width <span class="value-display" id="widthVal">32</span>%</label>
            <input type="range" id="width" min="14" max="50" value="32">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        bronze:   { bg: '#0d0a06', casing: '#1a0e04', strand: '#C07820', hi: '#F0C060' },
        silver:   { bg: '#08090e', casing: '#0d0f18', strand: '#9098B0', hi: '#D0D8E8' },
        emerald:  { bg: '#060e08', casing: '#040c06', strand: '#2A8B50', hi: '#60E090' },
        obsidian: { bg: '#060608', casing: '#020204', strand: '#505870', hi: '#A0A8C0' }
    };

    let tileSize = 80;
    let widthPct = 0.32;
    let paletteName = 'bronze';
    let W, H, cols, rows;
    let cells = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function regenerate() {
        resize();
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);
        draw();
    }

    // Draw a single Truchet arc with over/under at center
    // We simulate over/under by drawing arcs in two passes:
    // Pass 1 (all arcs): dark casing (sets base)
    // Pass 2 (strand A of each tile): strand color
    // Pass 3 (gap break at crossings): casing-colored gap
    // Pass 4 (strand B of each tile): strand color on top

    // For each tile, we have two arcs (A and B).
    // Config 0: A = TL arc, B = BR arc
    // Config 1: A = TR arc, B = BL arc
    // Over/under: we alternate based on cell checkerboard:
    // even cells: A over B (draw A last)
    // odd cells:  B over A (draw B last)

    function getTileArcs(c, r) {
        const s = tileSize;
        const rad = s / 2;
        const x0 = c * s, y0 = r * s;
        const cfg = cells[r * cols + c];
        if (cfg === 0) {
            return [
                { cx: x0,     cy: y0,     r: rad, a0: 0,            a1: Math.PI/2    },
                { cx: x0 + s, cy: y0 + s, r: rad, a0: Math.PI,      a1: Math.PI*1.5  }
            ];
        } else {
            return [
                { cx: x0 + s, cy: y0,     r: rad, a0: Math.PI/2,    a1: Math.PI      },
                { cx: x0,     cy: y0 + s, r: rad, a0: Math.PI*1.5,  a1: Math.PI*2    }
            ];
        }
    }

    function arcPath(a) {
        ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
        ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const rw = Math.max(4, tileSize * widthPct);
        const cw = rw + Math.max(4, tileSize * 0.12);
        const gapW = rw * 1.08; // gap to break the casing at crossings

        // Pass 1: draw ALL casing
        ctx.strokeStyle = pal.casing;
        ctx.lineWidth = cw;
        ctx.beginPath();
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                for (const a of getTileArcs(c, r)) arcPath(a);
            }
        }
        ctx.stroke();

        // Pass 2: draw ALL strand color
        ctx.strokeStyle = pal.strand;
        ctx.lineWidth = rw;
        ctx.beginPath();
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                for (const a of getTileArcs(c, r)) arcPath(a);
            }
        }
        ctx.stroke();

        // Pass 3: break the "under" arc at crossing points with a gap
        // The crossing center is at the tile center. We blank a segment there on the under-strand.
        ctx.strokeStyle = pal.bg;
        ctx.lineWidth = gapW;
        ctx.lineCap = 'butt';
        ctx.beginPath();
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const arcs = getTileArcs(c, r);
                // Under strand is arcs[1] if checkerboard even, arcs[0] if odd
                const underIdx = (c + r) % 2 === 0 ? 1 : 0;
                const a = arcs[underIdx];
                const aMid = (a.a0 + a.a1) / 2;
                const gapAngle = gapW / a.r * 0.6;
                ctx.moveTo(a.cx + Math.cos(aMid - gapAngle) * a.r, a.cy + Math.sin(aMid - gapAngle) * a.r);
                ctx.arc(a.cx, a.cy, a.r, aMid - gapAngle, aMid + gapAngle);
            }
        }
        ctx.stroke();
        ctx.lineCap = 'round';

        // Pass 4: redraw the "over" strands (and partial re-draw) on top
        ctx.strokeStyle = pal.strand;
        ctx.lineWidth = rw;
        ctx.beginPath();
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const arcs = getTileArcs(c, r);
                const overIdx = (c + r) % 2 === 0 ? 0 : 1;
                arcPath(arcs[overIdx]);
            }
        }
        ctx.stroke();

        // Highlight pass
        ctx.strokeStyle = pal.hi;
        ctx.lineWidth = Math.max(1, rw * 0.2);
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                for (const a of getTileArcs(c, r)) {
                    const hi_r = a.r - rw * 0.28;
                    ctx.moveTo(a.cx + Math.cos(a.a0)*hi_r, a.cy + Math.sin(a.a0)*hi_r);
                    ctx.arc(a.cx, a.cy, hi_r, a.a0, a.a1);
                }
            }
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
