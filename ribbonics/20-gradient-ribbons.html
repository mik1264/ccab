<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Ribbons - Ribbonics</title>
    <meta name="description" content="Square ribbon weave where each ribbon's colour is mapped to its canvas position via a smooth hue gradient, creating a flowing rainbow across the woven grid.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Gradient Ribbons</h1>
        <p>Each ribbon in a classic Truchet weave is tinted by the midpoint of its arc projected onto a smooth hue gradient, flooding the grid with a flowing full-spectrum wash.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="24" max="120" value="64">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">42</span>%</label>
            <input type="range" id="width" min="18" max="68" value="42">
        </div>
        <div class="control-group">
            <label>Gradient direction
                <select id="dir">
                    <option value="h">Horizontal</option>
                    <option value="v">Vertical</option>
                    <option value="d">Diagonal</option>
                    <option value="r">Radial</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CASING = '#0d0e18';

    let tileSize = 64;
    let widthPct = 0.42;
    let gradDir = 'h';
    let W, H;
    let arcs = [];
    let hueOffset = 0;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        hueOffset = Math.random() * 360;
        const s = tileSize;
        const r = s / 2;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;

        arcs = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x0 = col * s, y0 = row * s;
                const config = Math.random() < 0.5 ? 0 : 1;
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5 }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI       },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2   }
                    ];
                }
                for (const p of pairs) {
                    // midpoint of arc on the circle, for colour sampling
                    const amid = (p.a0 + p.a1) / 2;
                    const mx = p.cx + Math.cos(amid) * r;
                    const my = p.cy + Math.sin(amid) * r;
                    arcs.push({ cx: p.cx, cy: p.cy, r, a0: p.a0, a1: p.a1, mx, my });
                }
            }
        }
    }

    function posToHue(mx, my) {
        let t;
        if (gradDir === 'h') t = mx / W;
        else if (gradDir === 'v') t = my / H;
        else if (gradDir === 'd') t = (mx / W + my / H) / 2;
        else { // radial
            const cx = W / 2, cy = H / 2;
            const maxR = Math.sqrt(cx * cx + cy * cy);
            t = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2) / maxR;
        }
        return (hueOffset + t * 360) % 360;
    }

    function draw() {
        ctx.fillStyle = '#0d0e18';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const fill = Math.max(4, tileSize * widthPct);
        const casing = fill + Math.max(3, tileSize * 0.10);

        // casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // gradient-coloured ribbons
        ctx.lineWidth = fill;
        for (const a of arcs) {
            const h = posToHue(a.mx, a.my);
            ctx.strokeStyle = `hsl(${h},88%,62%)`;
            ctx.beginPath();
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('dir').addEventListener('change', e => {
        gradDir = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
