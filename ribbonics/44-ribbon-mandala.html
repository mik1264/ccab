<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribbon Mandala - Ribbonics</title>
    <meta name="description" content="Polar Truchet: arcs arranged in concentric rings and angular sectors forming a radial mandala of woven ribbons with rich multicolour depth.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Ribbon Mandala</h1>
        <p>Polar Truchet tiling: each cell in a ring-sector grid holds one of two arc orientations. Connected arcs trace closed ribbon loops that spiral outward in a radial mandala.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="jewel">Jewel</option>
                    <option value="sunset">Sunset</option>
                    <option value="pastel">Pastel</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Rings <span class="value-display" id="ringsVal">8</span></label>
            <input type="range" id="rings" min="4" max="16" value="8">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">45</span>%</label>
            <input type="range" id="width" min="20" max="75" value="45">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        jewel:  ['#E63946','#457B9D','#2A9D8F','#E9C46A','#F4A261','#8338EC','#06D6A0'],
        sunset: ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49','#E63946'],
        pastel: ['#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF','#D0BAFF','#FFB3F7'],
        fire:   ['#D00000','#E85D04','#F48C06','#FAA307','#FFBA08','#DC2F02','#9D0208'],
        ocean:  ['#03045E','#0077B6','#00B4D8','#90E0EF','#48CAE4','#023E8A','#0096C7'],
    };
    const BG = '#0d0d18';
    const CASING = '#06060f';

    let numRings = 8;
    let widthPct = 0.45;
    let paletteName = 'jewel';
    let W, H;
    let arcs = [];

    const TAU = Math.PI * 2;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const cx = W / 2, cy = H / 2;
        const maxR = Math.min(W, H) * 0.48;
        const ringWidth = maxR / numRings;

        // sectors per ring: more sectors in outer rings
        const baseSectors = 8; // symmetry base

        const pal = PALETTES[paletteName];
        const parent = new Map();
        function find(k) {
            if (!parent.has(k)) parent.set(k, k);
            let r = k;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(k) !== r) { const nk = parent.get(k); parent.set(k, r); k = nk; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }

        arcs = [];

        for (let ring = 0; ring < numRings; ring++) {
            const r_inner = ring * ringWidth;
            const r_outer = (ring + 1) * ringWidth;
            const r_mid = (r_inner + r_outer) / 2;
            // Number of sectors in this ring: scale with ring index for density
            const nSectors = baseSectors * (ring + 1);
            const sectorAngle = TAU / nSectors;

            for (let sec = 0; sec < nSectors; sec++) {
                const a_start = sec * sectorAngle;
                const a_end = (sec + 1) * sectorAngle;
                const a_mid = (a_start + a_end) / 2;

                // Cell corners in polar: (ring, sec), (ring+1, sec), (ring, sec+1), (ring+1, sec+1)
                // Two Truchet arc choices in polar cell:
                // Type 0: arc from inner-mid-edge to left-mid-edge (center at cell inner-left corner)
                // Type 1: arc from inner-mid-edge to right-mid-edge (center at cell inner-right corner)
                const config = Math.random() < 0.5 ? 0 : 1;

                // Edge midpoints in polar → Cartesian
                // Inner radial edge midpoint (arc between r_inner and r_outer, at a_start)
                // Outer radial edge midpoint (at a_end)
                // Inner arc edge midpoint (at r_inner, between a_start and a_end)
                // Outer arc edge midpoint (at r_outer, between a_start and a_end)

                const p_inner_left  = polar(cx, cy, r_inner, a_start);
                const p_inner_right = polar(cx, cy, r_inner, a_end);
                const p_outer_left  = polar(cx, cy, r_outer, a_start);
                const p_outer_right = polar(cx, cy, r_outer, a_end);

                // Mid-edges
                const p_left_mid  = polar(cx, cy, r_mid, a_start);
                const p_right_mid = polar(cx, cy, r_mid, a_end);
                const p_inner_mid = polar(cx, cy, r_inner, a_mid);
                const p_outer_mid = polar(cx, cy, r_outer, a_mid);

                // Edge node keys
                const k_left  = `L${ring}_${sec}`;   // left radial edge mid
                const k_right = `R${ring}_${sec}`;   // right radial edge mid
                const k_inner = `I${ring}_${sec}`;   // inner arc edge mid
                const k_outer = `O${ring}_${sec}`;   // outer arc edge mid

                // Shared edges between adjacent cells:
                // k_right of sec == k_left of sec+1 (same ring)
                const k_right_shared = `L${ring}_${(sec + 1) % nSectors}`;
                // k_outer of ring == k_inner of ring+1
                const k_outer_shared = `I${ring + 1}_${sec}`;  // approximation

                if (config === 0) {
                    // Arc 1: from k_left to k_inner, corner at (r_inner, a_start)
                    // Arc 2: from k_right to k_outer, corner at (r_outer, a_end)
                    union(k_left, k_inner);
                    union(k_right, k_outer);
                    const arc1 = makeArc(p_inner_left, p_left_mid, p_inner_mid, k_left);
                    const arc2 = makeArc(p_outer_right, p_right_mid, p_outer_mid, k_right);
                    if (arc1) arcs.push(arc1);
                    if (arc2) arcs.push(arc2);
                } else {
                    // Arc 1: from k_left to k_outer, corner at (r_outer, a_start)
                    // Arc 2: from k_right to k_inner, corner at (r_inner, a_end)
                    union(k_left, k_outer);
                    union(k_right, k_inner);
                    const arc1 = makeArc(p_outer_left, p_left_mid, p_outer_mid, k_left);
                    const arc2 = makeArc(p_inner_right, p_right_mid, p_inner_mid, k_right);
                    if (arc1) arcs.push(arc1);
                    if (arc2) arcs.push(arc2);
                }
            }
        }

        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function polar(cx, cy, r, a) {
        return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
    }

    // Build a circular arc through three points: start, corner (center of circle), end
    // Actually: arc centered at 'corner', from 'start' to 'end'
    function makeArc(corner, p1, p2, nodeKey) {
        // circle center = corner, radius = dist(corner, p1)
        const [cx, cy] = corner;
        const [x1, y1] = p1;
        const [x2, y2] = p2;
        const r = Math.sqrt((x1 - cx) ** 2 + (y1 - cy) ** 2);
        if (r < 1) return null;
        const a0 = Math.atan2(y1 - cy, x1 - cx);
        const a1 = Math.atan2(y2 - cy, x2 - cx);
        return { cx, cy, r, a0, a1, n1: nodeKey, color: '#fff' };
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const baseR = Math.min(W, H) * 0.48 / numRings;
        const fill = Math.max(3, baseR * widthPct * 0.8);
        const casing = fill + Math.max(3, baseR * 0.15);

        // Casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcs) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colors
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcs) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('rings').addEventListener('input', e => { numRings = +e.target.value; document.getElementById('ringsVal').textContent = numRings; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
