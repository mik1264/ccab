<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribbon Swirl - Ribbonics</title>
    <meta name="description" content="Polar-coordinate ribbon weave swirling around the centre along logarithmic-spiral arms, painted with a warm-to-cool radial gradient palette.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0c0c18;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Ribbon Swirl</h1>
        <p>Ribbon tiles arranged in polar coordinates swirl outward along logarithmic-spiral arms. A warm amber-to-cool teal gradient washes across the weave from centre to edge.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Arms <span class="value-display" id="armsVal">6</span></label>
            <input type="range" id="arms" min="3" max="12" value="6">
        </div>
        <div class="control-group">
            <label>Ring count <span class="value-display" id="ringsVal">14</span></label>
            <input type="range" id="rings" min="5" max="28" value="14">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">42</span>%</label>
            <input type="range" id="width" min="18" max="72" value="42">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CASING = 'rgba(0,0,0,0.9)';
    let numArms = 6;
    let numRings = 14;
    let widthPct = 0.42;
    let W, H;
    let segments = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Warm-to-cool gradient: amber (30°) at centre → teal (180°) at edge
    function ringColor(t) {
        // t in [0,1], 0=inner, 1=outer
        const h = 30 + t * 150;
        const s = 90 - t * 20;
        const l = 60 - t * 10;
        return `hsl(${h},${s}%,${l}%)`;
    }

    function build() {
        segments = [];
        const cx = W / 2, cy = H / 2;
        const maxR = Math.hypot(W, H) * 0.52;
        const minR = maxR * 0.06;

        // Log spiral: r = minR * e^(b*theta)
        // We create rings at increasing radii
        const b = Math.log(maxR / minR) / (numArms * 2 * Math.PI);

        for (let ring = 0; ring < numRings; ring++) {
            const t = ring / (numRings - 1);
            const r = minR + (maxR - minR) * (t * t); // quadratic spacing for more interest
            const arcPerCell = (2 * Math.PI) / numArms;
            const cellR = r * arcPerCell * 0.55; // arc radius for ribbon within the sector

            const color = ringColor(t);

            for (let arm = 0; arm < numArms; arm++) {
                // Swirl angle offset: each ring is rotated slightly
                const swirlOffset = ring * (arcPerCell * 0.5 + (Math.random() - 0.5) * 0.3);
                const baseAngle = arm * arcPerCell + swirlOffset;

                // config: which way does the arc turn?
                const config = Math.random() < 0.5 ? 0 : 1;

                // Two arc types: arc curving inward at sector start, or curving toward next arm
                // We just draw a circular arc from one radial line to another
                // Pivot point: either inner corner or outer corner of the sector tile
                const innerR = r * 0.82;
                const outerR = r * 1.18;
                const a0 = baseAngle;
                const a1 = baseAngle + arcPerCell;

                if (config === 0) {
                    // Arc curving from inner edge a0 to inner edge a1 (pivot at inner, arm boundary)
                    const pivotX = cx + innerR * Math.cos(a0);
                    const pivotY = cy + innerR * Math.sin(a0);
                    // Second point: inner edge at a1
                    const p2x = cx + innerR * Math.cos(a1);
                    const p2y = cy + innerR * Math.sin(a1);
                    const ar = Math.hypot(p2x - pivotX, p2y - pivotY) * 0.55;
                    const midA = (a0 + a1) / 2;
                    // arc centre: midpoint further in
                    const acx = cx + (innerR - ar * 0.7) * Math.cos(midA);
                    const acy = cy + (innerR - ar * 0.7) * Math.sin(midA);
                    const aa0 = Math.atan2(pivotY - acy, pivotX - acx);
                    const aa1 = Math.atan2(p2y - acy, p2x - acx);
                    const arad = Math.hypot(pivotX - acx, pivotY - acy);
                    segments.push({ cx: acx, cy: acy, r: arad, a0: aa0, a1: aa1, color, ring });
                } else {
                    // Arc from outer edge at a0+half to outer edge at a1-half
                    const midAngle = (a0 + a1) / 2;
                    const pivotX = cx + outerR * Math.cos(a0);
                    const pivotY = cy + outerR * Math.sin(a0);
                    const p2x = cx + outerR * Math.cos(a1);
                    const p2y = cy + outerR * Math.sin(a1);
                    const acx = cx + (outerR + cellR * 0.5) * Math.cos(midAngle);
                    const acy = cy + (outerR + cellR * 0.5) * Math.sin(midAngle);
                    const aa0 = Math.atan2(pivotY - acy, pivotX - acx);
                    const aa1 = Math.atan2(p2y - acy, p2x - acx);
                    const arad = Math.hypot(pivotX - acx, pivotY - acy);
                    segments.push({ cx: acx, cy: acy, r: arad, a0: aa0, a1: aa1, color, ring });
                }

                // Always add a complementary arc for weave density
                {
                    const midAngle = (a0 + a1) / 2;
                    const mr = (innerR + outerR) / 2;
                    const px = cx + mr * Math.cos(a0 + arcPerCell * 0.05);
                    const py = cy + mr * Math.sin(a0 + arcPerCell * 0.05);
                    const p2x = cx + mr * Math.cos(a1 - arcPerCell * 0.05);
                    const p2y = cy + mr * Math.sin(a1 - arcPerCell * 0.05);
                    // pivot at centre
                    const aa0 = Math.atan2(py - cy, px - cx);
                    const aa1 = Math.atan2(p2y - cy, p2x - cx);
                    // ensure short arc direction
                    let da = aa1 - aa0;
                    while (da > Math.PI) da -= 2 * Math.PI;
                    while (da < -Math.PI) da += 2 * Math.PI;
                    segments.push({ cx, cy, r: mr, a0: aa0, a1: aa0 + da, color, ring });
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#0c0c18';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Sort by ring (draw inner first)
        const sorted = segments.slice().sort((a, b) => a.ring - b.ring);

        // tile size proxy for ring spacing
        const maxR = Math.hypot(W, H) * 0.52;
        const tileR = maxR / numRings;
        const fill = Math.max(3, tileR * widthPct);
        const casing = fill + Math.max(3, tileR * 0.14);

        // Casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const s of sorted) {
            ctx.moveTo(s.cx + Math.cos(s.a0) * s.r, s.cy + Math.sin(s.a0) * s.r);
            ctx.arc(s.cx, s.cy, s.r, s.a0, s.a1);
        }
        ctx.stroke();

        // Colour — by ring colour grouped
        ctx.lineWidth = fill;
        const byColor = {};
        for (const s of sorted) (byColor[s.color] = byColor[s.color] || []).push(s);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const s of byColor[col]) {
                ctx.moveTo(s.cx + Math.cos(s.a0) * s.r, s.cy + Math.sin(s.a0) * s.r);
                ctx.arc(s.cx, s.cy, s.r, s.a0, s.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('arms').addEventListener('input', e => {
        numArms = +e.target.value;
        document.getElementById('armsVal').textContent = numArms;
        regenerate();
    });
    document.getElementById('rings').addEventListener('input', e => {
        numRings = +e.target.value;
        document.getElementById('ringsVal').textContent = numRings;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
