<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truchet Tapestry - Ribbonics</title>
    <meta name="description" content="Grand finale: a dense multiscale multicolour Truchet weave fills the screen with fine detail, per-loop ribbon colouring, and a rich tapestry palette.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a0f2e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Truchet Tapestry</h1>
        <p>Three scales of Truchet weave layer simultaneously — fine, medium, and coarse — each with its own palette layer. Per-loop ribbon colouring at every scale fills the screen like a grand woven tapestry.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="tapestry">Tapestry</option>
                    <option value="persian">Persian</option>
                    <option value="nordic">Nordic</option>
                    <option value="imperial">Imperial</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Base tile size <span class="value-display" id="sizeVal">32</span></label>
            <input type="range" id="size" min="14" max="80" value="32">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="18" max="65" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        tapestry: [
            // coarse layer — jewel tones
            ['#9B2335','#1B4F72','#1D6A3C','#7D3C98','#B7770D','#1A5276'],
            // medium layer — warm mid tones
            ['#C0392B','#2471A3','#27AE60','#8E44AD','#E67E22','#148F77'],
            // fine layer — bright accents
            ['#EC407A','#42A5F5','#66BB6A','#AB47BC','#FFA726','#26A69A']
        ],
        persian: [
            ['#6B2D2D','#2D4A6B','#2D6B47','#6B4A2D'],
            ['#C0392B','#2980B9','#27AE60','#D68910'],
            ['#E74C3C','#5DADE2','#52BE80','#F39C12']
        ],
        nordic: [
            ['#1B2A4A','#2E4A6B','#4A6B2E','#6B4A2E'],
            ['#2E5BA8','#4A8C3F','#A85A2E','#8C4A8C'],
            ['#5B9BD5','#7EBD5B','#D5845B','#BD5BD5']
        ],
        imperial: [
            ['#4A0000','#004A4A','#4A3A00','#1A004A'],
            ['#8B0000','#006B6B','#8B6B00','#2D008B'],
            ['#C00000','#009090','#C09000','#4000C0']
        ]
    };

    const BG = '#1a0f2e';
    let baseTileSize = 32;
    let widthPct = 0.40;
    let paletteName = 'tapestry';
    let W, H;
    let layers = []; // each layer: { arcList, tileSize, widthPct }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function makeUF() {
        const par = new Map();
        function find(x) {
            if (!par.has(x)) par.set(x, x);
            let r = x;
            while (par.get(r) !== r) r = par.get(r);
            while (par.get(x) !== r) { const nx = par.get(x); par.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { par.set(find(a), find(b)); }
        return { find, union };
    }

    function buildLayer(tileSize, palette, offsetX, offsetY) {
        const s = tileSize;
        const rad = s / 2;
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;
        const uf = makeUF();
        const arcList = [];

        const h = (c, r) => `h${c}_${r}`;
        const v = (c, r) => `v${c}_${r}`;

        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                const x0 = c * s + offsetX;
                const y0 = r * s + offsetY;
                const top    = h(c, r);
                const bottom = h(c, r + 1);
                const left   = v(c, r);
                const right  = v(c + 1, r);
                const config = Math.random() < 0.5 ? 0 : 1;
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,            a1: Math.PI / 2,    n1: top,    n2: left   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,      a1: Math.PI * 1.5,  n1: bottom, n2: right  }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,  a1: Math.PI,        n1: top,    n2: right  },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2,   n1: bottom, n2: left   }
                    ];
                }
                for (const p of pairs) {
                    uf.union(p.n1, p.n2);
                    arcList.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1, color: '#888' });
                }
            }
        }

        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, palette[next++ % palette.length]);
            a.color = rootColor.get(root);
        }

        return arcList;
    }

    function build() {
        const pal = PALETTES[paletteName];
        layers = [];

        // Three scales: fine (base), medium (2x), coarse (4x)
        const scales = [1, 2, 4];
        for (let i = 0; i < scales.length; i++) {
            const s = baseTileSize * scales[i];
            const offsetX = (Math.random() - 0.5) * s;
            const offsetY = (Math.random() - 0.5) * s;
            const palette = pal[i % pal.length];
            const arcList = buildLayer(s, palette, offsetX, offsetY);
            layers.push({ arcList, tileSize: s });
        }
    }

    function drawLayer(arcList, tileSize, fillWidth, opacity) {
        const fill = fillWidth;
        const casing = fill + Math.max(3, tileSize * 0.12);

        ctx.globalAlpha = opacity;

        // Casing
        ctx.strokeStyle = `rgba(0,0,0,0.9)`;
        ctx.lineWidth = casing;
        ctx.lineCap = 'round';
        ctx.beginPath();
        for (const a of arcList) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colour
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }

        ctx.globalAlpha = 1.0;
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        // Draw coarse layer first (most opaque), then medium, then fine (most opaque/detailed)
        // Opacities create depth: coarse is the "base", fine is the "overlay"
        const opacities = [1.0, 0.75, 0.55]; // fine, medium, coarse

        for (let i = layers.length - 1; i >= 0; i--) {
            const layer = layers[i];
            const fill = Math.max(3, layer.tileSize * widthPct);
            drawLayer(layer.arcList, layer.tileSize, fill, opacities[i]);
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => {
        baseTileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = baseTileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
