<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Tessellation - Ribbonics</title>
    <meta name="description" content="Square and equilateral-triangle Truchet tiles interleave in a snub-square tessellation so ribbons weave continuously across both tile shapes.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #12101e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Mixed Tessellation</h1>
        <p>Squares and equilateral triangles tile the plane in a 3.3.4.3.4 snub-square pattern. Each tile carries Truchet-style arcs, and the resulting ribbons weave seamlessly across both tile shapes.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="vivid">Vivid</option>
                    <option value="pastel">Pastel</option>
                    <option value="ocean">Ocean</option>
                    <option value="fire">Fire</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">52</span></label>
            <input type="range" id="size" min="20" max="110" value="52">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">40</span>%</label>
            <input type="range" id="width" min="15" max="68" value="40">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        vivid:  ['#E63946','#2EC4B6','#FF9F1C','#7B2D8B','#06D6A0','#F72585','#3A86FF','#FFBE0B'],
        pastel: ['#FFB5C8','#B5EAD7','#FFDAC1','#C7CEEA','#FF9AA2','#E2F0CB','#B5D5FF','#FFEAA7'],
        ocean:  ['#03045E','#0077B6','#00B4D8','#90E0EF','#ADE8F4','#CAF0F8','#023E8A','#0096C7'],
        fire:   ['#D00000','#DC2F02','#E85D04','#F48C06','#FAA307','#FFBA08','#370617','#6A040F']
    };
    const CASING = '#0a0814';

    let tileSize = 52;
    let widthPct = 0.40;
    let paletteName = 'vivid';
    let W, H;
    let arcList = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function makeUF() {
        const par = new Map();
        function find(x) {
            if (!par.has(x)) par.set(x, x);
            let r = x;
            while (par.get(r) !== r) r = par.get(r);
            while (par.get(x) !== r) { const nx = par.get(x); par.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { par.set(find(a), find(b)); }
        return { find, union };
    }

    // 3.3.4.3.4 snub square tiling
    // We tile using a repeat unit. The snub-square tiling can be described with a fundamental domain.
    // For simplicity we approximate by placing squares and triangles in a regular offset grid pattern.
    // Row pattern: alternating squares and 2 triangles, shifted on odd rows.
    // Each unit row has height = s (square side). Each unit column has width = s.
    // Triangles are equilateral with side = s.
    // In a row: [square, 2 right-leaning triangles, square, 2 left-leaning triangles, ...]
    // This gives a semi-regular pattern that looks like the snub square.

    function build() {
        const s = tileSize;
        const h3 = s * Math.sqrt(3) / 2; // equilateral triangle height

        const uf = makeUF();
        arcList = [];
        const pal = PALETTES[paletteName];

        // We'll use a simpler but visually convincing approach:
        // Row of squares, then a row of triangles, alternating.
        // Each tile gets random Truchet arcs with shared edge-midpoint nodes.

        const nodeKey = (x, y) => `${Math.round(x * 2)}_${Math.round(y * 2)}`;

        let nodeSeq = 0;
        const nodeMap = new Map();
        function getNode(x, y) {
            const k = nodeKey(x, y);
            if (!nodeMap.has(k)) nodeMap.set(k, 'N' + (nodeSeq++));
            return nodeMap.get(k);
        }

        // Tile the screen with squares on a grid + triangles filling the gaps
        // Use the elongated triangular tiling (3.3.3.4.4):
        // Columns of squares, with triangles between columns.
        const colW = s;
        const colH = s;
        const cols = Math.ceil(W / colW) + 2;
        const rowCount = Math.ceil(H / colH) + 2;

        for (let row = -1; row < rowCount; row++) {
            for (let col = -1; col < cols; col++) {
                const x0 = col * colW;
                const y0 = row * colH;

                // -- Square tile --
                const sqTL = { x: x0,       y: y0 };
                const sqTR = { x: x0 + s,   y: y0 };
                const sqBL = { x: x0,       y: y0 + s };
                const sqBR = { x: x0 + s,   y: y0 + s };

                // midpoints of square edges
                const mTop    = { x: x0 + s/2, y: y0 };
                const mRight  = { x: x0 + s,   y: y0 + s/2 };
                const mBottom = { x: x0 + s/2, y: y0 + s };
                const mLeft   = { x: x0,       y: y0 + s/2 };

                const nTop    = getNode(mTop.x,    mTop.y);
                const nRight  = getNode(mRight.x,  mRight.y);
                const nBottom = getNode(mBottom.x, mBottom.y);
                const nLeft   = getNode(mLeft.x,   mLeft.y);

                const sqConfig = Math.random() < 0.5 ? 0 : 1;
                const sqR = s / 2;

                if (sqConfig === 0) {
                    uf.union(nTop, nLeft);
                    uf.union(nRight, nBottom);
                    arcList.push({ cx: x0,     cy: y0,     r: sqR, a0: 0,            a1: Math.PI/2,    n1: nTop   });
                    arcList.push({ cx: x0 + s, cy: y0 + s, r: sqR, a0: Math.PI,      a1: Math.PI*1.5,  n1: nRight });
                } else {
                    uf.union(nTop, nRight);
                    uf.union(nLeft, nBottom);
                    arcList.push({ cx: x0 + s, cy: y0,     r: sqR, a0: Math.PI/2,    a1: Math.PI,      n1: nTop   });
                    arcList.push({ cx: x0,     cy: y0 + s, r: sqR, a0: Math.PI*1.5,  a1: Math.PI*2,    n1: nLeft  });
                }

                // -- Upper triangle (pointing up, apex between sq and next sq above) --
                // Triangle with base on top edge of square
                // Vertices: (x0, y0), (x0+s, y0), (x0+s/2, y0-h3) — apex above
                const triApexU = { x: x0 + s/2, y: y0 - h3 * 0.5 };
                const triTL    = { x: x0,        y: y0 };
                const triTR    = { x: x0 + s,    y: y0 };

                // Edge midpoints of this triangle
                const tmTop   = { x: (triTL.x + triApexU.x) / 2, y: (triTL.y + triApexU.y) / 2 };
                const tmRight = { x: (triTR.x + triApexU.x) / 2, y: (triTR.y + triApexU.y) / 2 };
                const tmBase  = { x: x0 + s/2, y: y0 }; // midpoint of base = same as sq top

                const tnTop   = getNode(tmTop.x,   tmTop.y);
                const tnRight = getNode(tmRight.x,  tmRight.y);
                const tnBase  = getNode(tmBase.x,   tmBase.y);  // shared with square's top midpoint

                // Triangle arc: connect two of three edge midpoints
                const triConfig = Math.random() < 0.33 ? 0 : (Math.random() < 0.5 ? 1 : 2);
                const triR = s * 0.32;

                if (triConfig === 0) {
                    // base to left edge
                    uf.union(tnBase, tnTop);
                    const acx = triTL.x; const acy = triTL.y;
                    const aa0 = Math.atan2(tmBase.y - acy, tmBase.x - acx);
                    const aa1 = Math.atan2(tmTop.y  - acy, tmTop.x  - acx);
                    arcList.push({ cx: acx, cy: acy, r: Math.hypot(tmBase.x - acx, tmBase.y - acy), a0: aa0, a1: aa1, n1: tnBase });
                } else if (triConfig === 1) {
                    // base to right edge
                    uf.union(tnBase, tnRight);
                    const acx = triTR.x; const acy = triTR.y;
                    const aa0 = Math.atan2(tmBase.y  - acy, tmBase.x  - acx);
                    const aa1 = Math.atan2(tmRight.y - acy, tmRight.x - acx);
                    arcList.push({ cx: acx, cy: acy, r: Math.hypot(tmBase.x - acx, tmBase.y - acy), a0: aa0, a1: aa1, n1: tnBase });
                } else {
                    // left to right edge
                    uf.union(tnTop, tnRight);
                    const acx = triApexU.x; const acy = triApexU.y;
                    const aa0 = Math.atan2(tmTop.y   - acy, tmTop.x   - acx);
                    const aa1 = Math.atan2(tmRight.y - acy, tmRight.x - acx);
                    arcList.push({ cx: acx, cy: acy, r: Math.hypot(tmTop.x - acx, tmTop.y - acy), a0: aa0, a1: aa1, n1: tnTop });
                }
            }
        }

        // Assign colours by root
        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function draw() {
        ctx.fillStyle = '#12101e';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(3, tileSize * widthPct);
        const casing = fill + Math.max(3, tileSize * 0.12);

        // Casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) {
            ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();

        // Colour
        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
