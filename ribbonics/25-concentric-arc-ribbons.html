<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concentric Arc Ribbons - Ribbonics</title>
    <meta name="description" content="Each Truchet corner draws several concentric parallel arcs in rainbow order so every tile shows nested multicolour ribbons forming a rich layered weave.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Concentric Arc Ribbons</h1>
        <p>Each Truchet quarter-circle corner spawns several concentric arcs at equally-spaced radii, coloured in rainbow order. Every tile becomes a nest of multicolour ribbons forming an intricate layered weave.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="150" value="80">
        </div>
        <div class="control-group">
            <label>Ring count <span class="value-display" id="ringsVal">5</span></label>
            <input type="range" id="rings" min="2" max="10" value="5" step="1">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="rainbow">Rainbow</option>
                    <option value="sunset">Sunset</option>
                    <option value="ocean">Ocean</option>
                    <option value="neon">Neon</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CASING = '#0a0a14';

    const PALETTES = {
        rainbow: (n) => Array.from({length:n}, (_,i) => `hsl(${Math.round(i/n*360)},90%,60%)`),
        sunset:  (n) => Array.from({length:n}, (_,i) => {
            const t = i/n;
            const h = 10 + t * 60;
            const s2 = 90, l = 55 + t*15;
            return `hsl(${h},${s2}%,${l}%)`;
        }),
        ocean:   (n) => Array.from({length:n}, (_,i) => `hsl(${180 + i/n*60},85%,${45+i/n*25}%)`),
        neon:    (n) => {
            const base = ['#FF0080','#00FFCC','#FFE600','#7B2FBE','#00B4D8','#FF6600','#39FF14','#FF00FF'];
            return Array.from({length:n}, (_,i) => base[i % base.length]);
        }
    };

    let tileSize = 80;
    let ringCount = 5;
    let paletteName = 'rainbow';
    let W, H;
    let allArcs = []; // {cx,cy,r,a0,a1,color}

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = tileSize;
        const cols = Math.ceil(W / s) + 1;
        const rows = Math.ceil(H / s) + 1;
        const pal = PALETTES[paletteName](ringCount);
        // spacing between rings: divide tile radius into ringCount+1 zones
        const maxR = s / 2;
        const gap = maxR / (ringCount + 1);
        // stroke width slightly less than gap to leave tiny dark gaps
        const sw = gap * 0.8;

        allArcs = [];

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x0 = col * s, y0 = row * s;
                const config = Math.random() < 0.5 ? 0 : 1;

                let cornerPairs;
                if (config === 0) {
                    cornerPairs = [
                        { cx: x0,     cy: y0,     a0: 0,             a1: Math.PI / 2   },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,       a1: Math.PI * 1.5 }
                    ];
                } else {
                    cornerPairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2,   a1: Math.PI       },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2   }
                    ];
                }

                for (const cp of cornerPairs) {
                    for (let ring = 0; ring < ringCount; ring++) {
                        const r = gap * (ring + 1);
                        allArcs.push({
                            cx: cp.cx, cy: cp.cy, r,
                            a0: cp.a0, a1: cp.a1,
                            color: pal[ring],
                            sw
                        });
                    }
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#0a0a14';
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        // Casing pass for all arcs (dark gap between rings)
        ctx.strokeStyle = CASING;
        for (const a of allArcs) {
            ctx.lineWidth = a.sw + 2;
            ctx.beginPath();
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            ctx.stroke();
        }

        // Colour pass grouped by colour for performance
        const byColor = {};
        for (const a of allArcs) {
            const key = a.color + '|' + a.sw;
            (byColor[key] = byColor[key] || { color: a.color, sw: a.sw, arcs: [] }).arcs.push(a);
        }
        for (const key in byColor) {
            const grp = byColor[key];
            ctx.strokeStyle = grp.color;
            ctx.lineWidth = grp.sw;
            ctx.beginPath();
            for (const a of grp.arcs) {
                ctx.moveTo(a.cx + Math.cos(a.a0) * a.r, a.cy + Math.sin(a.a0) * a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('rings').addEventListener('input', e => {
        ringCount = +e.target.value;
        document.getElementById('ringsVal').textContent = ringCount;
        regenerate();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        build(); draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
