<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipe Network - Ribbonics</title>
    <meta name="description" content="Truchet tiles styled as industrial pipes with flanges and joints. Metallic grey casings carry a colour-coded fluid core line across the tiled grid.">
    <meta name="theme-color" content="#1c2030">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1c2030;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(28, 32, 48, 0.88);
            color: #d0cfc8;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #b0bec5; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #8a9ab0; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(28, 32, 48, 0.88);
            color: #d0cfc8;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #8a9ab0; }
        .control-group input[type="range"] { width: 100%; accent-color: #78909c; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #d0cfc8;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #1c2030; }
        .value-display { float: right; color: #b0bec5; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #37474f, #78909c);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Pipe Network</h1>
        <p>Truchet arcs become curved industrial pipes with metallic casings and flanged joints. A thin coloured fluid line runs through the core of each connected loop.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">80</span></label>
            <input type="range" id="size" min="40" max="150" value="80">
        </div>
        <div class="control-group">
            <label>Pipe diameter <span class="value-display" id="dVal">38</span>%</label>
            <input type="range" id="diam" min="18" max="60" value="38">
        </div>
        <div class="control-group">
            <label>Fluid
                <select id="fluid">
                    <option value="water">Water (cyan)</option>
                    <option value="lava">Lava (orange)</option>
                    <option value="toxic">Toxic (lime)</option>
                    <option value="blood">Blood (red)</option>
                    <option value="multi">Multi-coloured</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const FLUID_COLORS = {
        water: ['#00bcd4'],
        lava:  ['#ff6f00','#ff9800','#ffb300'],
        toxic: ['#76ff03','#b2ff59','#ccff90'],
        blood: ['#d32f2f','#f44336','#ef9a9a'],
        multi: ['#00bcd4','#ff6f00','#76ff03','#e040fb','#ffea00','#ff1744'],
    };

    let tileSize = 80;
    let diamPct = 0.38;
    let fluidType = 'water';
    let W, H, cols, rows;
    let cells = [];
    let arcs = [];
    let rafId = null;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);

        const parent = new Map();
        function find(x) {
            if (!parent.has(x)) parent.set(x, x);
            let r = x;
            while (parent.get(r) !== r) r = parent.get(r);
            while (parent.get(x) !== r) { const nx = parent.get(x); parent.set(x, r); x = nx; }
            return r;
        }
        function union(a, b) { parent.set(find(a), find(b)); }
        const h = (c, r) => 'h_' + c + '_' + r;
        const v = (c, r) => 'v_' + c + '_' + r;

        arcs = [];
        const s = tileSize, rad = s / 2;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const top = h(c, r), bottom = h(c, r+1), left = v(c, r), right = v(c+1, r);
                const config = cells[r * cols + c];
                let pairs;
                if (config === 0) {
                    pairs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI/2,   n1: top,    n2: left  },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,     a1: Math.PI*1.5, n1: bottom, n2: right }
                    ];
                } else {
                    pairs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI/2,   a1: Math.PI,     n1: top,    n2: right },
                        { cx: x0,     cy: y0 + s, a0: Math.PI*1.5, a1: Math.PI*2,   n1: bottom, n2: left  }
                    ];
                }
                for (const p of pairs) {
                    union(p.n1, p.n2);
                    arcs.push({ cx: p.cx, cy: p.cy, r: rad, a0: p.a0, a1: p.a1, n1: p.n1 });
                }
            }
        }

        const pal = FLUID_COLORS[fluidType];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcs) {
            const root = find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.fluidColor = rootColor.get(root);
        }
    }

    function strokeArcs(list) {
        ctx.beginPath();
        for (const a of list) {
            ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
            ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
        }
        ctx.stroke();
    }

    function drawFlange(cx, cy, angle, r, flangeW) {
        // Draw a circle at the pipe end-point (flange)
        const ex = cx + Math.cos(angle) * r;
        const ey = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(ex, ey, flangeW * 0.55, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex, ey, flangeW * 0.55, 0, Math.PI * 2);
        ctx.stroke();
    }

    function draw() {
        ctx.fillStyle = '#1c2030';
        ctx.fillRect(0, 0, W, H);

        const pipeDiam = Math.max(6, tileSize * diamPct);
        const flangeW = pipeDiam * 0.72;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // -- Layer 1: Deep shadow under pipe --
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = pipeDiam + 8;
        strokeArcs(arcs);

        // -- Layer 2: Pipe outer casing (dark metal) --
        ctx.strokeStyle = '#37474f';
        ctx.lineWidth = pipeDiam;
        strokeArcs(arcs);

        // -- Layer 3: Metallic highlight (lighter on top-left) --
        const metalGrad = ctx.createLinearGradient(0, 0, W * 0.3, H * 0.3);
        metalGrad.addColorStop(0, '#78909c');
        metalGrad.addColorStop(1, '#546e7a');
        ctx.strokeStyle = metalGrad;
        ctx.lineWidth = pipeDiam * 0.75;
        strokeArcs(arcs);

        // -- Layer 4: Inner pipe wall shadow --
        ctx.strokeStyle = '#263238';
        ctx.lineWidth = pipeDiam * 0.45;
        strokeArcs(arcs);

        // -- Layer 5: Fluid core by loop color --
        ctx.lineWidth = pipeDiam * 0.22;
        const byColor = {};
        for (const a of arcs) (byColor[a.fluidColor] = byColor[a.fluidColor] || []).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.shadowColor = col;
            ctx.shadowBlur = pipeDiam * 0.4;
            ctx.beginPath();
            for (const a of byColor[col]) {
                ctx.moveTo(a.cx + Math.cos(a.a0)*a.r, a.cy + Math.sin(a.a0)*a.r);
                ctx.arc(a.cx, a.cy, a.r, a.a0, a.a1);
            }
            ctx.stroke();
        }
        ctx.shadowBlur = 0;

        // -- Layer 6: Flanges at arc endpoints --
        for (const a of arcs) {
            // flange at start
            ctx.fillStyle = '#546e7a';
            ctx.strokeStyle = '#90a4ae';
            ctx.lineWidth = 1.5;
            drawFlange(a.cx, a.cy, a.a0, a.r, flangeW);
            // flange at end
            drawFlange(a.cx, a.cy, a.a1, a.r, flangeW);
        }

        // -- Layer 7: Bolts on flanges --
        ctx.fillStyle = '#37474f';
        for (const a of arcs) {
            for (const angle of [a.a0, a.a1]) {
                const ex = a.cx + Math.cos(angle) * a.r;
                const ey = a.cy + Math.sin(angle) * a.r;
                const boltR = Math.max(1.5, flangeW * 0.15);
                const boltDist = flangeW * 0.38;
                for (let i = 0; i < 4; i++) {
                    const ba = (Math.PI / 4) + (Math.PI / 2) * i;
                    ctx.beginPath();
                    ctx.arc(ex + Math.cos(ba) * boltDist, ey + Math.sin(ba) * boltDist, boltR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    }

    function regenerate() {
        if (rafId) cancelAnimationFrame(rafId);
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('diam').addEventListener('input', e => {
        diamPct = +e.target.value / 100;
        document.getElementById('dVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('fluid').addEventListener('change', e => {
        fluidType = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
