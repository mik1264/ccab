<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tartan Plaid - Ribbonics</title>
    <meta name="description" content="Overlapping translucent horizontal and vertical coloured bands forming a randomized tartan plaid; classic sett generator with authentic woven appearance.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Tartan Plaid</h1>
        <p>Randomized sett generator: overlapping translucent warp and weft bands weave into authentic tartan patterns. Every click produces a new clan.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Thread count <span class="value-display" id="countVal">8</span></label>
            <input type="range" id="count" min="3" max="16" value="8">
        </div>
        <div class="control-group">
            <label>Band width <span class="value-display" id="bwidthVal">40</span></label>
            <input type="range" id="bwidth" min="16" max="90" value="40">
        </div>
        <div class="control-group">
            <label>Opacity <span class="value-display" id="opVal">72</span>%</label>
            <input type="range" id="op" min="30" max="95" value="72">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CLAN_PALETTES = [
        ['#1a1a2e','#16213e','#0f3460','#533483','#e94560'],
        ['#1b4332','#2d6a4f','#40916c','#52b788','#b7e4c7'],
        ['#6d1a36','#8b2252','#c0392b','#e74c3c','#f4a261'],
        ['#001f3f','#00345e','#005792','#00a8cc','#ffd460'],
        ['#2c1810','#5c2e0e','#8b4513','#cd853f','#f4c07e'],
        ['#0d0221','#0a1045','#1a237e','#283593','#7e57c2'],
    ];

    const BG = '#FEFAE0';
    let threadCount = 8;
    let bandWidth = 40;
    let opacityPct = 0.72;
    let W, H;
    let sett = [];  // array of {color, width} for the sett

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    function buildSett() {
        const pal = CLAN_PALETTES[Math.floor(Math.random() * CLAN_PALETTES.length)];
        sett = [];
        for (let i = 0; i < threadCount; i++) {
            const color = pal[Math.floor(Math.random() * pal.length)];
            // Vary widths slightly for authentic look
            const w = bandWidth * (0.5 + Math.random() * 1.2);
            sett.push({ color, width: w });
        }
        // Add a thin "guard stripe" between main bands
        const full = [];
        const guard = { color: pal[0], width: Math.max(3, bandWidth * 0.15) };
        for (let i = 0; i < sett.length; i++) {
            full.push(sett[i]);
            if (i < sett.length - 1) full.push(guard);
        }
        sett = full;
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        // Warp (horizontal bands) and weft (vertical bands)
        // Repeat the sett across the screen
        const totalWidth = sett.reduce((a, s) => a + s.width, 0);
        const totalHeight = totalWidth; // symmetric sett

        // Weft stripes (vertical) — draw first at full opacity
        ctx.save();
        let x = 0;
        let rep = 0;
        while (x < W) {
            for (const band of sett) {
                if (x > W) break;
                const rgb = hexToRgb(band.color);
                ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${opacityPct})`;
                ctx.fillRect(x, 0, band.width, H);
                x += band.width;
            }
            rep++;
            if (rep > 50) break;
        }
        ctx.restore();

        // Warp stripes (horizontal) — draw at half opacity to create blend
        ctx.save();
        let y = 0;
        rep = 0;
        while (y < H) {
            for (const band of sett) {
                if (y > H) break;
                const rgb = hexToRgb(band.color);
                ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${opacityPct * 0.65})`;
                ctx.fillRect(0, y, W, band.width);
                y += band.width;
            }
            rep++;
            if (rep > 50) break;
        }
        ctx.restore();

        // Twill-like diagonal accent lines to simulate weave texture
        ctx.save();
        ctx.globalAlpha = 0.08;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.8;
        for (let d = -H; d < W + H; d += 4) {
            ctx.beginPath();
            ctx.moveTo(d, 0);
            ctx.lineTo(d + H, H);
            ctx.stroke();
        }
        ctx.restore();

        // Thin dark grid lines at band boundaries
        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 0.5;
        x = 0;
        rep = 0;
        while (x < W) {
            for (const band of sett) {
                if (x > W) break;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
                x += band.width;
            }
            rep++;
            if (rep > 50) break;
        }
        y = 0;
        rep = 0;
        while (y < H) {
            for (const band of sett) {
                if (y > H) break;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
                y += band.width;
            }
            rep++;
            if (rep > 50) break;
        }
        ctx.restore();
    }

    function regenerate() {
        resize();
        buildSett();
        draw();
    }

    document.getElementById('count').addEventListener('input', e => {
        threadCount = +e.target.value;
        document.getElementById('countVal').textContent = threadCount;
        buildSett();
        draw();
    });
    document.getElementById('bwidth').addEventListener('input', e => {
        bandWidth = +e.target.value;
        document.getElementById('bwidthVal').textContent = bandWidth;
        buildSett();
        draw();
    });
    document.getElementById('op').addEventListener('input', e => {
        opacityPct = +e.target.value / 100;
        document.getElementById('opVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', () => { resize(); draw(); });
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
