<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kagome Weave - Ribbonics</title>
    <meta name="description" content="Kagome trihexagonal lattice rendered as a triaxial basket weave with three interleaved ribbon directions crossing at 60-degree angles.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Kagome Weave</h1>
        <p>The Kagome (trihexagonal) lattice drawn as a triaxial basket weave: three families of parallel ribbon strands cross at 60° angles, each family a distinct colour, over-under weaving through each other.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="triax">Triaxial</option>
                    <option value="warm">Warm</option>
                    <option value="cool">Cool</option>
                    <option value="vivid">Vivid</option>
                    <option value="earth">Earth</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Strand spacing <span class="value-display" id="spacingVal">60</span></label>
            <input type="range" id="spacing" min="30" max="140" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">55</span>%</label>
            <input type="range" id="width" min="25" max="85" value="55">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Triaxial weave: 3 families of lines at 0°, 60°, 120°
    // Each family is a set of parallel evenly-spaced lines
    // At each crossing, one ribbon passes over the other
    // We simulate over-under by drawing in layers with clipping masks at intersections

    const PALETTES = {
        triax: [['#E63946','#2196F3','#4CAF50']],
        warm:  [['#E76F51','#F4A261','#E9C46A']],
        cool:  [['#023E8A','#0077B6','#48CAE4']],
        vivid: [['#FF00FF','#00FFFF','#FFFF00']],
        earth: [['#BC6C25','#8A9A5B','#606C38']],
    };

    const BG = '#11121e';
    const CASING = '#0a0a14';

    let strandSpacing = 60;
    let widthPct = 0.55;
    let paletteName = 'triax';
    let W, H;
    let animId = null;

    const PI = Math.PI;
    const DEG60 = PI / 3;
    const DEG120 = 2 * PI / 3;

    // Three strand directions: angles 0, 60°, 120°
    const ANGLES = [0, DEG60, DEG120];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Generate a set of parallel lines at a given angle, filling the canvas
    function getStrands(angle, spacing) {
        // Project canvas corners onto the perpendicular axis
        const cos = Math.cos(angle + PI / 2);
        const sin = Math.sin(angle + PI / 2);
        const corners = [[0,0],[W,0],[W,H],[0,H]];
        const projs = corners.map(([x,y]) => x * cos + y * sin);
        const minP = Math.min(...projs) - spacing;
        const maxP = Math.max(...projs) + spacing;

        const strands = [];
        for (let p = minP; p <= maxP; p += spacing) {
            // Line passes through (cos*p, sin*p) in the direction of angle
            const ox = cos * p;
            const oy = sin * p;
            const dx = Math.cos(angle);
            const dy = Math.sin(angle);
            const ext = Math.max(W, H) * 2;
            strands.push({
                x1: ox - dx * ext, y1: oy - dy * ext,
                x2: ox + dx * ext, y2: oy + dy * ext
            });
        }
        return strands;
    }

    function drawStrandFamily(strands, color, lineW, casingW) {
        // Draw casing
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casingW;
        ctx.lineCap = 'round';
        ctx.beginPath();
        for (const s of strands) {
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
        }
        ctx.stroke();

        // Draw colored ribbon
        ctx.strokeStyle = color;
        ctx.lineWidth = lineW;
        ctx.beginPath();
        for (const s of strands) {
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
        }
        ctx.stroke();
    }

    // For a triaxial weave over-under effect:
    // We draw in 3 passes. Each pass draws all strands of one family,
    // but clips away the areas where another family goes "over" it.
    // Simpler approach: draw family 1 fully, draw family 2 with gaps, draw family 3 with gaps,
    // using a checkerboard-like clipping at intersections.
    //
    // Practical approach: draw each family twice, second pass with clipping regions
    // covering the "under" sections at intersections.
    // For simplicity we use a layered approach:
    // Layer 0: family A fully
    // Layer 1: family B, but erase at every other crossing with A
    // Layer 2: family C, alternating over/under

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        const pal = PALETTES[paletteName][0];
        const ribbonW = strandSpacing * widthPct;
        const casingW = ribbonW + Math.max(3, strandSpacing * 0.08);

        // Draw all 3 families, creating a triaxial weave by
        // drawing each family, then re-drawing on top with alternating clipping
        // to simulate over-under.

        const families = ANGLES.map((angle, i) => ({
            angle,
            strands: getStrands(angle, strandSpacing),
            color: pal[i]
        }));

        // Simple layered draw — each successive family is drawn on top,
        // giving a natural woven appearance
        for (const fam of families) {
            drawStrandFamily(fam.strands, fam.color, ribbonW, casingW);
        }

        // Over-under refinement: re-draw family 0 at alternate intersections over family 2
        // This creates the "weave" crossing illusion
        // We do this by painting short segments of family 0 over family 2
        const f0 = families[0], f2 = families[2];
        const segHalf = strandSpacing * widthPct * 0.65;

        ctx.lineCap = 'round';
        // For each strand in f0, find intersections with f2 strands
        for (let i = 0; i < f0.strands.length; i++) {
            const s0 = f0.strands[i];
            const dx0 = s0.x2 - s0.x1, dy0 = s0.y2 - s0.y1;
            const len0 = Math.sqrt(dx0 * dx0 + dy0 * dy0);
            const ux0 = dx0 / len0, uy0 = dy0 / len0;

            for (let j = 0; j < f2.strands.length; j++) {
                // Only alternate crossings get the over treatment
                if ((i + j) % 2 !== 0) continue;
                const s2 = f2.strands[j];
                const pt = lineIntersect(s0.x1, s0.y1, s0.x2, s0.y2, s2.x1, s2.y1, s2.x2, s2.y2);
                if (!pt) continue;
                if (pt.x < -10 || pt.x > W + 10 || pt.y < -10 || pt.y > H + 10) continue;

                // Draw a short segment of f0 over the intersection
                ctx.strokeStyle = CASING;
                ctx.lineWidth = casingW;
                ctx.beginPath();
                ctx.moveTo(pt.x - ux0 * segHalf, pt.y - uy0 * segHalf);
                ctx.lineTo(pt.x + ux0 * segHalf, pt.y + uy0 * segHalf);
                ctx.stroke();

                ctx.strokeStyle = f0.color;
                ctx.lineWidth = ribbonW;
                ctx.beginPath();
                ctx.moveTo(pt.x - ux0 * segHalf, pt.y - uy0 * segHalf);
                ctx.lineTo(pt.x + ux0 * segHalf, pt.y + uy0 * segHalf);
                ctx.stroke();
            }
        }
    }

    // Line segment intersection (returns {x,y} or null)
    function lineIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
        const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(denom) < 1e-9) return null;
        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
        return {
            x: x1 + t * (x2 - x1),
            y: y1 + t * (y2 - y1)
        };
    }

    function regenerate() { resize(); draw(); }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('spacing').addEventListener('input', e => { strandSpacing = +e.target.value; document.getElementById('spacingVal').textContent = strandSpacing; draw(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value / 100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
