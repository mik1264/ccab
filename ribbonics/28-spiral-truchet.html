<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Truchet - Ribbonics</title>
    <meta name="description" content="Tiles containing spiral arc segments chain into larger spirals across the grid, painted with warm gradient colours.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #12100e;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Spiral Truchet</h1>
        <p>Each tile holds a double-arc "S" segment that connects opposite edge midpoints. Randomly oriented tiles chain these arcs into large spiral forms across the grid, rendered with warm sunset gradient colours.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Colour scheme
                <select id="scheme">
                    <option value="sunset">Sunset</option>
                    <option value="ember">Ember</option>
                    <option value="ocean">Ocean</option>
                    <option value="forest">Forest</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">56</span>px</label>
            <input type="range" id="size" min="24" max="120" value="56">
        </div>
        <div class="control-group">
            <label>Stroke weight <span class="value-display" id="swVal">36</span>%</label>
            <input type="range" id="sw" min="10" max="65" value="36">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Each scheme is [colorStops] for a gradient across the grid
    const SCHEMES = {
        sunset: ['#F72585','#F77F00','#FCBF49','#F4A261','#E76F51','#B5179E','#7209B7'],
        ember:  ['#FF4E00','#EC9A29','#A8201A','#6B2737','#F7B267','#FF6B35','#E63946'],
        ocean:  ['#023E8A','#0077B6','#00B4D8','#90E0EF','#48CAE4','#0096C7','#ADE8F4'],
        forest: ['#1B4332','#2D6A4F','#40916C','#52B788','#74C69D','#95D5B2','#B7E4C7']
    };
    const BG = '#12100e';
    const CASING = '#0a0908';

    let tileSize = 56, strokePct = 0.36, scheme = 'sunset';
    let W, H, segList = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Each Truchet "S-tile" tile: two quarter-circle arcs forming an S or Z shape
    // Config 0: arc at TL corner (0 -> PI/2) and arc at BR corner (PI -> 3PI/2)
    // Config 1: arc at TR corner (PI/2 -> PI) and arc at BL corner (3PI/2 -> 2PI)
    function build() {
        const cols = Math.ceil(W / tileSize) + 1;
        const rows = Math.ceil(H / tileSize) + 1;
        segList = [];
        const s = tileSize;
        const r = s / 2;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x0 = col * s, y0 = row * s;
                // Normalised grid position for colour
                const t = (col / cols + row / rows) * 0.5;
                const config = Math.random() < 0.5 ? 0 : 1;

                if (config === 0) {
                    segList.push({ cx: x0,     cy: y0,     r, a0: 0,           a1: Math.PI/2,   t });
                    segList.push({ cx: x0 + s, cy: y0 + s, r, a0: Math.PI,     a1: Math.PI*1.5, t });
                } else {
                    segList.push({ cx: x0 + s, cy: y0,     r, a0: Math.PI/2,   a1: Math.PI,     t });
                    segList.push({ cx: x0,     cy: y0 + s, r, a0: Math.PI*1.5, a1: Math.PI*2,   t });
                }
            }
        }
    }

    function lerpColor(a, b, t) {
        const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
        const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
        const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
        const rr = Math.round(ar + (br - ar) * t);
        const rg = Math.round(ag + (bg - ag) * t);
        const rb = Math.round(ab + (bb - ab) * t);
        return '#' + ((1 << 24) | (rr << 16) | (rg << 8) | rb).toString(16).slice(1);
    }

    function gradientColor(t, stops) {
        t = Math.max(0, Math.min(1, t));
        const n = stops.length - 1;
        const idx = Math.min(Math.floor(t * n), n - 1);
        const frac = t * n - idx;
        return lerpColor(stops[idx], stops[idx + 1], frac);
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';

        const stops = SCHEMES[scheme];
        const fill = Math.max(3, tileSize * strokePct);
        const casing = fill + Math.max(3, tileSize * 0.09);

        // Casing pass
        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const s of segList) {
            ctx.moveTo(s.cx + Math.cos(s.a0) * s.r, s.cy + Math.sin(s.a0) * s.r);
            ctx.arc(s.cx, s.cy, s.r, s.a0, s.a1);
        }
        ctx.stroke();

        // Colour pass — each arc gets its own gradient colour based on position
        ctx.lineWidth = fill;
        for (const s of segList) {
            // Compute t from diagonal position to give wave-like gradient
            const tx = (s.cx / W + s.cy / H) * 0.5;
            const jitter = (s.r / Math.max(W, H)) * 0.5;
            const tval = (tx + jitter) % 1;
            ctx.strokeStyle = gradientColor(tval, stops);
            ctx.beginPath();
            ctx.moveTo(s.cx + Math.cos(s.a0) * s.r, s.cy + Math.sin(s.a0) * s.r);
            ctx.arc(s.cx, s.cy, s.r, s.a0, s.a1);
            ctx.stroke();
        }
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('scheme').addEventListener('change', e => { scheme = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('sw').addEventListener('input', e => {
        strokePct = +e.target.value / 100;
        document.getElementById('swVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
