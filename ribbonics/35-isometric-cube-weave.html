<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Cube Weave - Ribbonics</title>
    <meta name="description" content="Tumbling-blocks isometric cubes whose three visible faces carry ribbon arcs, creating a 3D woven illusion with shaded faces.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Isometric Cube Weave</h1>
        <p>Tumbling-blocks isometric cubes with three shaded faces each carrying Truchet ribbon arcs, building a continuous 3D woven illusion.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Cube size <span class="value-display" id="sizeVal">64</span></label>
            <input type="range" id="size" min="28" max="120" value="64">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">36</span>%</label>
            <input type="range" id="width" min="15" max="60" value="36">
        </div>
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="vivid">Vivid</option>
                    <option value="jewel">Jewel</option>
                    <option value="earth">Earthy</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        vivid: ['#E63946','#2A9D8F','#E9C46A','#264653','#F4A261','#A8DADC','#457B9D'],
        jewel: ['#9B2335','#1E5F74','#D4A017','#5E1B89','#0D7680','#B5451B','#2B6777'],
        earth: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A'],
    };
    const CASING = '#0d0e1a';
    const BG = '#11121e';

    let cubeSize = 64;
    let widthPct = 0.36;
    let paletteName = 'vivid';
    let W, H;
    let cubes = [];

    // Isometric projection: cube half-size h
    // Top face: rhombus, Left face: left-slanted, Right face: right-slanted
    // We use: h = cubeSize, so width = 2h, height_iso = 3*h*sin(30°)*2... let's parametrize
    // For a cube of side S, project onto screen:
    //   right vector:  (cos30, sin30)*S = (S*√3/2, S/2)
    //   left vector:  (-cos30, sin30)*S
    //   up vector:    (0, -S)
    // Origin at hex centre point

    function isoProject(gx, gy, s) {
        // gx, gy are grid coords (hex offset)
        const hw = s * Math.sqrt(3) / 2;
        const hh = s / 2;
        const screenX = W / 2 + (gx - gy) * hw;
        const screenY = H / 2 + (gx + gy) * hh - gx * hh;
        return { x: screenX, y: screenY };
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function build() {
        const s = cubeSize;
        const hw = s * Math.sqrt(3) / 2;
        const hh = s / 2;

        // Number of cubes to fill the screen
        const cols = Math.ceil(W / hw) + 4;
        const rows = Math.ceil(H / hh) + 4;
        const pal = PALETTES[paletteName];

        cubes = [];
        const offX = Math.floor(cols / 2);
        const offY = Math.floor(rows / 2);

        for (let gy = -offY; gy < rows - offY; gy++) {
            for (let gx = -offX; gx < cols - offX; gx++) {
                // screen center of top vertex of this cube
                const cx = W / 2 + (gx - gy) * hw;
                const cy = H / 2 + (gx + gy) * hh;

                // cull
                if (cx < -s * 2 || cx > W + s * 2 || cy < -s * 2 || cy > H + s * 2) continue;

                // top face vertices: diamond
                // top, right, bottom, left
                const top    = { x: cx,      y: cy - s      };
                const right  = { x: cx + hw, y: cy - hh     };
                const bottom = { x: cx,      y: cy          };
                const left   = { x: cx - hw, y: cy - hh     };

                // left face (from bottom-left going down s)
                const leftBot  = { x: cx - hw, y: cy - hh + s };
                const bottomBot= { x: cx,      y: cy + s       };

                // right face
                const rightBot = { x: cx + hw, y: cy - hh + s };

                const color = pal[Math.abs((gx * 3 + gy * 7 + Math.floor(Math.random() * pal.length))) % pal.length];
                const arcType = Math.random() < 0.5 ? 0 : 1;

                cubes.push({ top, right, bottom, left, leftBot, bottomBot, rightBot, color, arcType, cx, cy, s, hw, hh });
            }
        }
    }

    function drawFace(verts, lightFactor, color, arcType) {
        // verts: array of 4 points forming a parallelogram face
        // Draw the face fill with shading, then draw a ribbon arc clipped to it
        ctx.save();

        // clip to face
        ctx.beginPath();
        ctx.moveTo(verts[0].x, verts[0].y);
        for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
        ctx.closePath();
        ctx.clip();

        // shade fill
        ctx.fillStyle = shadeColor(color, lightFactor);
        ctx.fill();

        // draw ribbon arc within the face
        // center of face
        const cx = (verts[0].x + verts[1].x + verts[2].x + verts[3].x) / 4;
        const cy = (verts[0].y + verts[1].y + verts[2].y + verts[3].y) / 4;

        // Find approximate inradius: half-diagonal of smallest span
        const dx = verts[1].x - verts[0].x;
        const dy = verts[1].y - verts[0].y;
        const rad = Math.sqrt(dx * dx + dy * dy) / 2;

        const fill = rad * widthPct * 2;
        const casingW = fill + Math.max(3, rad * 0.15);

        ctx.lineCap = 'round';

        const a0 = arcType === 0 ? 0 : Math.PI / 2;
        const a1 = a0 + Math.PI / 2;
        const a2 = a0 + Math.PI;
        const a3 = a0 + Math.PI * 1.5;

        // Two arcs at opposite corners
        // Corner 0 (verts[0]) arc
        const c0x = (verts[0].x + verts[1].x) / 2;
        const c0y = (verts[0].y + verts[1].y) / 2;
        // simplified: just draw the arc centred in the face quadrants
        const corners = [
            { cx: verts[0].x, cy: verts[0].y, a0: a0, a1: a0 + Math.PI / 2 },
            { cx: verts[2].x, cy: verts[2].y, a0: a2, a1: a2 + Math.PI / 2 },
        ];

        ctx.strokeStyle = CASING;
        ctx.lineWidth = casingW;
        ctx.beginPath();
        for (const arc of corners) {
            ctx.moveTo(arc.cx + Math.cos(arc.a0) * rad, arc.cy + Math.sin(arc.a0) * rad);
            ctx.arc(arc.cx, arc.cy, rad, arc.a0, arc.a1);
        }
        ctx.stroke();

        ctx.strokeStyle = lightenColor(color, lightFactor + 0.3);
        ctx.lineWidth = fill;
        ctx.beginPath();
        for (const arc of corners) {
            ctx.moveTo(arc.cx + Math.cos(arc.a0) * rad, arc.cy + Math.sin(arc.a0) * rad);
            ctx.arc(arc.cx, arc.cy, rad, arc.a0, arc.a1);
        }
        ctx.stroke();

        ctx.restore();
    }

    function shadeColor(hex, factor) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const f = Math.max(0, Math.min(1, factor));
        return `rgb(${Math.round(r * f)},${Math.round(g * f)},${Math.round(b * f)})`;
    }

    function lightenColor(hex, factor) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const f = Math.max(0, Math.min(2, factor));
        return `rgb(${Math.min(255, Math.round(r * f))},${Math.min(255, Math.round(g * f))},${Math.min(255, Math.round(b * f))})`;
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);

        // Sort cubes back-to-front (painter's algorithm by y then x)
        cubes.sort((a, b) => (a.cy - b.cy) || (a.cx - b.cx));

        for (const cube of cubes) {
            const { top, right, bottom, left, leftBot, bottomBot, rightBot, color, arcType } = cube;

            // Draw outline of whole cube first
            ctx.strokeStyle = CASING;
            ctx.lineWidth = 1.5;

            // Top face
            drawFace([top, right, bottom, left], 1.0, color, arcType);

            // Left face
            drawFace([left, bottom, bottomBot, leftBot], 0.65, color, arcType);

            // Right face
            drawFace([bottom, right, rightBot, bottomBot], 0.82, color, arcType);

            // Edge outlines
            ctx.strokeStyle = CASING;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            // top face outline
            ctx.moveTo(top.x, top.y);
            ctx.lineTo(right.x, right.y);
            ctx.lineTo(bottom.x, bottom.y);
            ctx.lineTo(left.x, left.y);
            ctx.closePath();
            // left face
            ctx.moveTo(left.x, left.y);
            ctx.lineTo(leftBot.x, leftBot.y);
            ctx.lineTo(bottomBot.x, bottomBot.y);
            ctx.lineTo(bottom.x, bottom.y);
            // right face
            ctx.moveTo(bottom.x, bottom.y);
            ctx.lineTo(bottomBot.x, bottomBot.y);
            ctx.lineTo(rightBot.x, rightBot.y);
            ctx.lineTo(right.x, right.y);
            ctx.stroke();
        }
    }

    function regenerate() {
        resize();
        build();
        draw();
    }

    document.getElementById('size').addEventListener('input', e => {
        cubeSize = +e.target.value;
        document.getElementById('sizeVal').textContent = cubeSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('palette').addEventListener('change', e => {
        paletteName = e.target.value;
        build();
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
