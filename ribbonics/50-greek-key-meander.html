<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Key Meander - Ribbonics</title>
    <meta name="description" content="A classic Greek-key fret pattern drawn as a continuous gold ribbon maze on a dark background — ancient geometry made luminous.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Greek Key Meander</h1>
        <p>A classic meander fret drawn as a continuous ribbon: sharp right-angle turns form interlocking spirals that tile endlessly across the canvas in antique gold-on-dark.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="gold">Gold on Obsidian</option>
                    <option value="silver">Silver on Navy</option>
                    <option value="terracotta">Terracotta on Black</option>
                    <option value="jade">Jade on Dark</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Cell size <span class="value-display" id="sizeVal">60</span></label>
            <input type="range" id="size" min="30" max="120" value="60">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">28</span>%</label>
            <input type="range" id="width" min="12" max="45" value="28">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        gold:       { bg: '#0d0c07', ribbon: '#D4AF37', casing: '#6B4A00', hi: '#FFE57A' },
        silver:     { bg: '#080d1a', ribbon: '#C0C8D4', casing: '#1a2540', hi: '#e8edf5' },
        terracotta: { bg: '#100808', ribbon: '#BC6C25', casing: '#3a1200', hi: '#F4A460' },
        jade:       { bg: '#040e0a', ribbon: '#3EB489', casing: '#0a2e20', hi: '#8FE8C0' }
    };

    let cellSize = 60;
    let widthPct = 0.28;
    let paletteName = 'gold';
    let W, H;
    let segments = []; // each: {x1,y1,x2,y2}

    // The Greek key motif is a unit pattern that repeats on a 4x4 grid.
    // We tile this unit across the canvas.
    // Unit cell is cellSize*4 wide and cellSize*4 tall.
    // The canonical meander path (in grid units, origin top-left, step=1):
    // We draw line segments connecting corners of sub-cells.
    const KEY_PATH = [
        // Outer spiral CW (going right across the top, then down, left, up, right...):
        // We encode as polyline in units of cellSize, per 4x4 tile
        // Row 0: right across
        [0,0, 4,0],
        // Right side down
        [4,0, 4,4],
        // Bottom: left
        [4,4, 0,4],
        // Left side up to row 1
        [0,4, 0,1],
        // Row 1 right to col 3
        [0,1, 3,1],
        // Down to row 3
        [3,1, 3,3],
        // Left to col 1
        [3,3, 1,3],
        // Up to row 2
        [1,3, 1,2],
        // Right to col 2
        [1,2, 2,2],
    ];

    function buildSegments() {
        segments = [];
        const unit = cellSize * 4;
        const cols = Math.ceil(W / unit) + 1;
        const rows = Math.ceil(H / unit) + 1;
        for (let r = -1; r < rows; r++) {
            for (let c = -1; c < cols; c++) {
                const ox = c * unit;
                const oy = r * unit;
                for (const [x1g, y1g, x2g, y2g] of KEY_PATH) {
                    segments.push({
                        x1: ox + x1g * cellSize,
                        y1: oy + y1g * cellSize,
                        x2: ox + x2g * cellSize,
                        y2: oy + y2g * cellSize
                    });
                }
            }
        }
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);

        const lw = Math.max(3, cellSize * widthPct);
        const cw = lw + Math.max(3, cellSize * 0.09);

        ctx.lineCap = 'square';
        ctx.lineJoin = 'miter';
        ctx.miterLimit = 10;

        // Casing pass
        ctx.strokeStyle = pal.casing;
        ctx.lineWidth = cw;
        ctx.beginPath();
        for (const s of segments) {
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
        }
        ctx.stroke();

        // Ribbon pass
        ctx.strokeStyle = pal.ribbon;
        ctx.lineWidth = lw;
        ctx.beginPath();
        for (const s of segments) {
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
        }
        ctx.stroke();

        // Highlight pass (thin top edge shimmer)
        ctx.strokeStyle = pal.hi;
        ctx.lineWidth = Math.max(1, lw * 0.18);
        ctx.globalAlpha = 0.55;
        ctx.beginPath();
        for (const s of segments) {
            const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
            const len = Math.hypot(dx, dy);
            if (len === 0) continue;
            const nx = -dy / len * lw * 0.3, ny = dx / len * lw * 0.3;
            ctx.moveTo(s.x1 + nx, s.y1 + ny);
            ctx.lineTo(s.x2 + nx, s.y2 + ny);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        buildSegments();
        draw();
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        cellSize = +e.target.value;
        document.getElementById('sizeVal').textContent = cellSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
