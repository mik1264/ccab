<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatami Weave - Ribbonics</title>
    <meta name="description" content="Tatami-mat layout of rectangular ribbon blocks arranged in a herringbone-style pattern with contrasting binding edges in green and cream.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1f18;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Tatami Weave</h1>
        <p>Tatami-mat style rectangular ribbon blocks are arranged in a random herringbone layout — each mat is either horizontal or vertical. Contrasting binding-edge stripes frame each mat, evoking traditional Japanese woven flooring.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Colour scheme
                <select id="scheme">
                    <option value="traditional">Traditional</option>
                    <option value="modern">Modern</option>
                    <option value="autumnal">Autumnal</option>
                    <option value="indigo">Indigo</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Mat size <span class="value-display" id="msVal">60</span>px</label>
            <input type="range" id="ms" min="30" max="130" value="60">
        </div>
        <div class="control-group">
            <label>Binding width <span class="value-display" id="bwVal">8</span>px</label>
            <input type="range" id="bw" min="2" max="20" value="8">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const SCHEMES = {
        traditional: { mat1: '#D4C5A0', mat2: '#B8A87A', binding: '#4A6741', bg: '#2d3828', edge: '#1e261a' },
        modern:      { mat1: '#E8E0D4', mat2: '#C8BEB4', binding: '#5C7A8B', bg: '#2a3540', edge: '#1a2530' },
        autumnal:    { mat1: '#D4956A', mat2: '#B87C50', binding: '#8B3A2A', bg: '#2a1810', edge: '#1a0e08' },
        indigo:      { mat1: '#C8C0D8', mat2: '#A8A0C0', binding: '#3B2F6A', bg: '#1a1828', edge: '#100e1a' }
    };

    let matUnit = 60, bindW = 8, schemeName = 'traditional';
    let W, H, mats = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    // Tatami layout: each 2x1 unit is a mat. We tile the grid with horizontal (2x1) or vertical (1x2) mats
    // following a simple random tiling.
    function build() {
        const s = matUnit;
        const cols = Math.ceil(W / s) + 2;
        const rows = Math.ceil(H / s) + 2;

        mats = [];
        // Fill a grid: try to place 2x1 or 1x2 mats
        const grid = new Uint8Array(cols * rows); // 0=empty, 1=filled
        const idx = (c, r) => r * cols + c;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (grid[idx(c, r)]) continue;
                // Try horizontal (2 wide) or vertical (2 tall)
                const canH = c + 1 < cols && !grid[idx(c + 1, r)];
                const canV = r + 1 < rows && !grid[idx(c, r + 1)];
                let orient;
                if (canH && canV) orient = Math.random() < 0.5 ? 'H' : 'V';
                else if (canH) orient = 'H';
                else if (canV) orient = 'V';
                else orient = 'S'; // single cell fallback

                const x0 = (c - 0.5) * s, y0 = (r - 0.5) * s;
                if (orient === 'H') {
                    mats.push({ x: x0, y: y0, w: s * 2, h: s, orient: 'H' });
                    grid[idx(c, r)] = 1; grid[idx(c + 1, r)] = 1;
                } else if (orient === 'V') {
                    mats.push({ x: x0, y: y0, w: s, h: s * 2, orient: 'V' });
                    grid[idx(c, r)] = 1; grid[idx(c, r + 1)] = 1;
                } else {
                    mats.push({ x: x0, y: y0, w: s, h: s, orient: 'S' });
                    grid[idx(c, r)] = 1;
                }
            }
        }
    }

    function draw() {
        const sc = SCHEMES[schemeName];
        ctx.fillStyle = sc.bg;
        ctx.fillRect(0, 0, W, H);

        const bw = bindW;
        const gap = 2;

        for (const m of mats) {
            const { x, y, w, h, orient } = m;
            const isH = orient !== 'V';
            const matColor = isH ? sc.mat1 : sc.mat2;
            const rad = 3;

            // Shadow / edge
            ctx.fillStyle = sc.edge;
            roundFill(x - 1, y - 1, w + 2, h + 2, rad + 1);

            // Mat body
            ctx.fillStyle = matColor;
            roundFill(x, y, w, h, rad);

            // Binding stripe: runs perpendicular to mat orientation along the long axis
            ctx.fillStyle = sc.binding;
            if (isH) {
                // Horizontal mat: binding runs horizontally at top and bottom edges
                roundFill(x + gap, y + gap, w - gap * 2, bw, 2);
                roundFill(x + gap, y + h - gap - bw, w - gap * 2, bw, 2);
            } else {
                // Vertical mat: binding runs vertically at left and right edges
                roundFill(x + gap, y + gap, bw, h - gap * 2, 2);
                roundFill(x + w - gap - bw, y + gap, bw, h - gap * 2, 2);
            }

            // Centre weave texture: subtle diagonal lines
            ctx.strokeStyle = matColor === sc.mat1 ? sc.mat2 : sc.mat1;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.4;
            const step = Math.max(8, matUnit / 6);
            ctx.save();
            ctx.beginPath();
            ctx.rect(x + bw + gap, y + bw + gap, w - (bw + gap) * 2, h - (bw + gap) * 2);
            ctx.clip();
            ctx.beginPath();
            for (let d = -w; d < w + h; d += step) {
                ctx.moveTo(x + d, y);
                ctx.lineTo(x + d + h, y + h);
            }
            ctx.stroke();
            ctx.restore();
            ctx.globalAlpha = 1;
        }
    }

    function roundFill(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
        ctx.fill();
    }

    function regenerate() { resize(); build(); draw(); }

    document.getElementById('scheme').addEventListener('change', e => { schemeName = e.target.value; draw(); });
    document.getElementById('ms').addEventListener('input', e => {
        matUnit = +e.target.value;
        document.getElementById('msVal').textContent = matUnit;
        regenerate();
    });
    document.getElementById('bw').addEventListener('input', e => {
        bindW = +e.target.value;
        document.getElementById('bwVal').textContent = bindW;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
