<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rope Coils - Ribbonics</title>
    <meta name="description" content="Truchet arcs rendered as twisted rope: two helically-shaded strands with periodic diagonal hatching coil across the grid in natural fiber tones.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11121e;
        }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Rope Coils</h1>
        <p>Truchet quarter-circle paths are rendered as twisted rope: two helically-shaded strands with periodic diagonal hatch marks coil and interlock across the grid.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Rope color
                <select id="palette">
                    <option value="hemp">Natural Hemp</option>
                    <option value="red">Red Cord</option>
                    <option value="navy">Navy Rope</option>
                    <option value="gold">Gold Braid</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Tile size <span class="value-display" id="sizeVal">72</span></label>
            <input type="range" id="size" min="36" max="140" value="72">
        </div>
        <div class="control-group">
            <label>Rope thickness <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="18" max="60" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        hemp:  { bg: '#1a1409', dark: '#3a2a0a', mid: '#A0845C', light: '#D4B483', hi: '#F0D8A0' },
        red:   { bg: '#0f0608', dark: '#3a0808', mid: '#8B2020', light: '#C84040', hi: '#F07070' },
        navy:  { bg: '#07080f', dark: '#0a1030', mid: '#1a3060', light: '#3060A0', hi: '#70A0D8' },
        gold:  { bg: '#0d0c07', dark: '#3a2a00', mid: '#A07820', light: '#D4AF37', hi: '#FFE57A' }
    };

    let tileSize = 72;
    let widthPct = 0.38;
    let paletteName = 'hemp';
    let W, H, cols, rows;
    let cells = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function regenerate() {
        resize();
        cols = Math.ceil(W / tileSize) + 1;
        rows = Math.ceil(H / tileSize) + 1;
        cells = [];
        for (let i = 0; i < cols * rows; i++) cells.push(Math.random() < 0.5 ? 0 : 1);
        draw();
    }

    function drawRopeArc(cx, cy, r, a0, a1, pal, ropeW, hatchPhase) {
        const STEPS = Math.max(16, Math.round(r * Math.abs(a1 - a0) * 0.5));
        const da = (a1 - a0) / STEPS;
        const strand = ropeW * 0.28;
        const perp = ropeW * 0.22; // offset between strands

        // --- dark shadow outline ---
        ctx.strokeStyle = pal.dark;
        ctx.lineWidth = ropeW + 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(cx, cy, r, a0, a1);
        ctx.stroke();

        // --- strand A ---
        ctx.strokeStyle = pal.mid;
        ctx.lineWidth = strand;
        ctx.lineCap = 'round';
        ctx.beginPath();
        for (let i = 0; i <= STEPS; i++) {
            const a = a0 + i * da;
            const ta = a + Math.PI / 2; // tangent angle
            const px = cx + Math.cos(a) * r + Math.cos(ta) * perp;
            const py = cy + Math.sin(a) * r + Math.sin(ta) * perp;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        // --- strand B ---
        ctx.strokeStyle = pal.light;
        ctx.lineWidth = strand;
        ctx.beginPath();
        for (let i = 0; i <= STEPS; i++) {
            const a = a0 + i * da;
            const ta = a + Math.PI / 2;
            const px = cx + Math.cos(a) * r - Math.cos(ta) * perp;
            const py = cy + Math.sin(a) * r - Math.sin(ta) * perp;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        // --- hatch ticks (simulating twist crossings) ---
        const hatchStep = ropeW * 1.1;
        const arcLen = r * Math.abs(a1 - a0);
        const nHatch = Math.max(2, Math.floor(arcLen / hatchStep));
        ctx.strokeStyle = pal.dark;
        ctx.lineWidth = Math.max(1.2, strand * 0.6);
        ctx.lineCap = 'butt';
        const offset = (hatchPhase * hatchStep) % hatchStep;
        for (let h = 0; h <= nHatch; h++) {
            const t = (h * hatchStep + offset) / arcLen;
            if (t > 1) break;
            const a = a0 + t * (a1 - a0);
            const ta = a + Math.PI / 2;
            const bx = cx + Math.cos(a) * r;
            const by = cy + Math.sin(a) * r;
            ctx.beginPath();
            ctx.moveTo(bx + Math.cos(ta) * ropeW * 0.52, by + Math.sin(ta) * ropeW * 0.52);
            ctx.lineTo(bx - Math.cos(ta) * ropeW * 0.52, by - Math.sin(ta) * ropeW * 0.52);
            ctx.stroke();
        }

        // --- highlight ---
        ctx.strokeStyle = pal.hi;
        ctx.lineWidth = Math.max(1, strand * 0.4);
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc(cx, cy, r + perp * 0.7, a0, a1);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    function draw() {
        const pal = PALETTES[paletteName];
        ctx.fillStyle = pal.bg;
        ctx.fillRect(0, 0, W, H);

        const ropeW = Math.max(5, tileSize * widthPct);
        const s = tileSize, rad = s / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x0 = c * s, y0 = r * s;
                const config = cells[r * cols + c];
                const phase = ((c * 3 + r * 7) % 11) / 11;
                let arcs;
                if (config === 0) {
                    arcs = [
                        { cx: x0,     cy: y0,     a0: 0,           a1: Math.PI / 2 },
                        { cx: x0 + s, cy: y0 + s, a0: Math.PI,     a1: Math.PI * 1.5 }
                    ];
                } else {
                    arcs = [
                        { cx: x0 + s, cy: y0,     a0: Math.PI / 2, a1: Math.PI },
                        { cx: x0,     cy: y0 + s, a0: Math.PI * 1.5, a1: Math.PI * 2 }
                    ];
                }
                for (const a of arcs) {
                    drawRopeArc(a.cx, a.cy, rad, a.a0, a.a1, pal, ropeW, phase);
                }
            }
        }
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; draw(); });
    document.getElementById('size').addEventListener('input', e => {
        tileSize = +e.target.value;
        document.getElementById('sizeVal').textContent = tileSize;
        regenerate();
    });
    document.getElementById('width').addEventListener('input', e => {
        widthPct = +e.target.value / 100;
        document.getElementById('widthVal').textContent = e.target.value;
        draw();
    });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
