<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangular Truchet - Ribbonics</title>
    <meta name="description" content="An equilateral-triangle grid where each triangle carries a random Truchet arc near two of its three corners, producing flowing rounded weaves of triangles and hexagons in multicolour.">
    <meta name="theme-color" content="#FEFAE0">
    <link rel="icon" href="data:,">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FEFAE0;
        }
        canvas { display: block; }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-panel h1 { font-size: 20px; margin-bottom: 8px; color: #DDA15E; font-family: 'Lora', serif; }
        .info-panel p { font-size: 13px; line-height: 1.55; color: #c9c4b4; }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(17, 18, 30, 0.82);
            color: #f3efe0;
            padding: 18px 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 230px;
        }
        .control-group { margin-bottom: 13px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #c9c4b4; }
        .control-group input[type="range"] { width: 100%; accent-color: #DDA15E; }
        .control-group select {
            width: 100%; padding: 6px; background: rgba(255,255,255,0.06); color: #f3efe0;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
        }
        .control-group option { background: #222; }
        .value-display { float: right; color: #DDA15E; font-weight: 700; }
        button {
            width: 100%; padding: 10px; background: linear-gradient(135deg, #BC6C25, #DDA15E);
            color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 700; transition: transform 0.2s ease, filter 0.2s ease;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    </style>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:20px;left:20px;z-index:10000;display:inline-flex;align-items:center;gap:0.5rem;color:#BC6C25;text-decoration:none;font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:600;padding:0.5rem 1rem;background:rgba(254,250,224,0.95);border-radius:20px;border:2px solid rgba(138,154,91,0.3);box-shadow:0 4px 15px rgba(96,108,56,0.15);"><span>←</span><span>Gallery</span></a>
    <canvas id="canvas"></canvas>

    <div class="info-panel">
        <h1>Triangular Truchet</h1>
        <p>Each equilateral triangle holds a circular arc near two of its three corners, connecting edge-midpoints. Arcs chain across the grid into continuous colourful loops that follow both triangular and hexagonal paths.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Palette
                <select id="palette">
                    <option value="court">Basketball Court</option>
                    <option value="candy">Candy Pop</option>
                    <option value="meadow">Meadow</option>
                    <option value="sunset">Sunset</option>
                </select>
            </label>
        </div>
        <div class="control-group">
            <label>Triangle size <span class="value-display" id="sizeVal">70</span></label>
            <input type="range" id="size" min="30" max="140" value="70">
        </div>
        <div class="control-group">
            <label>Ribbon width <span class="value-display" id="widthVal">38</span>%</label>
            <input type="range" id="width" min="15" max="65" value="38">
        </div>
        <div class="control-group">
            <button id="regen">Regenerate</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const PALETTES = {
        court:  ['#C0392B','#2E86AB','#27AE60','#E67E22','#E84393','#F1C40F','#16A085'],
        candy:  ['#FF6B6B','#4ECDC4','#FFD93D','#6A4C93','#FF8FA3','#1A535C','#FFA630'],
        meadow: ['#606C38','#8A9A5B','#DDA15E','#BC6C25','#A3B18A','#588157','#E9C46A'],
        sunset: ['#F72585','#7209B7','#3A0CA3','#4361EE','#F77F00','#FCBF49','#E63946']
    };
    const BG = '#FEFAE0';
    const CASING = '#14151f';

    let triSize = 70;
    let widthPct = 0.38;
    let paletteName = 'court';
    let W, H;
    let arcList = [];

    /*
      Equilateral triangle grid:
      Row r, col c gives triangles — every row has upward and downward pointing triangles.
      For a side length S:
        height h = S * sqrt(3)/2
      Triangle vertices:
        Up-pointing (c+r even): A=(c*S/2, r*h), B=(c*S/2+S, r*h), C=(c*S/2+S/2, (r+1)*h)
        Down-pointing (c+r odd): A=(c*S/2, (r+1)*h), B=(c*S/2+S, (r+1)*h), C=(c*S/2+S/2, r*h)

      Truchet on triangle: each triangle has 3 edges → 3 edge-midpoints as nodes.
      We randomly choose ONE corner and draw an arc from the midpoint of one adjacent edge
      to the midpoint of the other adjacent edge, curving through that corner.
      That leaves one edge-midpoint on the "other side" unpaired — so we pair it with
      the adjacent triangle's arc. To ensure all 3 edge-midpoints are used, we actually
      pick TWO corners (the opposite-edge midpoints of those two corners each get connected
      leaving the third edge-midpoint free — but that third will be paired by a neighbour).

      Actually for a clean Truchet on triangles: each tile draws arcs near 1 corner.
      That connects 2 of the 3 edge-midpoints. The third is connected by a neighbour.
      We randomly pick which corner (0, 1, or 2).
    */

    function makeUF() {
        const p = {};
        const find = k => { if (p[k]===undefined) p[k]=k; if (p[k]!==k) p[k]=find(p[k]); return p[k]; };
        const union = (a,b) => { p[find(a)]=find(b); };
        return { find, union };
    }

    const nodeKey = (x, y) => Math.round(x*2)+'_'+Math.round(y*2);

    function build() {
        arcList = [];
        const uf = makeUF();

        const S = triSize;
        const H2 = S * Math.sqrt(3) / 2;

        const colCount = Math.ceil(W / (S/2)) + 4;
        const rowCount = Math.ceil(H / H2) + 4;

        for (let r = -2; r < rowCount; r++) {
            for (let c = -4; c < colCount; c++) {
                // up or down?
                const up = (c + r) % 2 === 0;
                let verts;
                const ox = c * S / 2;
                const oy = r * H2;
                if (up) {
                    verts = [
                        [ox,       oy],
                        [ox + S,   oy],
                        [ox + S/2, oy + H2]
                    ];
                } else {
                    verts = [
                        [ox,       oy + H2],
                        [ox + S,   oy + H2],
                        [ox + S/2, oy]
                    ];
                }

                // edge midpoints
                const mids = [
                    [(verts[0][0]+verts[1][0])/2, (verts[0][1]+verts[1][1])/2],
                    [(verts[1][0]+verts[2][0])/2, (verts[1][1]+verts[2][1])/2],
                    [(verts[2][0]+verts[0][0])/2, (verts[2][1]+verts[0][1])/2]
                ];
                const ns = mids.map(m => nodeKey(m[0], m[1]));

                // pick a random corner; that corner connects its two adjacent edge-midpoints
                // corner i connects edge (i-1, i) and edge (i, i+1) in mod 3
                const corner = Math.floor(Math.random() * 3);
                const edgeA = corner;                    // edge between verts[corner] and verts[(corner+1)%3]
                const edgeB = (corner + 2) % 3;         // edge between verts[(corner+2)%3] and verts[corner]
                // the arc curves around the corner vertex, from mids[edgeA] to mids[edgeB]
                uf.union(ns[edgeA], ns[edgeB]);
                arcList.push({
                    cx: verts[corner][0], cy: verts[corner][1],
                    pm1: mids[edgeA], pm2: mids[edgeB],
                    n1: ns[edgeA]
                });
            }
        }

        const pal = PALETTES[paletteName];
        const rootColor = new Map();
        let next = 0;
        for (const a of arcList) {
            const root = uf.find(a.n1);
            if (!rootColor.has(root)) rootColor.set(root, pal[next++ % pal.length]);
            a.color = rootColor.get(root);
        }
    }

    function drawArc(a) {
        const { cx, cy, pm1, pm2 } = a;
        const r = Math.hypot(pm1[0]-cx, pm1[1]-cy);
        if (r < 0.5) return;
        let a0 = Math.atan2(pm1[1]-cy, pm1[0]-cx);
        let a1 = Math.atan2(pm2[1]-cy, pm2[0]-cx);
        let diff = a1 - a0;
        while (diff < -Math.PI) diff += 2*Math.PI;
        while (diff >  Math.PI) diff -= 2*Math.PI;
        ctx.moveTo(pm1[0], pm1[1]);
        ctx.arc(cx, cy, r, a0, a1, diff < 0);
    }

    function draw() {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const fill = Math.max(3, triSize * widthPct * 0.55);
        const casing = fill + Math.max(3, triSize * 0.07);

        ctx.strokeStyle = CASING;
        ctx.lineWidth = casing;
        ctx.beginPath();
        for (const a of arcList) drawArc(a);
        ctx.stroke();

        ctx.lineWidth = fill;
        const byColor = {};
        for (const a of arcList) (byColor[a.color] = byColor[a.color]||[]).push(a);
        for (const col in byColor) {
            ctx.strokeStyle = col;
            ctx.beginPath();
            for (const a of byColor[col]) drawArc(a);
            ctx.stroke();
        }
    }

    function regenerate() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
        draw();
    }

    document.getElementById('palette').addEventListener('change', e => { paletteName = e.target.value; build(); draw(); });
    document.getElementById('size').addEventListener('input', e => { triSize = +e.target.value; document.getElementById('sizeVal').textContent = triSize; regenerate(); });
    document.getElementById('width').addEventListener('input', e => { widthPct = +e.target.value/100; document.getElementById('widthVal').textContent = e.target.value; draw(); });
    document.getElementById('regen').addEventListener('click', regenerate);
    window.addEventListener('resize', regenerate);
    window.reset = regenerate;

    regenerate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
