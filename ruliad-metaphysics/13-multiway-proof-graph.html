<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Multiway Proof Graph — Ruliad Metaphysics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
:root {
  --sage: #8A9A5B;
  --moss: #606C38;
  --earth: #DDA15E;
  --cream: #FEFAE0;
  --terracotta: #BC6C25;
  --dark-moss: #3d4423;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  color: var(--dark-moss);
  background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Floating organic back-link */
.organic-back-link {
  position: fixed;
  top: 22px;
  left: 22px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px 10px 14px;
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(96, 108, 56, 0.25);
  border-radius: 30px 38px 28px 36px;
  color: var(--moss);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  z-index: 50;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 18px rgba(96, 108, 56, 0.08);
}
.organic-back-link:hover {
  transform: translateX(-3px);
  background: rgba(255, 255, 255, 0.85);
  color: var(--dark-moss);
  box-shadow: 0 6px 22px rgba(96, 108, 56, 0.15);
}
.back-arrow { font-size: 1.15rem; line-height: 1; }

/* Title card */
.title-card {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 640px;
  padding: 16px 28px;
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(96, 108, 56, 0.18);
  border-radius: 22px;
  text-align: center;
  z-index: 40;
  box-shadow: 0 6px 22px rgba(96, 108, 56, 0.08);
}
.title-card h1 {
  font-family: 'Lora', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--moss);
  margin-bottom: 4px;
}
.title-card p {
  font-size: 0.85rem;
  color: var(--dark-moss);
  opacity: 0.85;
  line-height: 1.4;
}

/* Main layout */
.app {
  flex: 1;
  display: flex;
  flex-direction: row;
  padding-top: 110px;
  padding-bottom: 12px;
  gap: 14px;
  padding-left: 14px;
  padding-right: 14px;
  min-height: 0;
}

.graph-pane {
  flex: 1;
  position: relative;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(96, 108, 56, 0.18);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 6px 22px rgba(96, 108, 56, 0.07);
}

#graph {
  display: block;
  width: 100%;
  height: 100%;
}

.sidebar {
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
}

.panel {
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(96, 108, 56, 0.18);
  border-radius: 18px;
  padding: 16px 18px;
  box-shadow: 0 4px 16px rgba(96, 108, 56, 0.07);
}

.panel h2 {
  font-family: 'Lora', serif;
  font-size: 1.02rem;
  color: var(--moss);
  margin-bottom: 10px;
  font-weight: 600;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

button {
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  padding: 8px 14px;
  border: 1px solid var(--moss);
  background: var(--cream);
  color: var(--moss);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}
button:hover {
  background: var(--moss);
  color: var(--cream);
  transform: translateY(-1px);
}
button:active { transform: translateY(0); }
button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 0.82rem;
}
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.legend-swatch {
  width: 22px;
  height: 4px;
  border-radius: 2px;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  font-size: 0.86rem;
}
.stat {
  background: rgba(254, 250, 224, 0.7);
  border-radius: 10px;
  padding: 8px 10px;
  border: 1px solid rgba(96, 108, 56, 0.12);
}
.stat-label {
  font-size: 0.7rem;
  color: var(--moss);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.stat-value {
  font-family: 'Lora', serif;
  font-size: 1.15rem;
  color: var(--dark-moss);
  font-weight: 600;
}
.stat.highlight .stat-value { color: var(--terracotta); }

.theorem-list {
  max-height: 220px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-right: 4px;
}
.theorem-list::-webkit-scrollbar { width: 6px; }
.theorem-list::-webkit-scrollbar-track { background: transparent; }
.theorem-list::-webkit-scrollbar-thumb {
  background: rgba(96, 108, 56, 0.3);
  border-radius: 3px;
}

.theorem-item {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(96, 108, 56, 0.15);
  background: rgba(254, 250, 224, 0.5);
  cursor: pointer;
  font-family: 'Lora', serif;
  font-size: 0.88rem;
  color: var(--dark-moss);
  transition: all 0.15s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.theorem-item:hover {
  background: rgba(221, 161, 94, 0.2);
  border-color: var(--earth);
}
.theorem-item.selected {
  background: rgba(188, 108, 37, 0.18);
  border-color: var(--terracotta);
  color: var(--terracotta);
  font-weight: 600;
}
.theorem-item .proof-count {
  font-size: 0.7rem;
  color: var(--moss);
  background: rgba(254, 250, 224, 0.8);
  padding: 2px 7px;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}
.theorem-item.selected .proof-count {
  background: var(--terracotta);
  color: var(--cream);
}

.rules {
  font-size: 0.78rem;
  color: var(--dark-moss);
  line-height: 1.7;
  font-family: 'Lora', serif;
}
.rule-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.rule-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.axiom-chip {
  display: inline-block;
  padding: 1px 8px;
  background: rgba(138, 154, 91, 0.18);
  border: 1px solid var(--sage);
  color: var(--moss);
  border-radius: 8px;
  margin: 2px 3px 0 0;
  font-family: 'Lora', serif;
  font-size: 0.82rem;
}

/* Organic floating shapes */
.shape {
  position: fixed;
  pointer-events: none;
  z-index: -1;
  opacity: 0.35;
  filter: blur(40px);
  animation: morph 30s ease-in-out infinite;
}
.shape-1 {
  top: -100px;
  right: -120px;
  width: 360px;
  height: 360px;
  background: var(--sage);
  border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
}
.shape-2 {
  bottom: -120px;
  left: -100px;
  width: 320px;
  height: 320px;
  background: var(--earth);
  border-radius: 58% 42% 35% 65% / 55% 30% 70% 45%;
  animation-delay: -10s;
}
@keyframes morph {
  0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
  33% { border-radius: 58% 42% 35% 65% / 65% 60% 40% 35%; }
  66% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
}

@media (max-width: 900px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; max-height: 40vh; overflow-y: auto; }
  .title-card { max-width: calc(100% - 160px); }
}
</style>

<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<a href="../index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Multiway Proof Graph</h1>
  <p>Mathematical theorems are nodes; deductions are edges. Every distinct path to a node is a different proof — a slice of the ruliad's metamathematics.</p>
</div>

<div class="app">

  <div class="graph-pane">
    <svg id="graph"></svg>
  </div>

  <div class="sidebar">

    <div class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <button id="btn-step">Step +1</button>
        <button id="btn-expand">Expand x5</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div class="stats" style="margin-top:12px;">
        <div class="stat">
          <div class="stat-label">Nodes</div>
          <div class="stat-value" id="stat-nodes">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Edges</div>
          <div class="stat-value" id="stat-edges">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Depth</div>
          <div class="stat-value" id="stat-depth">0</div>
        </div>
        <div class="stat highlight">
          <div class="stat-label">Proofs</div>
          <div class="stat-value" id="stat-proofs">&mdash;</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Axioms &amp; Rules</h2>
      <div style="margin-bottom:8px;">
        <span style="font-size:0.78rem;color:var(--moss);font-weight:600;">Axioms:</span><br/>
        <span class="axiom-chip">A</span>
        <span class="axiom-chip">B</span>
        <span class="axiom-chip">AB</span>
      </div>
      <div class="rules" id="rules-list"></div>
    </div>

    <div class="panel" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <h2>Theorems &mdash; pick a target</h2>
      <div class="theorem-list" id="theorem-list"></div>
    </div>

  </div>

</div>

<script>
/* ============================================================
   Toy string-rewriting axiom system over alphabet {A, B}.
   Axioms: "A", "B", "AB"
   Rules (each applied as a rewrite anywhere a match is found):
     R1: AB  -> BA   (commutation, sage)
     R2: BA  -> AB   (reverse commutation, moss)
     R3: AA  -> ""   (involution / cancellation, earth)
     R4: BBB -> AB   (collapse, terracotta)
     R5: ""  -> AA   (introduction)  [disabled in default to keep finite]
   Theorems = all reachable strings. Different rewrite sequences
   reaching the same string = different proofs of that theorem.
   ============================================================ */

const RULES = [
  { id: 'R1', name: 'AB → BA',  lhs: 'AB',  rhs: 'BA', color: '#8A9A5B' },
  { id: 'R2', name: 'BA → AB',  lhs: 'BA',  rhs: 'AB', color: '#606C38' },
  { id: 'R3', name: 'AA → ε', lhs: 'AA', rhs: '',  color: '#DDA15E' },
  { id: 'R4', name: 'BBB → AB', lhs: 'BBB', rhs: 'AB', color: '#BC6C25' },
];

const AXIOMS = ['A', 'B', 'AB'];
const MAX_NODES = 150;
const MAX_LEN  = 6; // bound formula length so the graph stays finite-ish

/* State */
let nodes = [];       // { id, label, depth }
let edges = [];       // { source, target, rule }
let nodeIndex = {};   // label -> id
let frontier = [];    // labels to expand next
let currentDepth = 0;
let selectedTheorem = null;

/* Rendering */
const svg = document.getElementById('graph');
let svgNS = 'http://www.w3.org/2000/svg';
let width = 0, height = 0;

function resize() {
  const r = svg.getBoundingClientRect();
  width = r.width;
  height = r.height;
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  layoutAndDraw();
}
window.addEventListener('resize', resize);

/* ============================================================
   Rewrite logic
   ============================================================ */

function applyRule(str, rule) {
  // produce every distinct result string by finding each occurrence of lhs
  // and replacing it once with rhs
  const out = [];
  const lhs = rule.lhs;
  if (lhs.length === 0) return out; // skip empty-lhs rules
  let i = 0;
  while (i <= str.length - lhs.length) {
    if (str.substr(i, lhs.length) === lhs) {
      const next = str.substring(0, i) + rule.rhs + str.substring(i + lhs.length);
      out.push(next);
      i++;
    } else i++;
  }
  return out;
}

function labelOf(s) { return s === '' ? 'ε' : s; }

function addNodeIfNew(label, depth) {
  if (nodeIndex[label] !== undefined) return nodeIndex[label];
  if (nodes.length >= MAX_NODES) return -1;
  const id = nodes.length;
  nodeIndex[label] = id;
  nodes.push({ id, label, depth });
  return id;
}

function init() {
  nodes = [];
  edges = [];
  nodeIndex = {};
  frontier = [];
  currentDepth = 0;
  selectedTheorem = null;
  AXIOMS.forEach(a => {
    addNodeIfNew(a, 0);
    frontier.push(a);
  });
  updateStats();
  renderTheoremList();
  layoutAndDraw();
}

/* Expand one BFS layer */
function stepOnce() {
  if (frontier.length === 0 || nodes.length >= MAX_NODES) return false;
  const nextFrontier = [];
  const seenThisStep = new Set();
  currentDepth++;
  for (const src of frontier) {
    const srcId = nodeIndex[src];
    for (const rule of RULES) {
      const results = applyRule(src, rule);
      for (const r of results) {
        if (r.length > MAX_LEN) continue;
        const isNew = nodeIndex[r] === undefined;
        if (isNew && nodes.length >= MAX_NODES) continue;
        const tgtId = addNodeIfNew(r, currentDepth);
        if (tgtId < 0) continue;
        // de-dup identical edges (same src/tgt/rule)
        const key = srcId + '>' + tgtId + ':' + rule.id;
        if (!edges.some(e => e._key === key)) {
          edges.push({ source: srcId, target: tgtId, rule: rule.id, color: rule.color, _key: key });
        }
        if (isNew && !seenThisStep.has(r)) {
          seenThisStep.add(r);
          nextFrontier.push(r);
        }
      }
    }
  }
  frontier = nextFrontier;
  updateStats();
  renderTheoremList();
  layoutAndDraw();
  return true;
}

function expandMany(n) {
  for (let i = 0; i < n; i++) {
    if (!stepOnce()) break;
    if (nodes.length >= MAX_NODES) break;
  }
}

/* ============================================================
   Layout: nodes grouped by depth (layered top-to-bottom).
   Within a layer, distribute horizontally.
   ============================================================ */
function layoutAndDraw() {
  if (!width || !height) return;
  // group by depth
  const layers = {};
  let maxDepth = 0;
  for (const n of nodes) {
    if (!layers[n.depth]) layers[n.depth] = [];
    layers[n.depth].push(n);
    if (n.depth > maxDepth) maxDepth = n.depth;
  }
  const layerKeys = Object.keys(layers).map(Number).sort((a,b)=>a-b);
  const layerCount = layerKeys.length;
  const padTop = 40, padBottom = 40, padX = 40;
  const usableH = height - padTop - padBottom;
  const usableW = width - 2*padX;
  const positions = {};
  layerKeys.forEach((d, di) => {
    const y = layerCount === 1 ? height/2
            : padTop + (usableH * di) / Math.max(1, layerCount - 1);
    const layer = layers[d];
    layer.forEach((n, ni) => {
      const x = layer.length === 1
        ? width/2
        : padX + (usableW * ni) / Math.max(1, layer.length - 1);
      positions[n.id] = { x, y };
    });
  });

  // Compute proof paths (edges) leading to selected theorem.
  // We highlight all edges that lie on some path from any axiom to the target.
  const highlightEdges = new Set();
  const highlightNodes = new Set();
  let proofCount = 0;
  if (selectedTheorem !== null && nodeIndex[selectedTheorem] !== undefined) {
    const targetId = nodeIndex[selectedTheorem];
    const result = countAndCollectProofs(targetId, highlightEdges, highlightNodes);
    proofCount = result;
  }
  document.getElementById('stat-proofs').textContent =
    selectedTheorem === null ? '—'
      : (proofCount > 9999 ? '9999+' : proofCount.toString());

  // Render
  svg.innerHTML = '';

  // arrowhead defs
  const defs = document.createElementNS(svgNS, 'defs');
  defs.innerHTML = `
    <marker id="arrow-faded" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#606C38" opacity="0.35"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#BC6C25"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Draw edges first (so nodes sit on top)
  const edgeGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(edgeGroup);
  for (const e of edges) {
    const p1 = positions[e.source];
    const p2 = positions[e.target];
    if (!p1 || !p2) continue;
    const onPath = highlightEdges.has(e._key);
    // shorten endpoints a bit to avoid node overlap
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx/len, uy = dy/len;
    const nodeR = 18;
    const x1 = p1.x + ux * nodeR;
    const y1 = p1.y + uy * nodeR;
    const x2 = p2.x - ux * nodeR;
    const y2 = p2.y - uy * nodeR;

    // curve self-loops or same-layer edges slightly
    let path;
    if (p1.y === p2.y) {
      const midX = (x1 + x2) / 2;
      const midY = y1 - 22;
      path = `M${x1},${y1} Q${midX},${midY} ${x2},${y2}`;
    } else {
      path = `M${x1},${y1} L${x2},${y2}`;
    }

    const line = document.createElementNS(svgNS, 'path');
    line.setAttribute('d', path);
    line.setAttribute('fill', 'none');
    if (onPath) {
      line.setAttribute('stroke', '#BC6C25');
      line.setAttribute('stroke-width', '2.4');
      line.setAttribute('opacity', '0.95');
      line.setAttribute('marker-end', 'url(#arrow-hl)');
    } else {
      line.setAttribute('stroke', e.color);
      line.setAttribute('stroke-width', '1.2');
      line.setAttribute('opacity', selectedTheorem === null ? '0.55' : '0.18');
      line.setAttribute('marker-end', 'url(#arrow-faded)');
    }
    edgeGroup.appendChild(line);
  }

  // Draw nodes
  const nodeGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(nodeGroup);
  for (const n of nodes) {
    const p = positions[n.id];
    if (!p) continue;
    const isAxiom = n.depth === 0;
    const isTarget = (selectedTheorem === n.label);
    const onPath = highlightNodes.has(n.id);

    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', `translate(${p.x},${p.y})`);
    g.style.cursor = 'pointer';

    const text = labelOf(n.label);
    const w = Math.max(28, 8 + text.length * 9);
    const h = 24;

    const rect = document.createElementNS(svgNS, 'rect');
    rect.setAttribute('x', -w/2);
    rect.setAttribute('y', -h/2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', 8);
    rect.setAttribute('ry', 8);
    rect.setAttribute('fill', '#FEFAE0');
    let stroke = '#606C38';
    let strokeW = '1.3';
    if (isAxiom) { stroke = '#8A9A5B'; strokeW = '2'; }
    if (onPath && !isTarget) { stroke = '#BC6C25'; strokeW = '1.8'; }
    if (isTarget) { stroke = '#BC6C25'; strokeW = '3'; }
    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', strokeW);
    g.appendChild(rect);

    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-family', "'Lora', serif");
    t.setAttribute('font-size', '12');
    t.setAttribute('font-weight', isTarget || isAxiom ? '700' : '500');
    t.setAttribute('fill', isTarget ? '#BC6C25' : '#3d4423');
    t.textContent = text;
    g.appendChild(t);

    g.addEventListener('click', () => {
      selectedTheorem = n.label;
      renderTheoremList();
      layoutAndDraw();
    });

    nodeGroup.appendChild(g);
  }
}

/* ============================================================
   Count number of distinct proofs (paths from any axiom to target)
   and collect highlighted edges/nodes.
   We use dynamic programming over a DAG-ified view: since edges
   may form cycles, restrict counting to edges going from lower
   depth to greater-or-equal depth, and only follow forward in BFS
   discovery order (each node's depth = its BFS depth).
   A "proof" is a sequence of strictly-depth-increasing rewrites,
   ending at the target. (Same-layer edges are excluded from counting
   to avoid loops/inflation; but they're still drawn.)
   ============================================================ */
function countAndCollectProofs(targetId, edgeSet, nodeSet) {
  // Forward adjacency by depth
  // proofCount[id] = number of distinct proofs reaching id (sum over predecessors)
  // pred[id] = list of {srcId, edgeKey}
  const pred = {};
  for (const n of nodes) pred[n.id] = [];
  for (const e of edges) {
    const ds = nodes[e.source].depth;
    const dt = nodes[e.target].depth;
    if (dt > ds) pred[e.target].push({ src: e.source, key: e._key });
  }
  // topo order: by depth ascending
  const order = nodes.slice().sort((a,b) => a.depth - b.depth).map(n => n.id);
  const count = {};
  for (const id of order) {
    if (nodes[id].depth === 0) count[id] = 1;
    else {
      let c = 0;
      for (const p of pred[id]) c += (count[p.src] || 0);
      // cap to avoid runaway
      if (c > 100000) c = 100000;
      count[id] = c;
    }
  }
  // backward trace from target: mark every edge/node on some path
  const stack = [targetId];
  nodeSet.add(targetId);
  while (stack.length) {
    const id = stack.pop();
    for (const p of pred[id]) {
      if (count[p.src] > 0) {
        edgeSet.add(p.key);
        if (!nodeSet.has(p.src)) {
          nodeSet.add(p.src);
          stack.push(p.src);
        }
      }
    }
  }
  return count[targetId] || 0;
}

/* ============================================================
   UI
   ============================================================ */
function updateStats() {
  document.getElementById('stat-nodes').textContent = nodes.length.toString();
  document.getElementById('stat-edges').textContent = edges.length.toString();
  let md = 0;
  for (const n of nodes) if (n.depth > md) md = n.depth;
  document.getElementById('stat-depth').textContent = md.toString();
}

function renderTheoremList() {
  const list = document.getElementById('theorem-list');
  list.innerHTML = '';
  // sort: non-axioms first by depth, then by label length
  const sorted = nodes.slice().sort((a,b) => {
    if (a.depth !== b.depth) return a.depth - b.depth;
    return a.label.length - b.label.length;
  });
  for (const n of sorted) {
    const div = document.createElement('div');
    div.className = 'theorem-item' + (selectedTheorem === n.label ? ' selected' : '');
    const span = document.createElement('span');
    span.textContent = labelOf(n.label) + (n.depth === 0 ? '  (axiom)' : '');
    div.appendChild(span);
    const pc = document.createElement('span');
    pc.className = 'proof-count';
    // quick local count for label badge
    if (n.depth === 0) pc.textContent = '1';
    else {
      const tmpE = new Set(), tmpN = new Set();
      const c = countAndCollectProofs(n.id, tmpE, tmpN);
      pc.textContent = c > 9999 ? '9999+' : c.toString();
    }
    div.appendChild(pc);
    div.addEventListener('click', () => {
      selectedTheorem = n.label;
      renderTheoremList();
      layoutAndDraw();
    });
    list.appendChild(div);
  }
}

function renderRules() {
  const el = document.getElementById('rules-list');
  el.innerHTML = '';
  for (const r of RULES) {
    const row = document.createElement('div');
    row.className = 'rule-row';
    const dot = document.createElement('span');
    dot.className = 'rule-dot';
    dot.style.background = r.color;
    row.appendChild(dot);
    const txt = document.createElement('span');
    txt.textContent = r.id + ': ' + r.name;
    row.appendChild(txt);
    el.appendChild(row);
  }
}

document.getElementById('btn-step').addEventListener('click', () => stepOnce());
document.getElementById('btn-expand').addEventListener('click', () => expandMany(5));
document.getElementById('btn-reset').addEventListener('click', () => init());

renderRules();
init();
// initial expansion so the user sees something interesting
expandMany(3);
requestAnimationFrame(() => { resize(); });
</script>
