<div id="tooltip"></div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const minimap = document.getElementById('minimap');
    const mctx = minimap.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    // ===== Virtual world coordinates =====
    const WORLD = { x: -2000, y: -1500, w: 4000, h: 3000 };

    // Camera
    let cam = { x: 0, y: 0, zoom: 0.55 };
    let dpr = 1;
    let W = 0, H = 0;

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Seeded PRNG (Mulberry32) =====
    function mulberry32(seed) {
        return function() {
            let t = (seed += 0x6D2B79F5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
    }

    // ===== Value noise =====
    const NOISE_SIZE = 256;
    const noiseTable = (function() {
        const r = mulberry32(1337);
        const t = new Float32Array(NOISE_SIZE * NOISE_SIZE);
        for (let i = 0; i < t.length; i++) t[i] = r();
        return t;
    })();
    function noise2(x, y) {
        const xi = Math.floor(x), yi = Math.floor(y);
        const xf = x - xi, yf = y - yi;
        const x0 = ((xi % NOISE_SIZE) + NOISE_SIZE) % NOISE_SIZE;
        const y0 = ((yi % NOISE_SIZE) + NOISE_SIZE) % NOISE_SIZE;
        const x1 = (x0 + 1) % NOISE_SIZE;
        const y1 = (y0 + 1) % NOISE_SIZE;
        const a = noiseTable[y0 * NOISE_SIZE + x0];
        const b = noiseTable[y0 * NOISE_SIZE + x1];
        const c = noiseTable[y1 * NOISE_SIZE + x0];
        const d = noiseTable[y1 * NOISE_SIZE + x1];
        const sx = xf * xf * (3 - 2 * xf);
        const sy = yf * yf * (3 - 2 * yf);
        const ab = a + sx * (b - a);
        const cd = c + sx * (d - c);
        return ab + sy * (cd - ab);
    }
    function fbm(x, y) {
        let total = 0, amp = 0.5, freq = 1;
        for (let i = 0; i < 4; i++) {
            total += amp * noise2(x * freq, y * freq);
            freq *= 2;
            amp *= 0.5;
        }
        return total;
    }

    // ===== Regions =====
    // Each region: name, cx, cy, rx, ry, color, accent, type (icon kind), description, link
    const REGIONS = [
        {
            name: 'Physics',
            cx: -900, cy: -600, rx: 520, ry: 380,
            color: 'rgba(138, 154, 91, 0.42)',
            accent: '#606C38',
            type: 'hypergraph',
            desc: 'Causal graphs and hypergraphs unfold here — space, time and matter as the persistent structure of rewriting.',
            link: '01-hypergraph-rewriting.html'
        },
        {
            name: 'Mathematics',
            cx: 750, cy: -700, rx: 540, ry: 360,
            color: 'rgba(221, 161, 94, 0.40)',
            accent: '#BC6C25',
            type: 'proof',
            desc: 'Axiom systems weave into multiway proof DAGs — theorems are paths through entangled deductive space.',
            link: '13-multiway-proof-graph.html'
        },
        {
            name: 'Mind',
            cx: 850, cy: 600, rx: 480, ry: 380,
            color: 'rgba(188, 108, 37, 0.38)',
            accent: '#BC6C25',
            type: 'observer',
            desc: 'Observers, free will, and consciousness — finite minds sampling slices of the ruliad they can coherently bind.',
            link: '08-observer-localization.html'
        },
        {
            name: 'Branchial Space',
            cx: -1100, cy: 500, rx: 420, ry: 340,
            color: 'rgba(96, 108, 56, 0.45)',
            accent: '#3d4423',
            type: 'branchial',
            desc: 'Quantum superposition as proximity in branchial space — entanglement is geometric closeness between histories.',
            link: '05-branchial-space.html'
        },
        {
            name: 'Class 4 Archipelago',
            cx: -100, cy: -1100, rx: 380, ry: 220,
            color: 'rgba(138, 154, 91, 0.50)',
            accent: '#606C38',
            type: 'ca',
            desc: 'Islands of complex emergent computation — Rule 110, Rule 30, gliders and structures at the edge of chaos.',
            link: '02-rule-30-irreducibility.html'
        },
        {
            name: 'Causal Foliations',
            cx: -200, cy: 100, rx: 320, ry: 240,
            color: 'rgba(96, 108, 56, 0.38)',
            accent: '#606C38',
            type: 'foliation',
            desc: 'Reference frames as ways of slicing the causal graph — relativity reborn as a choice of foliation.',
            link: '09-causal-foliation.html'
        },
        {
            name: 'Multiway Systems',
            cx: 100, cy: -350, rx: 300, ry: 220,
            color: 'rgba(221, 161, 94, 0.36)',
            accent: '#BC6C25',
            type: 'multiway',
            desc: 'All possible rewrites pursued in parallel — branching, merging, the substrate of quantum mechanics.',
            link: '03-multiway-system.html'
        },
        {
            name: 'Rule Space Atlas',
            cx: -1500, cy: 1100, rx: 320, ry: 240,
            color: 'rgba(188, 108, 37, 0.32)',
            accent: '#BC6C25',
            type: 'atlas',
            desc: 'The space of all possible rules — every Turing machine, every cellular automaton, mapped as a single terrain.',
            link: '06-rule-space-atlas.html'
        },
        {
            name: 'Pockets of Reducibility',
            cx: 1450, cy: 100, rx: 300, ry: 240,
            color: 'rgba(254, 250, 224, 0.55)',
            accent: '#606C38',
            type: 'pocket',
            desc: 'Rare regions where shortcuts exist — the slim seams of the ruliad where science as prediction is possible.',
            link: '14-pockets-of-reducibility.html'
        },
        {
            name: 'Computational Equivalence',
            cx: 1500, cy: -150, rx: 280, ry: 200,
            color: 'rgba(138, 154, 91, 0.36)',
            accent: '#606C38',
            type: 'equiv',
            desc: 'Almost all sufficiently complex systems compute at the same maximal level — the Principle of Computational Equivalence.',
            link: '15-computational-equivalence.html'
        },
        {
            name: 'Rulial Distance',
            cx: -1700, cy: -200, rx: 280, ry: 220,
            color: 'rgba(96, 108, 56, 0.32)',
            accent: '#3d4423',
            type: 'rulial',
            desc: 'The metric across rule-space — how far must an observer travel to reach an alien physics?',
            link: '16-rulial-distance.html'
        },
        {
            name: 'Turing Machines',
            cx: 500, cy: 1250, rx: 260, ry: 180,
            color: 'rgba(221, 161, 94, 0.34)',
            accent: '#BC6C25',
            type: 'turing',
            desc: 'Tapes and heads — the canonical computational substrate, embedded as a small province of the ruliad.',
            link: '19-turing-machine.html'
        },
        {
            name: 'String Substitution',
            cx: -700, cy: 1250, rx: 260, ry: 180,
            color: 'rgba(138, 154, 91, 0.34)',
            accent: '#606C38',
            type: 'string',
            desc: 'Symbol-rewriting on strings — the simplest possible window onto multiway computation.',
            link: '17-string-substitution.html'
        },
        {
            name: 'Quantum Measurement',
            cx: -350, cy: 850, rx: 280, ry: 200,
            color: 'rgba(188, 108, 37, 0.36)',
            accent: '#BC6C25',
            type: 'measure',
            desc: 'Wavefunction collapse as the observer\'s coarse-graining over branchial space — measurement reframed.',
            link: '12-quantum-measurement.html'
        },
        {
            name: 'Persistent Observer Thread',
            cx: 350, cy: 350, rx: 250, ry: 180,
            color: 'rgba(254, 250, 224, 0.50)',
            accent: '#606C38',
            type: 'thread',
            desc: 'The thin braided worldline of a coherent observer — selfhood as a stable trajectory through the multiway.',
            link: '20-persistent-observer-thread.html'
        },
        {
            name: 'Emergent Curvature',
            cx: -1500, cy: -1000, rx: 280, ry: 200,
            color: 'rgba(96, 108, 56, 0.36)',
            accent: '#3d4423',
            type: 'curvature',
            desc: 'Gravity as the local curvature of the hypergraph — Einstein\'s equations emerging from pure combinatorics.',
            link: '11-emergent-curvature.html'
        },
        {
            name: 'Interconcept Wilds',
            cx: 1500, cy: 1200, rx: 360, ry: 260,
            color: 'rgba(138, 154, 91, 0.18)',
            accent: '#8A9A5B',
            type: 'wild',
            desc: 'Unnamed regions of the ruliad — vast tracts of computation no observer has ever found a use for.',
            link: null
        },
        {
            name: 'Irreducibility Frontier',
            cx: 250, cy: -1500, rx: 360, ry: 200,
            color: 'rgba(188, 108, 37, 0.30)',
            accent: '#BC6C25',
            type: 'frontier',
            desc: 'Where shortcuts vanish — every prediction here demands literal step-by-step simulation. No theory escapes.',
            link: '07-irreducibility-race.html'
        }
    ];

    // Pre-generate scattered tiny structures across the interconcept space
    const SCATTER = (function() {
        const r = mulberry32(99);
        const items = [];
        for (let i = 0; i < 380; i++) {
            const x = WORLD.x + r() * WORLD.w;
            const y = WORLD.y + r() * WORLD.h;
            // Skip if inside any region (approximate)
            let inside = false;
            for (const reg of REGIONS) {
                const dx = (x - reg.cx) / reg.rx;
                const dy = (y - reg.cy) / reg.ry;
                if (dx*dx + dy*dy < 0.9) { inside = true; break; }
            }
            if (inside) continue;
            items.push({
                x, y,
                kind: Math.floor(r() * 4),
                size: 6 + r() * 14,
                rot: r() * Math.PI * 2,
                seed: Math.floor(r() * 100000)
            });
        }
        return items;
    })();

    // Pre-generate noise tile for backdrop (sampled at world coords)
    const TILE = 256;
    const noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = TILE;
    noiseCanvas.height = TILE;
    (function() {
        const nctx = noiseCanvas.getContext('2d');
        const img = nctx.createImageData(TILE, TILE);
        for (let y = 0; y < TILE; y++) {
            for (let x = 0; x < TILE; x++) {
                const n = fbm(x * 0.012, y * 0.012);
                const v = 230 + Math.floor(n * 26 - 6);
                const idx = (y * TILE + x) * 4;
                // soft sage tint
                img.data[idx] = Math.min(255, v + 4);
                img.data[idx + 1] = Math.min(255, v + 6);
                img.data[idx + 2] = Math.max(0, v - 14);
                img.data[idx + 3] = 255;
            }
        }
        nctx.putImageData(img, 0, 0);
    })();
    const noisePattern = ctx.createPattern(noiseCanvas, 'repeat');

    // ===== Camera helpers =====
    function worldToScreen(x, y) {
        return {
            x: (x - cam.x) * cam.zoom + W / 2,
            y: (y - cam.y) * cam.zoom + H / 2
        };
    }
    function screenToWorld(x, y) {
        return {
            x: (x - W / 2) / cam.zoom + cam.x,
            y: (y - H / 2) / cam.zoom + cam.y
        };
    }

    // ===== Icon drawing (tiny generative thumbnails) =====
    function drawIcon(x, y, size, kind, seed, accent) {
        ctx.save();
        ctx.translate(x, y);
        const r = mulberry32(seed || 1);

        if (kind === 'hypergraph') {
            // small hypergraph: nodes + edges
            const N = 7;
            const pts = [];
            for (let i = 0; i < N; i++) {
                const a = (i / N) * Math.PI * 2 + r() * 0.4;
                const rr = size * (0.4 + r() * 0.5);
                pts.push([Math.cos(a) * rr, Math.sin(a) * rr]);
            }
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.2;
            ctx.globalAlpha = 0.7;
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    if (r() > 0.65) {
                        ctx.beginPath();
                        ctx.moveTo(pts[i][0], pts[i][1]);
                        ctx.lineTo(pts[j][0], pts[j][1]);
                        ctx.stroke();
                    }
                }
            }
            ctx.globalAlpha = 1;
            ctx.fillStyle = accent;
            for (const p of pts) {
                ctx.beginPath();
                ctx.arc(p[0], p[1], 2, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (kind === 'ca') {
            // tiny rule 30/110 evolution
            const rows = 9, cols = 13;
            const cw = (size * 1.8) / cols;
            let state = new Array(cols).fill(0);
            state[Math.floor(cols / 2)] = 1;
            ctx.fillStyle = accent;
            for (let row = 0; row < rows; row++) {
                for (let c = 0; c < cols; c++) {
                    if (state[c]) {
                        ctx.fillRect(-size * 0.9 + c * cw, -size * 0.7 + row * cw, cw - 0.5, cw - 0.5);
                    }
                }
                const next = new Array(cols).fill(0);
                for (let c = 0; c < cols; c++) {
                    const l = state[(c - 1 + cols) % cols];
                    const m = state[c];
                    const rr = state[(c + 1) % cols];
                    const idx = (l << 2) | (m << 1) | rr;
                    // rule 30
                    next[c] = (30 >> idx) & 1;
                }
                state = next;
            }
        } else if (kind === 'proof') {
            // tree DAG
            const depth = 3;
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.1;
            ctx.fillStyle = accent;
            function rec(x, y, d, sp) {
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
                if (d >= depth) return;
                const dy = size * 0.4;
                const x1 = x - sp, x2 = x + sp;
                const y2 = y + dy;
                ctx.beginPath();
                ctx.moveTo(x, y); ctx.lineTo(x1, y2);
                ctx.moveTo(x, y); ctx.lineTo(x2, y2);
                ctx.stroke();
                rec(x1, y2, d + 1, sp * 0.55);
                rec(x2, y2, d + 1, sp * 0.55);
            }
            rec(0, -size * 0.6, 0, size * 0.55);
        } else if (kind === 'observer') {
            // eye / observer
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.85, size * 0.5, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = accent;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(-size * 0.06, -size * 0.06, size * 0.08, 0, Math.PI * 2);
            ctx.fill();
        } else if (kind === 'branchial') {
            // branching tree of dots
            const layers = 4;
            ctx.strokeStyle = accent;
            ctx.fillStyle = accent;
            ctx.lineWidth = 1;
            for (let l = 0; l < layers; l++) {
                const n = Math.pow(2, l);
                const y = -size * 0.7 + (l / (layers - 1)) * size * 1.4;
                for (let i = 0; i < n; i++) {
                    const x = -size * 0.85 + (i + 0.5) / n * size * 1.7;
                    ctx.beginPath();
                    ctx.arc(x, y, 1.7, 0, Math.PI * 2);
                    ctx.fill();
                    if (l < layers - 1) {
                        const ny = -size * 0.7 + ((l + 1) / (layers - 1)) * size * 1.4;
                        const nn = Math.pow(2, l + 1);
                        for (let k = 0; k < 2; k++) {
                            const ni = i * 2 + k;
                            const nx = -size * 0.85 + (ni + 0.5) / nn * size * 1.7;
                            ctx.beginPath();
                            ctx.moveTo(x, y); ctx.lineTo(nx, ny);
                            ctx.stroke();
                        }
                    }
                }
            }
        } else if (kind === 'foliation') {
            // sliced curves
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.1;
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                const yy = -size * 0.7 + (i / 5) * size * 1.4;
                ctx.moveTo(-size * 0.9, yy);
                for (let x = -size * 0.9; x <= size * 0.9; x += 4) {
                    const y = yy + Math.sin((x + i * 30) * 0.08) * size * 0.08;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        } else if (kind === 'multiway') {
            // diamond of branches
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.1;
            ctx.fillStyle = accent;
            const pts = [[0, -size*0.7],[-size*0.7,0],[0,size*0.7],[size*0.7,0],[-size*0.4,-size*0.3],[size*0.4,-size*0.3],[-size*0.4,size*0.3],[size*0.4,size*0.3]];
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    if (r() > 0.55) {
                        ctx.beginPath();
                        ctx.moveTo(pts[i][0], pts[i][1]);
                        ctx.lineTo(pts[j][0], pts[j][1]);
                        ctx.stroke();
                    }
                }
            }
            for (const p of pts) {
                ctx.beginPath();
                ctx.arc(p[0], p[1], 2, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (kind === 'atlas') {
            // grid of varied cells
            const g = 6;
            const cs = (size * 1.6) / g;
            for (let i = 0; i < g; i++) {
                for (let j = 0; j < g; j++) {
                    const v = r();
                    ctx.fillStyle = v > 0.5 ? accent : 'rgba(96,108,56,0.3)';
                    ctx.globalAlpha = 0.4 + v * 0.5;
                    ctx.fillRect(-size * 0.8 + i * cs, -size * 0.8 + j * cs, cs - 0.5, cs - 0.5);
                }
            }
            ctx.globalAlpha = 1;
        } else if (kind === 'pocket') {
            // smooth ellipse with rays
            ctx.fillStyle = accent;
            ctx.globalAlpha = 0.35;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.7, size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * size * 0.5, Math.sin(a) * size * 0.3);
                ctx.lineTo(Math.cos(a) * size * 0.9, Math.sin(a) * size * 0.6);
                ctx.stroke();
            }
        } else if (kind === 'equiv') {
            // two systems with equal sign
            ctx.fillStyle = accent;
            ctx.fillRect(-size * 0.8, -size * 0.2, size * 0.5, size * 0.4);
            ctx.fillRect(size * 0.3, -size * 0.2, size * 0.5, size * 0.4);
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-size * 0.2, -size * 0.1);
            ctx.lineTo(size * 0.2, -size * 0.1);
            ctx.moveTo(-size * 0.2, size * 0.1);
            ctx.lineTo(size * 0.2, size * 0.1);
            ctx.stroke();
        } else if (kind === 'rulial') {
            // compass-like
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = accent;
            for (let i = 0; i < 4; i++) {
                const a = (i / 4) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(a) * size * 0.55, Math.sin(a) * size * 0.55);
                ctx.lineTo(Math.cos(a + 0.3) * size * 0.2, Math.sin(a + 0.3) * size * 0.2);
                ctx.closePath();
                ctx.fill();
            }
        } else if (kind === 'turing') {
            // tape with head
            const cells = 7;
            const cw = (size * 1.6) / cells;
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1;
            for (let i = 0; i < cells; i++) {
                ctx.strokeRect(-size * 0.8 + i * cw, -size * 0.15, cw, size * 0.3);
                if (r() > 0.55) {
                    ctx.fillStyle = accent;
                    ctx.fillRect(-size * 0.8 + i * cw + 1, -size * 0.13, cw - 2, size * 0.26);
                }
            }
            // head triangle
            ctx.fillStyle = accent;
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.25);
            ctx.lineTo(-size * 0.1, -size * 0.5);
            ctx.lineTo(size * 0.1, -size * 0.5);
            ctx.closePath();
            ctx.fill();
        } else if (kind === 'string') {
            // letters with arrows
            ctx.fillStyle = accent;
            ctx.font = (size * 0.5) + 'px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('AB', -size * 0.4, 0);
            ctx.fillText('BA', size * 0.4, 0);
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(-size * 0.1, 0);
            ctx.lineTo(size * 0.15, 0);
            ctx.moveTo(size * 0.08, -size * 0.07);
            ctx.lineTo(size * 0.15, 0);
            ctx.lineTo(size * 0.08, size * 0.07);
            ctx.stroke();
        } else if (kind === 'measure') {
            // gauge dial
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.3;
            ctx.beginPath();
            ctx.arc(0, size * 0.2, size * 0.7, Math.PI, 2 * Math.PI);
            ctx.stroke();
            for (let i = 0; i <= 5; i++) {
                const a = Math.PI + (i / 5) * Math.PI;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * size * 0.65, size * 0.2 + Math.sin(a) * size * 0.65);
                ctx.lineTo(Math.cos(a) * size * 0.75, size * 0.2 + Math.sin(a) * size * 0.75);
                ctx.stroke();
            }
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, size * 0.2);
            ctx.lineTo(size * 0.4, -size * 0.2);
            ctx.stroke();
        } else if (kind === 'thread') {
            // braided thread
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.4;
            for (let s = -1; s <= 1; s += 2) {
                ctx.beginPath();
                for (let x = -size * 0.85; x <= size * 0.85; x += 3) {
                    const y = s * Math.sin((x + size) * 0.12) * size * 0.3;
                    if (x === -size * 0.85) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        } else if (kind === 'curvature') {
            // curved grid
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1;
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath();
                for (let x = -size * 0.85; x <= size * 0.85; x += 4) {
                    const d = Math.sqrt(x*x + (i*size*0.2)*(i*size*0.2));
                    const warp = Math.exp(-d * d / (size * size * 0.3)) * size * 0.3;
                    const y = i * size * 0.2 + warp * Math.sign(i || 1);
                    if (x === -size * 0.85) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        } else if (kind === 'wild') {
            // scattered specks
            ctx.fillStyle = accent;
            for (let i = 0; i < 40; i++) {
                const a = r() * Math.PI * 2;
                const rr = r() * size * 0.9;
                ctx.globalAlpha = 0.2 + r() * 0.5;
                ctx.beginPath();
                ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, 0.8 + r() * 1.4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        } else if (kind === 'frontier') {
            // jagged front
            ctx.strokeStyle = accent;
            ctx.lineWidth = 1.3;
            ctx.beginPath();
            for (let x = -size * 0.9; x <= size * 0.9; x += 3) {
                const y = Math.sin(x * 0.3) * size * 0.15 + (r() - 0.5) * size * 0.3;
                if (x === -size * 0.9) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            // shading below
            ctx.fillStyle = accent;
            ctx.globalAlpha = 0.15;
            ctx.beginPath();
            ctx.moveTo(-size * 0.9, size * 0.9);
            for (let x = -size * 0.9; x <= size * 0.9; x += 3) {
                const y = Math.sin(x * 0.3) * size * 0.15;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(size * 0.9, size * 0.9);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        } else {
            // default speck
            ctx.fillStyle = accent;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    // ===== Drawing =====
    let hoveredRegion = null;
    let mouseScreen = { x: 0, y: 0 };

    function drawBackground() {
        // Base gradient is in CSS body, but we paint noise tile over it
        if (noisePattern) {
            ctx.save();
            // Translate pattern so it follows pan
            const ox = (-cam.x * cam.zoom) + W / 2;
            const oy = (-cam.y * cam.zoom) + H / 2;
            ctx.translate(ox, oy);
            ctx.scale(cam.zoom, cam.zoom);
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = noisePattern;
            ctx.fillRect(WORLD.x, WORLD.y, WORLD.w, WORLD.h);
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        // soft world border
        const tl = worldToScreen(WORLD.x, WORLD.y);
        const br = worldToScreen(WORLD.x + WORLD.w, WORLD.y + WORLD.h);
        ctx.strokeStyle = 'rgba(96, 108, 56, 0.2)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 6]);
        ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
        ctx.setLineDash([]);
    }

    function drawScatter() {
        // Cull to viewport
        const margin = 60;
        const viewMinX = (-W / 2 - margin) / cam.zoom + cam.x;
        const viewMaxX = (W / 2 + margin) / cam.zoom + cam.x;
        const viewMinY = (-H / 2 - margin) / cam.zoom + cam.y;
        const viewMaxY = (H / 2 + margin) / cam.zoom + cam.y;

        for (const item of SCATTER) {
            if (item.x < viewMinX || item.x > viewMaxX || item.y < viewMinY || item.y > viewMaxY) continue;
            const s = worldToScreen(item.x, item.y);
            const sz = item.size * cam.zoom;
            if (sz < 1.2) continue;
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(item.rot);
            const accent = 'rgba(96, 108, 56, 0.55)';
            const r = mulberry32(item.seed);

            if (item.kind === 0) {
                // tiny dot cluster
                ctx.fillStyle = accent;
                for (let i = 0; i < 4; i++) {
                    ctx.globalAlpha = 0.35 + r() * 0.3;
                    ctx.beginPath();
                    ctx.arc((r() - 0.5) * sz, (r() - 0.5) * sz, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (item.kind === 1) {
                // tiny line segment
                ctx.strokeStyle = accent;
                ctx.lineWidth = 0.8;
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.moveTo(-sz * 0.5, 0);
                ctx.lineTo(sz * 0.5, 0);
                ctx.stroke();
            } else if (item.kind === 2) {
                // tiny triangle
                ctx.strokeStyle = accent;
                ctx.lineWidth = 0.7;
                ctx.globalAlpha = 0.45;
                ctx.beginPath();
                ctx.moveTo(0, -sz * 0.4);
                ctx.lineTo(-sz * 0.4, sz * 0.3);
                ctx.lineTo(sz * 0.4, sz * 0.3);
                ctx.closePath();
                ctx.stroke();
            } else {
                // tiny + glyph
                ctx.strokeStyle = accent;
                ctx.lineWidth = 0.7;
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.moveTo(-sz * 0.3, 0); ctx.lineTo(sz * 0.3, 0);
                ctx.moveTo(0, -sz * 0.3); ctx.lineTo(0, sz * 0.3);
                ctx.stroke();
            }
            ctx.restore();
        }
        ctx.globalAlpha = 1;
    }

    function drawRegions() {
        for (const reg of REGIONS) {
            const c = worldToScreen(reg.cx, reg.cy);
            const rx = reg.rx * cam.zoom;
            const ry = reg.ry * cam.zoom;
            // Quick cull
            if (c.x + rx < -20 || c.x - rx > W + 20 || c.y + ry < -20 || c.y - ry > H + 20) continue;

            // Glow if hovered
            if (hoveredRegion === reg) {
                ctx.save();
                ctx.shadowColor = reg.accent;
                ctx.shadowBlur = 30;
                ctx.fillStyle = reg.color;
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else {
                ctx.fillStyle = reg.color;
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Border
            ctx.strokeStyle = reg.accent;
            ctx.globalAlpha = hoveredRegion === reg ? 0.9 : 0.55;
            ctx.lineWidth = hoveredRegion === reg ? 2.2 : 1.4;
            ctx.beginPath();
            ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Icon thumbnail (above center)
            const iconSize = Math.min(reg.rx, reg.ry) * 0.32 * cam.zoom;
            if (iconSize > 5) {
                drawIcon(c.x, c.y - ry * 0.25, iconSize, reg.type, reg.cx * 13 + reg.cy * 7, reg.accent);
            }

            // Label
            const fontSize = Math.max(11, Math.min(28, 14 * cam.zoom * 1.4));
            ctx.font = '600 ' + fontSize + 'px Lora, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const labelY = c.y + ry * 0.35;
            const text = reg.name;
            const metrics = ctx.measureText(text);
            const padX = fontSize * 0.6;
            const padY = fontSize * 0.3;

            // Earth halo
            ctx.fillStyle = 'rgba(221, 161, 94, 0.55)';
            ctx.beginPath();
            const haloW = metrics.width + padX * 2;
            const haloH = fontSize + padY * 2;
            const rad = haloH / 2;
            ctx.moveTo(c.x - haloW / 2 + rad, labelY - haloH / 2);
            ctx.lineTo(c.x + haloW / 2 - rad, labelY - haloH / 2);
            ctx.arc(c.x + haloW / 2 - rad, labelY, rad, -Math.PI / 2, Math.PI / 2);
            ctx.lineTo(c.x - haloW / 2 + rad, labelY + haloH / 2);
            ctx.arc(c.x - haloW / 2 + rad, labelY, rad, Math.PI / 2, -Math.PI / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#3d4423';
            ctx.fillText(text, c.x, labelY);
        }
    }

    function drawMinimap() {
        const mw = minimap.width;
        const mh = minimap.height;
        mctx.clearRect(0, 0, mw, mh);

        // Background
        mctx.fillStyle = '#F4F1DE';
        mctx.fillRect(0, 0, mw, mh);

        const sx = mw / WORLD.w;
        const sy = mh / WORLD.h;
        function w2m(x, y) {
            return { x: (x - WORLD.x) * sx, y: (y - WORLD.y) * sy };
        }

        // Regions
        for (const reg of REGIONS) {
            const c = w2m(reg.cx, reg.cy);
            mctx.fillStyle = reg.color;
            mctx.strokeStyle = reg.accent;
            mctx.lineWidth = 0.6;
            mctx.beginPath();
            mctx.ellipse(c.x, c.y, reg.rx * sx, reg.ry * sy, 0, 0, Math.PI * 2);
            mctx.fill();
            mctx.stroke();
        }

        // Viewport rect
        const vtl = screenToWorld(0, 0);
        const vbr = screenToWorld(W, H);
        const a = w2m(vtl.x, vtl.y);
        const b = w2m(vbr.x, vbr.y);
        mctx.strokeStyle = '#BC6C25';
        mctx.lineWidth = 1.5;
        mctx.strokeRect(a.x, a.y, b.x - a.x, b.y - a.y);
        mctx.fillStyle = 'rgba(188, 108, 37, 0.12)';
        mctx.fillRect(a.x, a.y, b.x - a.x, b.y - a.y);

        // Border
        mctx.strokeStyle = 'rgba(96, 108, 56, 0.5)';
        mctx.lineWidth = 1;
        mctx.strokeRect(0.5, 0.5, mw - 1, mh - 1);
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        drawBackground();
        drawScatter();
        drawRegions();
        drawMinimap();
    }

    // ===== Interaction =====
    let isDragging = false;
    let dragStart = null;
    let camStart = null;

    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
        camStart = { x: cam.x, y: cam.y };
        canvas.classList.add('dragging');
    });
    window.addEventListener('mousemove', (e) => {
        mouseScreen = { x: e.clientX, y: e.clientY };
        if (isDragging) {
            const dx = (e.clientX - dragStart.x) / cam.zoom;
            const dy = (e.clientY - dragStart.y) / cam.zoom;
            cam.x = camStart.x - dx;
            cam.y = camStart.y - dy;
            clampCam();
            draw();
        } else {
            updateHover(e.clientX, e.clientY);
        }
    });
    window.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.classList.remove('dragging');
    });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const wp = screenToWorld(e.clientX, e.clientY);
        const factor = Math.pow(1.0015, -e.deltaY);
        cam.zoom = Math.max(0.25, Math.min(2.5, cam.zoom * factor));
        // Zoom toward mouse point
        const wp2 = screenToWorld(e.clientX, e.clientY);
        cam.x += wp.x - wp2.x;
        cam.y += wp.y - wp2.y;
        clampCam();
        draw();
    }, { passive: false });

    canvas.addEventListener('click', (e) => {
        const reg = pickRegion(e.clientX, e.clientY);
        if (reg && reg.link) {
            // Subtle prompt to navigate; do not auto-navigate (preserve self-contained behavior)
            // Already shown in tooltip; flash effect
        }
    });

    function clampCam() {
        // Keep at least part of world visible
        const margin = 200;
        cam.x = Math.max(WORLD.x - margin, Math.min(WORLD.x + WORLD.w + margin, cam.x));
        cam.y = Math.max(WORLD.y - margin, Math.min(WORLD.y + WORLD.h + margin, cam.y));
    }

    function pickRegion(sx, sy) {
        const wp = screenToWorld(sx, sy);
        let best = null;
        let bestScore = Infinity;
        for (const reg of REGIONS) {
            const dx = (wp.x - reg.cx) / reg.rx;
            const dy = (wp.y - reg.cy) / reg.ry;
            const d = dx * dx + dy * dy;
            if (d < 1 && d < bestScore) {
                bestScore = d;
                best = reg;
            }
        }
        return best;
    }

    function updateHover(sx, sy) {
        const reg = pickRegion(sx, sy);
        if (reg !== hoveredRegion) {
            hoveredRegion = reg;
            draw();
        }
        if (reg) {
            tooltip.innerHTML = '<span class="tt-name">' + reg.name + '</span>' + reg.desc +
                (reg.link ? '<span class="tt-link">View demo: ' + reg.link + '</span>' : '');
            tooltip.classList.add('visible');
            // Position
            const ttRect = tooltip.getBoundingClientRect();
            let tx = sx + 16;
            let ty = sy + 16;
            if (tx + 280 > W) tx = sx - 280 - 16;
            if (ty + ttRect.height > H) ty = sy - ttRect.height - 16;
            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
            canvas.style.cursor = reg.link ? 'pointer' : 'grab';
        } else {
            tooltip.classList.remove('visible');
            canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
        }
    }

    // Touch support
    let touchState = null;
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            touchState = {
                mode: 'pan',
                x: e.touches[0].clientX,
                y: e.touches[0].clientY,
                camX: cam.x, camY: cam.y
            };
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            touchState = {
                mode: 'pinch',
                dist: Math.hypot(dx, dy),
                zoom: cam.zoom
            };
        }
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchState) return;
        if (touchState.mode === 'pan' && e.touches.length === 1) {
            const dx = (e.touches[0].clientX - touchState.x) / cam.zoom;
            const dy = (e.touches[0].clientY - touchState.y) / cam.zoom;
            cam.x = touchState.camX - dx;
            cam.y = touchState.camY - dy;
            clampCam();
            draw();
        } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            cam.zoom = Math.max(0.25, Math.min(2.5, touchState.zoom * (dist / touchState.dist)));
            clampCam();
            draw();
        }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { touchState = null; });

    window.addEventListener('resize', draw);

    // Initial render
    draw();

})();
</script>
</body>
</html>
