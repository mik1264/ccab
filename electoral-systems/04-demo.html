<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPTP vs Proportional Representation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        canvas { display: block; }
        .panel { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 14px 20px; border-radius: 12px; z-index: 100; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .panel label { font-size: 0.8rem; color: #8A9A5B; }
        .panel input[type="range"] { width: 100px; accent-color: #8A9A5B; vertical-align: middle; }
        .panel span { color: #DDA15E; font-size: 0.85rem; font-weight: 600; }
        button { padding: 6px 14px; background: #606C38; color: #FEFAE0; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        button:hover { background: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <div><label>Districts: <span id="dVal">8</span></label><br><input type="range" id="districts" min="3" max="20" value="8"></div>
        <div><label>Voters/District: <span id="vVal">1000</span></label><br><input type="range" id="vpd" min="100" max="5000" value="1000" step="100"></div>
        <div><label>Party spread: <span id="sVal">0.5</span></label><br><input type="range" id="spread" min="0" max="100" value="50"></div>
        <button id="runBtn">Run Election</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261'];
        const names = ['Red','Blue','Green','Gold','Orange'];

        let numDistricts = 8;
        let votersPerDistrict = 1000;
        let spread = 0.5;
        let districtResults = [];
        let fptpSeats = [];
        let prSeats = [];
        let nationalVotes = [];
        let animT = 0;

        document.getElementById('districts').addEventListener('input', e => {
            numDistricts = +e.target.value;
            document.getElementById('dVal').textContent = numDistricts;
        });
        document.getElementById('vpd').addEventListener('input', e => {
            votersPerDistrict = +e.target.value;
            document.getElementById('vVal').textContent = votersPerDistrict;
        });
        document.getElementById('spread').addEventListener('input', e => {
            spread = +e.target.value / 100;
            document.getElementById('sVal').textContent = spread.toFixed(2);
        });
        document.getElementById('runBtn').addEventListener('click', runElection);
        document.getElementById('resetBtn').addEventListener('click', () => { window.reset(); });

        function runElection() {
            districtResults = [];
            const baseSupport = [0.35, 0.30, 0.20, 0.10, 0.05];
            nationalVotes = [0, 0, 0, 0, 0];

            for (let d = 0; d < numDistricts; d++) {
                // Regional variation
                const support = baseSupport.map(s => {
                    const variation = (Math.random() - 0.5) * spread;
                    return Math.max(0.01, s + variation);
                });
                const total = support.reduce((a, b) => a + b, 0);
                const normalized = support.map(s => s / total);

                const votes = normalized.map(s => Math.round(s * votersPerDistrict));
                votes.forEach((v, i) => nationalVotes[i] += v);

                let winnerIdx = 0, maxV = 0;
                votes.forEach((v, i) => { if (v > maxV) { maxV = v; winnerIdx = i; } });

                districtResults.push({ votes, winner: winnerIdx, normalized });
            }

            // FPTP: winner of each district gets 1 seat
            fptpSeats = [0, 0, 0, 0, 0];
            districtResults.forEach(d => fptpSeats[d.winner]++);

            // PR (D'Hondt on national totals)
            prSeats = [0, 0, 0, 0, 0];
            for (let s = 0; s < numDistricts; s++) {
                let best = -1, bestQ = -1;
                nationalVotes.forEach((v, i) => {
                    const q = v / (prSeats[i] + 1);
                    if (q > bestQ) { bestQ = q; best = i; }
                });
                if (best >= 0) prSeats[best]++;
            }

            animT = 0;
        }

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function drawDistrictMap(x, y, w, h) {
            ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('District Map', x + w / 2, y);

            if (districtResults.length === 0) return;
            const cols = Math.ceil(Math.sqrt(numDistricts * (w / h)));
            const rows = Math.ceil(numDistricts / cols);
            const cellW = (w - 20) / cols;
            const cellH = (h - 30) / rows;

            districtResults.forEach((d, i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const cx = x + 10 + col * cellW;
                const cy = y + 20 + row * cellH;

                const alpha = Math.min(1, animT * 2);
                ctx.globalAlpha = alpha;

                // District background colored by winner
                ctx.fillStyle = colors[d.winner];
                ctx.globalAlpha = alpha * 0.3;
                ctx.fillRect(cx + 2, cy + 2, cellW - 4, cellH - 4);
                ctx.globalAlpha = alpha;

                // Pie chart of votes
                const pieR = Math.min(cellW, cellH) * 0.3;
                const pcx = cx + cellW / 2;
                const pcy = cy + cellH / 2;
                let startAngle = -Math.PI / 2;
                const totalV = d.votes.reduce((a, b) => a + b, 0);
                d.votes.forEach((v, pi) => {
                    const angle = (v / totalV) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(pcx, pcy);
                    ctx.arc(pcx, pcy, pieR, startAngle, startAngle + angle);
                    ctx.closePath();
                    ctx.fillStyle = colors[pi];
                    ctx.fill();
                    startAngle += angle;
                });

                // Border for winner
                ctx.strokeStyle = colors[d.winner];
                ctx.lineWidth = 2;
                ctx.strokeRect(cx + 2, cy + 2, cellW - 4, cellH - 4);

                ctx.globalAlpha = 1;

                ctx.font = '9px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#FEFAE0';
                ctx.textAlign = 'center';
                ctx.fillText(`D${i + 1}`, pcx, cy + cellH - 6);
            });
        }

        function drawHemicycle(cx, cy, maxR, seats, title) {
            ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText(title, cx, cy - maxR - 10);

            const totalS = seats.reduce((a, b) => a + b, 0);
            if (totalS === 0) return;
            const rows = Math.max(2, Math.ceil(totalS / 8));
            const minR = maxR * 0.35;
            let idx = 0;

            for (let row = 0; row < rows; row++) {
                const r = minR + (maxR - minR) * (row / Math.max(1, rows - 1));
                const n = Math.ceil(totalS / rows);
                const span = Math.PI * 0.85;
                const startA = Math.PI + (Math.PI - span) / 2;

                for (let s = 0; s < n && idx < totalS; s++) {
                    const a = startA + (s / Math.max(1, n - 1)) * span;
                    const sx = cx + Math.cos(a) * r;
                    const sy = cy + Math.sin(a) * r;

                    let cum = 0, pi = 0;
                    for (let j = 0; j < seats.length; j++) {
                        cum += seats[j];
                        if (idx < cum) { pi = j; break; }
                    }

                    const sr = Math.max(5, Math.min(14, maxR / totalS * 2));
                    const alpha = idx < Math.floor(animT * totalS * 2) ? 1 : 0.15;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fillStyle = colors[pi];
                    ctx.globalAlpha = alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    idx++;
                }
            }

            // Seat labels
            ctx.font = '11px "Segoe UI", system-ui, sans-serif';
            let lx = cx - maxR;
            names.forEach((n, i) => {
                if (seats[i] > 0) {
                    ctx.fillStyle = colors[i];
                    ctx.textAlign = 'left';
                    ctx.fillText(`${n}: ${seats[i]}`, lx, cy + 25);
                    lx += ctx.measureText(`${n}: ${seats[i]}`).width + 16;
                }
            });
        }

        function drawVoteShare(x, y, w, h) {
            ctx.font = 'bold 12px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.textAlign = 'center';
            ctx.fillText('National Vote Share', x + w / 2, y);

            const total = nationalVotes.reduce((a, b) => a + b, 0);
            if (total === 0) return;
            let cx = x;
            names.forEach((n, i) => {
                const pct = nationalVotes[i] / total;
                const bw = pct * w;
                ctx.fillStyle = colors[i];
                ctx.globalAlpha = Math.min(1, animT * 3);
                ctx.fillRect(cx, y + 8, bw, 18);
                ctx.globalAlpha = 1;
                if (bw > 30) {
                    ctx.fillStyle = '#FEFAE0';
                    ctx.font = '9px "Segoe UI", system-ui, sans-serif';
                    ctx.fillText(`${(pct * 100).toFixed(1)}%`, cx + bw / 2, y + 21);
                }
                cx += bw;
            });
        }

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (canvas.width !== w * devicePixelRatio) resize();

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('First Past the Post vs Proportional Representation', w / 2, 30);

            if (districtResults.length === 0) {
                ctx.font = '16px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('Click "Run Election" to simulate', w / 2, h / 2);
            } else {
                // District map
                drawDistrictMap(20, 50, w * 0.35, h * 0.5);

                // FPTP hemicycle
                const hemiR = Math.min(w * 0.14, h * 0.2);
                drawHemicycle(w * 0.58, h * 0.38, hemiR, fptpSeats, 'FPTP Result');

                // PR hemicycle
                drawHemicycle(w * 0.83, h * 0.38, hemiR, prSeats, 'PR Result (D\'Hondt)');

                // Vote share bar
                drawVoteShare(20, h * 0.6, w - 40, h * 0.06);

                // Disproportionality
                const totalVotes = nationalVotes.reduce((a, b) => a + b, 0);
                const gallagherFPTP = Math.sqrt(0.5 * names.reduce((sum, _, i) => {
                    const vs = (nationalVotes[i] / totalVotes) * 100;
                    const ss = (fptpSeats[i] / numDistricts) * 100;
                    return sum + (vs - ss) ** 2;
                }, 0));
                const gallagherPR = Math.sqrt(0.5 * names.reduce((sum, _, i) => {
                    const vs = (nationalVotes[i] / totalVotes) * 100;
                    const ss = (prSeats[i] / numDistricts) * 100;
                    return sum + (vs - ss) ** 2;
                }, 0));

                ctx.font = '13px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#FEFAE0';
                ctx.textAlign = 'center';
                ctx.fillText(`Gallagher Index: FPTP = ${gallagherFPTP.toFixed(1)}  |  PR = ${gallagherPR.toFixed(1)}`, w / 2, h * 0.72);
                ctx.font = '11px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('(Lower = more proportional. 0 = perfectly proportional)', w / 2, h * 0.76);

                // Wasted votes comparison
                const fptpWasted = districtResults.reduce((sum, d) => {
                    return sum + d.votes.reduce((s, v, i) => s + (i === d.winner ? v - Math.floor(d.votes.reduce((a, b) => a + b, 0) / 2) - 1 : v), 0);
                }, 0);
                const totalCast = nationalVotes.reduce((a, b) => a + b, 0);
                ctx.fillStyle = '#606C38';
                ctx.fillText(`FPTP wasted votes: ~${Math.round(fptpWasted / totalCast * 100)}% of all votes cast`, w / 2, h * 0.81);
            }

            animT += 0.015;
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            numDistricts = 8; votersPerDistrict = 1000; spread = 0.5;
            districtResults = []; fptpSeats = []; prSeats = []; nationalVotes = [];
            animT = 0;
            document.getElementById('districts').value = 8;
            document.getElementById('dVal').textContent = '8';
            document.getElementById('vpd').value = 1000;
            document.getElementById('vVal').textContent = '1000';
            document.getElementById('spread').value = 50;
            document.getElementById('sVal').textContent = '0.50';
        };

        runElection();
        draw();
    })();
    </script>
</body>
</html>
