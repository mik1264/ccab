<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainte-Lague vs D'Hondt - Method Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        canvas { display: block; }
        .controls { position: fixed; top: 10px; right: 10px; width: 280px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 16px; border-radius: 12px; z-index: 100; }
        h1 { font-size: 1.1rem; color: #DDA15E; margin-bottom: 4px; }
        .sub { font-size: 0.78rem; color: #8A9A5B; margin-bottom: 12px; }
        .party { margin-bottom: 10px; }
        .party label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 3px; }
        .party label span:first-child { font-weight: 600; }
        .party label span:last-child { color: #8A9A5B; }
        input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .seat-ctrl { margin-bottom: 12px; }
        .seat-ctrl label { font-size: 0.85rem; color: #DDA15E; }
        .info { font-size: 0.72rem; color: #606C38; line-height: 1.4; margin-top: 8px; padding: 8px; background: rgba(96,108,56,0.15); border-radius: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>Sainte-Lague vs D'Hondt</h1>
        <p class="sub">Compare how two methods allocate the same votes</p>
        <div class="seat-ctrl">
            <label>Seats: <span id="seatVal">12</span></label>
            <input type="range" id="seats" min="4" max="30" value="12">
        </div>
        <div id="partyUI"></div>
        <div class="info">
            <strong>D'Hondt</strong> divides by 1, 2, 3... (favors large parties).<br>
            <strong>Sainte-Lague</strong> divides by 1, 3, 5... (more proportional).<br>
            Watch how the same votes produce different parliaments.
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#264653'];
        let parties = [
            { name: 'Alpha', votes: 120000 },
            { name: 'Beta', votes: 80000 },
            { name: 'Gamma', votes: 50000 },
            { name: 'Delta', votes: 30000 },
            { name: 'Epsilon', votes: 15000 }
        ];
        let totalSeats = 12;
        let animT = 0;
        let paused = false;

        function buildUI() {
            const c = document.getElementById('partyUI');
            c.innerHTML = '';
            parties.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'party';
                d.innerHTML = `<label><span style="color:${colors[i]}">${p.name}</span><span id="pv${i}">${p.votes.toLocaleString()}</span></label>
                    <input type="range" min="0" max="200000" value="${p.votes}" data-i="${i}">`;
                d.querySelector('input').addEventListener('input', e => {
                    parties[i].votes = +e.target.value;
                    document.getElementById('pv'+i).textContent = parties[i].votes.toLocaleString();
                    animT = 0;
                });
                c.appendChild(d);
            });
        }

        document.getElementById('seats').addEventListener('input', e => {
            totalSeats = +e.target.value;
            document.getElementById('seatVal').textContent = totalSeats;
            animT = 0;
        });

        function allocate(pts, seats, divisorFn) {
            const res = pts.map(() => 0);
            for (let s = 0; s < seats; s++) {
                let best = -1, bestQ = -1;
                pts.forEach((p, i) => {
                    const q = p.votes / divisorFn(res[i]);
                    if (q > bestQ) { bestQ = q; best = i; }
                });
                if (best >= 0) res[best]++;
            }
            return res;
        }

        const dhontDiv = n => n + 1;
        const slDiv = n => 2 * n + 1;

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function drawHemicycle(cx, cy, maxR, seats, label, yLabel) {
            ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText(label, cx, yLabel);

            const totalS = seats.reduce((a, b) => a + b, 0);
            if (totalS === 0) return;
            const minR = maxR * 0.35;
            const rows = Math.max(2, Math.ceil(totalS / 10));
            let seatIdx = 0;
            const visSeats = Math.min(Math.floor(animT * 2), totalS);

            for (let row = 0; row < rows; row++) {
                const r = minR + (maxR - minR) * (row / Math.max(1, rows - 1));
                const seatsInRow = Math.round(totalS / rows) + (row % 2);
                const angleSpan = Math.PI * 0.88;
                const startA = Math.PI + (Math.PI - angleSpan) / 2;

                for (let s = 0; s < seatsInRow && seatIdx < totalS; s++) {
                    const a = startA + (s / Math.max(1, seatsInRow - 1)) * angleSpan;
                    const sx = cx + Math.cos(a) * r;
                    const sy = cy + Math.sin(a) * r;

                    let cum = 0, pi = 0;
                    for (let j = 0; j < seats.length; j++) {
                        cum += seats[j];
                        if (seatIdx < cum) { pi = j; break; }
                    }

                    const sr = Math.max(4, Math.min(14, maxR / totalS * 1.5));
                    const alpha = seatIdx < visSeats ? 1 : 0.15;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fillStyle = colors[pi];
                    ctx.globalAlpha = alpha;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    seatIdx++;
                }
            }

            // Seat count labels
            let lx = cx - maxR;
            ctx.font = '12px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'left';
            parties.forEach((p, i) => {
                if (seats[i] > 0) {
                    ctx.fillStyle = colors[i];
                    ctx.fillText(`${p.name}: ${seats[i]}`, lx, cy + 30);
                    lx += ctx.measureText(`${p.name}: ${seats[i]}`).width + 20;
                }
            });
        }

        function drawBars(x, y, w, h, dSeats, slSeats) {
            ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Seat Comparison', x + w / 2, y);

            const barW = w / (parties.length * 3 + 1);
            parties.forEach((p, i) => {
                const bx = x + (i * 3 + 0.5) * barW;
                const maxS = totalSeats;

                // D'Hondt bar
                const dh = (dSeats[i] / maxS) * (h - 30);
                ctx.fillStyle = colors[i];
                ctx.globalAlpha = 0.6;
                ctx.fillRect(bx, y + h - dh, barW * 0.9, dh);
                ctx.globalAlpha = 1;

                // SL bar
                const slh = (slSeats[i] / maxS) * (h - 30);
                ctx.fillStyle = colors[i];
                ctx.fillRect(bx + barW, y + h - slh, barW * 0.9, slh);

                // Labels
                ctx.font = '10px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = 'rgba(254,250,224,0.6)';
                ctx.fillText('DH', bx + barW * 0.45, y + h + 12);
                ctx.fillText('SL', bx + barW * 1.45, y + h + 12);
                ctx.fillStyle = '#FEFAE0';
                if (dSeats[i] > 0) ctx.fillText(dSeats[i], bx + barW * 0.45, y + h - dh - 4);
                if (slSeats[i] > 0) ctx.fillText(slSeats[i], bx + barW * 1.45, y + h - slh - 4);
            });
        }

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (canvas.width !== w * devicePixelRatio) resize();

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            const dSeats = allocate(parties, totalSeats, dhontDiv);
            const slSeats = allocate(parties, totalSeats, slDiv);

            const halfW = (w - 300) / 2;
            const hemiR = Math.min(halfW * 0.4, h * 0.3);

            // D'Hondt hemicycle
            drawHemicycle(halfW * 0.5 + 10, h * 0.48, hemiR, dSeats, "D'Hondt Method", h * 0.08);

            // Sainte-Lague hemicycle
            drawHemicycle(halfW * 1.5 + 10, h * 0.48, hemiR, slSeats, 'Sainte-Lague Method', h * 0.08);

            // Divider
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(halfW + 10, h * 0.05);
            ctx.lineTo(halfW + 10, h * 0.75);
            ctx.stroke();
            ctx.setLineDash([]);

            // Bar comparison
            drawBars(20, h * 0.78, w - 320, h * 0.18, dSeats, slSeats);

            if (!paused) animT += 0.03;
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            parties = [
                { name: 'Alpha', votes: 120000 },
                { name: 'Beta', votes: 80000 },
                { name: 'Gamma', votes: 50000 },
                { name: 'Delta', votes: 30000 },
                { name: 'Epsilon', votes: 15000 }
            ];
            totalSeats = 12;
            document.getElementById('seats').value = 12;
            document.getElementById('seatVal').textContent = '12';
            animT = 0;
            buildUI();
        };

        buildUI();
        draw();
    })();
    </script>
</body>
</html>
