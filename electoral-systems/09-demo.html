<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apportionment Paradoxes Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        canvas { display: block; }
        .panel { position: fixed; top: 10px; right: 10px; width: 300px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 14px; border-radius: 12px; z-index: 100; max-height: 95vh; overflow-y: auto; }
        h1 { font-size: 1.1rem; color: #DDA15E; margin-bottom: 4px; }
        .sub { font-size: 0.78rem; color: #8A9A5B; margin-bottom: 12px; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab { padding: 6px 10px; background: rgba(255,255,255,0.08); border: none; color: #8A9A5B; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }
        .tab.active { background: #606C38; color: #FEFAE0; }
        .state { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; padding: 6px 8px; background: rgba(255,255,255,0.05); border-radius: 6px; }
        .state .name { width: 70px; font-size: 0.85rem; }
        .state input { width: 80px; padding: 4px; background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.3); color: #FEFAE0; border-radius: 4px; text-align: center; font-size: 0.82rem; }
        .state .seats { font-size: 0.82rem; color: #DDA15E; width: 35px; text-align: right; }
        .ctrl-row { margin-bottom: 10px; }
        .ctrl-row label { font-size: 0.85rem; color: #DDA15E; display: block; margin-bottom: 3px; }
        input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        button { padding: 6px 14px; background: #606C38; color: #FEFAE0; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; width: 100%; margin-top: 6px; }
        button:hover { background: #8A9A5B; }
        .alert { margin-top: 10px; padding: 10px; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); border-radius: 8px; font-size: 0.82rem; line-height: 1.4; }
        .alert.found { border-color: #e63946; }
        .alert.none { border-color: rgba(42,157,143,0.3); background: rgba(42,157,143,0.1); }
        .info { font-size: 0.72rem; color: #606C38; line-height: 1.4; margin-top: 10px; padding: 8px; background: rgba(96,108,56,0.15); border-radius: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h1>Apportionment Paradoxes</h1>
        <p class="sub">When adding seats takes yours away</p>
        <div class="tab-bar">
            <button class="tab active" data-tab="alabama">Alabama</button>
            <button class="tab" data-tab="population">Population</button>
            <button class="tab" data-tab="newstate">New State</button>
        </div>
        <div id="tabContent"></div>
        <div id="alertBox" class="alert none"></div>
        <div class="info" id="infoBox"></div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#a8dadc','#264653'];

        let currentTab = 'alabama';
        let animT = 0;

        // Alabama paradox data
        let states = [
            { name: 'Alabama', pop: 1262505 },
            { name: 'Texas', pop: 3048710 },
            { name: 'Illinois', pop: 3077871 },
            { name: 'Ohio', pop: 3198062 },
            { name: 'New York', pop: 5082871 },
            { name: 'Penn.', pop: 4282891 }
        ];
        let seatRange = [25, 35];
        let alabamaResults = [];

        // Population paradox data
        let popStates = [
            { name: 'Virginia', pop0: 1854184, growth: 0.15 },
            { name: 'Maine', pop0: 648936, growth: 0.02 },
            { name: 'Ohio', pop0: 3198062, growth: 0.05 },
            { name: 'New York', pop0: 5082871, growth: 0.08 }
        ];
        let popSeats = 30;
        let popYears = 10;
        let popResults = [];

        // New state data
        let nsStates = [
            { name: 'State A', pop: 900 },
            { name: 'State B', pop: 600 },
            { name: 'State C', pop: 500 }
        ];
        let nsNewState = { name: 'State D', pop: 400 };
        let nsSeats = 20;

        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => t.addEventListener('click', () => {
            tabs.forEach(tb => tb.classList.remove('active'));
            t.classList.add('active');
            currentTab = t.dataset.tab;
            animT = 0;
            buildTabContent();
        }));

        function hamilton(populations, seats) {
            const total = populations.reduce((s, p) => s + p, 0);
            const quota = total / seats;
            const initial = populations.map(p => Math.floor(p / quota));
            const remainders = populations.map((p, i) => ({ idx: i, rem: (p / quota) - initial[i] }));
            let assigned = initial.reduce((s, v) => s + v, 0);
            remainders.sort((a, b) => b.rem - a.rem);
            const result = [...initial];
            for (let i = 0; assigned < seats && i < remainders.length; i++) {
                result[remainders[i].idx]++;
                assigned++;
            }
            return result;
        }

        function buildTabContent() {
            const c = document.getElementById('tabContent');
            const info = document.getElementById('infoBox');

            if (currentTab === 'alabama') {
                c.innerHTML = `
                    <div class="ctrl-row">
                        <label>Seat range: <span id="srVal">${seatRange[0]} - ${seatRange[1]}</span></label>
                        <input type="range" id="srMin" min="10" max="50" value="${seatRange[0]}" style="width:48%;margin-right:4%;">
                        <input type="range" id="srMax" min="15" max="60" value="${seatRange[1]}" style="width:48%;">
                    </div>
                    <div id="stateList"></div>
                    <button id="scanBtn">Scan for Paradox</button>`;

                buildStateList();

                document.getElementById('srMin').addEventListener('input', e => {
                    seatRange[0] = +e.target.value;
                    if (seatRange[0] >= seatRange[1]) seatRange[1] = seatRange[0] + 1;
                    document.getElementById('srVal').textContent = `${seatRange[0]} - ${seatRange[1]}`;
                });
                document.getElementById('srMax').addEventListener('input', e => {
                    seatRange[1] = +e.target.value;
                    if (seatRange[1] <= seatRange[0]) seatRange[0] = seatRange[1] - 1;
                    document.getElementById('srVal').textContent = `${seatRange[0]} - ${seatRange[1]}`;
                });
                document.getElementById('scanBtn').addEventListener('click', scanAlabama);

                info.innerHTML = '<strong>Alabama Paradox (1880):</strong> When the House grew from 299 to 300 seats, Alabama would have LOST a seat under Hamilton\'s method. More total seats, fewer for one state.';
                scanAlabama();

            } else if (currentTab === 'population') {
                c.innerHTML = `
                    <div class="ctrl-row">
                        <label>Total seats: <span id="psVal">${popSeats}</span></label>
                        <input type="range" id="popSeats" min="10" max="50" value="${popSeats}">
                    </div>
                    <div class="ctrl-row">
                        <label>Years to simulate: <span id="pyVal">${popYears}</span></label>
                        <input type="range" id="popYears" min="1" max="20" value="${popYears}">
                    </div>
                    <div id="popList"></div>
                    <button id="popScan">Simulate Growth</button>`;

                buildPopList();

                document.getElementById('popSeats').addEventListener('input', e => {
                    popSeats = +e.target.value;
                    document.getElementById('psVal').textContent = popSeats;
                });
                document.getElementById('popYears').addEventListener('input', e => {
                    popYears = +e.target.value;
                    document.getElementById('pyVal').textContent = popYears;
                });
                document.getElementById('popScan').addEventListener('click', scanPopulation);

                info.innerHTML = '<strong>Population Paradox:</strong> A fast-growing small state can LOSE a seat to a slow-growing large state. Virginia lost a seat to Maine in 1900 despite growing faster.';
                scanPopulation();

            } else {
                c.innerHTML = `
                    <div class="ctrl-row">
                        <label>Total seats: <span id="nsVal">${nsSeats}</span></label>
                        <input type="range" id="nsSeats" min="10" max="40" value="${nsSeats}">
                    </div>
                    <div id="nsList"></div>
                    <div style="margin-top:8px;font-size:0.82rem;color:#DDA15E;">New state: ${nsNewState.name} (pop: ${nsNewState.pop})</div>
                    <button id="nsScan">Check for Paradox</button>`;

                buildNsList();

                document.getElementById('nsSeats').addEventListener('input', e => {
                    nsSeats = +e.target.value;
                    document.getElementById('nsVal').textContent = nsSeats;
                });
                document.getElementById('nsScan').addEventListener('click', scanNewState);

                info.innerHTML = '<strong>New State Paradox (1907):</strong> Adding Oklahoma (with its fair share of seats) caused New York to lose a seat to Maine. Adding a state changed the balance between existing states.';
                scanNewState();
            }
        }

        function buildStateList() {
            const list = document.getElementById('stateList');
            if (!list) return;
            list.innerHTML = '';
            states.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'state';
                d.innerHTML = `<span class="name" style="color:${colors[i]}">${s.name}</span>
                    <input type="number" value="${s.pop}" min="1000">
                    <span class="seats" id="as${i}">--</span>`;
                d.querySelector('input').addEventListener('change', e => { states[i].pop = +e.target.value; });
                list.appendChild(d);
            });
        }

        function buildPopList() {
            const list = document.getElementById('popList');
            if (!list) return;
            list.innerHTML = '';
            popStates.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'state';
                d.innerHTML = `<span class="name" style="color:${colors[i]}">${s.name}</span>
                    <input type="number" value="${s.growth * 100}" min="0" max="50" step="0.5" style="width:50px;" title="Growth %">
                    <span style="font-size:0.7rem;color:#606C38;">%/yr</span>`;
                d.querySelector('input').addEventListener('change', e => { popStates[i].growth = +e.target.value / 100; });
                list.appendChild(d);
            });
        }

        function buildNsList() {
            const list = document.getElementById('nsList');
            if (!list) return;
            list.innerHTML = '';
            nsStates.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'state';
                d.innerHTML = `<span class="name" style="color:${colors[i]}">${s.name}</span>
                    <input type="number" value="${s.pop}" min="100">`;
                d.querySelector('input').addEventListener('change', e => { nsStates[i].pop = +e.target.value; });
                list.appendChild(d);
            });
        }

        function scanAlabama() {
            alabamaResults = [];
            const pops = states.map(s => s.pop);
            let foundParadox = false;
            let paradoxMsg = '';

            for (let s = seatRange[0]; s <= seatRange[1]; s++) {
                const alloc = hamilton(pops, s);
                alabamaResults.push({ seats: s, alloc: [...alloc] });
            }

            for (let i = 1; i < alabamaResults.length; i++) {
                for (let j = 0; j < states.length; j++) {
                    if (alabamaResults[i].alloc[j] < alabamaResults[i - 1].alloc[j]) {
                        foundParadox = true;
                        paradoxMsg = `PARADOX: ${states[j].name} loses a seat when total increases from ${alabamaResults[i-1].seats} to ${alabamaResults[i].seats}!`;
                    }
                }
            }

            const alert = document.getElementById('alertBox');
            if (foundParadox) {
                alert.className = 'alert found';
                alert.textContent = paradoxMsg;
            } else {
                alert.className = 'alert none';
                alert.textContent = 'No Alabama paradox found in this range. Try different populations or range.';
            }
            animT = 0;
        }

        function scanPopulation() {
            popResults = [];
            let foundParadox = false;
            let paradoxMsg = '';

            for (let y = 0; y <= popYears; y++) {
                const pops = popStates.map(s => Math.round(s.pop0 * Math.pow(1 + s.growth, y)));
                const alloc = hamilton(pops, popSeats);
                popResults.push({ year: y, pops, alloc: [...alloc] });
            }

            for (let i = 1; i < popResults.length; i++) {
                for (let j = 0; j < popStates.length; j++) {
                    const popGrowth = (popResults[i].pops[j] - popResults[i-1].pops[j]) / popResults[i-1].pops[j];
                    if (popResults[i].alloc[j] < popResults[i - 1].alloc[j]) {
                        // Check if another state with slower growth gained
                        for (let k = 0; k < popStates.length; k++) {
                            if (k !== j && popResults[i].alloc[k] > popResults[i-1].alloc[k]) {
                                const otherGrowth = (popResults[i].pops[k] - popResults[i-1].pops[k]) / popResults[i-1].pops[k];
                                if (popGrowth > otherGrowth) {
                                    foundParadox = true;
                                    paradoxMsg = `PARADOX at year ${i}: ${popStates[j].name} (${(popGrowth*100).toFixed(1)}% growth) loses seat to ${popStates[k].name} (${(otherGrowth*100).toFixed(1)}% growth)!`;
                                }
                            }
                        }
                    }
                }
            }

            const alert = document.getElementById('alertBox');
            if (foundParadox) {
                alert.className = 'alert found';
                alert.textContent = paradoxMsg;
            } else {
                alert.className = 'alert none';
                alert.textContent = 'No population paradox found. Try adjusting growth rates.';
            }
            animT = 0;
        }

        function scanNewState() {
            const pops = nsStates.map(s => s.pop);
            const before = hamilton(pops, nsSeats);

            // Add new state with proportional seats
            const totalPop = [...pops, nsNewState.pop].reduce((a, b) => a + b, 0);
            const newStateSeats = Math.round(nsNewState.pop / totalPop * (nsSeats + Math.round(nsNewState.pop / totalPop * nsSeats)));
            const afterTotal = nsSeats + Math.max(1, newStateSeats);
            const after = hamilton([...pops, nsNewState.pop], afterTotal);

            let foundParadox = false;
            let paradoxMsg = '';
            for (let i = 0; i < nsStates.length; i++) {
                if (after[i] !== before[i]) {
                    const change = after[i] - before[i];
                    if (change < 0) {
                        for (let j = 0; j < nsStates.length; j++) {
                            if (j !== i && after[j] > before[j]) {
                                foundParadox = true;
                                paradoxMsg = `PARADOX: Adding ${nsNewState.name} causes ${nsStates[i].name} to lose a seat to ${nsStates[j].name}!`;
                            }
                        }
                    }
                }
            }

            const alert = document.getElementById('alertBox');
            if (foundParadox) {
                alert.className = 'alert found';
                alert.textContent = paradoxMsg;
            } else {
                alert.className = 'alert none';
                alert.textContent = 'No new-state paradox with these values. Try adjusting populations.';
            }
            animT = 0;
        }

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (canvas.width !== w * devicePixelRatio) resize();

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            const cw = w - 330;

            if (currentTab === 'alabama' && alabamaResults.length > 0) {
                drawAlabamaChart(30, 40, cw - 40, h - 80);
            } else if (currentTab === 'population' && popResults.length > 0) {
                drawPopChart(30, 40, cw - 40, h - 80);
            } else if (currentTab === 'newstate') {
                drawNewStateChart(30, 40, cw - 40, h - 80);
            }

            animT += 0.015;
            requestAnimationFrame(draw);
        }

        function drawAlabamaChart(x, y, w, h) {
            ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Alabama Paradox: Seats by Total House Size', x + w / 2, y);

            const chartY = y + 30;
            const chartH = h - 60;
            const n = alabamaResults.length;
            const maxSeats = Math.max(...alabamaResults.flatMap(r => r.alloc));

            // Axes
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + 40, chartY);
            ctx.lineTo(x + 40, chartY + chartH);
            ctx.lineTo(x + w, chartY + chartH);
            ctx.stroke();

            // Y axis labels
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            for (let s = 0; s <= maxSeats; s++) {
                const ly = chartY + chartH - (s / maxSeats) * chartH;
                ctx.fillText(s, x + 36, ly + 3);
            }

            // Lines for each state
            states.forEach((st, si) => {
                ctx.strokeStyle = colors[si];
                ctx.lineWidth = 2;
                ctx.beginPath();
                const visN = Math.min(n, Math.floor(animT * n * 2));
                for (let i = 0; i < visN; i++) {
                    const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                    const ly = chartY + chartH - (alabamaResults[i].alloc[si] / maxSeats) * chartH;
                    if (i === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                // Check for drops (paradox)
                for (let i = 1; i < visN; i++) {
                    if (alabamaResults[i].alloc[si] < alabamaResults[i-1].alloc[si]) {
                        const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                        const ly = chartY + chartH - (alabamaResults[i].alloc[si] / maxSeats) * chartH;
                        ctx.fillStyle = '#e63946';
                        ctx.beginPath();
                        ctx.arc(lx, ly, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.font = '9px "Segoe UI", system-ui, sans-serif';
                        ctx.fillStyle = '#e63946';
                        ctx.textAlign = 'center';
                        ctx.fillText('PARADOX', lx, ly - 10);
                    }
                }

                // Label
                const lastI = Math.min(visN - 1, n - 1);
                if (lastI >= 0) {
                    const lx = x + 40 + (lastI / Math.max(1, n - 1)) * (w - 50);
                    const ly = chartY + chartH - (alabamaResults[lastI].alloc[si] / maxSeats) * chartH;
                    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
                    ctx.fillStyle = colors[si];
                    ctx.textAlign = 'left';
                    ctx.fillText(st.name, lx + 6, ly + 3);
                }
            });

            // X axis labels
            ctx.font = '9px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.textAlign = 'center';
            alabamaResults.forEach((r, i) => {
                if (i % Math.max(1, Math.floor(n / 10)) === 0) {
                    const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                    ctx.fillText(r.seats, lx, chartY + chartH + 14);
                }
            });
            ctx.fillText('Total House Seats', x + w / 2, chartY + chartH + 28);
        }

        function drawPopChart(x, y, w, h) {
            ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Population Paradox: Seats Over Time', x + w / 2, y);

            const chartY = y + 30;
            const chartH = h - 60;
            const n = popResults.length;
            const maxSeats = Math.max(...popResults.flatMap(r => r.alloc));

            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + 40, chartY);
            ctx.lineTo(x + 40, chartY + chartH);
            ctx.lineTo(x + w, chartY + chartH);
            ctx.stroke();

            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            for (let s = 0; s <= maxSeats; s++) {
                const ly = chartY + chartH - (s / maxSeats) * chartH;
                ctx.fillText(s, x + 36, ly + 3);
            }

            popStates.forEach((st, si) => {
                ctx.strokeStyle = colors[si];
                ctx.lineWidth = 2;
                ctx.beginPath();
                const visN = Math.min(n, Math.floor(animT * n * 2));
                for (let i = 0; i < visN; i++) {
                    const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                    const ly = chartY + chartH - (popResults[i].alloc[si] / maxSeats) * chartH;
                    if (i === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                // Paradox markers
                for (let i = 1; i < visN; i++) {
                    if (popResults[i].alloc[si] < popResults[i-1].alloc[si]) {
                        const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                        const ly = chartY + chartH - (popResults[i].alloc[si] / maxSeats) * chartH;
                        ctx.fillStyle = '#e63946';
                        ctx.beginPath();
                        ctx.arc(lx, ly, 6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const lastI = Math.min(visN - 1, n - 1);
                if (lastI >= 0) {
                    const lx = x + 40 + (lastI / Math.max(1, n - 1)) * (w - 50);
                    const ly = chartY + chartH - (popResults[lastI].alloc[si] / maxSeats) * chartH;
                    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
                    ctx.fillStyle = colors[si];
                    ctx.textAlign = 'left';
                    ctx.fillText(`${st.name} (${(st.growth*100).toFixed(0)}%/yr)`, lx + 6, ly + 3);
                }
            });

            ctx.font = '9px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.textAlign = 'center';
            ctx.fillText('Year', x + w / 2, chartY + chartH + 28);
            popResults.forEach((r, i) => {
                const lx = x + 40 + (i / Math.max(1, n - 1)) * (w - 50);
                ctx.fillText(r.year, lx, chartY + chartH + 14);
            });
        }

        function drawNewStateChart(x, y, w, h) {
            ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('New State Paradox: Before vs After', x + w / 2, y);

            const pops = nsStates.map(s => s.pop);
            const before = hamilton(pops, nsSeats);
            const totalPop = [...pops, nsNewState.pop].reduce((a, b) => a + b, 0);
            const newStateSeats = Math.max(1, Math.round(nsNewState.pop / totalPop * nsSeats));
            const after = hamilton([...pops, nsNewState.pop], nsSeats + newStateSeats);

            const chartY = y + 40;
            const barW = w / ((nsStates.length + 1) * 3 + 1);
            const maxS = Math.max(...before, ...after);
            const chartH = h - 100;

            ctx.font = '12px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.textAlign = 'center';
            ctx.fillText(`Before: ${nsSeats} seats among ${nsStates.length} states`, x + w * 0.3, chartY - 4);
            ctx.fillText(`After: ${nsSeats + newStateSeats} seats among ${nsStates.length + 1} states`, x + w * 0.7, chartY - 4);

            [...nsStates, nsNewState].forEach((st, si) => {
                const gx = x + 20 + si * (w - 40) / (nsStates.length + 1);
                const bw = (w - 40) / (nsStates.length + 1) * 0.35;

                // Before bar
                const bv = si < nsStates.length ? before[si] : 0;
                const bh = (bv / Math.max(1, maxS)) * chartH * Math.min(1, animT * 2);
                ctx.fillStyle = colors[si];
                ctx.globalAlpha = 0.5;
                ctx.fillRect(gx, chartY + chartH - bh, bw, bh);
                ctx.globalAlpha = 1;

                // After bar
                const av = after[si];
                const ah = (av / Math.max(1, maxS)) * chartH * Math.min(1, animT * 2);
                ctx.fillStyle = colors[si];
                ctx.fillRect(gx + bw + 4, chartY + chartH - ah, bw, ah);

                // Labels
                ctx.font = '11px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = colors[si];
                ctx.textAlign = 'center';
                ctx.fillText(st.name, gx + bw, chartY + chartH + 16);

                ctx.font = '10px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#FEFAE0';
                if (bh > 12) ctx.fillText(bv, gx + bw / 2, chartY + chartH - bh - 4);
                if (ah > 12) ctx.fillText(av, gx + bw + 4 + bw / 2, chartY + chartH - ah - 4);

                // Change indicator
                if (si < nsStates.length && animT > 1.5) {
                    const diff = av - bv;
                    if (diff !== 0) {
                        ctx.font = 'bold 12px "Segoe UI", system-ui, sans-serif';
                        ctx.fillStyle = diff > 0 ? '#2a9d8f' : '#e63946';
                        const sign = diff > 0 ? '+' : '';
                        ctx.fillText(`${sign}${diff}`, gx + bw, chartY + chartH + 30);
                    }
                }
            });

            // Legend
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'left';
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(x + 20, y + h - 20, 12, 10);
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Before', x + 36, y + h - 11);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(x + 100, y + h - 20, 12, 10);
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('After', x + 116, y + h - 11);
        }

        window.reset = function() {
            currentTab = 'alabama';
            animT = 0;
            states = [
                { name: 'Alabama', pop: 1262505 },
                { name: 'Texas', pop: 3048710 },
                { name: 'Illinois', pop: 3077871 },
                { name: 'Ohio', pop: 3198062 },
                { name: 'New York', pop: 5082871 },
                { name: 'Penn.', pop: 4282891 }
            ];
            seatRange = [25, 35];
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="alabama"]').classList.add('active');
            buildTabContent();
        };

        buildTabContent();
        draw();
    })();
    </script>
</body>
</html>
