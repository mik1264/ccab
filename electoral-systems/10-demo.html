<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electoral System Arena - Method Showdown</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        canvas { display: block; }
        .panel { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 14px 20px; border-radius: 12px; z-index: 100; display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; justify-content: center; max-width: 95vw; }
        .ctrl { text-align: center; }
        .ctrl label { font-size: 0.75rem; color: #8A9A5B; display: block; margin-bottom: 3px; }
        .ctrl input[type="range"] { width: 80px; accent-color: #8A9A5B; }
        .ctrl span { color: #DDA15E; font-size: 0.8rem; }
        button { padding: 8px 18px; background: #606C38; color: #FEFAE0; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        button:hover { background: #8A9A5B; }
        button.active { background: #DDA15E; color: #1a1a2e; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <div class="ctrl">
            <label>Parties</label>
            <input type="range" id="numParties" min="3" max="8" value="6">
            <span id="npVal">6</span>
        </div>
        <div class="ctrl">
            <label>Seats</label>
            <input type="range" id="numSeats" min="5" max="40" value="20">
            <span id="nsVal">20</span>
        </div>
        <div class="ctrl">
            <label>Inequality</label>
            <input type="range" id="inequality" min="0" max="100" value="60">
            <span id="iqVal">0.60</span>
        </div>
        <button id="runBtn">New Election</button>
        <button id="animBtn">Animate</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const partyColors = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#a8dadc','#264653','#ff6b6b'];
        const partyNames = ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta'];

        const methodNames = ["D'Hondt","Sainte-Lague","Hare LR","Droop LR","Adams","Huntington-Hill"];

        let numParties = 6;
        let numSeats = 20;
        let inequality = 0.6;
        let votes = [];
        let results = {};
        let animT = 0;
        let autoAnimate = false;

        document.getElementById('numParties').addEventListener('input', e => {
            numParties = +e.target.value;
            document.getElementById('npVal').textContent = numParties;
        });
        document.getElementById('numSeats').addEventListener('input', e => {
            numSeats = +e.target.value;
            document.getElementById('nsVal').textContent = numSeats;
        });
        document.getElementById('inequality').addEventListener('input', e => {
            inequality = +e.target.value / 100;
            document.getElementById('iqVal').textContent = inequality.toFixed(2);
        });
        document.getElementById('runBtn').addEventListener('click', runElection);
        document.getElementById('animBtn').addEventListener('click', () => {
            autoAnimate = !autoAnimate;
            document.getElementById('animBtn').className = autoAnimate ? 'active' : '';
        });

        function generateVotes() {
            votes = [];
            let remaining = 1;
            for (let i = 0; i < numParties - 1; i++) {
                const share = remaining * (0.1 + Math.random() * inequality * 0.5);
                votes.push(Math.round(share * 100000));
                remaining -= share;
            }
            votes.push(Math.round(remaining * 100000));
            votes.sort((a, b) => b - a);
        }

        function highestAvg(vts, seats, divFn) {
            const res = vts.map(() => 0);
            for (let s = 0; s < seats; s++) {
                let best = -1, bestQ = -1;
                vts.forEach((v, i) => { const q = v / divFn(res[i]); if (q > bestQ) { bestQ = q; best = i; } });
                if (best >= 0) res[best]++;
            }
            return res;
        }

        function largestRem(vts, seats, quotaType) {
            const total = vts.reduce((s, v) => s + v, 0);
            const quota = quotaType === 'hare' ? total / seats : Math.floor(total / (seats + 1)) + 1;
            const res = vts.map(v => ({ initial: Math.floor(v / quota), rem: (v / quota) - Math.floor(v / quota) }));
            res.forEach(r => r.seats = r.initial);
            let assigned = res.reduce((s, r) => s + r.seats, 0);
            const indices = res.map((_, i) => i).sort((a, b) => res[b].rem - res[a].rem);
            for (let i = 0; i < seats - assigned && i < indices.length; i++) res[indices[i]].seats++;
            return res.map(r => r.seats);
        }

        function gallagher(vts, alloc, seats) {
            const total = vts.reduce((s, v) => s + v, 0);
            let sum = 0;
            vts.forEach((v, i) => {
                const vp = (v / total) * 100;
                const sp = (alloc[i] / seats) * 100;
                sum += (vp - sp) ** 2;
            });
            return Math.sqrt(0.5 * sum);
        }

        function runElection() {
            generateVotes();

            results = {};
            results["D'Hondt"] = highestAvg(votes, numSeats, n => n + 1);
            results["Sainte-Lague"] = highestAvg(votes, numSeats, n => 2 * n + 1);
            results["Hare LR"] = largestRem(votes, numSeats, 'hare');
            results["Droop LR"] = largestRem(votes, numSeats, 'droop');
            results["Adams"] = highestAvg(votes, numSeats, n => n === 0 ? 0.5 : n);
            results["Huntington-Hill"] = highestAvg(votes, numSeats, n => n === 0 ? 0.5 : Math.sqrt(n * (n + 1)));

            animT = 0;
        }

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function drawHemicycle(cx, cy, maxR, alloc, title, gIdx) {
            const totalS = alloc.reduce((a, b) => a + b, 0);
            if (totalS === 0) return;

            // Title
            ctx.font = 'bold 12px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText(title, cx, cy - maxR - 16);

            // Gallagher
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            const cls = gIdx < 2 ? '#2a9d8f' : gIdx < 5 ? '#e9c46a' : '#e63946';
            ctx.fillStyle = cls;
            ctx.fillText(`G=${gIdx.toFixed(1)}`, cx, cy - maxR - 4);

            const minR = maxR * 0.3;
            const rows = Math.max(2, Math.ceil(totalS / 8));
            let idx = 0;
            const visSeats = Math.min(Math.floor(animT * totalS * 1.5), totalS);

            for (let row = 0; row < rows; row++) {
                const r = minR + (maxR - minR) * (row / Math.max(1, rows - 1));
                const n = Math.ceil(totalS / rows);
                const span = Math.PI * 0.85;
                const startA = Math.PI + (Math.PI - span) / 2;

                for (let s = 0; s < n && idx < totalS; s++) {
                    const a = startA + (s / Math.max(1, n - 1)) * span;
                    const sx = cx + Math.cos(a) * r;
                    const sy = cy + Math.sin(a) * r;

                    let cum = 0, pi = 0;
                    for (let j = 0; j < alloc.length; j++) {
                        cum += alloc[j]; if (idx < cum) { pi = j; break; }
                    }

                    const sr = Math.max(3, Math.min(10, maxR / totalS * 1.8));
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fillStyle = partyColors[pi];
                    ctx.globalAlpha = idx < visSeats ? 1 : 0.1;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    idx++;
                }
            }

            // Seat counts
            ctx.font = '9px "Segoe UI", system-ui, sans-serif';
            let lx = cx - maxR;
            alloc.forEach((s, i) => {
                if (s > 0 && i < numParties) {
                    ctx.fillStyle = partyColors[i];
                    ctx.textAlign = 'left';
                    ctx.fillText(`${s}`, lx, cy + 16);
                    lx += ctx.measureText(`${s}`).width + 8;
                }
            });
        }

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (canvas.width !== w * devicePixelRatio) resize();

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            if (votes.length === 0) {
                ctx.font = '18px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#8A9A5B';
                ctx.textAlign = 'center';
                ctx.fillText('Click "New Election" to begin', w / 2, h / 2 - 10);
                ctx.font = '13px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#606C38';
                ctx.fillText('Compare 6 allocation methods on the same election data', w / 2, h / 2 + 20);
                requestAnimationFrame(draw);
                return;
            }

            // Title
            ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Electoral System Arena', w / 2, 28);

            // Vote share bar
            const totalVotes = votes.reduce((s, v) => s + v, 0);
            const barY = 42;
            const barW = w - 40;
            let bx = 20;
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            votes.forEach((v, i) => {
                if (i >= numParties) return;
                const sw = (v / totalVotes) * barW;
                ctx.fillStyle = partyColors[i];
                ctx.globalAlpha = Math.min(1, animT * 3);
                ctx.fillRect(bx, barY, sw, 16);
                ctx.globalAlpha = 1;
                if (sw > 30) {
                    ctx.fillStyle = '#FEFAE0';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${partyNames[i]} ${(v/totalVotes*100).toFixed(1)}%`, bx + sw / 2, barY + 12);
                }
                bx += sw;
            });

            // 6 hemicycles in 3x2 grid
            const cols = 3;
            const rows = 2;
            const cellW = w / cols;
            const cellH = (h - 120) / rows;
            const hemiR = Math.min(cellW * 0.35, cellH * 0.35);

            methodNames.forEach((name, mi) => {
                const col = mi % cols;
                const row = Math.floor(mi / cols);
                const cx = cellW * (col + 0.5);
                const cy = 90 + cellH * (row + 0.5);

                const alloc = results[name] || votes.map(() => 0);
                const gIdx = gallagher(votes, alloc, numSeats);
                drawHemicycle(cx, cy, hemiR, alloc, name, gIdx);
            });

            // Ranking
            const rankY = h - 64;
            ctx.font = 'bold 12px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.textAlign = 'center';
            ctx.fillText('Proportionality Ranking (lower Gallagher = better):', w / 2, rankY);

            const ranked = methodNames.map(name => ({
                name,
                g: gallagher(votes, results[name] || votes.map(() => 0), numSeats)
            })).sort((a, b) => a.g - b.g);

            ctx.font = '11px "Segoe UI", system-ui, sans-serif';
            const totalRankW = ranked.length * 130;
            let rx = (w - totalRankW) / 2;
            ranked.forEach((r, i) => {
                const medal = i === 0 ? '#2a9d8f' : i === 1 ? '#8A9A5B' : i === ranked.length - 1 ? '#e63946' : '#FEFAE0';
                ctx.fillStyle = medal;
                ctx.textAlign = 'center';
                ctx.fillText(`${i + 1}. ${r.name} (${r.g.toFixed(1)})`, rx + 65, rankY + 18);
                rx += 130;
            });

            animT += 0.02;

            if (autoAnimate && animT > 4) {
                runElection();
            }

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            numParties = 6; numSeats = 20; inequality = 0.6;
            votes = []; results = {};
            animT = 0; autoAnimate = false;
            document.getElementById('numParties').value = 6;
            document.getElementById('npVal').textContent = '6';
            document.getElementById('numSeats').value = 20;
            document.getElementById('nsVal').textContent = '20';
            document.getElementById('inequality').value = 60;
            document.getElementById('iqVal').textContent = '0.60';
            document.getElementById('animBtn').className = '';
        };

        runElection();
        draw();
    })();
    </script>
</body>
</html>
