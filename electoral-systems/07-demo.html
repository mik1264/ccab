<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallagher Disproportionality Index</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        canvas { display: block; }
        .controls { position: fixed; top: 10px; right: 10px; width: 280px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 14px; border-radius: 12px; z-index: 100; }
        h1 { font-size: 1.1rem; color: #DDA15E; margin-bottom: 4px; }
        .sub { font-size: 0.78rem; color: #8A9A5B; margin-bottom: 12px; }
        .party { margin-bottom: 10px; }
        .party label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 2px; }
        input[type="range"] { width: 100%; accent-color: #8A9A5B; }
        .seat-ctrl label { font-size: 0.85rem; color: #DDA15E; }
        .result-box { margin-top: 12px; padding: 10px; background: rgba(221,161,94,0.1); border-radius: 8px; }
        .result-box h3 { font-size: 0.9rem; color: #DDA15E; margin-bottom: 6px; }
        .method-row { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 3px; }
        .method-row .name { color: #8A9A5B; }
        .method-row .val { font-weight: 600; }
        .val.good { color: #2a9d8f; }
        .val.ok { color: #e9c46a; }
        .val.bad { color: #e63946; }
        .info { font-size: 0.72rem; color: #606C38; line-height: 1.4; margin-top: 10px; padding: 8px; background: rgba(96,108,56,0.15); border-radius: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>Gallagher Index</h1>
        <p class="sub">Measure disproportionality across allocation methods</p>
        <div class="seat-ctrl" style="margin-bottom:12px;">
            <label>Seats: <span id="sVal">15</span></label>
            <input type="range" id="seats" min="5" max="30" value="15">
        </div>
        <div id="partyUI"></div>
        <div class="result-box">
            <h3>Gallagher LSq Index</h3>
            <div id="results"></div>
        </div>
        <div class="info">
            <strong>Formula:</strong> LSq = sqrt(0.5 * sum((V% - S%)^2))<br>
            0 = perfect proportionality. Lower is better.<br>
            &lt;2 Excellent | 2-5 Good | 5-10 Moderate | &gt;10 Poor
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#a8dadc'];
        let parties = [
            { name: 'Party A', votes: 40000 },
            { name: 'Party B', votes: 25000 },
            { name: 'Party C', votes: 15000 },
            { name: 'Party D', votes: 12000 },
            { name: 'Party E', votes: 5000 },
            { name: 'Party F', votes: 3000 }
        ];
        let totalSeats = 15;
        let animT = 0;

        const methods = [
            { name: "D'Hondt", fn: (pts, s) => highestAvg(pts, s, n => n + 1) },
            { name: "Sainte-Lague", fn: (pts, s) => highestAvg(pts, s, n => 2*n + 1) },
            { name: "Hare-LR", fn: (pts, s) => largestRem(pts, s, 'hare') },
            { name: "Droop-LR", fn: (pts, s) => largestRem(pts, s, 'droop') }
        ];

        function highestAvg(pts, seats, divFn) {
            const res = pts.map(() => 0);
            for (let s = 0; s < seats; s++) {
                let best = -1, bestQ = -1;
                pts.forEach((p, i) => { const q = p.votes / divFn(res[i]); if (q > bestQ) { bestQ = q; best = i; } });
                if (best >= 0) res[best]++;
            }
            return res;
        }

        function largestRem(pts, seats, type) {
            const total = pts.reduce((s, p) => s + p.votes, 0);
            const quota = type === 'hare' ? total / seats : Math.floor(total / (seats + 1)) + 1;
            const res = pts.map(p => ({ initial: Math.floor(p.votes / quota), rem: (p.votes / quota) % 1, seats: 0 }));
            res.forEach(r => r.seats = r.initial);
            let assigned = res.reduce((s, r) => s + r.seats, 0);
            const indices = res.map((_, i) => i).sort((a, b) => res[b].rem - res[a].rem);
            for (let i = 0; i < seats - assigned && i < indices.length; i++) res[indices[i]].seats++;
            return res.map(r => r.seats);
        }

        function gallagher(pts, seatAlloc, seats) {
            const totalVotes = pts.reduce((s, p) => s + p.votes, 0);
            let sum = 0;
            pts.forEach((p, i) => {
                const vPct = (p.votes / totalVotes) * 100;
                const sPct = (seatAlloc[i] / seats) * 100;
                sum += (vPct - sPct) ** 2;
            });
            return Math.sqrt(0.5 * sum);
        }

        function buildUI() {
            const c = document.getElementById('partyUI');
            c.innerHTML = '';
            parties.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'party';
                d.innerHTML = `<label><span style="color:${colors[i]}">${p.name}</span><span id="pv${i}">${p.votes.toLocaleString()}</span></label>
                    <input type="range" min="0" max="80000" value="${p.votes}">`;
                d.querySelector('input').addEventListener('input', e => {
                    parties[i].votes = +e.target.value;
                    document.getElementById('pv'+i).textContent = parties[i].votes.toLocaleString();
                    updateResults();
                    animT = 0;
                });
                c.appendChild(d);
            });
            updateResults();
        }

        document.getElementById('seats').addEventListener('input', e => {
            totalSeats = +e.target.value;
            document.getElementById('sVal').textContent = totalSeats;
            updateResults();
            animT = 0;
        });

        function updateResults() {
            const el = document.getElementById('results');
            el.innerHTML = '';
            methods.forEach(m => {
                const alloc = m.fn(parties, totalSeats);
                const g = gallagher(parties, alloc, totalSeats);
                const cls = g < 2 ? 'good' : g < 5 ? 'ok' : 'bad';
                const div = document.createElement('div');
                div.className = 'method-row';
                div.innerHTML = `<span class="name">${m.name}</span><span class="val ${cls}">${g.toFixed(2)}</span>`;
                el.appendChild(div);
            });
        }

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (canvas.width !== w * devicePixelRatio) resize();

            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(1, '#16213e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            const totalVotes = parties.reduce((s, p) => s + p.votes, 0);
            const chartW = w - 320;
            const chartH = h - 80;
            const ox = 80, oy = 50;

            // Title
            ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Vote Share vs Seat Share by Method', ox + chartW / 2, 30);

            // Draw grouped bars: for each party, show vote%, then seat% per method
            const groupW = chartW / parties.length;
            const barW = groupW / (methods.length + 2);
            const maxPct = 100;

            // Y axis
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            for (let p = 0; p <= 100; p += 20) {
                const y = oy + chartH - (p / maxPct) * chartH;
                ctx.fillText(p + '%', ox - 8, y + 3);
                ctx.strokeStyle = 'rgba(254,250,224,0.1)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(ox, y);
                ctx.lineTo(ox + chartW, y);
                ctx.stroke();
            }

            parties.forEach((p, pi) => {
                const gx = ox + pi * groupW;
                const vPct = (p.votes / totalVotes) * 100;

                // Vote share bar
                const vh = (vPct / maxPct) * chartH * Math.min(1, animT * 2);
                ctx.fillStyle = 'rgba(254,250,224,0.15)';
                ctx.fillRect(gx + 4, oy + chartH - vh, barW - 2, vh);
                ctx.strokeStyle = colors[pi];
                ctx.lineWidth = 1;
                ctx.strokeRect(gx + 4, oy + chartH - vh, barW - 2, vh);

                // Method bars
                methods.forEach((m, mi) => {
                    const alloc = m.fn(parties, totalSeats);
                    const sPct = (alloc[pi] / totalSeats) * 100;
                    const sh = (sPct / maxPct) * chartH * Math.min(1, animT * 2 - 0.3);
                    const bx = gx + (mi + 1.5) * barW;

                    if (sh > 0) {
                        ctx.fillStyle = colors[pi];
                        ctx.globalAlpha = 0.3 + mi * 0.15;
                        ctx.fillRect(bx, oy + chartH - sh, barW - 2, sh);
                        ctx.globalAlpha = 1;
                    }

                    // Deviation line from vote share
                    if (animT > 1) {
                        const vy = oy + chartH - (vPct / maxPct) * chartH;
                        const sy = oy + chartH - (sPct / maxPct) * chartH;
                        ctx.strokeStyle = sPct > vPct ? '#2a9d8f' : '#e63946';
                        ctx.lineWidth = 1.5;
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(bx + barW / 2, vy);
                        ctx.lineTo(bx + barW / 2, sy);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                });

                // Party label
                ctx.font = '11px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = colors[pi];
                ctx.textAlign = 'center';
                ctx.fillText(p.name, gx + groupW / 2, oy + chartH + 16);
                ctx.font = '9px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText(vPct.toFixed(1) + '%', gx + groupW / 2, oy + chartH + 28);
            });

            // Legend
            const legY = oy + chartH + 40;
            ctx.font = '10px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'left';
            const legItems = ['Vote %', ...methods.map(m => m.name)];
            let lx = ox;
            legItems.forEach((item, i) => {
                if (i === 0) {
                    ctx.fillStyle = 'rgba(254,250,224,0.3)';
                    ctx.fillRect(lx, legY, 12, 10);
                    ctx.strokeStyle = '#8A9A5B';
                    ctx.strokeRect(lx, legY, 12, 10);
                } else {
                    ctx.fillStyle = '#8A9A5B';
                    ctx.globalAlpha = 0.3 + (i - 1) * 0.15;
                    ctx.fillRect(lx, legY, 12, 10);
                    ctx.globalAlpha = 1;
                }
                ctx.fillStyle = '#FEFAE0';
                ctx.fillText(item, lx + 16, legY + 9);
                lx += ctx.measureText(item).width + 30;
            });

            // Gallagher gauge
            const gaugeY = legY + 30;
            ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Disproportionality Gauge', ox + chartW / 2, gaugeY);

            methods.forEach((m, mi) => {
                const alloc = m.fn(parties, totalSeats);
                const g = gallagher(parties, alloc, totalSeats);
                const gx = ox + (mi / methods.length) * chartW;
                const gw = chartW / methods.length - 10;

                // Gauge bar
                const gaugeH = 16;
                const gy = gaugeY + 12;
                const gradBar = ctx.createLinearGradient(gx, 0, gx + gw, 0);
                gradBar.addColorStop(0, '#2a9d8f');
                gradBar.addColorStop(0.3, '#e9c46a');
                gradBar.addColorStop(1, '#e63946');
                ctx.fillStyle = gradBar;
                ctx.globalAlpha = 0.3;
                ctx.fillRect(gx + 5, gy, gw, gaugeH);
                ctx.globalAlpha = 1;

                // Needle
                const needleX = gx + 5 + Math.min(1, g / 20) * gw;
                ctx.fillStyle = '#FEFAE0';
                ctx.beginPath();
                ctx.moveTo(needleX, gy - 4);
                ctx.lineTo(needleX - 4, gy - 10);
                ctx.lineTo(needleX + 4, gy - 10);
                ctx.closePath();
                ctx.fill();

                ctx.font = '10px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#FEFAE0';
                ctx.textAlign = 'center';
                ctx.fillText(m.name, gx + 5 + gw / 2, gy + gaugeH + 12);
                ctx.fillText(g.toFixed(2), gx + 5 + gw / 2, gy + gaugeH + 24);
            });

            animT += 0.015;
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            parties = [
                { name: 'Party A', votes: 40000 },
                { name: 'Party B', votes: 25000 },
                { name: 'Party C', votes: 15000 },
                { name: 'Party D', votes: 12000 },
                { name: 'Party E', votes: 5000 },
                { name: 'Party F', votes: 3000 }
            ];
            totalSeats = 15;
            document.getElementById('seats').value = 15;
            document.getElementById('sVal').textContent = '15';
            animT = 0;
            buildUI();
        };

        buildUI();
        draw();
    })();
    </script>
</body>
</html>
