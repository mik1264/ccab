<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrier Grid Animation (Scanimation) - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 300px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Barrier Grid Animation</strong><br>
        A striped overlay slides across interleaved animation frames, revealing one frame at a time -- the scanimation effect. A bouncing circle is encoded into strips. Move mouse left/right to manually scrub, or let it auto-animate.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Frame Count</label>
            <input type="range" id="frames" min="4" max="12" value="6" step="1">
            <div class="value" id="framesVal">6</div>
        </div>
        <div class="control-group">
            <label>Strip Width</label>
            <input type="range" id="stripW" min="2" max="12" value="5" step="1">
            <div class="value" id="stripWVal">5px</div>
        </div>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed" min="0" max="100" value="40" step="5">
            <div class="value" id="speedVal">40</div>
        </div>
        <div class="control-group">
            <label>Animation</label>
            <input type="range" id="anim" min="0" max="2" value="0" step="1">
            <div class="value" id="animVal">Bounce</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = -1;
        let useAuto = true;
        let animId;
        let phase = 0;

        const animNames = ['Bounce', 'Spiral', 'Wave'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            useAuto = false;
        });
        document.addEventListener('mouseleave', () => { useAuto = true; });

        const framesEl = document.getElementById('frames');
        const stripWEl = document.getElementById('stripW');
        const speedEl = document.getElementById('speed');
        const animEl = document.getElementById('anim');

        function updateLabels() {
            document.getElementById('framesVal').textContent = framesEl.value;
            document.getElementById('stripWVal').textContent = stripWEl.value + 'px';
            document.getElementById('speedVal').textContent = speedEl.value;
            document.getElementById('animVal').textContent = animNames[parseInt(animEl.value)];
        }
        [framesEl, stripWEl, speedEl, animEl].forEach(el => el.addEventListener('input', updateLabels));

        function generateFrame(frameIdx, totalFrames, animType) {
            const t = frameIdx / totalFrames;
            const cx = W / 2;
            const cy = H / 2;
            const r = Math.min(W, H) * 0.15;

            switch (animType) {
                case 0: { // Bounce
                    const bx = cx + Math.cos(t * Math.PI * 2) * r;
                    const by = cy + Math.sin(t * Math.PI * 2) * r * 0.5;
                    return { type: 'circle', x: bx, y: by, r: 40 };
                }
                case 1: { // Spiral
                    const angle = t * Math.PI * 4;
                    const dist = r * (0.3 + t * 0.7);
                    const sx = cx + Math.cos(angle) * dist;
                    const sy = cy + Math.sin(angle) * dist;
                    return { type: 'circle', x: sx, y: sy, r: 20 + t * 30 };
                }
                case 2: { // Wave
                    return { type: 'wave', t: t };
                }
            }
        }

        function drawFrameContent(frame) {
            if (frame.type === 'circle') {
                ctx.beginPath();
                ctx.arc(frame.x, frame.y, frame.r, 0, Math.PI * 2);
                ctx.fill();
            } else if (frame.type === 'wave') {
                const amplitude = H * 0.15;
                ctx.beginPath();
                for (let x = 0; x < W; x += 2) {
                    const y = H / 2 + Math.sin(x * 0.02 + frame.t * Math.PI * 2) * amplitude *
                              Math.sin(x * 0.005 + frame.t * Math.PI);
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.closePath();
                ctx.fill();
            }
        }

        function draw(t) {
            const numFrames = parseInt(framesEl.value);
            const stripW = parseInt(stripWEl.value);
            const speed = parseInt(speedEl.value);
            const animType = parseInt(animEl.value);
            const cellWidth = stripW * numFrames;

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            // Draw interleaved frame strips
            for (let f = 0; f < numFrames; f++) {
                const frame = generateFrame(f, numFrames, animType);
                ctx.save();
                ctx.beginPath();
                for (let x = -cellWidth; x < W + cellWidth; x += cellWidth) {
                    ctx.rect(x + f * stripW, 0, stripW, H);
                }
                ctx.clip();
                const hue = (f / numFrames) * 60 + 60;
                ctx.fillStyle = `hsl(${hue}, 50%, 45%)`;
                drawFrameContent(frame);
                ctx.restore();
            }

            // Draw barrier grid (opaque strips)
            if (useAuto) {
                phase += speed * 0.0004;
            } else {
                phase = (mouseX / W) * numFrames;
            }
            const offset = (phase % 1) * cellWidth;

            ctx.fillStyle = 'rgba(10,10,10,0.92)';
            for (let x = -cellWidth + offset; x < W + cellWidth; x += cellWidth) {
                ctx.fillRect(x + stripW, 0, cellWidth - stripW, H);
            }

            // Thin guide lines on barrier edges
            ctx.strokeStyle = 'rgba(138,154,91,0.15)';
            ctx.lineWidth = 0.5;
            for (let x = -cellWidth + offset; x < W + cellWidth; x += cellWidth) {
                ctx.beginPath();
                ctx.moveTo(x + stripW, 0);
                ctx.lineTo(x + stripW, H);
                ctx.stroke();
            }

            animId = requestAnimationFrame(draw);
        }

        draw(0);
        updateLabels();

        window.reset = function() {
            framesEl.value = 6;
            stripWEl.value = 5;
            speedEl.value = 40;
            animEl.value = 0;
            phase = 0;
            useAuto = true;
            updateLabels();
        };
    </script>
</body>
</html>
