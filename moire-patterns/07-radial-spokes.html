<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Spoke Moire - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Radial Spoke Moire</strong><br>
        Two sets of radial spokes emanating from different centers. Their overlap creates cardioid-like interference curves. Move mouse to reposition the second center. The number of spokes controls the fringe density.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Spokes</label>
            <input type="range" id="spokes" min="20" max="360" value="120" step="5">
            <div class="value" id="spokesVal">120</div>
        </div>
        <div class="control-group">
            <label>Line Width</label>
            <input type="range" id="lw" min="0.3" max="3" value="0.8" step="0.1">
            <div class="value" id="lwVal">0.8</div>
        </div>
        <div class="control-group">
            <label>Auto Orbit</label>
            <input type="range" id="orbit" min="0" max="100" value="50" step="5">
            <div class="value" id="orbitVal">50</div>
        </div>
        <div class="control-group">
            <label>Orbit Radius</label>
            <input type="range" id="orbitR" min="10" max="300" value="80" step="10">
            <div class="value" id="orbitRVal">80px</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX, mouseY;
        let useAuto = true;
        let autoAngle = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            mouseX = W / 2 + 80;
            mouseY = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            useAuto = false;
        });
        document.addEventListener('mouseleave', () => { useAuto = true; });

        const spokesEl = document.getElementById('spokes');
        const lwEl = document.getElementById('lw');
        const orbitEl = document.getElementById('orbit');
        const orbitREl = document.getElementById('orbitR');

        function updateLabels() {
            document.getElementById('spokesVal').textContent = spokesEl.value;
            document.getElementById('lwVal').textContent = parseFloat(lwEl.value).toFixed(1);
            document.getElementById('orbitVal').textContent = orbitEl.value;
            document.getElementById('orbitRVal').textContent = orbitREl.value + 'px';
        }
        [spokesEl, lwEl, orbitEl, orbitREl].forEach(el => el.addEventListener('input', updateLabels));

        function drawSpokes(cx, cy, count, color, lw) {
            const diag = Math.sqrt(W * W + H * H);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            for (let i = 0; i < count; i++) {
                const a = (i / count) * Math.PI * 2;
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(a) * diag, cy + Math.sin(a) * diag);
            }
            ctx.stroke();
        }

        function draw() {
            const numSpokes = parseInt(spokesEl.value);
            const lw = parseFloat(lwEl.value);
            const orbitSpeed = parseInt(orbitEl.value);
            const orbitRadius = parseInt(orbitREl.value);

            ctx.globalAlpha = 1;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            const cx1 = W / 2;
            const cy1 = H / 2;

            let cx2, cy2;
            if (useAuto && orbitSpeed > 0) {
                autoAngle += orbitSpeed * 0.0002;
                cx2 = cx1 + Math.cos(autoAngle) * orbitRadius;
                cy2 = cy1 + Math.sin(autoAngle) * orbitRadius;
            } else {
                cx2 = mouseX;
                cy2 = mouseY;
            }

            drawSpokes(cx1, cy1, numSpokes, '#8A9A5B', lw);
            drawSpokes(cx2, cy2, numSpokes, '#DDA15E', lw);

            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            spokesEl.value = 120;
            lwEl.value = 0.8;
            orbitEl.value = 50;
            orbitREl.value = 80;
            useAuto = true;
            autoAngle = 0;
            updateLabels();
        };
    </script>
</body>
</html>
