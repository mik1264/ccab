<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Screen Halftone Moire - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Dot Screen Halftone Moire</strong><br>
        Simulates overlapping halftone dot screens used in CMYK printing. Different screen angles produce the classic rosette pattern or distracting moire. Move mouse to shift the top screen.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Dot Spacing</label>
            <input type="range" id="spacing" min="6" max="30" value="14" step="1">
            <div class="value" id="spacingVal">14px</div>
        </div>
        <div class="control-group">
            <label>Dot Size</label>
            <input type="range" id="dotSize" min="1" max="10" value="4" step="0.5">
            <div class="value" id="dotSizeVal">4px</div>
        </div>
        <div class="control-group">
            <label>Screen 1 Angle</label>
            <input type="range" id="angle1" min="0" max="90" value="15" step="1">
            <div class="value" id="angle1Val">15&deg;</div>
        </div>
        <div class="control-group">
            <label>Screen 2 Angle</label>
            <input type="range" id="angle2" min="0" max="90" value="75" step="1">
            <div class="value" id="angle2Val">75&deg;</div>
        </div>
        <div class="control-group">
            <label>Screen 3 Angle</label>
            <input type="range" id="angle3" min="0" max="90" value="0" step="1">
            <div class="value" id="angle3Val">0&deg;</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = 0, mouseY = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX - W / 2;
            mouseY = e.clientY - H / 2;
        });

        const spacingEl = document.getElementById('spacing');
        const dotSizeEl = document.getElementById('dotSize');
        const angle1El = document.getElementById('angle1');
        const angle2El = document.getElementById('angle2');
        const angle3El = document.getElementById('angle3');

        function updateLabels() {
            document.getElementById('spacingVal').textContent = spacingEl.value + 'px';
            document.getElementById('dotSizeVal').textContent = dotSizeEl.value + 'px';
            document.getElementById('angle1Val').innerHTML = angle1El.value + '&deg;';
            document.getElementById('angle2Val').innerHTML = angle2El.value + '&deg;';
            document.getElementById('angle3Val').innerHTML = angle3El.value + '&deg;';
        }

        [spacingEl, dotSizeEl, angle1El, angle2El, angle3El].forEach(el => el.addEventListener('input', updateLabels));

        function drawDotScreen(angle, offsetX, offsetY, color, spacing, dotR) {
            ctx.save();
            ctx.translate(W / 2 + offsetX, H / 2 + offsetY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.4;
            const diag = Math.sqrt(W * W + H * H);
            const n = Math.ceil(diag / spacing) + 2;
            ctx.beginPath();
            for (let row = -n; row <= n; row++) {
                for (let col = -n; col <= n; col++) {
                    const x = col * spacing;
                    const y = row * spacing;
                    ctx.moveTo(x + dotR, y);
                    ctx.arc(x, y, dotR, 0, Math.PI * 2);
                }
            }
            ctx.fill();
            ctx.restore();
        }

        function draw() {
            const spacing = parseFloat(spacingEl.value);
            const dotR = parseFloat(dotSizeEl.value) / 2;
            const a1 = parseFloat(angle1El.value);
            const a2 = parseFloat(angle2El.value);
            const a3 = parseFloat(angle3El.value);

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            const shiftX = mouseX * 0.05;
            const shiftY = mouseY * 0.05;

            drawDotScreen(a1, 0, 0, '#8A9A5B', spacing, dotR);
            drawDotScreen(a2, shiftX, shiftY, '#DDA15E', spacing, dotR);
            drawDotScreen(a3, shiftX * 0.5, shiftY * 0.5, '#BC6C25', spacing, dotR);

            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            spacingEl.value = 14;
            dotSizeEl.value = 4;
            angle1El.value = 15;
            angle2El.value = 75;
            angle3El.value = 0;
            mouseX = 0; mouseY = 0;
            updateLabels();
        };
    </script>
</body>
</html>
