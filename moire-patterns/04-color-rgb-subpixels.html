<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color RGB Subpixel Moire - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Color RGB Subpixel Moire</strong><br>
        Three color channels (R, G, B) rendered as separate line gratings at different angles. The interference produces shimmering color moire. Move the mouse to shift channels independently.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Spacing</label>
            <input type="range" id="spacing" min="4" max="24" value="8" step="0.5">
            <div class="value" id="spacingVal">8px</div>
        </div>
        <div class="control-group">
            <label>Red Angle</label>
            <input type="range" id="rAngle" min="0" max="180" value="0" step="1">
            <div class="value" id="rAngleVal">0&deg;</div>
        </div>
        <div class="control-group">
            <label>Green Angle</label>
            <input type="range" id="gAngle" min="0" max="180" value="60" step="1">
            <div class="value" id="gAngleVal">60&deg;</div>
        </div>
        <div class="control-group">
            <label>Blue Angle</label>
            <input type="range" id="bAngle" min="0" max="180" value="120" step="1">
            <div class="value" id="bAngleVal">120&deg;</div>
        </div>
        <div class="control-group">
            <label>Line Width</label>
            <input type="range" id="lw" min="0.5" max="4" value="1.5" step="0.25">
            <div class="value" id="lwVal">1.5px</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = 0, mouseY = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / W - 0.5) * 2;
            mouseY = (e.clientY / H - 0.5) * 2;
        });

        const spacingEl = document.getElementById('spacing');
        const rAngleEl = document.getElementById('rAngle');
        const gAngleEl = document.getElementById('gAngle');
        const bAngleEl = document.getElementById('bAngle');
        const lwEl = document.getElementById('lw');

        function updateLabels() {
            document.getElementById('spacingVal').textContent = spacingEl.value + 'px';
            document.getElementById('rAngleVal').innerHTML = rAngleEl.value + '&deg;';
            document.getElementById('gAngleVal').innerHTML = gAngleEl.value + '&deg;';
            document.getElementById('bAngleVal').innerHTML = bAngleEl.value + '&deg;';
            document.getElementById('lwVal').textContent = lwEl.value + 'px';
        }
        [spacingEl, rAngleEl, gAngleEl, bAngleEl, lwEl].forEach(el => el.addEventListener('input', updateLabels));

        function drawColorGrating(angle, offsetX, offsetY, color, spacing, lw) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.translate(W / 2 + offsetX, H / 2 + offsetY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.7;
            const diag = Math.sqrt(W * W + H * H);
            const n = Math.ceil(diag / spacing) + 2;
            ctx.beginPath();
            for (let i = -n; i <= n; i++) {
                const x = i * spacing;
                ctx.moveTo(x, -diag);
                ctx.lineTo(x, diag);
            }
            ctx.stroke();
            ctx.restore();
        }

        function draw() {
            const spacing = parseFloat(spacingEl.value);
            const rA = parseFloat(rAngleEl.value);
            const gA = parseFloat(gAngleEl.value);
            const bA = parseFloat(bAngleEl.value);
            const lw = parseFloat(lwEl.value);

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, W, H);

            const shiftR = mouseX * 15;
            const shiftG = mouseY * 15;
            const shiftB = (mouseX + mouseY) * 10;

            drawColorGrating(rA, shiftR, 0, '#ff2020', spacing, lw);
            drawColorGrating(gA, 0, shiftG, '#20ff20', spacing, lw);
            drawColorGrating(bA, shiftB * 0.5, -shiftB * 0.5, '#4040ff', spacing, lw);

            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            spacingEl.value = 8;
            rAngleEl.value = 0;
            gAngleEl.value = 60;
            bAngleEl.value = 120;
            lwEl.value = 1.5;
            mouseX = 0; mouseY = 0;
            updateLabels();
        };
    </script>
</body>
</html>
