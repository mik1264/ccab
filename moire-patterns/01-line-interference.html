<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Grating Interference - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Line Grating Interference</strong><br>
        Two sets of parallel lines overlap to create moire fringes. Move mouse to shift the top grating. Adjust spacing and angle with sliders.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Spacing A</label>
            <input type="range" id="spacingA" min="3" max="30" value="10" step="0.5">
            <div class="value" id="spacingAVal">10px</div>
        </div>
        <div class="control-group">
            <label>Spacing B</label>
            <input type="range" id="spacingB" min="3" max="30" value="11" step="0.5">
            <div class="value" id="spacingBVal">11px</div>
        </div>
        <div class="control-group">
            <label>Angle</label>
            <input type="range" id="angle" min="0" max="30" value="3" step="0.5">
            <div class="value" id="angleVal">3&deg;</div>
        </div>
        <div class="control-group">
            <label>Line Width</label>
            <input type="range" id="lineWidth" min="0.5" max="5" value="1.5" step="0.25">
            <div class="value" id="lineWidthVal">1.5px</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = 0, mouseY = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        const sliders = {
            spacingA: document.getElementById('spacingA'),
            spacingB: document.getElementById('spacingB'),
            angle: document.getElementById('angle'),
            lineWidth: document.getElementById('lineWidth')
        };

        function getParams() {
            return {
                spacingA: parseFloat(sliders.spacingA.value),
                spacingB: parseFloat(sliders.spacingB.value),
                angle: parseFloat(sliders.angle.value) * Math.PI / 180,
                lineWidth: parseFloat(sliders.lineWidth.value)
            };
        }

        function updateLabels() {
            document.getElementById('spacingAVal').textContent = sliders.spacingA.value + 'px';
            document.getElementById('spacingBVal').textContent = sliders.spacingB.value + 'px';
            document.getElementById('angleVal').innerHTML = sliders.angle.value + '&deg;';
            document.getElementById('lineWidthVal').textContent = sliders.lineWidth.value + 'px';
        }

        Object.values(sliders).forEach(s => s.addEventListener('input', updateLabels));

        function drawGrating(spacing, angle, offsetX, offsetY, color, lw) {
            ctx.save();
            ctx.translate(W / 2 + offsetX, H / 2 + offsetY);
            ctx.rotate(angle);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.6;
            const diag = Math.sqrt(W * W + H * H);
            const count = Math.ceil(diag / spacing) + 2;
            ctx.beginPath();
            for (let i = -count; i <= count; i++) {
                const x = i * spacing;
                ctx.moveTo(x, -diag);
                ctx.lineTo(x, diag);
            }
            ctx.stroke();
            ctx.restore();
        }

        function draw() {
            const p = getParams();
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            const shiftX = (mouseX - W / 2) * 0.1;
            const shiftY = (mouseY - H / 2) * 0.1;

            drawGrating(p.spacingA, 0, 0, 0, '#8A9A5B', p.lineWidth);
            drawGrating(p.spacingB, p.angle, shiftX, shiftY, '#DDA15E', p.lineWidth);

            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            sliders.spacingA.value = 10;
            sliders.spacingB.value = 11;
            sliders.angle.value = 3;
            sliders.lineWidth.value = 1.5;
            mouseX = W / 2;
            mouseY = H / 2;
            updateLabels();
        };
    </script>
</body>
</html>
