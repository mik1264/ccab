<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moire Magnification - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Moire Magnification</strong><br>
        A tiny repeating micro-pattern viewed through a slightly different-pitch lens array produces magnified virtual images. Move mouse to shift the lens grid. Watch how tiny symbols become enormous through moire magnification.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Pattern Period</label>
            <input type="range" id="patternPeriod" min="8" max="30" value="14" step="1">
            <div class="value" id="patternPeriodVal">14px</div>
        </div>
        <div class="control-group">
            <label>Lens Period</label>
            <input type="range" id="lensPeriod" min="8" max="30" value="15" step="1">
            <div class="value" id="lensPeriodVal">15px</div>
        </div>
        <div class="control-group">
            <label>Pattern Shape</label>
            <input type="range" id="shape" min="0" max="3" value="0" step="1">
            <div class="value" id="shapeVal">Star</div>
        </div>
        <div class="control-group">
            <label>Lens Opacity</label>
            <input type="range" id="lensOp" min="0.3" max="0.95" value="0.7" step="0.05">
            <div class="value" id="lensOpVal">0.70</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = 0, mouseY = 0;
        let animId;

        const shapes = ['Star', 'Diamond', 'Cross', 'Circle'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        const patternPeriodEl = document.getElementById('patternPeriod');
        const lensPeriodEl = document.getElementById('lensPeriod');
        const shapeEl = document.getElementById('shape');
        const lensOpEl = document.getElementById('lensOp');

        function updateLabels() {
            document.getElementById('patternPeriodVal').textContent = patternPeriodEl.value + 'px';
            document.getElementById('lensPeriodVal').textContent = lensPeriodEl.value + 'px';
            document.getElementById('shapeVal').textContent = shapes[parseInt(shapeEl.value)];
            document.getElementById('lensOpVal').textContent = parseFloat(lensOpEl.value).toFixed(2);
        }
        [patternPeriodEl, lensPeriodEl, shapeEl, lensOpEl].forEach(el => el.addEventListener('input', updateLabels));

        function drawMicroShape(x, y, size, shapeIdx) {
            const s = size * 0.35;
            ctx.beginPath();
            switch (shapeIdx) {
                case 0: // Star
                    for (let i = 0; i < 5; i++) {
                        const a1 = (i * 72 - 90) * Math.PI / 180;
                        const a2 = ((i * 72) + 36 - 90) * Math.PI / 180;
                        const method = i === 0 ? 'moveTo' : 'lineTo';
                        ctx[method](x + Math.cos(a1) * s, y + Math.sin(a1) * s);
                        ctx.lineTo(x + Math.cos(a2) * s * 0.4, y + Math.sin(a2) * s * 0.4);
                    }
                    ctx.closePath();
                    break;
                case 1: // Diamond
                    ctx.moveTo(x, y - s);
                    ctx.lineTo(x + s * 0.6, y);
                    ctx.lineTo(x, y + s);
                    ctx.lineTo(x - s * 0.6, y);
                    ctx.closePath();
                    break;
                case 2: // Cross
                    const t = s * 0.3;
                    ctx.moveTo(x - t, y - s);
                    ctx.lineTo(x + t, y - s);
                    ctx.lineTo(x + t, y - t);
                    ctx.lineTo(x + s, y - t);
                    ctx.lineTo(x + s, y + t);
                    ctx.lineTo(x + t, y + t);
                    ctx.lineTo(x + t, y + s);
                    ctx.lineTo(x - t, y + s);
                    ctx.lineTo(x - t, y + t);
                    ctx.lineTo(x - s, y + t);
                    ctx.lineTo(x - s, y - t);
                    ctx.lineTo(x - t, y - t);
                    ctx.closePath();
                    break;
                case 3: // Circle
                    ctx.arc(x, y, s * 0.5, 0, Math.PI * 2);
                    break;
            }
        }

        function draw() {
            const pp = parseInt(patternPeriodEl.value);
            const lp = parseInt(lensPeriodEl.value);
            const shapeIdx = parseInt(shapeEl.value);
            const lensOp = parseFloat(lensOpEl.value);

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            // Draw micro-pattern layer
            ctx.fillStyle = '#8A9A5B';
            ctx.globalAlpha = 0.8;
            const nx = Math.ceil(W / pp) + 2;
            const ny = Math.ceil(H / pp) + 2;
            for (let row = -1; row <= ny; row++) {
                for (let col = -1; col <= nx; col++) {
                    drawMicroShape(col * pp, row * pp, pp, shapeIdx);
                    ctx.fill();
                }
            }

            // Draw lens array (opaque grid with holes)
            ctx.globalAlpha = 1;
            const shiftX = (mouseX - W / 2) * 0.15;
            const shiftY = (mouseY - H / 2) * 0.15;

            // Create lens mask using destination-out approach
            ctx.fillStyle = `rgba(10,10,10,${lensOp})`;
            ctx.fillRect(0, 0, W, H);

            // Cut circular holes in the mask
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'white';
            const lnx = Math.ceil(W / lp) + 4;
            const lny = Math.ceil(H / lp) + 4;
            const holeR = lp * 0.3;
            for (let row = -2; row <= lny; row++) {
                for (let col = -2; col <= lnx; col++) {
                    ctx.beginPath();
                    ctx.arc(col * lp + shiftX, row * lp + shiftY, holeR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalCompositeOperation = 'source-over';

            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            patternPeriodEl.value = 14;
            lensPeriodEl.value = 15;
            shapeEl.value = 0;
            lensOpEl.value = 0.7;
            mouseX = W / 2; mouseY = H / 2;
            updateLabels();
        };
    </script>
</body>
</html>
