<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperbolic Moire Patterns - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 300px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Hyperbolic Moire</strong><br>
        When concentric circles overlap with a parallel-line grating, the moire fringes trace out conic sections: ellipses, parabolas, and hyperbolas. Move mouse to reposition the circle center. The mathematics of interference and geometry unite beautifully.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Ring Spacing</label>
            <input type="range" id="ringSpace" min="4" max="24" value="10" step="1">
            <div class="value" id="ringSpaceVal">10px</div>
        </div>
        <div class="control-group">
            <label>Line Spacing</label>
            <input type="range" id="lineSpace" min="4" max="24" value="10" step="1">
            <div class="value" id="lineSpaceVal">10px</div>
        </div>
        <div class="control-group">
            <label>Line Angle</label>
            <input type="range" id="lineAngle" min="0" max="90" value="0" step="1">
            <div class="value" id="lineAngleVal">0&deg;</div>
        </div>
        <div class="control-group">
            <label>Line Width</label>
            <input type="range" id="lw" min="0.3" max="3" value="0.8" step="0.1">
            <div class="value" id="lwVal">0.8</div>
        </div>
        <div class="control-group">
            <label>Auto Drift</label>
            <input type="range" id="drift" min="0" max="100" value="30" step="5">
            <div class="value" id="driftVal">30</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX, mouseY;
        let useAuto = true;
        let autoT = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            mouseX = W / 2;
            mouseY = H / 2 - 50;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            useAuto = false;
        });
        document.addEventListener('mouseleave', () => { useAuto = true; });

        const ringSpaceEl = document.getElementById('ringSpace');
        const lineSpaceEl = document.getElementById('lineSpace');
        const lineAngleEl = document.getElementById('lineAngle');
        const lwEl = document.getElementById('lw');
        const driftEl = document.getElementById('drift');

        function updateLabels() {
            document.getElementById('ringSpaceVal').textContent = ringSpaceEl.value + 'px';
            document.getElementById('lineSpaceVal').textContent = lineSpaceEl.value + 'px';
            document.getElementById('lineAngleVal').innerHTML = lineAngleEl.value + '&deg;';
            document.getElementById('lwVal').textContent = parseFloat(lwEl.value).toFixed(1);
            document.getElementById('driftVal').textContent = driftEl.value;
        }
        [ringSpaceEl, lineSpaceEl, lineAngleEl, lwEl, driftEl].forEach(el => el.addEventListener('input', updateLabels));

        function draw() {
            const ringSpace = parseInt(ringSpaceEl.value);
            const lineSpace = parseInt(lineSpaceEl.value);
            const lineAngle = parseInt(lineAngleEl.value) * Math.PI / 180;
            const lw = parseFloat(lwEl.value);
            const driftSpeed = parseInt(driftEl.value);

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            let cx, cy;
            if (useAuto && driftSpeed > 0) {
                autoT += driftSpeed * 0.0002;
                const path = Math.min(W, H) * 0.2;
                cx = W / 2 + Math.cos(autoT) * path;
                cy = H / 2 + Math.sin(autoT * 0.7) * path * 0.5;
            } else {
                cx = mouseX;
                cy = mouseY;
            }

            // Draw concentric circles
            const diag = Math.sqrt(W * W + H * H);
            const maxRings = Math.ceil(diag / ringSpace);

            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            for (let i = 1; i <= maxRings; i++) {
                const r = i * ringSpace;
                ctx.moveTo(cx + r, cy);
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
            }
            ctx.stroke();

            // Draw parallel lines
            ctx.strokeStyle = '#DDA15E';
            ctx.globalAlpha = 0.5;
            ctx.save();
            ctx.translate(W / 2, H / 2);
            ctx.rotate(lineAngle);
            const maxLines = Math.ceil(diag / lineSpace) + 2;
            ctx.beginPath();
            for (let i = -maxLines; i <= maxLines; i++) {
                const y = i * lineSpace;
                ctx.moveTo(-diag, y);
                ctx.lineTo(diag, y);
            }
            ctx.stroke();
            ctx.restore();

            ctx.globalAlpha = 1;
            animId = requestAnimationFrame(draw);
        }

        draw();
        updateLabels();

        window.reset = function() {
            ringSpaceEl.value = 10;
            lineSpaceEl.value = 10;
            lineAngleEl.value = 0;
            lwEl.value = 0.8;
            driftEl.value = 30;
            useAuto = true;
            autoT = 0;
            updateLabels();
        };
    </script>
</body>
</html>
