<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotational Circular Moire - Moire Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 16px; display: flex; gap: 24px;
            align-items: center; z-index: 1000; border: 1px solid rgba(138,154,91,0.3);
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: #8A9A5B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .control-group input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; text-align: center; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.85rem;
            background: rgba(30,30,30,0.7); padding: 10px 14px; border-radius: 10px;
            backdrop-filter: blur(10px); max-width: 280px; line-height: 1.4;
            border: 1px solid rgba(138,154,91,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <strong style="color:#DDA15E;">Rotational Circular Moire</strong><br>
        Two sets of concentric circles centered at different points create mesmerizing interference. Move mouse to reposition the second set. Adjust ring spacing and count.
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Ring Spacing</label>
            <input type="range" id="spacing" min="4" max="30" value="12" step="1">
            <div class="value" id="spacingVal">12px</div>
        </div>
        <div class="control-group">
            <label>Max Rings</label>
            <input type="range" id="rings" min="20" max="200" value="80" step="5">
            <div class="value" id="ringsVal">80</div>
        </div>
        <div class="control-group">
            <label>Line Width</label>
            <input type="range" id="lw" min="0.3" max="3" value="1" step="0.1">
            <div class="value" id="lwVal">1.0</div>
        </div>
        <div class="control-group">
            <label>Auto-Rotate</label>
            <input type="range" id="autoSpeed" min="0" max="100" value="30" step="5">
            <div class="value" id="autoSpeedVal">30</div>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX, mouseY;
        let autoAngle = 0;
        let useAuto = true;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            mouseX = W / 2 + 50;
            mouseY = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            useAuto = false;
        });

        document.addEventListener('mouseleave', () => { useAuto = true; });

        const spacingEl = document.getElementById('spacing');
        const ringsEl = document.getElementById('rings');
        const lwEl = document.getElementById('lw');
        const autoSpeedEl = document.getElementById('autoSpeed');

        function updateLabels() {
            document.getElementById('spacingVal').textContent = spacingEl.value + 'px';
            document.getElementById('ringsVal').textContent = ringsEl.value;
            document.getElementById('lwVal').textContent = parseFloat(lwEl.value).toFixed(1);
            document.getElementById('autoSpeedVal').textContent = autoSpeedEl.value;
        }

        [spacingEl, ringsEl, lwEl, autoSpeedEl].forEach(el => el.addEventListener('input', updateLabels));

        function drawConcentricCircles(cx, cy, spacing, maxRings, color, lw) {
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.globalAlpha = 0.55;
            ctx.beginPath();
            for (let i = 1; i <= maxRings; i++) {
                const r = i * spacing;
                ctx.moveTo(cx + r, cy);
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
            }
            ctx.stroke();
        }

        function draw(t) {
            const spacing = parseFloat(spacingEl.value);
            const maxRings = parseInt(ringsEl.value);
            const lw = parseFloat(lwEl.value);
            const speed = parseInt(autoSpeedEl.value);

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);

            const cx1 = W / 2;
            const cy1 = H / 2;

            let cx2, cy2;
            if (useAuto && speed > 0) {
                autoAngle += speed * 0.0003;
                const radius = Math.min(W, H) * 0.15;
                cx2 = cx1 + Math.cos(autoAngle) * radius;
                cy2 = cy1 + Math.sin(autoAngle) * radius;
            } else {
                cx2 = mouseX;
                cy2 = mouseY;
            }

            drawConcentricCircles(cx1, cy1, spacing, maxRings, '#8A9A5B', lw);
            drawConcentricCircles(cx2, cy2, spacing, maxRings, '#DDA15E', lw);

            animId = requestAnimationFrame(draw);
        }

        draw(0);
        updateLabels();

        window.reset = function() {
            spacingEl.value = 12;
            ringsEl.value = 80;
            lwEl.value = 1;
            autoSpeedEl.value = 30;
            useAuto = true;
            autoAngle = 0;
            updateLabels();
        };
    </script>
</body>
</html>
