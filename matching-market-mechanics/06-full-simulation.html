<style>

</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>

<div id="top-bar">
  <button id="btn-gen">Generate Students</button>
  <div class="sep"></div>
  <button id="btn-ed" disabled>Run ED</button>
  <button id="btn-rd" disabled>Run RD</button>
  <button id="btn-may" disabled>May 1st</button>
  <button id="btn-cascade" disabled>Waitlist Cascade</button>
  <div class="sep"></div>
  <button id="btn-auto" disabled>Full Auto</button>
  <button id="btn-reset">Reset</button>
  <div class="sep"></div>
  <label>Speed</label>
  <input type="range" id="speed-slider" min="1" max="10" value="5">
  <span id="status-text">Ready</span>
</div>

<div id="grid">
  <div class="panel" id="scatter-panel">
    <div class="panel-title">Student Distribution (GPA vs SAT)</div>
    <div class="panel-body"><canvas id="scatter-canvas"></canvas>
      <div class="legend" id="scatter-legend"></div>
    </div>
  </div>
  <div class="panel" id="school-panel">
    <div class="panel-title">School Enrollment Dashboard</div>
    <div class="panel-body"><canvas id="school-canvas"></canvas></div>
  </div>
  <div class="panel" id="dynamics-panel">
    <div class="panel-title">Market Dynamics</div>
    <div class="panel-body"><canvas id="dynamics-canvas"></canvas></div>
  </div>
  <div class="panel" id="inspector-panel">
    <div class="panel-title">Inspector (click a student or school)</div>
    <div class="panel-body" id="inspector">
      <div style="color:#666;padding:20px;text-align:center;">Generate students and click on a dot or school bar to inspect.</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & CONFIGURATION
// ============================================================
const ARCHETYPES = [
  {name:'Academic Star',    color:'#3b82f6', gpaMu:3.9, gpaSig:0.08, satMu:1550,satSig:25, rho:0.7, listMu:12},
  {name:'Well-Rounded',     color:'#22c55e', gpaMu:3.7, gpaSig:0.15, satMu:1480,satSig:50, rho:0.5, listMu:10},
  {name:'Test Ace',         color:'#f59e0b', gpaMu:3.5, gpaSig:0.2,  satMu:1560,satSig:20, rho:0.3, listMu:9},
  {name:'GPA Grinder',      color:'#ef4444', gpaMu:3.85,gpaSig:0.1,  satMu:1400,satSig:60, rho:0.4, listMu:10},
  {name:'Creative Talent',  color:'#a855f7', gpaMu:3.5, gpaSig:0.25, satMu:1380,satSig:70, rho:0.2, listMu:8},
  {name:'STEM Focused',     color:'#06b6d4', gpaMu:3.6, gpaSig:0.18, satMu:1520,satSig:40, rho:0.6, listMu:11},
  {name:'Legacy Applicant', color:'#f472b6', gpaMu:3.4, gpaSig:0.25, satMu:1420,satSig:65, rho:0.3, listMu:7},
  {name:'Safety Seeker',    color:'#94a3b8', gpaMu:3.3, gpaSig:0.3,  satMu:1350,satSig:80, rho:0.2, listMu:6}
];

const ARCH_WEIGHTS = [0.12, 0.20, 0.08, 0.15, 0.10, 0.13, 0.07, 0.15];

const SCHOOLS = [
  // Tier 1
  {name:'Harvard',   abbr:'HAR', tier:1, seats:1700, threshold:3.3, edPct:0.55},
  {name:'Stanford',  abbr:'STA', tier:1, seats:1700, threshold:3.4, edPct:0.50},
  {name:'MIT',       abbr:'MIT', tier:1, seats:1600, threshold:3.5, edPct:0.45},
  {name:'Yale',      abbr:'YAL', tier:1, seats:1650, threshold:3.2, edPct:0.55},
  {name:'Princeton', abbr:'PRI', tier:1, seats:1800, threshold:3.0, edPct:0.50},
  // Tier 2
  {name:'Columbia',    abbr:'COL', tier:2, seats:1500, threshold:2.8, edPct:0.45},
  {name:'UChicago',    abbr:'UCH', tier:2, seats:1800, threshold:2.5, edPct:0.50},
  {name:'Duke',        abbr:'DUK', tier:2, seats:1700, threshold:2.6, edPct:0.50},
  {name:'Penn',        abbr:'PEN', tier:2, seats:1600, threshold:2.4, edPct:0.45},
  {name:'Caltech',     abbr:'CIT', tier:2, seats:1400, threshold:2.7, edPct:0.40},
  {name:'Northwestern',abbr:'NW',  tier:2, seats:1700, threshold:2.3, edPct:0.45},
  // Tier 3
  {name:'Johns Hopkins',abbr:'JHU', tier:3, seats:1400, threshold:2.0, edPct:0.50},
  {name:'Dartmouth',    abbr:'DAR', tier:3, seats:1200, threshold:2.2, edPct:0.50},
  {name:'Brown',        abbr:'BRO', tier:3, seats:1600, threshold:1.8, edPct:0.45},
  {name:'Cornell',      abbr:'COR', tier:3, seats:1700, threshold:1.5, edPct:0.40},
  {name:'Rice',         abbr:'RIC', tier:3, seats:1300, threshold:2.1, edPct:0.45},
  {name:'Vanderbilt',   abbr:'VAN', tier:3, seats:1600, threshold:1.7, edPct:0.40},
  {name:'WashU',        abbr:'WAS', tier:3, seats:1500, threshold:1.6, edPct:0.45},
  // Tier 4
  {name:'Georgetown',abbr:'GEO', tier:4, seats:2200, threshold:1.3, edPct:0.35},
  {name:'UCLA',      abbr:'UCL', tier:4, seats:6000, threshold:1.0, edPct:0.20},
  {name:'USC',       abbr:'USC', tier:4, seats:3400, threshold:1.1, edPct:0.30},
  {name:'UMich',     abbr:'UMI', tier:4, seats:4500, threshold:0.9, edPct:0.25},
  {name:'UVA',       abbr:'UVA', tier:4, seats:3800, threshold:1.0, edPct:0.25},
  {name:'Emory',     abbr:'EMO', tier:4, seats:2000, threshold:1.2, edPct:0.40},
  {name:'NYU',       abbr:'NYU', tier:4, seats:3500, threshold:0.8, edPct:0.30},
  // Tier 5
  {name:'Tufts',     abbr:'TUF', tier:5, seats:1400, threshold:0.7, edPct:0.45},
  {name:'BC',        abbr:'BC',  tier:5, seats:1200, threshold:0.6, edPct:0.40},
  {name:'Middlebury',abbr:'MID', tier:5, seats:700,  threshold:0.5, edPct:0.50},
  {name:'Colby',     abbr:'CLB', tier:5, seats:600,  threshold:0.4, edPct:0.45},
  {name:'Hamilton',  abbr:'HAM', tier:5, seats:650,  threshold:0.3, edPct:0.45},
  // Not using Bates, already have 30
];

const TIER_COLORS = {1:'#ef4444',2:'#f59e0b',3:'#22c55e',4:'#3b82f6',5:'#94a3b8'};
const NUM_STUDENTS = 4000;

// ============================================================
// STATE
// ============================================================
let students = [];
let schools = [];
let phase = 'init'; // init, generated, ed_done, rd_done, may_done, cascade_done
let dynamicsHistory = []; // {round, pctMatched, avgFill, churn}
let selectedStudent = null;
let selectedSchool = null;
let animFrame = null;
let autoRunning = false;

// ============================================================
// MATH UTILITIES
// ============================================================
function randn() {
  let u=0,v=0;
  while(u===0)u=Math.random();
  while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function bivariateNormal(mu1,sig1,mu2,sig2,rho) {
  const z1=randn(), z2=randn();
  const x1=mu1+sig1*z1;
  const x2=mu2+sig2*(rho*z1+Math.sqrt(1-rho*rho)*z2);
  return [x1,x2];
}

function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}

function logistic(x){return 1/(1+Math.exp(-x));}

function lognormalSample(mu,sigma){return Math.exp(mu+sigma*randn());}

function pickWeighted(weights) {
  let r=Math.random(), s=0;
  for(let i=0;i<weights.length;i++){s+=weights[i];if(r<s)return i;}
  return weights.length-1;
}

// ============================================================
// STUDENT GENERATION
// ============================================================
function generateStudents() {
  students = [];
  for(let i=0;i<NUM_STUDENTS;i++){
    const ai = pickWeighted(ARCH_WEIGHTS);
    const a = ARCHETYPES[ai];
    let [gpa,sat] = bivariateNormal(a.gpaMu,a.gpaSig,a.satMu,a.satSig,a.rho);
    gpa = clamp(gpa, 2.0, 4.0);
    sat = clamp(Math.round(sat/10)*10, 1000, 1600);

    const hooks = [];
    if(Math.random()<0.08) hooks.push('athlete');
    if(Math.random()<0.10) hooks.push('legacy');
    if(Math.random()<0.05) hooks.push('donor');
    if(Math.random()<0.12) hooks.push('firstgen');
    if(Math.random()<0.10) hooks.push('urm');

    students.push({
      id: i,
      archetype: ai,
      gpa: gpa,
      sat: sat,
      hooks: hooks,
      applications: [],  // [{schoolIdx, phase, status, logitScore, utility}]
      edChoice: -1,
      committed: -1,     // school index committed to
      matched: false
    });
  }

  // Initialize schools state
  schools = SCHOOLS.map((s,idx)=>({
    ...s,
    idx: idx,
    edFilled: 0,
    rdFilled: 0,
    wlFilled: 0,
    edApplicants: [],
    rdApplicants: [],
    waitlist: [],
    admitted: [],
    enrolledStudents: [],
    targetClass: Math.round(s.seats * (0.35 + Math.random()*0.15)), // target ~40-50% of seats as incoming class
  }));

  // Scale down for simulation: target class = seats for this sim
  // Actually let's use seats as the actual class size target
  schools.forEach(s => s.targetClass = s.seats);

  buildApplicationLists();
  phase = 'generated';
  selectedStudent = null;
  selectedSchool = null;
  dynamicsHistory = [];
  recordDynamics('Gen');
  updateButtons();
  renderAll();
  setStatus('Generated '+NUM_STUDENTS+' students across '+SCHOOLS.length+' schools');
}

// ============================================================
// APPLICATION LIST BUILDING
// ============================================================
function computeUtility(student, schoolIdx) {
  const s = schools[schoolIdx];
  const gpaNorm = (student.gpa - 2.0) / 2.0;
  const satNorm = (student.sat - 1000) / 600;
  const quality = gpaNorm * 0.5 + satNorm * 0.5;

  // Prestige component (tier 1 = highest prestige)
  const prestige = (6 - s.tier) * 1.2;

  // Fit: some randomness per student-school pair
  const fitSeed = ((student.id * 31 + schoolIdx * 17) % 1000) / 1000;
  const fit = (fitSeed - 0.5) * 2.0;

  // Legacy bonus
  let legacyBonus = 0;
  if(student.hooks.includes('legacy')) legacyBonus = 0.8;
  if(student.hooks.includes('donor')) legacyBonus += 1.2;

  // Admission probability estimate (rough)
  const admitLogit = quality * 3 - s.threshold;
  const pAdmit = logistic(admitLogit);
  const safetyTerm = 5 * Math.log(Math.max(pAdmit, 0.01));

  return prestige + fit + legacyBonus + safetyTerm;
}

function computeLogitScore(student, schoolIdx) {
  const s = schools[schoolIdx];
  const gpaNorm = (student.gpa - 2.0) / 2.0;
  const satNorm = (student.sat - 1000) / 600;

  let score = gpaNorm * 2.0 + satNorm * 2.0 - s.threshold;

  // Hook bonuses in admission
  if(student.hooks.includes('athlete')) score += 0.8;
  if(student.hooks.includes('legacy')) score += 0.6;
  if(student.hooks.includes('donor')) score += 1.0;
  if(student.hooks.includes('firstgen')) score += 0.3;
  if(student.hooks.includes('urm')) score += 0.4;

  // Small random factor
  const noise = ((student.id * 7 + schoolIdx * 13) % 100) / 100 * 0.4 - 0.2;
  score += noise;

  return score;
}

function buildApplicationLists() {
  for(const student of students) {
    const a = ARCHETYPES[student.archetype];
    let K = Math.round(clamp(lognormalSample(Math.log(a.listMu), 0.3), 3, 25));

    // Compute utility for all schools
    const utils = schools.map((_,j) => ({idx:j, util:computeUtility(student,j)}));
    utils.sort((a,b) => b.util - a.util);

    // Pick top K
    const topK = utils.slice(0, K);

    student.applications = topK.map(u => ({
      schoolIdx: u.idx,
      phase: 'pending',
      status: 'pending',
      logitScore: computeLogitScore(student, u.idx),
      utility: u.util
    }));

    // ED choice: highest utility school that's not tier 4/5 (or sometimes is)
    if(student.applications.length > 0 && Math.random() < 0.65) {
      // Pick from top 3 if available
      const edCandidates = student.applications.slice(0, Math.min(3, student.applications.length));
      const pick = edCandidates[Math.floor(Math.random()*edCandidates.length)];
      student.edChoice = pick.schoolIdx;
      pick.phase = 'ED';
    }
  }

  // Populate school applicant lists
  for(const student of students) {
    for(const app of student.applications) {
      if(app.phase === 'ED') {
        schools[app.schoolIdx].edApplicants.push(student.id);
      }
    }
  }
}

// ============================================================
// EARLY DECISION
// ============================================================
function runEarlyDecision() {
  for(const school of schools) {
    const edTarget = Math.round(school.targetClass * school.edPct);

    // Score and sort ED applicants
    const scored = school.edApplicants.map(sid => {
      const st = students[sid];
      const app = st.applications.find(a => a.schoolIdx === school.idx);
      return {sid, score: app.logitScore};
    });
    scored.sort((a,b) => b.score - a.score);

    // Admit top edTarget
    const toAdmit = Math.min(edTarget, scored.length);
    for(let i=0; i<scored.length; i++) {
      const st = students[scored[i].sid];
      const app = st.applications.find(a => a.schoolIdx === school.idx);
      if(i < toAdmit) {
        app.status = 'ed_accepted';
        st.committed = school.idx;
        st.matched = true;
        school.edFilled++;
        school.admitted.push(scored[i].sid);
        school.enrolledStudents.push(scored[i].sid);
        // Remove this student from all other applications
        for(const otherApp of st.applications) {
          if(otherApp.schoolIdx !== school.idx && otherApp.status === 'pending') {
            otherApp.status = 'withdrawn';
          }
        }
      } else {
        app.status = 'ed_rejected';
        app.phase = 'RD'; // deferred to RD
        app.status = 'deferred';
      }
    }
  }

  // Move remaining pending apps to RD phase
  for(const student of students) {
    for(const app of student.applications) {
      if(app.phase === 'pending') app.phase = 'RD';
    }
  }

  // Build RD applicant lists
  for(const school of schools) {
    school.rdApplicants = [];
  }
  for(const student of students) {
    if(student.committed >= 0) continue;
    for(const app of student.applications) {
      if(app.phase === 'RD' && (app.status === 'pending' || app.status === 'deferred')) {
        schools[app.schoolIdx].rdApplicants.push(student.id);
      }
    }
  }

  phase = 'ed_done';
  recordDynamics('ED');
  updateButtons();
  renderAll();
  setStatus('ED complete. '+students.filter(s=>s.matched).length+' students committed.');
}

// ============================================================
// REGULAR DECISION
// ============================================================
function runRegularDecision() {
  for(const school of schools) {
    const remaining = school.targetClass - school.edFilled;
    if(remaining <= 0) continue;

    // Over-admit by yield factor: admit ~2-4x remaining to account for yield
    const yieldFactor = school.tier === 1 ? 1.8 : school.tier === 2 ? 2.2 : school.tier === 3 ? 2.5 : school.tier === 4 ? 1.5 : 1.3;
    const toAdmitTarget = Math.round(remaining * yieldFactor);

    const scored = school.rdApplicants.map(sid => {
      const st = students[sid];
      const app = st.applications.find(a => a.schoolIdx === school.idx);
      if(!app) return null;
      let score = app.logitScore;
      // Yield protection: penalize overqualified students with no hooks
      const gpaNorm = (st.gpa - 2.0) / 2.0;
      const satNorm = (st.sat - 1000) / 600;
      const quality = gpaNorm * 0.5 + satNorm * 0.5;
      if(quality > 0.9 && school.tier >= 3 && st.hooks.length === 0) {
        score -= 0.5; // yield protection
      }
      return {sid, score};
    }).filter(Boolean);

    scored.sort((a,b) => b.score - a.score);

    const toAdmit = Math.min(toAdmitTarget, scored.length);
    const waitlistTarget = Math.min(Math.round(remaining * 0.5), scored.length - toAdmit);

    for(let i=0; i<scored.length; i++) {
      const st = students[scored[i].sid];
      const app = st.applications.find(a => a.schoolIdx === school.idx);
      if(!app) continue;
      if(i < toAdmit) {
        app.status = 'rd_accepted';
        school.admitted.push(scored[i].sid);
      } else if(i < toAdmit + waitlistTarget) {
        app.status = 'waitlisted';
        school.waitlist.push({sid: scored[i].sid, score: scored[i].score});
      } else {
        app.status = 'rd_rejected';
      }
    }

    school.waitlist.sort((a,b) => b.score - a.score);
  }

  phase = 'rd_done';
  recordDynamics('RD');
  updateButtons();
  renderAll();
  const accepted = students.filter(s => s.applications.some(a => a.status === 'rd_accepted' || a.status === 'ed_accepted'));
  setStatus('RD complete. '+accepted.length+' students have at least one acceptance.');
}

// ============================================================
// MAY 1ST DECISION
// ============================================================
function runMay1st() {
  for(const student of students) {
    if(student.committed >= 0) continue; // already ED committed

    // Find all acceptances
    const acceptances = student.applications.filter(a => a.status === 'rd_accepted');
    if(acceptances.length === 0) continue;

    // Pick highest utility
    acceptances.sort((a,b) => b.utility - a.utility);
    const choice = acceptances[0];
    choice.status = 'committed';
    student.committed = choice.schoolIdx;
    student.matched = true;
    schools[choice.schoolIdx].rdFilled++;
    schools[choice.schoolIdx].enrolledStudents.push(student.id);

    // Mark others as declined
    for(const app of acceptances.slice(1)) {
      app.status = 'declined';
    }
  }

  phase = 'may_done';
  recordDynamics('May1');
  updateButtons();
  renderAll();
  setStatus('May 1st decisions. '+students.filter(s=>s.matched).length+' matched. Starting waitlist...');
}

// ============================================================
// WAITLIST CASCADE
// ============================================================
function runCascade() {
  let totalChurn = 0;
  const MAX_ROUNDS = 5;

  for(let round = 0; round < MAX_ROUNDS; round++) {
    let roundChurn = 0;

    for(const school of schools) {
      const currentFill = school.enrolledStudents.length;
      const vacancies = school.targetClass - currentFill;
      if(vacancies <= 0 || school.waitlist.length === 0) continue;

      const toPull = Math.min(vacancies, school.waitlist.length);
      const pulled = school.waitlist.splice(0, toPull);

      for(const {sid} of pulled) {
        const st = students[sid];
        if(st.committed >= 0) {
          // Student already committed elsewhere; check if this is better
          const currentApp = st.applications.find(a => a.schoolIdx === st.committed);
          const newApp = st.applications.find(a => a.schoolIdx === school.idx);
          if(newApp && currentApp && newApp.utility > currentApp.utility) {
            // Switch: leave old school
            const oldSchool = schools[st.committed];
            oldSchool.enrolledStudents = oldSchool.enrolledStudents.filter(id => id !== sid);
            if(currentApp.status === 'committed') oldSchool.rdFilled--;
            else oldSchool.wlFilled--;
            currentApp.status = 'abandoned';

            // Join new school
            newApp.status = 'wl_accepted';
            st.committed = school.idx;
            school.wlFilled++;
            school.enrolledStudents.push(sid);
            roundChurn++;
          }
          // else: student declines waitlist offer
        } else {
          // Student not yet matched
          const app = st.applications.find(a => a.schoolIdx === school.idx);
          if(app) {
            app.status = 'wl_accepted';
            st.committed = school.idx;
            st.matched = true;
            school.wlFilled++;
            school.enrolledStudents.push(sid);
            roundChurn++;
          }
        }
      }
    }

    totalChurn += roundChurn;
    recordDynamics('WL'+(round+1), roundChurn);
    if(roundChurn === 0) break;
  }

  phase = 'cascade_done';
  updateButtons();
  renderAll();
  setStatus('Cascade done. '+students.filter(s=>s.matched).length+'/'+NUM_STUDENTS+' matched. Churn: '+totalChurn);
}

// ============================================================
// DYNAMICS TRACKING
// ============================================================
function recordDynamics(label, churn) {
  const matched = students.filter(s=>s.matched).length;
  const pctMatched = matched / NUM_STUDENTS * 100;
  let totalFill = 0, totalSeats = 0;
  for(const s of schools) {
    totalFill += s.enrolledStudents.length;
    totalSeats += s.targetClass;
  }
  const avgFill = totalSeats > 0 ? totalFill / totalSeats * 100 : 0;
  dynamicsHistory.push({label, pctMatched, avgFill, churn: churn||0});
}

// ============================================================
// AUTO RUN
// ============================================================
async function fullAuto() {
  autoRunning = true;
  document.getElementById('btn-auto').classList.add('active');
  const delay = () => new Promise(r => setTimeout(r, (11 - document.getElementById('speed-slider').value) * 100));

  if(phase === 'init') { generateStudents(); await delay(); }
  if(phase === 'generated') { runEarlyDecision(); await delay(); }
  if(phase === 'ed_done') { runRegularDecision(); await delay(); }
  if(phase === 'rd_done') { runMay1st(); await delay(); }
  if(phase === 'may_done') { runCascade(); }

  autoRunning = false;
  document.getElementById('btn-auto').classList.remove('active');
}

// ============================================================
// UI HELPERS
// ============================================================
function setStatus(t) { document.getElementById('status-text').textContent = t; }

function updateButtons() {
  document.getElementById('btn-ed').disabled = phase !== 'generated';
  document.getElementById('btn-rd').disabled = phase !== 'ed_done';
  document.getElementById('btn-may').disabled = phase !== 'rd_done';
  document.getElementById('btn-cascade').disabled = phase !== 'may_done';
  document.getElementById('btn-auto').disabled = phase === 'cascade_done' || autoRunning;
}

function reset() {
  students = [];
  schools = [];
  phase = 'init';
  dynamicsHistory = [];
  selectedStudent = null;
  selectedSchool = null;
  autoRunning = false;
  updateButtons();
  renderAll();
  document.getElementById('inspector').innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Generate students and click on a dot or school bar to inspect.</div>';
  setStatus('Ready');
}

// ============================================================
// RENDERING: SCATTER PLOT
// ============================================================
const scatterCanvas = document.getElementById('scatter-canvas');
const sctx = scatterCanvas.getContext('2d');
let scatterStudentPositions = []; // [{x,y,id}] for hit testing

function renderScatter() {
  const rect = scatterCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  scatterCanvas.width = rect.width * dpr;
  scatterCanvas.height = rect.height * dpr;
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width, H = rect.height;

  sctx.clearRect(0, 0, W, H);
  scatterStudentPositions = [];

  if(students.length === 0) {
    sctx.fillStyle = '#444';
    sctx.font = '14px sans-serif';
    sctx.textAlign = 'center';
    sctx.fillText('Click "Generate Students" to begin', W/2, H/2);
    return;
  }

  const pad = {top:10, right:10, bottom:30, left:42};
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  // Axes
  sctx.strokeStyle = 'rgba(255,255,255,0.15)';
  sctx.lineWidth = 1;
  sctx.beginPath();
  sctx.moveTo(pad.left, pad.top);
  sctx.lineTo(pad.left, pad.top + plotH);
  sctx.lineTo(pad.left + plotW, pad.top + plotH);
  sctx.stroke();

  // Axis labels
  sctx.fillStyle = '#888';
  sctx.font = '10px sans-serif';
  sctx.textAlign = 'center';
  sctx.fillText('SAT Score', pad.left + plotW/2, H - 2);
  sctx.save();
  sctx.translate(10, pad.top + plotH/2);
  sctx.rotate(-Math.PI/2);
  sctx.fillText('GPA', 0, 0);
  sctx.restore();

  // Tick marks
  for(let sat=1000; sat<=1600; sat+=200) {
    const x = pad.left + (sat-1000)/600 * plotW;
    sctx.fillStyle = '#666';
    sctx.textAlign = 'center';
    sctx.fillText(sat, x, pad.top + plotH + 14);
    sctx.strokeStyle = 'rgba(255,255,255,0.05)';
    sctx.beginPath(); sctx.moveTo(x, pad.top); sctx.lineTo(x, pad.top+plotH); sctx.stroke();
  }
  for(let gpa=2.0; gpa<=4.0; gpa+=0.5) {
    const y = pad.top + plotH - (gpa-2.0)/2.0 * plotH;
    sctx.fillStyle = '#666';
    sctx.textAlign = 'right';
    sctx.fillText(gpa.toFixed(1), pad.left - 4, y + 3);
    sctx.strokeStyle = 'rgba(255,255,255,0.05)';
    sctx.beginPath(); sctx.moveTo(pad.left, y); sctx.lineTo(pad.left+plotW, y); sctx.stroke();
  }

  // Plot students
  const r = Math.max(1.5, Math.min(3, plotW / 250));
  for(const st of students) {
    const x = pad.left + (st.sat - 1000)/600 * plotW;
    const y = pad.top + plotH - (st.gpa - 2.0)/2.0 * plotH;
    scatterStudentPositions.push({x, y, id: st.id});

    const arch = ARCHETYPES[st.archetype];
    sctx.beginPath();
    sctx.arc(x, y, r, 0, Math.PI*2);

    if(st.matched) {
      sctx.fillStyle = arch.color;
      sctx.fill();
      // Border = tier color
      if(st.committed >= 0) {
        const tier = schools[st.committed].tier;
        sctx.strokeStyle = TIER_COLORS[tier];
        sctx.lineWidth = 1.5;
        sctx.stroke();
      }
    } else {
      sctx.fillStyle = 'transparent';
      sctx.strokeStyle = arch.color;
      sctx.lineWidth = 0.8;
      sctx.stroke();
    }
  }

  // Highlight selected
  if(selectedStudent !== null) {
    const st = students[selectedStudent];
    const x = pad.left + (st.sat - 1000)/600 * plotW;
    const y = pad.top + plotH - (st.gpa - 2.0)/2.0 * plotH;
    sctx.beginPath();
    sctx.arc(x, y, r+5, 0, Math.PI*2);
    sctx.strokeStyle = '#fbbf24';
    sctx.lineWidth = 2;
    sctx.stroke();
  }

  // Build legend
  const legendEl = document.getElementById('scatter-legend');
  legendEl.innerHTML = ARCHETYPES.map((a,i) => {
    const count = students.filter(s=>s.archetype===i).length;
    return `<span class="legend-item"><span class="legend-dot" style="background:${a.color}"></span>${a.name} (${count})</span>`;
  }).join('');
}

// ============================================================
// RENDERING: SCHOOL ENROLLMENT
// ============================================================
const schoolCanvas = document.getElementById('school-canvas');
const schctx = schoolCanvas.getContext('2d');
let schoolBarPositions = []; // [{y,h,idx}]

function renderSchools() {
  const rect = schoolCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const minH = schools.length * 22 + 40;
  const canvasH = Math.max(rect.height, minH);
  schoolCanvas.width = rect.width * dpr;
  schoolCanvas.height = canvasH * dpr;
  schoolCanvas.style.height = canvasH + 'px';
  schctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width, H = canvasH;

  schctx.clearRect(0, 0, W, H);
  schoolBarPositions = [];

  if(schools.length === 0) {
    schctx.fillStyle = '#444';
    schctx.font = '14px sans-serif';
    schctx.textAlign = 'center';
    schctx.fillText('No data yet', W/2, H/2);
    return;
  }

  const pad = {top:8, right:12, bottom:8, left:50};
  const barH = Math.min(16, (H - pad.top - pad.bottom) / schools.length - 3);
  const gap = 2;
  const maxSeats = Math.max(...schools.map(s => s.targetClass));
  const barAreaW = W - pad.left - pad.right - 80;

  // Header
  schctx.fillStyle = '#888';
  schctx.font = '9px sans-serif';
  schctx.textAlign = 'left';

  for(let i=0; i<schools.length; i++) {
    const s = schools[i];
    const y = pad.top + i * (barH + gap);
    schoolBarPositions.push({y, h: barH, idx: i});

    // School name
    schctx.fillStyle = TIER_COLORS[s.tier];
    schctx.font = '10px sans-serif';
    schctx.textAlign = 'right';
    schctx.fillText(s.abbr, pad.left - 4, y + barH - 2);

    // Background bar (total capacity)
    const totalW = (s.targetClass / maxSeats) * barAreaW;
    schctx.fillStyle = 'rgba(255,255,255,0.05)';
    schctx.fillRect(pad.left, y, totalW, barH);

    // Stacked fills
    let xOff = pad.left;
    const edW = (s.edFilled / maxSeats) * barAreaW;
    const rdW = (s.rdFilled / maxSeats) * barAreaW;
    const wlW = (s.wlFilled / maxSeats) * barAreaW;

    if(edW > 0) {
      schctx.fillStyle = 'rgba(168,85,247,0.7)'; // purple for ED
      schctx.fillRect(xOff, y, edW, barH);
      xOff += edW;
    }
    if(rdW > 0) {
      schctx.fillStyle = 'rgba(59,130,246,0.7)'; // blue for RD
      schctx.fillRect(xOff, y, rdW, barH);
      xOff += rdW;
    }
    if(wlW > 0) {
      schctx.fillStyle = 'rgba(251,191,36,0.7)'; // yellow for WL
      schctx.fillRect(xOff, y, wlW, barH);
      xOff += wlW;
    }

    // Stats text
    const filled = s.enrolledStudents.length;
    const pct = s.targetClass > 0 ? Math.round(filled / s.targetClass * 100) : 0;
    schctx.fillStyle = '#aaa';
    schctx.font = '9px sans-serif';
    schctx.textAlign = 'left';
    schctx.fillText(filled+'/'+s.targetClass+' ('+pct+'%)', pad.left + totalW + 4, y + barH - 2);

    // Highlight selected
    if(selectedSchool === i) {
      schctx.strokeStyle = '#fbbf24';
      schctx.lineWidth = 1.5;
      schctx.strokeRect(pad.left - 1, y - 1, totalW + 2, barH + 2);
    }
  }

  // Legend for bar colors
  const ly = H - 18;
  const items = [
    {color:'rgba(168,85,247,0.7)', label:'ED'},
    {color:'rgba(59,130,246,0.7)', label:'RD'},
    {color:'rgba(251,191,36,0.7)', label:'Waitlist'},
    {color:'rgba(255,255,255,0.05)', label:'Empty'}
  ];
  let lx = pad.left;
  schctx.font = '9px sans-serif';
  for(const item of items) {
    schctx.fillStyle = item.color;
    schctx.fillRect(lx, ly, 12, 10);
    schctx.strokeStyle = 'rgba(255,255,255,0.2)';
    schctx.strokeRect(lx, ly, 12, 10);
    schctx.fillStyle = '#999';
    schctx.textAlign = 'left';
    schctx.fillText(item.label, lx+15, ly+9);
    lx += 60;
  }
}

// ============================================================
// RENDERING: DYNAMICS CHART
// ============================================================
const dynCanvas = document.getElementById('dynamics-canvas');
const dctx = dynCanvas.getContext('2d');

function renderDynamics() {
  const rect = dynCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  dynCanvas.width = rect.width * dpr;
  dynCanvas.height = rect.height * dpr;
  dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width, H = rect.height;

  dctx.clearRect(0, 0, W, H);

  if(dynamicsHistory.length === 0) {
    dctx.fillStyle = '#444';
    dctx.font = '14px sans-serif';
    dctx.textAlign = 'center';
    dctx.fillText('No data yet', W/2, H/2);
    return;
  }

  const pad = {top:20, right:14, bottom:32, left:42};
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const n = dynamicsHistory.length;

  // Axes
  dctx.strokeStyle = 'rgba(255,255,255,0.15)';
  dctx.lineWidth = 1;
  dctx.beginPath();
  dctx.moveTo(pad.left, pad.top);
  dctx.lineTo(pad.left, pad.top + plotH);
  dctx.lineTo(pad.left + plotW, pad.top + plotH);
  dctx.stroke();

  // Y axis: 0-100%
  dctx.fillStyle = '#666';
  dctx.font = '9px sans-serif';
  dctx.textAlign = 'right';
  for(let p=0; p<=100; p+=25) {
    const y = pad.top + plotH - (p/100)*plotH;
    dctx.fillText(p+'%', pad.left-4, y+3);
    dctx.strokeStyle = 'rgba(255,255,255,0.05)';
    dctx.beginPath(); dctx.moveTo(pad.left, y); dctx.lineTo(pad.left+plotW, y); dctx.stroke();
  }

  // X labels
  dctx.textAlign = 'center';
  for(let i=0; i<n; i++) {
    const x = pad.left + (n===1 ? plotW/2 : i/(n-1)*plotW);
    dctx.fillStyle = '#888';
    dctx.fillText(dynamicsHistory[i].label, x, pad.top + plotH + 14);
  }

  // Draw lines
  function drawLine(key, color) {
    dctx.strokeStyle = color;
    dctx.lineWidth = 2;
    dctx.beginPath();
    for(let i=0; i<n; i++) {
      const x = pad.left + (n===1 ? plotW/2 : i/(n-1)*plotW);
      const v = dynamicsHistory[i][key];
      const y = pad.top + plotH - (v/100)*plotH;
      if(i===0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
    }
    dctx.stroke();

    // Dots
    for(let i=0; i<n; i++) {
      const x = pad.left + (n===1 ? plotW/2 : i/(n-1)*plotW);
      const v = dynamicsHistory[i][key];
      const y = pad.top + plotH - (v/100)*plotH;
      dctx.beginPath();
      dctx.arc(x, y, 3, 0, Math.PI*2);
      dctx.fillStyle = color;
      dctx.fill();
    }
  }

  drawLine('pctMatched', '#22c55e');
  drawLine('avgFill', '#3b82f6');

  // Churn line (normalized: max churn -> 100%)
  const maxChurn = Math.max(1, ...dynamicsHistory.map(d=>d.churn));
  dctx.strokeStyle = '#f59e0b';
  dctx.lineWidth = 2;
  dctx.setLineDash([4,3]);
  dctx.beginPath();
  for(let i=0; i<n; i++) {
    const x = pad.left + (n===1 ? plotW/2 : i/(n-1)*plotW);
    const v = (dynamicsHistory[i].churn / maxChurn) * 100;
    const y = pad.top + plotH - (v/100)*plotH;
    if(i===0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
  }
  dctx.stroke();
  dctx.setLineDash([]);

  // Legend
  const legends = [
    {color:'#22c55e', label:'% Matched'},
    {color:'#3b82f6', label:'Avg Fill %'},
    {color:'#f59e0b', label:'Churn (norm)'}
  ];
  let lx = pad.left + 4;
  dctx.font = '10px sans-serif';
  for(const l of legends) {
    dctx.fillStyle = l.color;
    dctx.fillRect(lx, pad.top - 14, 12, 8);
    dctx.fillStyle = '#ccc';
    dctx.textAlign = 'left';
    dctx.fillText(l.label, lx+15, pad.top - 6);
    lx += 90;
  }
}

// INSPECTOR

function renderStudentInspector(sid) {
  const st = students[sid];
  const arch = ARCHETYPES[st.archetype];
  let html = '<div class="section"><h4>Student #'+sid+' - '+arch.name+'</h4>';
  html += '<table>';
  html += '<tr><td>GPA</td><td><b>'+st.gpa.toFixed(3)+'</b></td></tr>';
  html += '<tr><td>SAT</td><td><b>'+st.sat+'</b></td></tr>';
  html += '<tr><td>Hooks</td><td>'+(st.hooks.length?st.hooks.map(h=>'<span class="tag" style="background:rgba(251,191,36,0.15);color:#fbbf24;">'+h+'</span>').join(' '):'<span style="color:#666;">none</span>')+'</td></tr>';
  html += '<tr><td>Archetype</td><td><span style="color:'+arch.color+'">'+arch.name+'</span></td></tr>';
  html += '<tr><td>Status</td><td>'+(st.matched?(st.committed>=0?'Committed to <b style="color:'+TIER_COLORS[schools[st.committed].tier]+'">'+schools[st.committed].name+'</b>':'Matched'):'<span style="color:#ef4444;">Unmatched</span>')+'</td></tr>';
  if(st.edChoice >= 0) {
    html += '<tr><td>ED Choice</td><td><span class="ed-tag tag">'+schools[st.edChoice].name+'</span></td></tr>';
  }
  html += '</table></div>';

  html += '<div class="section"><h4>Applications ('+st.applications.length+')</h4>';
  html += '<table><tr style="color:#888;font-size:10px;"><td>School</td><td>Util</td><td>Logit</td><td>Status</td></tr>';
  const sortedApps = [...st.applications].sort((a,b)=>b.utility-a.utility);
  for(const app of sortedApps) {
    const s = schools[app.schoolIdx];
    const statusClass = app.status.includes('accepted')||app.status==='committed'||app.status==='wl_accepted'?'accepted':
                        app.status.includes('rejected')?'rejected':
                        app.status==='waitlisted'?'waitlisted':
                        app.status==='committed'?'committed':'';
    html += '<tr><td style="color:'+TIER_COLORS[s.tier]+'">'+s.abbr+(app.phase==='ED'?' <span class="ed-tag tag">ED</span>':'')+'</td>';
    html += '<td>'+app.utility.toFixed(2)+'</td>';
    html += '<td>'+app.logitScore.toFixed(2)+'</td>';
    html += '<td><span class="tag '+statusClass+'">'+app.status+'</span></td></tr>';
  }
  html += '</table></div>';

  document.getElementById('inspector').innerHTML = html;
}

function renderSchoolInspector(idx) {
  const s = schools[idx];
  const filled = s.enrolledStudents.length;
  const pct = s.targetClass>0 ? (filled/s.targetClass*100).toFixed(1) : 0;
  const yieldRate = s.admitted.length>0 ? (filled/s.admitted.length*100).toFixed(1) : 'N/A';

  let html = '<div class="section"><h4 style="color:'+TIER_COLORS[s.tier]+'">'+s.name+' (Tier '+s.tier+')</h4>';
  html += '<table>';
  html += '<tr><td>Target Class</td><td>'+s.targetClass+'</td></tr>';
  html += '<tr><td>ED Filled</td><td>'+s.edFilled+'</td></tr>';
  html += '<tr><td>RD Filled</td><td>'+s.rdFilled+'</td></tr>';
  html += '<tr><td>WL Filled</td><td>'+s.wlFilled+'</td></tr>';
  html += '<tr><td>Total Enrolled</td><td><b>'+filled+'</b> ('+pct+'%)</td></tr>';
  html += '<tr><td>Total Admitted</td><td>'+s.admitted.length+'</td></tr>';
  html += '<tr><td>Yield Rate</td><td>'+yieldRate+'%</td></tr>';
  html += '<tr><td>Threshold</td><td>'+s.threshold.toFixed(1)+'</td></tr>';
  html += '<tr><td>WL Remaining</td><td>'+s.waitlist.length+'</td></tr>';
  html += '</table></div>';

  // Enrolled student stats
  if(s.enrolledStudents.length > 0) {
    const enrolled = s.enrolledStudents.map(id=>students[id]);
    const avgGPA = enrolled.reduce((a,st)=>a+st.gpa,0)/enrolled.length;
    const avgSAT = enrolled.reduce((a,st)=>a+st.sat,0)/enrolled.length;
    const hookCounts = {};
    enrolled.forEach(st=>st.hooks.forEach(h=>{hookCounts[h]=(hookCounts[h]||0)+1;}));

    html += '<div class="section"><h4>Enrolled Student Stats</h4>';
    html += '<table>';
    html += '<tr><td>Avg GPA</td><td>'+avgGPA.toFixed(3)+'</td></tr>';
    html += '<tr><td>Avg SAT</td><td>'+Math.round(avgSAT)+'</td></tr>';
    if(Object.keys(hookCounts).length) {
      html += '<tr><td>Hooks</td><td>'+Object.entries(hookCounts).map(([k,v])=>k+':'+v).join(', ')+'</td></tr>';
    }
    // Archetype breakdown
    const archCounts = {};
    enrolled.forEach(st=>{const n=ARCHETYPES[st.archetype].name; archCounts[n]=(archCounts[n]||0)+1;});
    html += '<tr><td colspan="2" style="color:#888;padding-top:6px;">Archetype Mix</td></tr>';
    Object.entries(archCounts).sort((a,b)=>b[1]-a[1]).forEach(([name,count])=>{
      const arch = ARCHETYPES.find(a=>a.name===name);
      html += '<tr><td style="color:'+arch.color+'">'+name+'</td><td>'+count+' ('+(count/enrolled.length*100).toFixed(1)+'%)</td></tr>';
    });
    html += '</table></div>';
  }

  document.getElementById('inspector').innerHTML = html;
}

document.getElementById('btn-rd').addEventListener('click', runRegularDecision);
document.getElementById('btn-may').addEventListener('click', runMay1st);

// Click on scatter plot
scatterCanvas.addEventListener('click', function(e) {
  if(students.length === 0) return;
  const rect = scatterCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let closest = null, closestDist = Infinity;
  for(const sp of scatterStudentPositions) {
    const d = Math.sqrt((sp.x-mx)**2 + (sp.y-my)**2);
    if(d < closestDist && d < 15) {
      closest = sp.id;
      closestDist = d;
    }
  }

  if(closest !== null) {
    selectedStudent = closest;
    selectedSchool = null;
    renderScatter();
    renderSchools();
    renderStudentInspector(closest);
  }
});

// Click on school chart
schoolCanvas.addEventListener('click', function(e) {
  if(schools.length === 0) return;
  const rect = schoolCanvas.getBoundingClientRect();
  const my = e.clientY - rect.top;

  for(const bp of schoolBarPositions) {
    if(my >= bp.y && my <= bp.y + bp.h) {
      selectedSchool = bp.idx;
      selectedStudent = null;
      renderScatter();
      renderSchools();
      renderSchoolInspector(bp.idx);
      return;
    }
  }
});

// Resize
let resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderAll, 100);
});

// Initial render
updateButtons();
renderAll();
</script>
</body>
</html>
