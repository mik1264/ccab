<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Clearing Cascade - College Admissions Equilibrium</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0e1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
}
a.back-link {
    position: fixed; top: 10px; left: 10px; padding: 8px 16px;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    border-radius: 6px; font-size: 14px; z-index: 999;
}
a.back-link:hover { background: rgba(0,0,0,0.9); }

#mainCanvas {
    position: absolute; top: 0; left: 0;
}

#controls {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(10, 14, 30, 0.92); border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px; padding: 14px; width: 260px;
    backdrop-filter: blur(8px);
}
#controls h3 { color: #fbbf24; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.ctrl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.ctrl-row label { font-size: 11px; color: #94a3b8; min-width: 50px; }
.btn {
    padding: 5px 12px; border: 1px solid rgba(251,191,36,0.3); background: rgba(251,191,36,0.1);
    color: #fbbf24; border-radius: 5px; cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.btn:hover { background: rgba(251,191,36,0.25); }
.btn.active { background: rgba(251,191,36,0.35); border-color: #fbbf24; }
input[type="range"] {
    flex: 1; accent-color: #fbbf24; height: 4px;
}
.toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.toggle-row label { font-size: 11px; color: #94a3b8; }
.toggle {
    width: 36px; height: 18px; background: #1e293b; border-radius: 9px;
    position: relative; cursor: pointer; border: 1px solid #334155; transition: all 0.3s;
}
.toggle.on { background: rgba(251,191,36,0.3); border-color: #fbbf24; }
.toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: #64748b; border-radius: 50%; transition: all 0.3s;
}
.toggle.on::after { left: 20px; background: #fbbf24; }

#archFilter {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.arch-btn {
    padding: 2px 8px; border-radius: 10px; font-size: 10px;
    cursor: pointer; border: 1px solid; opacity: 0.5; transition: all 0.2s;
}
.arch-btn.active { opacity: 1; }

#stats {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10, 14, 30, 0.95); border-top: 1px solid rgba(251,191,36,0.15);
    height: 180px; display: flex;
}
#statsLeft {
    width: 200px; padding: 10px 14px; border-right: 1px solid rgba(251,191,36,0.1);
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
}
.stat-item { display: flex; justify-content: space-between; align-items: center; }
.stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 14px; color: #fbbf24; font-weight: 600; }
#timelineCanvas { flex: 1; }

#roundLabel {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 18px; font-weight: 700; color: #fbbf24; text-align: center;
    text-shadow: 0 0 20px rgba(251,191,36,0.3);
    background: rgba(10,14,30,0.8); padding: 6px 20px; border-radius: 20px;
    border: 1px solid rgba(251,191,36,0.2);
}

#schoolTooltip {
    position: fixed; z-index: 200; display: none;
    background: rgba(10,14,30,0.95); border: 1px solid rgba(251,191,36,0.4);
    border-radius: 8px; padding: 12px; min-width: 200px; pointer-events: none;
}
#schoolTooltip h4 { color: #fbbf24; font-size: 13px; margin-bottom: 6px; }
#schoolTooltip .tt-row { display: flex; justify-content: space-between; font-size: 11px; margin: 2px 0; }
#schoolTooltip .tt-label { color: #64748b; }
#schoolTooltip .tt-val { color: #e0e0e0; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>

<canvas id="mainCanvas"></canvas>

<div id="roundLabel">Initializing Market...</div>

<div id="controls">
    <h3>Market Controls</h3>
    <div class="ctrl-row">
        <button class="btn" id="btnPlay">▶ Play</button>
        <button class="btn" id="btnStep">Step ▸</button>
        <button class="btn" id="btnReset">↺ Reset</button>
    </div>
    <div class="ctrl-row">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="1" max="10" value="5">
    </div>
    <div class="toggle-row">
        <div class="toggle" id="toggleNoED"></div>
        <label>What if no ED?</label>
    </div>
    <div style="margin-top: 10px;">
        <label style="font-size:10px;color:#64748b;text-transform:uppercase;">Filter Archetype</label>
        <div id="archFilter"></div>
    </div>
</div>

<div id="stats">
    <div id="statsLeft">
        <div class="stat-item"><span class="stat-label">Matched</span><span class="stat-value" id="statMatched">0</span></div>
        <div class="stat-item"><span class="stat-label">Unmatched</span><span class="stat-value" id="statUnmatched">500</span></div>
        <div class="stat-item"><span class="stat-label">Avg Accepts</span><span class="stat-value" id="statAvgAccepts">0.0</span></div>
        <div class="stat-item"><span class="stat-label">Cascade Depth</span><span class="stat-value" id="statCascade">0</span></div>
        <div class="stat-item"><span class="stat-label">Gini Coeff</span><span class="stat-value" id="statGini">0.00</span></div>
    </div>
    <canvas id="timelineCanvas"></canvas>
</div>

<div id="schoolTooltip">
    <h4 id="ttName"></h4>
    <div class="tt-row"><span class="tt-label">Tier</span><span class="tt-val" id="ttTier"></span></div>
    <div class="tt-row"><span class="tt-label">Capacity</span><span class="tt-val" id="ttCap"></span></div>
    <div class="tt-row"><span class="tt-label">Enrolled</span><span class="tt-val" id="ttEnrolled"></span></div>
    <div class="tt-row"><span class="tt-label">Fill Rate</span><span class="tt-val" id="ttFill"></span></div>
    <div class="tt-row"><span class="tt-label">ED Admits</span><span class="tt-val" id="ttED"></span></div>
    <div class="tt-row"><span class="tt-label">RD Admits</span><span class="tt-val" id="ttRD"></span></div>
    <div class="tt-row"><span class="tt-label">WL Admits</span><span class="tt-val" id="ttWL"></span></div>
</div>

<script>
// ===================== CONFIGURATION =====================
const NUM_STUDENTS = 500;
const ROUNDS = ['ED', 'RD', 'WL1', 'WL2', 'WL3', 'WL4', 'WL5'];
const ROUND_LABELS = ['Early Decision', 'Regular Decision', 'Waitlist Round 1', 'Waitlist Round 2', 'Waitlist Round 3', 'Waitlist Round 4', 'Waitlist Round 5'];

const ARCHETYPES = [
    { name: 'Academic Star', color: '#f59e0b', weight: 0.15, academicBias: 0.95, prestigeBias: 0.9, edLikely: 0.6 },
    { name: 'Well-Rounded', color: '#10b981', weight: 0.25, academicBias: 0.7, prestigeBias: 0.65, edLikely: 0.45 },
    { name: 'Legacy/Athlete', color: '#8b5cf6', weight: 0.1, academicBias: 0.5, prestigeBias: 0.85, edLikely: 0.7 },
    { name: 'STEM Focused', color: '#3b82f6', weight: 0.2, academicBias: 0.8, prestigeBias: 0.6, edLikely: 0.35 },
    { name: 'Creative', color: '#ec4899', weight: 0.15, academicBias: 0.6, prestigeBias: 0.5, edLikely: 0.3 },
    { name: 'Safety Seeker', color: '#6b7280', weight: 0.15, academicBias: 0.55, prestigeBias: 0.4, edLikely: 0.2 }
];

const SCHOOLS = [
    // Tier 1: Elite (prestige 0.95-1.0)
    { name: 'Harvard', tier: 1, prestige: 1.0, capacity: 22, edFillTarget: 0.22, selectivity: 0.04 },
    { name: 'Stanford', tier: 1, prestige: 0.98, capacity: 22, edFillTarget: 0.25, selectivity: 0.04 },
    { name: 'MIT', tier: 1, prestige: 0.96, capacity: 20, edFillTarget: 0.20, selectivity: 0.04 },
    // Tier 2: Very Selective (prestige 0.8-0.94)
    { name: 'Duke', tier: 2, prestige: 0.92, capacity: 30, edFillTarget: 0.50, selectivity: 0.08 },
    { name: 'Northwestern', tier: 2, prestige: 0.90, capacity: 30, edFillTarget: 0.52, selectivity: 0.09 },
    { name: 'Wash U', tier: 2, prestige: 0.87, capacity: 28, edFillTarget: 0.48, selectivity: 0.12 },
    // Tier 3: Selective (prestige 0.65-0.79)
    { name: 'Middlebury', tier: 3, prestige: 0.78, capacity: 35, edFillTarget: 0.55, selectivity: 0.16 },
    { name: 'Colgate', tier: 3, prestige: 0.74, capacity: 35, edFillTarget: 0.50, selectivity: 0.2 },
    { name: 'Lehigh', tier: 3, prestige: 0.70, capacity: 35, edFillTarget: 0.45, selectivity: 0.25 },
    { name: 'Bucknell', tier: 3, prestige: 0.67, capacity: 38, edFillTarget: 0.55, selectivity: 0.3 },
    // Tier 4: Moderate (prestige 0.4-0.64)
    { name: 'U Vermont', tier: 4, prestige: 0.58, capacity: 42, edFillTarget: 0.35, selectivity: 0.5 },
    { name: 'U Denver', tier: 4, prestige: 0.52, capacity: 42, edFillTarget: 0.30, selectivity: 0.55 },
    { name: 'Drexel', tier: 4, prestige: 0.46, capacity: 45, edFillTarget: 0.25, selectivity: 0.65 },
    // Tier 5: Accessible
    { name: 'Hofstra', tier: 5, prestige: 0.35, capacity: 48, edFillTarget: 0.20, selectivity: 0.75 },
    { name: 'Pace', tier: 5, prestige: 0.28, capacity: 50, edFillTarget: 0.15, selectivity: 0.82 }
];

const TIER_COLORS = ['#fbbf24', '#f59e0b', '#3b82f6', '#10b981', '#6b7280'];

// ===================== CANVAS SETUP =====================
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const tlCanvas = document.getElementById('timelineCanvas');
const tlCtx = tlCanvas.getContext('2d');

let W, H, TLW, TLH;
const BOTTOM_H = 180;

function resize() {
    W = window.innerWidth;
    H = window.innerHeight - BOTTOM_H;
    mainCanvas.width = W * devicePixelRatio;
    mainCanvas.height = (H + BOTTOM_H) * devicePixelRatio;
    mainCanvas.style.width = W + 'px';
    mainCanvas.style.height = (H + BOTTOM_H) + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

    const statsLeft = document.getElementById('statsLeft');
    TLW = W - statsLeft.offsetWidth;
    TLH = BOTTOM_H;
    tlCanvas.width = TLW * devicePixelRatio;
    tlCanvas.height = TLH * devicePixelRatio;
    tlCanvas.style.width = TLW + 'px';
    tlCanvas.style.height = TLH + 'px';
    tlCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===================== SIMULATION STATE =====================
let students = [];
let schools = [];
let simState = 'idle'; // idle, running, paused, done
let currentRound = -1;
let roundProgress = 0; // 0-1 animation progress within a round
let speed = 5;
let noED = false;
let activeArchetypes = new Set(ARCHETYPES.map((_, i) => i));
let hoveredSchool = null;
let playing = false;
let roundHistory = []; // [{round, fillRates[], unmatched, switches}]
let particles = [];
let roundTransitioning = false;
let cascadeDepth = 0;

function rand() { return Math.random(); }
function randN(mu, sigma) {
    let u = 0, v = 0;
    while (u === 0) u = rand();
    while (v === 0) v = rand();
    return mu + sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

// ===================== INITIALIZATION =====================
function initSchools() {
    schools = SCHOOLS.map((s, i) => ({
        ...s,
        id: i,
        enrolled: [],
        edAdmits: 0,
        rdAdmits: 0,
        wlAdmits: 0,
        waitlist: [],
        accepted: [],
        fillHistory: [],
        y: 0, // computed in layout
    }));
}

function initStudents() {
    students = [];
    for (let i = 0; i < NUM_STUDENTS; i++) {
        // Pick archetype by weight
        let r = rand(), cum = 0, arch = 0;
        for (let a = 0; a < ARCHETYPES.length; a++) {
            cum += ARCHETYPES[a].weight;
            if (r < cum) { arch = a; break; }
        }
        const at = ARCHETYPES[arch];
        const academic = clamp(randN(at.academicBias, 0.15), 0, 1);
        const prestige_pref = clamp(randN(at.prestigeBias, 0.12), 0, 1);

        // Build preference list (utility for each school)
        const prefs = schools.map((s, si) => {
            let util = s.prestige * prestige_pref + (1 - prestige_pref) * (0.5 + 0.5 * rand());
            util += randN(0, 0.08);
            return { schoolId: si, utility: clamp(util, 0, 1) };
        }).sort((a, b) => b.utility - a.utility);

        const wantsED = !noED && rand() < at.edLikely;
        students.push({
            id: i,
            archetype: arch,
            academic,
            prestige_pref,
            prefs,
            edChoice: wantsED ? prefs[0].schoolId : -1,
            acceptances: [],
            enrolled: -1,
            round: -1, // round when matched
            x: 0, y: 0,
            targetX: 0, targetY: 0,
            opacity: 1,
            particle: null,
        });
    }
}

function resetSim() {
    initSchools();
    initStudents();
    currentRound = -1;
    roundProgress = 0;
    roundHistory = [];
    particles = [];
    cascadeDepth = 0;
    simState = 'idle';
    playing = false;
    document.getElementById('btnPlay').textContent = '▶ Play';
    updateStats();
}

// ===================== SIMULATION LOGIC =====================
function logitScore(student, school) {
    // Probability school admits student
    let base = school.selectivity;
    let academicBoost = student.academic * 0.7;
    let noise = randN(0, 0.1);
    return clamp(base + academicBoost + noise, 0, 1);
}

function runEDRound() {
    if (noED) return;
    for (const st of students) {
        if (st.edChoice < 0) continue;
        const school = schools[st.edChoice];
        const edCap = Math.floor(school.capacity * school.edFillTarget);
        if (school.enrolled.length < edCap) {
            let score = logitScore(st, school);
            if (rand() < score) {
                school.enrolled.push(st.id);
                school.edAdmits++;
                st.enrolled = school.id;
                st.round = 0;
                st.acceptances.push(school.id);
            }
        }
    }
}

function runRDRound() {
    // Each unmatched student applies to top ~6-10 schools
    const unmatched = students.filter(s => s.enrolled < 0);
    for (const st of unmatched) {
        const numApps = Math.floor(lerp(5, 10, st.prestige_pref) + randN(0, 1));
        const apps = st.prefs.slice(0, clamp(numApps, 3, 12));
        for (const pref of apps) {
            const school = schools[pref.schoolId];
            let score = logitScore(st, school);
            if (rand() < score) {
                st.acceptances.push(pref.schoolId);
                school.accepted.push(st.id);
            }
        }
    }
    // Students choose best acceptance
    for (const st of students) {
        if (st.enrolled >= 0) continue;
        if (st.acceptances.length === 0) continue;
        // Pick highest utility
        let bestUtil = -1, bestSchool = -1;
        for (const sid of st.acceptances) {
            const pref = st.prefs.find(p => p.schoolId === sid);
            if (pref && pref.utility > bestUtil) {
                bestUtil = pref.utility;
                bestSchool = sid;
            }
        }
        if (bestSchool >= 0 && schools[bestSchool].enrolled.length < schools[bestSchool].capacity) {
            schools[bestSchool].enrolled.push(st.id);
            schools[bestSchool].rdAdmits++;
            st.enrolled = bestSchool;
            st.round = 1;
        }
    }
}

function runWaitlistRound(wlNum) {
    let switches = 0;
    // Schools under capacity activate waitlists
    for (const school of schools) {
        if (school.enrolled.length < school.capacity) {
            // Find students who were accepted elsewhere but might switch
            const candidates = students.filter(s => {
                if (s.enrolled < 0) return false;
                // Would they prefer this school?
                const currentUtil = s.prefs.find(p => p.schoolId === s.enrolled);
                const thisUtil = s.prefs.find(p => p.schoolId === school.id);
                return thisUtil && currentUtil && thisUtil.utility > currentUtil.utility + 0.05;
            });
            // Also include unmatched students
            const unmatched = students.filter(s => s.enrolled < 0);
            const pool = [...candidates, ...unmatched].sort((a, b) => {
                return logitScore(b, school) - logitScore(a, school);
            });

            const slotsOpen = school.capacity - school.enrolled.length;
            let filled = 0;
            for (const st of pool) {
                if (filled >= slotsOpen) break;
                let score = logitScore(st, school);
                if (rand() < score * 0.6) {
                    if (st.enrolled >= 0) {
                        // Remove from current school
                        const oldSchool = schools[st.enrolled];
                        oldSchool.enrolled = oldSchool.enrolled.filter(id => id !== st.id);
                        switches++;
                    }
                    school.enrolled.push(st.id);
                    school.wlAdmits++;
                    st.enrolled = school.id;
                    st.round = wlNum + 2;
                    filled++;
                }
            }
        }
    }
    return switches;
}

function recordHistory(roundIdx) {
    const fillRates = schools.map(s => s.enrolled.length / s.capacity);
    const unmatched = students.filter(s => s.enrolled < 0).length;
    const switches = roundIdx > 1 ? (roundHistory.length > 0 ? roundHistory[roundHistory.length - 1].switches || 0 : 0) : 0;
    roundHistory.push({ round: roundIdx, fillRates, unmatched, switches });
    for (const s of schools) {
        s.fillHistory.push(s.enrolled.length / s.capacity);
    }
}

function advanceRound() {
    currentRound++;
    if (currentRound === 0) {
        runEDRound();
        recordHistory(0);
    } else if (currentRound === 1) {
        runRDRound();
        recordHistory(1);
    } else if (currentRound <= 6) {
        const switches = runWaitlistRound(currentRound - 2);
        cascadeDepth = currentRound - 1;
        recordHistory(currentRound);
        roundHistory[roundHistory.length - 1].switches = switches;
        if (switches === 0 && currentRound > 2) {
            simState = 'done';
            playing = false;
            document.getElementById('btnPlay').textContent = '▶ Play';
        }
    } else {
        simState = 'done';
        playing = false;
        document.getElementById('btnPlay').textContent = '▶ Play';
    }
    roundProgress = 0;
    roundTransitioning = true;
    generateParticles();
    updateStats();

    if (currentRound >= 6) {
        simState = 'done';
        playing = false;
        document.getElementById('btnPlay').textContent = '▶ Play';
    }
}

// ===================== PARTICLES =====================
function generateParticles() {
    particles = [];
    const colW = W / (ROUNDS.length + 2);
    const roundX = (currentRound + 1.5) * colW;

    for (const st of students) {
        if (st.round === currentRound || (currentRound === 0 && st.round === 0) ||
            (currentRound === 1 && st.round === 1) ||
            (currentRound > 1 && st.round === currentRound)) {
            // This student was matched this round
        } else if (st.round < 0 && currentRound <= 1) {
            // Unmatched, still in pool
        } else {
            continue;
        }

        if (st.round === currentRound && st.enrolled >= 0) {
            const school = schools[st.enrolled];
            particles.push({
                studentId: st.id,
                archetype: st.archetype,
                sx: lerp(40, roundX - 30, rand()),
                sy: lerp(60, H - 20, rand()),
                ex: W - 130,
                ey: school.y,
                t: 0,
                speed: 0.005 + rand() * 0.008,
                active: true,
                matched: true,
            });
        }
    }
}

// ===================== LAYOUT =====================
function getSchoolPositions() {
    const margin = 80;
    const usable = H - margin * 2;
    const gap = usable / (schools.length - 1);
    for (let i = 0; i < schools.length; i++) {
        schools[i].y = margin + i * gap;
    }
}

// ===================== DRAWING =====================
function drawBackground() {
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = 'rgba(251,191,36,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
}

function drawRoundColumns() {
    const colW = W / (ROUNDS.length + 2);
    for (let i = 0; i < ROUNDS.length; i++) {
        const x = (i + 1.5) * colW;
        const isActive = i <= currentRound;
        const isCurrent = i === currentRound;

        // Column line
        ctx.strokeStyle = isCurrent ? 'rgba(251,191,36,0.3)' : 'rgba(255,255,255,0.05)';
        ctx.lineWidth = isCurrent ? 2 : 1;
        ctx.setLineDash(isCurrent ? [] : [4, 4]);
        ctx.beginPath(); ctx.moveTo(x, 50); ctx.lineTo(x, H - 10); ctx.stroke();
        ctx.setLineDash([]);

        // Label
        ctx.font = '11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillStyle = isCurrent ? '#fbbf24' : (isActive ? '#64748b' : '#334155');
        ctx.fillText(ROUNDS[i], x, 42);
    }
}

function drawSchools() {
    const rightX = W - 130;
    const barW = 100;

    for (let i = 0; i < schools.length; i++) {
        const s = schools[i];
        const y = s.y;
        const fillRate = s.enrolled.length / s.capacity;
        const tierColor = TIER_COLORS[s.tier - 1];

        // Fill bar background
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(rightX, y - 8, barW, 16);

        // Fill bar
        const grad = ctx.createLinearGradient(rightX, 0, rightX + barW, 0);
        grad.addColorStop(0, tierColor + '88');
        grad.addColorStop(1, tierColor);
        ctx.fillStyle = grad;
        ctx.fillRect(rightX, y - 8, barW * fillRate, 16);

        // Border
        ctx.strokeStyle = hoveredSchool === i ? '#fbbf24' : tierColor + '66';
        ctx.lineWidth = hoveredSchool === i ? 2 : 1;
        ctx.strokeRect(rightX, y - 8, barW, 16);

        // School name
        ctx.font = hoveredSchool === i ? 'bold 11px system-ui' : '11px system-ui';
        ctx.textAlign = 'right';
        ctx.fillStyle = hoveredSchool === i ? '#fbbf24' : '#94a3b8';
        ctx.fillText(s.name, rightX - 8, y + 4);

        // Fill percentage
        ctx.font = '9px system-ui';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#fff';
        ctx.fillText(Math.round(fillRate * 100) + '%', rightX + barW + 4, y + 3);
    }
}

function drawSankeyFlows() {
    if (currentRound < 0) return;

    const colW = W / (ROUNDS.length + 2);
    const rightX = W - 130;

    // Draw flow bands from round columns to schools
    for (let r = 0; r <= Math.min(currentRound, ROUNDS.length - 1); r++) {
        const rx = (r + 1.5) * colW;

        for (const school of schools) {
            // Count students matched to this school in this round
            const count = students.filter(s => s.enrolled === school.id && s.round === r).length;
            if (count === 0) continue;

            const thickness = Math.max(1, count * 1.5);
            const tierColor = TIER_COLORS[school.tier - 1];

            ctx.beginPath();
            ctx.moveTo(rx, school.y);

            // Bezier curve to school position
            const cp1x = rx + (rightX - rx) * 0.4;
            const cp2x = rx + (rightX - rx) * 0.6;
            ctx.bezierCurveTo(cp1x, school.y, cp2x, school.y, rightX, school.y);

            ctx.strokeStyle = tierColor + '30';
            ctx.lineWidth = thickness;
            ctx.stroke();
        }
    }
}

function drawApplicantPool() {
    const poolX = 50;
    const unmatched = students.filter(s => s.enrolled < 0);
    const matched = students.filter(s => s.enrolled >= 0);

    // Draw pool circle representation
    ctx.font = '12px system-ui';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#64748b';
    ctx.fillText('Applicant Pool', poolX - 10, 42);

    // Dot cloud for unmatched students
    const cols = 8;
    for (let i = 0; i < unmatched.length; i++) {
        const st = unmatched[i];
        if (!activeArchetypes.has(st.archetype)) continue;
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = poolX + col * 5;
        const y = 55 + row * 5;

        ctx.fillStyle = ARCHETYPES[st.archetype].color + '88';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawParticles(time) {
    for (const p of particles) {
        if (!p.active) continue;
        if (!activeArchetypes.has(p.archetype)) continue;

        p.t += p.speed * speed * 0.3;
        if (p.t >= 1) { p.t = 1; p.active = false; }

        const et = easeInOut(p.t);
        const x = lerp(p.sx, p.ex, et);
        // Add slight arc
        const arc = Math.sin(et * Math.PI) * 30;
        const y = lerp(p.sy, p.ey, et) - arc;

        const color = ARCHETYPES[p.archetype].color;
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Trail
        ctx.globalAlpha = 0.2;
        for (let tr = 1; tr <= 3; tr++) {
            const tt = Math.max(0, p.t - tr * 0.03);
            const tet = easeInOut(tt);
            const tx = lerp(p.sx, p.ex, tet);
            const ty = lerp(p.sy, p.ey, tet) - Math.sin(tet * Math.PI) * 30;
            ctx.beginPath();
            ctx.arc(tx, ty, 2.5 - tr * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
}

function drawFlowArrows() {
    if (currentRound < 0) return;
    const colW = W / (ROUNDS.length + 2);

    // Draw aggregated flow arcs from applicant pool through rounds
    for (let r = 0; r <= Math.min(currentRound, ROUNDS.length - 1); r++) {
        const rx = (r + 1.5) * colW;
        const studentsThisRound = students.filter(s => s.round === r);

        // Group by school
        const bySchool = {};
        for (const s of studentsThisRound) {
            if (!activeArchetypes.has(s.archetype)) continue;
            if (!bySchool[s.enrolled]) bySchool[s.enrolled] = [];
            bySchool[s.enrolled].push(s);
        }

        for (const [sid, sts] of Object.entries(bySchool)) {
            const school = schools[parseInt(sid)];
            if (!school) continue;
            const count = sts.length;
            const thickness = Math.max(1, Math.sqrt(count) * 2);
            const tierColor = TIER_COLORS[school.tier - 1];

            // Flow from round column to school
            ctx.beginPath();
            ctx.moveTo(rx + 5, school.y);
            const midX = (rx + W - 130) / 2;
            ctx.bezierCurveTo(midX, school.y - 10, midX + 30, school.y, W - 130, school.y);
            ctx.strokeStyle = tierColor + '25';
            ctx.lineWidth = thickness;
            ctx.stroke();
        }
    }
}

// ===================== TIMELINE DRAWING =====================
function drawTimeline() {
    tlCtx.fillStyle = 'rgba(10, 14, 30, 0.95)';
    tlCtx.fillRect(0, 0, TLW, TLH);

    if (roundHistory.length === 0) {
        tlCtx.font = '12px system-ui';
        tlCtx.fillStyle = '#334155';
        tlCtx.textAlign = 'center';
        tlCtx.fillText('Timeline data will appear as rounds progress...', TLW / 2, TLH / 2);
        return;
    }

    const pad = { top: 25, bottom: 30, left: 50, right: 20 };
    const chartW = (TLW - pad.left - pad.right) / 2;
    const chartH = TLH - pad.top - pad.bottom;

    // Left chart: Fill rates per school
    tlCtx.font = '10px system-ui';
    tlCtx.fillStyle = '#64748b';
    tlCtx.textAlign = 'center';
    tlCtx.fillText('School Fill Rates', pad.left + chartW / 2, 14);

    // Axes
    tlCtx.strokeStyle = '#1e293b';
    tlCtx.lineWidth = 1;
    tlCtx.beginPath();
    tlCtx.moveTo(pad.left, pad.top);
    tlCtx.lineTo(pad.left, pad.top + chartH);
    tlCtx.lineTo(pad.left + chartW, pad.top + chartH);
    tlCtx.stroke();

    // Y axis labels
    tlCtx.font = '9px system-ui';
    tlCtx.textAlign = 'right';
    tlCtx.fillStyle = '#475569';
    for (let p = 0; p <= 100; p += 25) {
        const y = pad.top + chartH - (p / 100) * chartH;
        tlCtx.fillText(p + '%', pad.left - 4, y + 3);
        tlCtx.strokeStyle = '#1e293b';
        tlCtx.beginPath(); tlCtx.moveTo(pad.left, y); tlCtx.lineTo(pad.left + chartW, y); tlCtx.stroke();
    }

    // X axis labels
    tlCtx.textAlign = 'center';
    const xStep = chartW / Math.max(1, roundHistory.length - 1);
    for (let r = 0; r < roundHistory.length; r++) {
        const x = pad.left + r * xStep;
        tlCtx.fillText(ROUNDS[r] || 'WL' + (r - 1), x, pad.top + chartH + 14);
    }

    // Draw lines per school
    for (let si = 0; si < schools.length; si++) {
        const tierColor = TIER_COLORS[schools[si].tier - 1];
        tlCtx.strokeStyle = tierColor + '88';
        tlCtx.lineWidth = 1.5;
        tlCtx.beginPath();
        for (let r = 0; r < roundHistory.length; r++) {
            const x = pad.left + r * xStep;
            const y = pad.top + chartH - roundHistory[r].fillRates[si] * chartH;
            if (r === 0) tlCtx.moveTo(x, y); else tlCtx.lineTo(x, y);
        }
        tlCtx.stroke();
    }

    // Right chart: Unmatched students & stability
    const rx = pad.left + chartW + 40;
    tlCtx.font = '10px system-ui';
    tlCtx.fillStyle = '#64748b';
    tlCtx.textAlign = 'center';
    tlCtx.fillText('Unmatched & Switches', rx + chartW / 2, 14);

    tlCtx.strokeStyle = '#1e293b';
    tlCtx.beginPath();
    tlCtx.moveTo(rx, pad.top);
    tlCtx.lineTo(rx, pad.top + chartH);
    tlCtx.lineTo(rx + chartW, pad.top + chartH);
    tlCtx.stroke();

    const maxUnmatched = NUM_STUDENTS;
    for (let r = 0; r < roundHistory.length; r++) {
        const x = rx + r * xStep;
        tlCtx.fillText(ROUNDS[r] || 'WL' + (r - 1), x, pad.top + chartH + 14);
    }

    // Unmatched line
    tlCtx.strokeStyle = '#ef4444';
    tlCtx.lineWidth = 2;
    tlCtx.beginPath();
    for (let r = 0; r < roundHistory.length; r++) {
        const x = rx + r * xStep;
        const y = pad.top + chartH - (roundHistory[r].unmatched / maxUnmatched) * chartH;
        if (r === 0) tlCtx.moveTo(x, y); else tlCtx.lineTo(x, y);
    }
    tlCtx.stroke();

    // Switches line
    const maxSwitches = Math.max(1, ...roundHistory.map(h => h.switches || 0));
    tlCtx.strokeStyle = '#8b5cf6';
    tlCtx.lineWidth = 2;
    tlCtx.beginPath();
    for (let r = 0; r < roundHistory.length; r++) {
        const x = rx + r * xStep;
        const sw = roundHistory[r].switches || 0;
        const y = pad.top + chartH - (sw / maxSwitches) * chartH;
        if (r === 0) tlCtx.moveTo(x, y); else tlCtx.lineTo(x, y);
    }
    tlCtx.stroke();

    // Legend
    const ly = pad.top + chartH + 24;
    tlCtx.font = '9px system-ui';
    tlCtx.fillStyle = '#ef4444'; tlCtx.fillRect(rx + 10, ly - 4, 8, 2);
    tlCtx.fillStyle = '#94a3b8'; tlCtx.textAlign = 'left'; tlCtx.fillText('Unmatched', rx + 22, ly);
    tlCtx.fillStyle = '#8b5cf6'; tlCtx.fillRect(rx + 85, ly - 4, 8, 2);
    tlCtx.fillStyle = '#94a3b8'; tlCtx.fillText('Switches', rx + 97, ly);
}

// ===================== STATS =====================
function computeGini() {
    // Gini of enrollment quality (avg academic score of enrollees per school)
    const vals = schools.map(s => {
        if (s.enrolled.length === 0) return 0;
        return s.enrolled.reduce((sum, id) => sum + students[id].academic, 0) / s.enrolled.length;
    }).sort((a, b) => a - b);

    const n = vals.length;
    if (n === 0) return 0;
    let num = 0, denom = 0;
    for (let i = 0; i < n; i++) {
        num += (2 * (i + 1) - n - 1) * vals[i];
        denom += vals[i];
    }
    return denom === 0 ? 0 : num / (n * denom);
}

function updateStats() {
    const matched = students.filter(s => s.enrolled >= 0).length;
    const unmatched = NUM_STUDENTS - matched;
    const totalAccepts = students.reduce((s, st) => s + st.acceptances.length, 0);
    const avgAccepts = matched > 0 ? (totalAccepts / NUM_STUDENTS).toFixed(1) : '0.0';

    document.getElementById('statMatched').textContent = matched;
    document.getElementById('statUnmatched').textContent = unmatched;
    document.getElementById('statAvgAccepts').textContent = avgAccepts;
    document.getElementById('statCascade').textContent = cascadeDepth;
    document.getElementById('statGini').textContent = computeGini().toFixed(2);

    const roundText = currentRound < 0 ? 'Ready to Start' :
        currentRound < ROUNDS.length ? ROUND_LABELS[currentRound] :
        'Equilibrium Reached';
    document.getElementById('roundLabel').textContent = roundText +
        (simState === 'done' ? ' — Market Cleared' : '');
}

// ===================== INTERACTION =====================
mainCanvas.addEventListener('mousemove', (e) => {
    const mx = e.clientX, my = e.clientY;
    hoveredSchool = null;

    for (let i = 0; i < schools.length; i++) {
        const s = schools[i];
        const rightX = W - 130;
        if (mx >= rightX - 80 && mx <= W - 10 && Math.abs(my - s.y) < 12) {
            hoveredSchool = i;
            break;
        }
    }

    const tt = document.getElementById('schoolTooltip');
    if (hoveredSchool !== null) {
        const s = schools[hoveredSchool];
        tt.style.display = 'block';
        tt.style.left = Math.min(e.clientX + 15, W - 220) + 'px';
        tt.style.top = Math.min(e.clientY + 15, H - 100) + 'px';
        document.getElementById('ttName').textContent = s.name;
        document.getElementById('ttTier').textContent = 'Tier ' + s.tier;
        document.getElementById('ttCap').textContent = s.enrolled.length + ' / ' + s.capacity;
        document.getElementById('ttEnrolled').textContent = s.enrolled.length;
        document.getElementById('ttFill').textContent = Math.round(s.enrolled.length / s.capacity * 100) + '%';
        document.getElementById('ttED').textContent = s.edAdmits;
        document.getElementById('ttRD').textContent = s.rdAdmits;
        document.getElementById('ttWL').textContent = s.wlAdmits;
    } else {
        tt.style.display = 'none';
    }
});

// Controls
document.getElementById('btnPlay').addEventListener('click', () => {
    if (simState === 'done') return;
    playing = !playing;
    if (playing) {
        simState = 'running';
        document.getElementById('btnPlay').textContent = '⏸ Pause';
    } else {
        simState = 'paused';
        document.getElementById('btnPlay').textContent = '▶ Play';
    }
});

document.getElementById('btnStep').addEventListener('click', () => {
    if (simState === 'done') return;
    if (currentRound < ROUNDS.length - 1) {
        advanceRound();
    }
});

document.getElementById('btnReset').addEventListener('click', resetSim);

document.getElementById('speedSlider').addEventListener('input', (e) => {
    speed = parseInt(e.target.value);
});

document.getElementById('toggleNoED').addEventListener('click', function () {
    this.classList.toggle('on');
    noED = this.classList.contains('on');
    resetSim();
});

// Build archetype filter buttons
const archDiv = document.getElementById('archFilter');
ARCHETYPES.forEach((a, i) => {
    const btn = document.createElement('div');
    btn.className = 'arch-btn active';
    btn.style.borderColor = a.color;
    btn.style.color = a.color;
    btn.style.background = a.color + '22';
    btn.textContent = a.name;
    btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
            activeArchetypes.add(i);
            btn.style.background = a.color + '22';
        } else {
            activeArchetypes.delete(i);
            btn.style.background = 'transparent';
        }
    });
    archDiv.appendChild(btn);
});

// ===================== ANIMATION LOOP =====================
let lastAutoAdvance = 0;
const AUTO_ADVANCE_DELAY = 2500; // ms between auto-rounds

function animate(time) {
    requestAnimationFrame(animate);

    // Auto-advance when playing
    if (playing && simState === 'running') {
        const allParticlesDone = particles.length === 0 || particles.every(p => !p.active);
        if (allParticlesDone) {
            if (!lastAutoAdvance) lastAutoAdvance = time;
            const delayMs = AUTO_ADVANCE_DELAY / (speed * 0.5);
            if (time - lastAutoAdvance > delayMs) {
                if (currentRound < ROUNDS.length - 1) {
                    advanceRound();
                    lastAutoAdvance = time;
                } else {
                    simState = 'done';
                    playing = false;
                    document.getElementById('btnPlay').textContent = '▶ Play';
                    updateStats();
                }
            }
        }
    }

    getSchoolPositions();
    drawBackground();
    drawRoundColumns();
    drawFlowArrows();
    drawSankeyFlows();
    drawSchools();
    drawApplicantPool();
    drawParticles(time);
    drawTimeline();
}

// Initialize
resetSim();
requestAnimationFrame(animate);
</script>
