<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abelian Sandpile Identity | Sandpile Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); color: #FEFAE0; padding: 15px 20px;
            border-radius: 12px; font-size: 0.85rem; z-index: 1000;
            border: 1px solid rgba(138,154,91,0.3); max-width: 280px;
        }
        .info-panel h2 { color: #8A9A5B; font-size: 1rem; margin-bottom: 8px; }
        .info-panel p { margin-bottom: 8px; line-height: 1.4; color: #ccc; }
        .progress { color: #DDA15E; font-weight: bold; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000;
        }
        .controls button, .controls select {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .controls button:hover, .controls select:hover { background: rgba(138,154,91,0.9); }
        .legend {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000; font-size: 0.8rem; color: #FEFAE0;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>Sandpile Identity Fractal</h2>
        <p>The identity element of the Abelian sandpile group. Start with all 6s, relax to stable. The result is a stunning fractal with four-fold symmetry.</p>
        <p class="progress" id="status">Ready</p>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#1a1a2e"></div> 0</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#606C38"></div> 1</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#8A9A5B"></div> 2</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#DDA15E"></div> 3</div>
    </div>
    <div class="controls">
        <select id="sizeSelect">
            <option value="101">101x101</option>
            <option value="151">151x151</option>
            <option value="201" selected>201x201</option>
            <option value="301">301x301</option>
        </select>
        <button id="btnCompute">Compute Identity</button>
        <button id="btnStep">Step (1000)</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let N = 201;
        let grid, computing = false, done = false;
        const colors = ['#1a1a2e', '#606C38', '#8A9A5B', '#DDA15E'];

        function initGrid(size) {
            N = size;
            grid = new Int32Array(N * N);
            for (let i = 0; i < grid.length; i++) grid[i] = 6;
            done = false;
            computing = false;
            document.getElementById('status').textContent = 'All cells set to 6. Click Compute.';
            fitCanvas();
            draw();
        }

        function fitCanvas() {
            const maxDim = Math.min(window.innerWidth - 40, window.innerHeight - 120);
            const px = Math.max(1, Math.floor(maxDim / N));
            canvas.width = N * px;
            canvas.height = N * px;
            canvas._px = px;
        }

        function toppleStep(maxIter) {
            let didTopple = false;
            let iters = 0;
            do {
                didTopple = false;
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] >= 4) {
                        const x = i % N;
                        const y = Math.floor(i / N);
                        const give = Math.floor(grid[i] / 4);
                        grid[i] -= give * 4;
                        if (x > 0) grid[i - 1] += give;
                        if (x < N - 1) grid[i + 1] += give;
                        if (y > 0) grid[i - N] += give;
                        if (y < N - 1) grid[i + N] += give;
                        didTopple = true;
                    }
                }
                iters++;
            } while (didTopple && iters < maxIter);
            return didTopple;
        }

        function draw() {
            const px = canvas._px || 1;
            const imgData = ctx.createImageData(canvas.width, canvas.height);
            const data = imgData.data;
            const hexToRgb = (hex) => {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return [r, g, b];
            };
            const colorRgb = colors.map(hexToRgb);

            for (let gy = 0; gy < N; gy++) {
                for (let gx = 0; gx < N; gx++) {
                    const v = Math.min(grid[gy * N + gx], 3);
                    const [r, g, b] = colorRgb[v];
                    for (let py = 0; py < px; py++) {
                        for (let px2 = 0; px2 < px; px2++) {
                            const idx = ((gy * px + py) * canvas.width + gx * px + px2) * 4;
                            data[idx] = r;
                            data[idx + 1] = g;
                            data[idx + 2] = b;
                            data[idx + 3] = 255;
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function computeIdentity() {
            if (computing) return;
            computing = true;
            done = false;
            document.getElementById('status').textContent = 'Computing...';

            function step() {
                if (!computing) return;
                const stillUnstable = toppleStep(50);
                draw();
                if (stillUnstable) {
                    document.getElementById('status').textContent = 'Relaxing...';
                    requestAnimationFrame(step);
                } else {
                    // Now we have the "all-6 relaxed" config. The identity = 2*E_max - relaxed(2*E_max)
                    // where E_max is the max stable config (all 3s).
                    // Actually the identity is computed as: relax(6,6,...,6) gives us identity directly
                    // because 6 = 2*3 and the max stable config is all-3s.
                    computing = false;
                    done = true;
                    document.getElementById('status').textContent = 'Identity computed! The fractal is revealed.';
                }
            }
            requestAnimationFrame(step);
        }

        document.getElementById('btnCompute').addEventListener('click', function() {
            const size = parseInt(document.getElementById('sizeSelect').value);
            initGrid(size);
            computeIdentity();
        });

        document.getElementById('btnStep').addEventListener('click', function() {
            toppleStep(1000);
            draw();
            let unstable = false;
            for (let i = 0; i < grid.length; i++) { if (grid[i] >= 4) { unstable = true; break; } }
            document.getElementById('status').textContent = unstable ? 'Still relaxing...' : 'Stable!';
        });

        window.reset = function() {
            computing = false;
            initGrid(N);
        };

        window.addEventListener('resize', () => { fitCanvas(); draw(); });
        initGrid(N);
    })();
    </script>
</body>
</html>
