<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascade Tracer | Sandpile Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); color: #FEFAE0; padding: 15px 20px;
            border-radius: 12px; font-size: 0.85rem; z-index: 1000;
            border: 1px solid rgba(138,154,91,0.3); max-width: 260px;
        }
        .info-panel h2 { color: #8A9A5B; font-size: 1rem; margin-bottom: 8px; }
        .info-panel p { margin-bottom: 6px; line-height: 1.4; color: #ccc; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .stat-label { color: #8A9A5B; }
        .stat-val { color: #DDA15E; font-weight: bold; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000;
        }
        .controls button {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .controls button:hover { background: rgba(138,154,91,0.9); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>Cascade Tracer</h2>
        <p>Click anywhere to drop a grain. Cells that topple glow and leave trails showing the cascade wavefront.</p>
        <div class="stat-row"><span class="stat-label">Cascade size:</span><span class="stat-val" id="cascadeSize">0</span></div>
        <div class="stat-row"><span class="stat-label">Cascade depth:</span><span class="stat-val" id="cascadeDepth">0</span></div>
        <div class="stat-row"><span class="stat-label">Total grains:</span><span class="stat-val" id="totalGrains">0</span></div>
    </div>
    <div class="controls">
        <button id="btnFill">Pre-fill Critical</button>
        <button id="btnDrop">Drop Center</button>
        <button id="btnClear">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cellSize, N;
        let grid, heatmap, totalGrains = 0;
        let cascadeActive = false, cascadeWaves = [], currentWave = 0;

        const baseColors = ['#1a1a2e', '#2d3a1a', '#606C38', '#8A9A5B'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cellSize = Math.max(4, Math.min(8, Math.floor(Math.min(W, H) / 100)));
            const newN = Math.floor(Math.min(W, H) / cellSize);
            if (!grid || newN !== N) {
                N = newN;
                grid = new Int32Array(N * N);
                heatmap = new Float32Array(N * N);
            }
        }

        function preFillCritical() {
            for (let i = 0; i < grid.length; i++) {
                grid[i] = Math.floor(Math.random() * 4);
                if (Math.random() < 0.6) grid[i] = 3;
            }
            totalGrains = 0;
            for (let i = 0; i < grid.length; i++) totalGrains += grid[i];
        }

        function dropAndTrace(gx, gy) {
            if (gx < 0 || gx >= N || gy < 0 || gy >= N) return;
            grid[gy * N + gx]++;
            totalGrains++;
            cascadeWaves = [];
            currentWave = 0;

            let depth = 0;
            let totalToppled = 0;
            let didTopple = true;

            while (didTopple && depth < 500) {
                didTopple = false;
                const wave = [];
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] >= 4) {
                        const x = i % N;
                        const y = Math.floor(i / N);
                        grid[i] -= 4;
                        if (x > 0) grid[i - 1]++;
                        if (x < N - 1) grid[i + 1]++;
                        if (y > 0) grid[i - N]++;
                        if (y < N - 1) grid[i + N]++;
                        wave.push({ x, y });
                        heatmap[i] = 1.0;
                        totalToppled++;
                        didTopple = true;
                    }
                }
                if (wave.length > 0) {
                    cascadeWaves.push(wave);
                    depth++;
                }
            }

            document.getElementById('cascadeSize').textContent = totalToppled;
            document.getElementById('cascadeDepth').textContent = depth;
            document.getElementById('totalGrains').textContent = totalGrains.toLocaleString();

            if (cascadeWaves.length > 0) {
                cascadeActive = true;
                currentWave = 0;
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const ox = (W - N * cellSize) / 2;
            const oy = (H - N * cellSize) / 2;

            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    const i = y * N + x;
                    const v = grid[i];
                    const heat = heatmap[i];

                    if (v > 0 || heat > 0.01) {
                        if (heat > 0.3) {
                            const r = Math.floor(221 * heat + 96 * (1 - heat));
                            const g = Math.floor(161 * heat + 108 * (1 - heat));
                            const b = Math.floor(94 * heat + 56 * (1 - heat));
                            ctx.fillStyle = `rgb(${r},${g},${b})`;
                        } else if (v > 0) {
                            ctx.fillStyle = baseColors[Math.min(v, 3)];
                        } else {
                            const a = heat * 2;
                            ctx.fillStyle = `rgba(188,108,37,${a})`;
                        }
                        ctx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize, cellSize);
                    }
                }
            }

            // Draw cascade wavefront highlights
            if (cascadeActive && currentWave < cascadeWaves.length) {
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = 0.6;
                const wave = cascadeWaves[currentWave];
                wave.forEach(({ x, y }) => {
                    ctx.fillRect(ox + x * cellSize - 1, oy + y * cellSize - 1, cellSize + 2, cellSize + 2);
                });
                ctx.globalAlpha = 1;
            }
        }

        let frameCount = 0;
        function animate() {
            frameCount++;

            // Decay heatmap
            for (let i = 0; i < heatmap.length; i++) {
                if (heatmap[i] > 0) heatmap[i] *= 0.96;
            }

            // Advance cascade replay
            if (cascadeActive && frameCount % 3 === 0) {
                currentWave++;
                if (currentWave >= cascadeWaves.length) cascadeActive = false;
            }

            draw();
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', function(e) {
            const ox = (W - N * cellSize) / 2;
            const oy = (H - N * cellSize) / 2;
            const gx = Math.floor((e.clientX - ox) / cellSize);
            const gy = Math.floor((e.clientY - oy) / cellSize);
            dropAndTrace(gx, gy);
        });

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            const ox = (W - N * cellSize) / 2;
            const oy = (H - N * cellSize) / 2;
            const gx = Math.floor((t.clientX - ox) / cellSize);
            const gy = Math.floor((t.clientY - oy) / cellSize);
            dropAndTrace(gx, gy);
        }, { passive: false });

        document.getElementById('btnFill').addEventListener('click', preFillCritical);
        document.getElementById('btnDrop').addEventListener('click', () => {
            dropAndTrace(Math.floor(N / 2), Math.floor(N / 2));
        });
        document.getElementById('btnClear').addEventListener('click', () => {
            grid.fill(0);
            heatmap.fill(0);
            totalGrains = 0;
            cascadeActive = false;
            cascadeWaves = [];
            document.getElementById('cascadeSize').textContent = '0';
            document.getElementById('cascadeDepth').textContent = '0';
            document.getElementById('totalGrains').textContent = '0';
        });

        window.reset = function() {
            grid.fill(0);
            heatmap.fill(0);
            totalGrains = 0;
            cascadeActive = false;
            cascadeWaves = [];
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
