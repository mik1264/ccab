<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandpile Fractal Garden | Sandpile Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); color: #FEFAE0; padding: 15px 20px;
            border-radius: 12px; font-size: 0.85rem; z-index: 1000;
            border: 1px solid rgba(138,154,91,0.3); max-width: 260px;
        }
        .info-panel h2 { color: #8A9A5B; font-size: 1rem; margin-bottom: 8px; }
        .info-panel p { margin-bottom: 6px; line-height: 1.4; color: #ccc; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .stat-label { color: #8A9A5B; }
        .stat-val { color: #DDA15E; font-weight: bold; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; flex-wrap: wrap; justify-content: center;
        }
        .controls button, .controls select {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .controls button:hover { background: rgba(138,154,91,0.9); }
        .controls button.active { background: #8A9A5B; color: #1a1a2e; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>Sandpile Fractal Garden</h2>
        <p>Click to plant seeds (large grain piles). Each grows into a diamond fractal. Where fractals overlap, interference creates new patterns.</p>
        <div class="stat-row"><span class="stat-label">Seeds planted:</span><span class="stat-val" id="seedCount">0</span></div>
        <div class="stat-row"><span class="stat-label">Total grains:</span><span class="stat-val" id="totalGrains">0</span></div>
        <div class="stat-row"><span class="stat-label">Topplings/frame:</span><span class="stat-val" id="toppleRate">0</span></div>
    </div>
    <div class="controls">
        <select id="seedSize">
            <option value="500">Seed: 500 grains</option>
            <option value="1000" selected>Seed: 1,000 grains</option>
            <option value="5000">Seed: 5,000 grains</option>
            <option value="10000">Seed: 10,000 grains</option>
            <option value="50000">Seed: 50,000 grains</option>
        </select>
        <select id="colorScheme">
            <option value="nature">Colors: Nature</option>
            <option value="fire">Colors: Fire</option>
            <option value="ocean">Colors: Ocean</option>
            <option value="neon">Colors: Neon</option>
        </select>
        <button id="btnPreset">Preset: Triangle</button>
        <button id="btnClear">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cellSize, gridW, gridH;
        let grid;
        let seedCount = 0, totalGrains = 0;
        let toppleCount = 0;

        const colorSchemes = {
            nature: ['#1a1a2e', '#2d3a1a', '#606C38', '#8A9A5B', '#DDA15E'],
            fire: ['#1a1a2e', '#4a0e0e', '#8b1a1a', '#d4500a', '#ffaa00'],
            ocean: ['#1a1a2e', '#0a2a3a', '#0e4d6e', '#2e8b9e', '#6ecfdb'],
            neon: ['#1a1a2e', '#2a0a3a', '#6a0dad', '#e040fb', '#00ff88']
        };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cellSize = Math.max(2, Math.min(5, Math.floor(Math.min(W, H) / 200)));
            const newGW = Math.floor(W / cellSize);
            const newGH = Math.floor(H / cellSize);
            if (!grid || newGW !== gridW || newGH !== gridH) {
                const oldGrid = grid;
                const oldW = gridW, oldH = gridH;
                gridW = newGW;
                gridH = newGH;
                grid = new Int32Array(gridW * gridH);
                if (oldGrid) {
                    const mw = Math.min(gridW, oldW);
                    const mh = Math.min(gridH, oldH);
                    for (let y = 0; y < mh; y++)
                        for (let x = 0; x < mw; x++)
                            grid[y * gridW + x] = oldGrid[y * oldW + x];
                }
            }
        }

        function plantSeed(gx, gy, amount) {
            if (gx < 0 || gx >= gridW || gy < 0 || gy >= gridH) return;
            grid[gy * gridW + gx] += amount;
            seedCount++;
            totalGrains += amount;
            document.getElementById('seedCount').textContent = seedCount;
            document.getElementById('totalGrains').textContent = totalGrains.toLocaleString();
        }

        function topplePartial(maxTopples) {
            let count = 0;
            for (let i = 0; i < grid.length && count < maxTopples; i++) {
                if (grid[i] >= 4) {
                    const x = i % gridW;
                    const y = Math.floor(i / gridW);
                    const give = Math.floor(grid[i] / 4);
                    grid[i] -= give * 4;
                    if (x > 0) grid[i - 1] += give;
                    if (x < gridW - 1) grid[i + 1] += give;
                    if (y > 0) grid[i - gridW] += give;
                    if (y < gridH - 1) grid[i + gridW] += give;
                    count++;
                }
            }
            return count;
        }

        function draw() {
            const scheme = colorSchemes[document.getElementById('colorScheme').value];
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;
            const hexToRgb = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
            const cRgb = scheme.map(hexToRgb);
            const bg = cRgb[0];

            // Fill background
            for (let i = 0; i < data.length; i += 4) {
                data[i] = bg[0]; data[i+1] = bg[1]; data[i+2] = bg[2]; data[i+3] = 255;
            }

            for (let gy = 0; gy < gridH; gy++) {
                for (let gx = 0; gx < gridW; gx++) {
                    const v = grid[gy * gridW + gx];
                    if (v > 0) {
                        const ci = Math.min(v, cRgb.length - 1);
                        const [r, g, b] = cRgb[ci];
                        for (let py = 0; py < cellSize; py++) {
                            const row = gy * cellSize + py;
                            if (row >= H) continue;
                            for (let px = 0; px < cellSize; px++) {
                                const col = gx * cellSize + px;
                                if (col >= W) continue;
                                const idx = (row * W + col) * 4;
                                data[idx] = r; data[idx+1] = g; data[idx+2] = b;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        canvas.addEventListener('click', function(e) {
            const gx = Math.floor(e.clientX / cellSize);
            const gy = Math.floor(e.clientY / cellSize);
            const amount = parseInt(document.getElementById('seedSize').value);
            plantSeed(gx, gy, amount);
        });

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            const gx = Math.floor(t.clientX / cellSize);
            const gy = Math.floor(t.clientY / cellSize);
            const amount = parseInt(document.getElementById('seedSize').value);
            plantSeed(gx, gy, amount);
        }, { passive: false });

        document.getElementById('btnPreset').addEventListener('click', function() {
            const amount = parseInt(document.getElementById('seedSize').value);
            const cx = Math.floor(gridW / 2);
            const cy = Math.floor(gridH / 2);
            const offset = Math.floor(Math.min(gridW, gridH) / 6);
            // Plant triangle of seeds
            plantSeed(cx, cy - offset, amount);
            plantSeed(cx - offset, cy + offset, amount);
            plantSeed(cx + offset, cy + offset, amount);
        });

        document.getElementById('btnClear').addEventListener('click', function() {
            grid.fill(0);
            seedCount = 0;
            totalGrains = 0;
            document.getElementById('seedCount').textContent = '0';
            document.getElementById('totalGrains').textContent = '0';
        });

        function animate() {
            const tc = topplePartial(5000);
            toppleCount = tc;
            document.getElementById('toppleRate').textContent = tc.toLocaleString();
            draw();
            requestAnimationFrame(animate);
        }

        window.reset = function() {
            grid.fill(0);
            seedCount = 0;
            totalGrains = 0;
            toppleCount = 0;
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
