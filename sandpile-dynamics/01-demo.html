<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic BTW Sandpile | Sandpile Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); color: #FEFAE0; padding: 15px 20px;
            border-radius: 12px; font-size: 0.85rem; z-index: 1000;
            border: 1px solid rgba(138,154,91,0.3); max-width: 260px;
        }
        .info-panel h2 { color: #8A9A5B; font-size: 1rem; margin-bottom: 8px; }
        .info-panel p { margin-bottom: 6px; line-height: 1.4; color: #ccc; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .stat-label { color: #8A9A5B; }
        .stat-val { color: #DDA15E; font-weight: bold; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000;
        }
        .controls button {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .controls button:hover { background: rgba(138,154,91,0.9); }
        .controls button.active { background: #8A9A5B; color: #1a1a2e; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>Bak-Tang-Wiesenfeld Sandpile</h2>
        <p>Click to drop grains. When a cell reaches 4, it topples to neighbors.</p>
        <div class="stat-row"><span class="stat-label">Grains:</span><span class="stat-val" id="grainCount">0</span></div>
        <div class="stat-row"><span class="stat-label">Topplings:</span><span class="stat-val" id="toppleCount">0</span></div>
        <div class="stat-row"><span class="stat-label">Max height:</span><span class="stat-val" id="maxHeight">0</span></div>
    </div>
    <div class="controls">
        <button id="btnDrop">Drop 1</button>
        <button id="btnDrop10">Drop 10</button>
        <button id="btnDrop100">Drop 100</button>
        <button id="btnRain">Rain Mode</button>
        <button id="btnClear">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cellSize, gridW, gridH;
        let grid, totalGrains = 0, totalTopples = 0;
        let raining = false;
        let pendingTopples = [];
        const colors = ['#1a1a2e', '#2d3a1a', '#606C38', '#8A9A5B', '#DDA15E', '#BC6C25', '#ff6b35', '#fff'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cellSize = Math.max(3, Math.min(8, Math.floor(Math.min(W, H) / 120)));
            const newGW = Math.floor(W / cellSize);
            const newGH = Math.floor(H / cellSize);
            if (grid && newGW === gridW && newGH === gridH) return;
            gridW = newGW;
            gridH = newGH;
            const oldGrid = grid;
            grid = new Int32Array(gridW * gridH);
            if (oldGrid) {
                const minW = Math.min(gridW, Math.floor(W / cellSize));
                const minH = Math.min(gridH, Math.floor(H / cellSize));
                for (let y = 0; y < minH && y < gridH; y++)
                    for (let x = 0; x < minW && x < gridW; x++)
                        grid[y * gridW + x] = oldGrid[y * gridW + x] || 0;
            }
        }

        function addGrain(gx, gy) {
            if (gx < 0 || gx >= gridW || gy < 0 || gy >= gridH) return;
            grid[gy * gridW + gx]++;
            totalGrains++;
        }

        function topple() {
            let didTopple = false;
            let toppleThisRound = 0;
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] >= 4) {
                    const x = i % gridW;
                    const y = Math.floor(i / gridW);
                    const give = Math.floor(grid[i] / 4);
                    grid[i] -= give * 4;
                    if (x > 0) grid[i - 1] += give;
                    if (x < gridW - 1) grid[i + 1] += give;
                    if (y > 0) grid[i - gridW] += give;
                    if (y < gridH - 1) grid[i + gridW] += give;
                    toppleThisRound++;
                    didTopple = true;
                }
            }
            totalTopples += toppleThisRound;
            return didTopple;
        }

        function stabilize(maxSteps) {
            let steps = 0;
            while (topple() && steps < (maxSteps || 1000)) steps++;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            for (let y = 0; y < gridH; y++) {
                for (let x = 0; x < gridW; x++) {
                    const v = grid[y * gridW + x];
                    if (v > 0) {
                        ctx.fillStyle = colors[Math.min(v, colors.length - 1)];
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
        }

        function updateStats() {
            document.getElementById('grainCount').textContent = totalGrains.toLocaleString();
            document.getElementById('toppleCount').textContent = totalTopples.toLocaleString();
            let mx = 0;
            for (let i = 0; i < grid.length; i++) if (grid[i] > mx) mx = grid[i];
            document.getElementById('maxHeight').textContent = mx;
        }

        function dropAt(cx, cy) {
            const gx = Math.floor(cx / cellSize);
            const gy = Math.floor(cy / cellSize);
            addGrain(gx, gy);
            stabilize(500);
        }

        function dropCenter(n) {
            const cx = Math.floor(gridW / 2);
            const cy = Math.floor(gridH / 2);
            for (let i = 0; i < n; i++) {
                grid[cy * gridW + cx]++;
                totalGrains++;
            }
            stabilize(2000);
        }

        canvas.addEventListener('click', function(e) {
            dropAt(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', function(e) {
            if (e.buttons === 1) dropAt(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            dropAt(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const t = e.touches[0];
            dropAt(t.clientX, t.clientY);
        }, { passive: false });

        document.getElementById('btnDrop').addEventListener('click', () => dropCenter(1));
        document.getElementById('btnDrop10').addEventListener('click', () => dropCenter(10));
        document.getElementById('btnDrop100').addEventListener('click', () => dropCenter(100));
        document.getElementById('btnRain').addEventListener('click', function() {
            raining = !raining;
            this.classList.toggle('active', raining);
            this.textContent = raining ? 'Stop Rain' : 'Rain Mode';
        });
        document.getElementById('btnClear').addEventListener('click', function() {
            grid.fill(0);
            totalGrains = 0;
            totalTopples = 0;
        });

        let frameCount = 0;
        function animate() {
            frameCount++;
            if (raining && frameCount % 2 === 0) {
                const rx = Math.floor(Math.random() * gridW);
                const ry = Math.floor(Math.random() * gridH);
                grid[ry * gridW + rx]++;
                totalGrains++;
                stabilize(200);
            }
            topple();
            draw();
            if (frameCount % 10 === 0) updateStats();
            requestAnimationFrame(animate);
        }

        window.reset = function() {
            grid.fill(0);
            totalGrains = 0;
            totalTopples = 0;
            raining = false;
            const btn = document.getElementById('btnRain');
            btn.classList.remove('active');
            btn.textContent = 'Rain Mode';
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
