<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Slope Explorer | Sandpile Dynamics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); color: #FEFAE0; padding: 15px 20px;
            border-radius: 12px; font-size: 0.85rem; z-index: 1000;
            border: 1px solid rgba(138,154,91,0.3); max-width: 280px;
        }
        .info-panel h2 { color: #8A9A5B; font-size: 1rem; margin-bottom: 8px; }
        .info-panel p { margin-bottom: 8px; line-height: 1.4; color: #ccc; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .stat-label { color: #8A9A5B; }
        .stat-val { color: #DDA15E; font-weight: bold; }
        .density-bar {
            width: 100%; height: 20px; background: #0a0a18; border-radius: 4px;
            margin: 8px 0; overflow: hidden; border: 1px solid rgba(138,154,91,0.3);
        }
        .density-fill { height: 100%; transition: width 0.3s; border-radius: 4px; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; align-items: center;
        }
        .controls button {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .controls button:hover { background: rgba(138,154,91,0.9); }
        .controls button.active { background: #8A9A5B; color: #1a1a2e; }
        .controls label { color: #FEFAE0; font-size: 0.8rem; }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>Critical Slope Explorer</h2>
        <p>Watch the sandpile self-organize to criticality. The average height converges to a critical density near 2.09 for the BTW model on a square lattice.</p>
        <div class="stat-row"><span class="stat-label">Avg height:</span><span class="stat-val" id="avgHeight">0</span></div>
        <div class="stat-row"><span class="stat-label">Critical cells:</span><span class="stat-val" id="critCells">0%</span></div>
        <div class="stat-row"><span class="stat-label">Grains added:</span><span class="stat-val" id="totalGrains">0</span></div>
        <div class="stat-row"><span class="stat-label">Grains lost:</span><span class="stat-val" id="grainsLost">0</span></div>
        <p style="margin-top:8px; font-size:0.75rem; color:#8A9A5B;">Density approaching critical:</p>
        <div class="density-bar"><div class="density-fill" id="densityFill" style="width:0%; background: linear-gradient(90deg, #606C38, #8A9A5B, #DDA15E);"></div></div>
    </div>
    <div class="controls">
        <label>Speed: <input type="range" id="speedSlider" min="1" max="50" value="10"></label>
        <button id="btnRun" class="active">Running</button>
        <button id="btnClear">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const N = 80;
        let W, H, cellSize;
        let grid = new Int32Array(N * N);
        let totalAdded = 0, totalLost = 0;
        let running = true;
        let speed = 10;
        const colors = ['#1a1a2e', '#2d3a1a', '#606C38', '#8A9A5B', '#DDA15E'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cellSize = Math.min(W / N, H / N);
        }

        function addGrain() {
            const rx = Math.floor(Math.random() * N);
            const ry = Math.floor(Math.random() * N);
            grid[ry * N + rx]++;
            totalAdded++;
        }

        function topple() {
            let any = false;
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] >= 4) {
                    const x = i % N;
                    const y = Math.floor(i / N);
                    grid[i] -= 4;
                    if (x > 0) grid[i - 1]++; else totalLost++;
                    if (x < N - 1) grid[i + 1]++; else totalLost++;
                    if (y > 0) grid[i - N]++; else totalLost++;
                    if (y < N - 1) grid[i + N]++; else totalLost++;
                    any = true;
                }
            }
            return any;
        }

        function stabilize() {
            let s = 0;
            while (topple() && s < 500) s++;
        }

        function computeStats() {
            let sum = 0, crit = 0;
            for (let i = 0; i < grid.length; i++) {
                sum += grid[i];
                if (grid[i] === 3) crit++;
            }
            const avg = sum / grid.length;
            const critPct = (crit / grid.length * 100);
            document.getElementById('avgHeight').textContent = avg.toFixed(3);
            document.getElementById('critCells').textContent = critPct.toFixed(1) + '%';
            document.getElementById('totalGrains').textContent = totalAdded.toLocaleString();
            document.getElementById('grainsLost').textContent = totalLost.toLocaleString();

            // Critical density is about 2.09
            const progress = Math.min(100, (avg / 2.5) * 100);
            document.getElementById('densityFill').style.width = progress + '%';
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            const ox = (W - N * cellSize) / 2;
            const oy = (H - N * cellSize) / 2;

            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    const v = grid[y * N + x];
                    ctx.fillStyle = colors[Math.min(v, colors.length - 1)];
                    ctx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize - 0.5, cellSize - 0.5);
                }
            }

            // Draw critical line overlay
            ctx.strokeStyle = 'rgba(221,161,94,0.15)';
            ctx.lineWidth = 1;
            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    if (grid[y * N + x] === 3) {
                        // Mark cells at threshold
                        ctx.strokeRect(ox + x * cellSize, oy + y * cellSize, cellSize - 0.5, cellSize - 0.5);
                    }
                }
            }
        }

        let frameCount = 0;
        function animate() {
            frameCount++;
            if (running) {
                const s = parseInt(document.getElementById('speedSlider').value);
                for (let i = 0; i < s; i++) {
                    addGrain();
                    stabilize();
                }
            }
            draw();
            if (frameCount % 10 === 0) computeStats();
            requestAnimationFrame(animate);
        }

        document.getElementById('btnRun').addEventListener('click', function() {
            running = !running;
            this.classList.toggle('active', running);
            this.textContent = running ? 'Running' : 'Paused';
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            grid.fill(0);
            totalAdded = 0;
            totalLost = 0;
        });

        window.reset = function() {
            grid.fill(0);
            totalAdded = 0;
            totalLost = 0;
            running = true;
            document.getElementById('btnRun').classList.add('active');
            document.getElementById('btnRun').textContent = 'Running';
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
